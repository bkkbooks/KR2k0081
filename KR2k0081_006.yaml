body:
  text: 籌海圖編卷六明胡宗憲撰直𨽻沿海總圖松江府圖蘇州府圖常州府圖鎮江府圖揚州府圖淮安府圖直𨽻兵防官考直𨽻倭變紀直𨽻事宜直𨽻兵防官考分江南北為二蘇松總督直浙福軍務兼巡撫浙江都御史提督應天軍務巡撫都御史操江都御史督察侍郎詳見浙江視軍情官詳見浙江巡按蘇松監察御史嘉靖乙卯四月兵部題准敕兼監軍紀功巡江監察御史整飭蘇松兵備副使整飭常鎮兵備副使添設海防僉事駐劄上海鎮守浙直地方總兵官駐浙江協守浙真地方總兵官駐金山蘇松參將常鎮參將遊擊將軍新設駐劄金山南洋逰兵都司劉家河把總以都指揮體統行事吳松江把總南滙把總青村把總柘林把總川沙把總福山港把總鎮江把總京口圌山把總沿海衛所金山衛左右前三所俱在衛城後所今調守柘林鎮堡中所今調守松江府城中前所今調守青村城中後所今調守南滙城太倉衛左右中前後五所吳松所鎮海衛左右中前後五所崇明守禦千户所鎮江衛沿海巡檢司松江府金山戚朩涇三林莊南蹌蘇州府江灣顧涇劉家港茜涇唐茜涇甘草白茆港唐浦福山沿海營堡臺堠松江府營五獨樹小盤金山大盤江門堡四柘林川沙胡家港蔡廟港塘鋪二十四前所二瞭守軍四人右所二瞭守軍四人左所二瞭守軍四人中所十七瞭守軍三十四人烽堠四十三每瞭守軍五人後所三新廟葛逢江門前所四橫瀝戚家管金山左所三漴缺陸鶴周公右所三西新胡家東新中前所十二戚漴大門宋家焦樹新袁浦舊袁浦頭墩五墩二墩墩舊四三墩墩新四中後所十八南滙頭墩二墩四墩五墩三墩六墩七墩墩十一八墩墩十二九墩墩十三十墩墩十四十五墩十六墩蘇州府營堡三福山村雙濵九折村敵臺三黃窑港白茆港七了港烽堠四十八依有周家西馬沙生宇墟吕家墟東潜顧涇寶山練祁月浦五嶽掬港七了港張浦浪港黃窰鹿鳴新塘雙鳴唐茜涇大錢涇金涇崔浦許浦黃濵髙浦福山白茆港千步涇瓦浦西洋盧浦海洋奚浦耿涇三丈浦黃泗浦新莊浦小東唐浦涇四馬大陳浦烏沙港徐陸涇野漕淮揚除總督督察視軍重官操江巡江與蘇松同不列外總督漕運兼提督軍務巡撫都御史提督淮揚軍務巡撫都御史巡按淮揚監察御史嘉靖乙卯四月兵部題准敕兼監軍紀功整飭淮揚兵備副使總督漕運總兵官提督狼山等處地方副總兵揚州參將鹽城參將統領兵勇逰擊將軍駐儀真北洋逰兵都司儀真守備掘港守備大河口把總周家橋把總狼山水兵把總東海把總管領曹濮民兵把總管領沂州民兵把總沿海衛所揚州衛旗軍八千九百六十名屯軍四千四百四十名通州千户所旗軍二百三名屯軍八百八十二名鹽城千户所屯軍八百八十二名泰州千户所旗軍二百三名屯軍八百八十二名髙郵衛旗軍六千七百二十名屯軍四千四百四十名興化千户所儀真衛軍四千四百八十名大河衛軍一千五百二十一名左中右前後中左中右中前八所淮安衛軍八百五十名左右前後中左中右六所東海中千户所軍五百五十名海州中前千户所軍四百七十五名沿海巡檢司揚州府狼山六十名吳陵五十名張港五十名石港四十名掘港四十名西場三十名海安三十名西溪三十名安豐三百名黃橋三百名印莊三十名口岸三十名歸仁五十名瓜州一百名淮安府喻口鎮馬邏廟灣羊寨壩上長樂惠深東海臨洪荻水鎮沿海營堡臺堠揚州府營十五徐稍壯捷大河壯武料角嘴營掘港東鎮逺登庸輕忠平定濟武忠節掘港西營興義寨九白駒拼茶劉莊角斜掘港場李家堡大河口軍二百人徐稍寨軍五十人料角嘴軍五十人烽堠九十三通州八海門縣二十八泰州十一拼茶寨四角斜寨二白駒寨一掘港寨九劉家寨一李家堡五直𨽻倭變紀蘇松常鎮洪武二年二月倭冦崇明諸處指揮翁德朱文擊敗之賊犯崇明德督舟師禦之於海門之工幫斬獲甚衆阮而復冦吳淞江沿海一帶文亦破之俘斬獻捷永樂二年四月對馬岐倭冦蘇松賊掠浙江穿山而來轉掠沿海上命太監諭其國王源道義源道義出師獲渠魁以獻十四年倭冦崇明朝廷發鎮江鎮海二衛百户十員率軍士千餘禦之冦平遂𨽻崇明守禦所其舊戍官軍發屬水寨自是賊無至境者嘉靖三十二年閏三月賊首王直犯嘉定賊自烈港之敗以百餘人自白馬廟而來收集餘黨流突蘇松掠嘉定之寶山鎮撫陳憲疑為鹽盜率輕兵追之後知為直不敢襲破南滙所自望日而後七日賊破城者再同知任環守備解明道敗賊於吳淞江口賊至劉家河揚帆而西明道與六合知縣董邦政率兵迎擊之追及於吳淞江口值綵綯港復有新賊至者與之合踪勢益猖獗官兵莫敢進都御史蔡公克亷遣同知任環往助之賊遂敗走俘斬百餘四月賊圍太倉州時賊勢甚急直逼太倉城下蔡公躬乘城督戰賊乃去而城外居民焚掠幾盡五月賊破吳淞所入據之越十日守禦解明道復之賊既破城遂據為巢明道襲敗之斬首百餘賊首三大王六大王死焉遂復所城賊遁出海復為州判金汝舟千户楊循禮所敗擒斬八十有竒賊首蕭顯入上海縣鎮撫胡賢死之顯自浙西流突直境過金山至天妃宫指揮黎鵬舉與賢禦之鵬舉被鎗賢死焉賊遂衝縣市焚台所自是而後浦東沿海二百餘里間新舊之賊往來絡繹無虛日矣十一月參將湯克寬敗賊於髙家嘴俘斬百餘三十三年正月蕭顯攻嘉定縣顯自上年入冦上海而去為官兵追逈登據崇明之南沙官兵圍守且半載值嵗暮守者懈顯得遁至黃􅹄入攻縣城又分掠南翔等鎮參將湯克寬擊敗之攻上海縣顯自嘉定循海而南攻圍上海甚急時城初築未固勢且陷官民洶洶兵備僉事任環統民兵三百僧兵八十往援時賊船泊黃浦者以百計而自吳淞江南行者不計焉環追襲之於五里橋賊敗南奔環追敗之於習家墳賊始懼適浙江都御史王公忬遣都指揮盧鏜來擊賊乃解圍而南二月都指揮盧鏜敗賊於史家濱僉事任環敗賊於歸家港時顯據史家濱為巢鏜進搗大敗之賊死者無算乃遁往浙江海寧縣鏜復追敗之其别踪之在歸家港者環亦敗之三月賊攻南滙所攻松江府副千户童元巡檢李叢祿禦戰死之賊自曹涇而來元與叢祿禦之於蕭塘力戰而死賊遂渡浦攻府城環與克寬擊敗之賊乃退走大門孰四月賊首王直等巢柘林賊與徐碧溪吳德宣等營柘林為巢窟連絡三百里如老鸛嘴七八團之間皆其部落之所屯聚也問分一支自清浦白鶴港而北出太倉分一支自劉家河入趨崑山州判金汝舟指揮姜統敗賊於劉家河賊自正月復據南沙至是突入劉家河統與汝舟率舟師擊敗之斬首百餘攻太倉州松江之賊出青魚涇遇賊自劉家河入者六十餘合攻州城攻崑山縣賊自劉家河入越太倉至崑山知縣祝乾夀蒞任甫一月聞報即督官民死守賊攻圍甚急蘇州路絶乾夀夜募死士持蠟書浮水而行八晝夜始逹郡城巡撫屠公大山巡按孫公慎遣都指揮梁鳯應援鳯竟不進生員龔良相涕泣請兵於孫公始知鳯逗遛之罪遣良相監督以行鳯大怒欲殺良相良相不為動促之益力鳯不得已至三里橋望賊即潰而西遺火器二船於賊佯報賊己遁去人皆信之賊得火器攻城益急至有捍陴者有穴城門下者乾夀與鄉宦朱隆禧等分門登禦而今生員張光紹潘蔚卿武舉郭龍韜等嚴督士民竭力禦之城賴以全時賊欲據崑山為巢故蘇州各縣皆被攻圍而攻崑尤急以崑山為蘇郡州縣適中之地得此為巢則沿海諸邑聲援俱絶進可以蠶食蘇常退可以拒援兵也總兵俞大猷敗賊於吳淞所賊船入吳淞江者十六艘大猷敗之沉其舟十一斬首二百五十有四賊攻蘇州府賊首阿八王自崑山分踪進掠府城參政翁大立提兵禦之賊乃退遁攻常熟縣賊酋劉鑑自梅李進攻越四日又合福山賊進攻縣城攻松江府五月賊解蘇松圍而去州同張魁千戶田應山追敗之賊糾諸縣精悍者凡七千人攻崑山縣城期於必破知縣祝乾夀殪其渠魁二大王賊大懼圖歸而各縣之圍皆解遁出劉家河者數百艘魁等追擊大敗之斬首四百四十有竒六月賊犯蘇州府賊自松江來者分作三支一由嘉定太倉大道而進一由關橋清浦間道而進一由唐行千墩而進㑹於崑山期犯府城兵備任環禦之於真義弗利百戶劉愛臣死焉賊遂進至府城焚掠諸市鎮而去取道於行春橋由鮎魚口出太湖過吳江知縣楊芷舉人周大章率舟師追擊於王江涇爛溪鶯湖等處皆勝之賊由菜花涇過嘉善而去七月賊攻南滙所八月賊攻嘉定縣賊首王直分遣其酋吳德宣徐碧溪自綵綯港率衆千餘入攻縣城參將許國李逢時敗賊於師家濱直知官兵將搗其巢乃進營於師家濱列七星陳以待官兵擊之大敗而去阮而又進攻之賊固守其舟時二參將所統者皆北兵不知地利屯所遇潮死者甚衆無何賊由原港出海水兵追戰於老鸛嘴之四馬洪大敗之賊攻青村南滙所金山衛蔡廟港賊併入柘林賊巢合攻青村所繼至之賊登周公墩者千餘攻南滙所旋亦入巢與新至之倭合攻金山皆為官軍敵退十二月賊陷青村所先是賊攻所城者數次官兵守備極嚴賊皆負傷而走積忿詣柘林借兵二千來攻弗克賊亦計窮欲去㑹守門百戶之伯有為賊所虜者賊令叩南門呼姪求入姪聞伯音以繩下挽昏黑之際賊乘隙以登百戶首先被殺賊遂入城焚殺比他地尤慘三十四年正月賊攻南滙所川沙之城僉事董邦政搗川沙窪賊巢破之時賊死傷者五百餘監生喬鏜復追敗之賊攻金山衛總兵俞大猷副使任環孫宏軾等敗賊於勝墩賊自嘉興流至吳江之平望分道而來一支由太湖瀾溪南麻一支由張村黎里出牛場涇期㑹於蘇州兵備任環知州熊桴知縣楊芷禦之於梅堰鶯湖皆勝之賊乃遁去以嘉善道阻復合兵由大道進至勝墩環與知府林懋舉等率狼兵自北擊之浙江副使孫宏軾總兵俞大猷率宣慰彭翼南兵自南擊之狼兵首殪其渠魁一人賊氣阻捐資於狼兵求脫弗聽東西皆阻水官兵南北夾擊之賊遂大敗斬首三百是戰也提督都御史周公珫巡按御史周公如斗令所在清野凡賊所向民間㸑具悉毁之而令環等扼之於前浙江巡按胡公宗憲復督宏軾等自後追之賊進不得食退不得息故有是敗賊入崇明縣知縣唐一岑死之賊旋就滅賊夜襲破縣城岑與之巷戰身被數刃猶力戰城賊敗出城一岑傷重而死居二日賊復至據縣諸耆民相與謀曰唐父母被害而吾輩乃容賊磐據吾縣耶於是相與戮力為死鬭賊二百人皆就滅二月賊攻青村所翁時奬等擊敗之三月賊圍上海縣賊五千餘屯新場下沙千餘屯閘港數千屯川沙俱進逼縣城時總督都御史張公經調集廣兵湖兵數萬駐松江賊乃退入舊巢完壘治兵為拒守計而諸營連絡聲勢益盛張公欲伺其出海擊其惰歸故搗巢之策卒不果行賊攻金山衛總兵俞大猷敗之柘林新至賊乘鋭來攻守者發矢石禦之賊中傷者甚衆乃解去既而又來攻大猷敗之俘者二百餘四月賊攻常熟縣福山之賊兵備副使任環擊敗常熟三丈浦之賊先是賊屯三丈浦者勢甚猖獗且易官軍不為備環隂部署主客官兵以保靖應襲彭守忠為中哨太倉耆民為右哨知縣王鈇為左哨躬環甲胄激勵三軍我兵皆踴躍思奮進攻之賊遂大敗俘斬二百八十有竒而我兵不損一人自用兵以來旱戰全捷未有如此者也常熟知縣王鈇與致仕參政錢泮禦賊於上塘港口皆死之三丈浦之賊為任環所敗勢已破沮值陸涇壩敗遁之冦與之合踪復肆猖獗欲攻縣城鈇泮率兵禦之賊佯為村民避賊若依官兵為援者官兵方共惜之倐爾起鬭兵士驚潰鈇泮猶督戰不已遂皆遇害柘林賊首徐海分踪出掠賊知官兵將搗其巢乃分兵四出以牽制我師東掠崇明常熟以達江北西出嘉湖以搖動全浙而川沙之賊先屯老鸛嘴者以聲援不繼俱併入柘林賊攻無錫縣五月任環復敗三丈浦之賊賊既殺王知縣聲勢甚滋漫而太湖之賊與之合益驕肆無忌環率官兵進攻大敗之殺其白眉主帥一人賊乃大懼稱環為拚命官人數遷徒避之官兵擊賊於陸涇壩大破之詳見大捷紀逰擊將軍周藩與賊戰于朱涇敗績死之賊復巢柘林賊自王江涇之敗皆遁出海新賊萬人復來據之未幾風雨大作出海之賊覆溺幾盡餘黨復巢焉賊掠浙江取道蘇州出海至平望浙直官兵㑹擊大敗之詳見大捷考六月賊攻蘇州府賊自柘林取路崑山而來遂掠太湖洞庭兩山常熟三丈浦賊出海太倉知州熊桴敗之於登舟沙俘斬一百三十有竒餘賊南遁至吳淞江口復為把總劉堂所敗其酋急速如郎就擒斬首二百六十七月松江府知府方亷計殺柘林賊千人時巢賊甚熾亷遣諜投毒井中賊死者千餘人斬首數百浙江提督都御史胡公宗憲遣參將盧鏜都指揮王沛敗賊於劉家河金山洋先是賊自王江涇陸涇壩平望數敗之後勢甚窮促參將盧鏜都指揮王沛時往撓之賊死傷及疾疫者過半乃潜伏巢穴不敢出掠日為遁歸之計既而為官兵邀擊遂沉舟破釡示無去志然實計官兵不備之於海而得走也胡公諜知之預遣沛等率舟師伏海口向之賊果遁去沛等追敗之於金山洋悉沉其舟賊溺死無遺柘林賊攻屯陶宅賊出海復為總兵俞大猷參將盧鏜把總婁宇所敗乃復登陸結巢陶宅其一艘飄泊海門則賊酋林碧川為之首與其下一百二十餘賊復登大陳山為把總任錦俘斬無遺八月劇賊五十三人流犯蘇州提督都御史曹公邦輔討平之詳見大捷考七丫港吳淞江賊遁出海洋把總楊尚英追敗之沉其舟六十俘斬三百有竒九月浙直官兵㑹擊陶宅之冦指揮邵升姚泓生員千嶽皆死之升等乘勝進攻賊死守其巢乘髙刺下三人皆死焉總督都御史楊公宜遣逰擊將軍曹克新副使任環搗川沙賊巢擊走之克新統官兵攻賊大敗之燬其巢賊遁至吳淞所環督舟師襲之斬獲大半餘黨走清水窪閏十一月僉事焦希程率川兵搗周浦賊巢大敗之先是楊公潜令武生胡亘朱先等設伏賊巢約縱火為號希程監督川兵與曹克新乘雪夜襲之亘等縱火焚寺賊驚亂四面伏起斬首二百三十有竒而賊巢燬焉官兵敗賊於吳淞江口周浦賊遁出吳淞江副使王崇古總兵俞大猷追擊大敗之俘斬一百七十三十五年正月參將尚允紹擊賊於四橋死之賊首陳東時屯新場為巢二月賊首徐海復巢柘林新陳賊首陳東自燬其巢來與之合三月賊據蔡廟堡參政任環參將喬基等大破之時賊新至漴缺總督胡公令環㑹基共擊之賊逃入蔡廟廢堡環乃以把總陳習攻東門車梁攻西門張惟孝攻西北顧鳴鵬攻西南賊死守官兵攻之戰方酣王賔等兵潜從東北入賊遂大敗悉斬之官兵擊新至賊於七竈洪等處悉敗之時新至賊一支自漴缺登犯逰擊宗禮敗之一支自七竈洪登犯僉事董邦政敗之一支自南滙所登犯參政任環敗之參將婁宇又敗之俘斬甚衆而所存者無幾焉先是賊據松江纍年未有能挫之者及胡公為總督於是官兵僇力而新至之賊皆迎刃以敗云陶宅之冦為官兵擊敗遁出海洋參將婁宇等復追敗之總督胡公會浙直兵進搗陶宅之冦大敗之賊死者甚衆遁出漴缺外洋婁宇與把總王應麟復敗之於九團洋俘斬踰百參政任環僉事董邦政擊界嘴新至賊平之賊新至自界嘴登犯胡公檄環邦政㑹擊之大戰一日斬賊十之七八明日復戰遂無孑遺賊犯西菴董邦政平之賊新至自金山登陸流至西菴胡公檄邦政攻之賊大敗走匿法昌寺邦政復火攻之盡殱焉賊犯青村把總王應麟討平之新至賊自青村焚舟登陸應麟敗之賊匿民房官兵復火攻之賊突走為官兵所截不得去乃復匿民房遂悉斬之董邦政追擊新賊于沈莊平之賊百餘皆就僇賊入吳淞江總兵俞大猷大破之賊舶十六自寶山入江大猷先奉胡公檄與把總楊尚英劉堂等設伏海口待之賊至伏發沉其舟十三斬首二百五十賊攻江隂縣知縣錢錞出禦戰死之時賊攻圍甚急填濠直逼城下勢且陷錢錞議欲出兵拒之兵備副使王崇古不從錢錞獨率民兵出城捍賊力戰而死然自是賊亦稍稍引去矣賊攻無錫縣賊入楊子江鎮江衛千户沈宗玉王世臣戰死五月賊攻上海縣尋進攻松江府官兵追擊於􅍩湖敗之時賊新至者以萬計復屯柘林乍浦總兵俞大猷同知袁文貴知縣楊旦等敗其前鋒既而賊攻工海縣又為官兵所敗而去遂攻府城把總劉堂追擊於􅍩湖敗之參政任環同知熊桴復追擊於澱山湖東又敗之前後俘斬三百餘賊六月新安衛百户帥印與賊戰於青村德勝港死之時印統廣兵追賊總兵俞大猷邀擊遁賊於茶山洋大破之七了港賊與吳淞江賊為官兵所敗相繼遁出海洋大猷預受胡公檄設伏劉家河海洋待之且攻且逐追及于茶山東北沉其舟六十俘斬三百餘殘冦宵遁復為颶風所覆無生還者總兵徐珏擊孟河之賊大破之賊遁出楊子江把總張成己復追敗之時賊在孟河勢頗猖獗珏與戰大敗之賊死者三百餘人先是督察趙公渡江而南預戒兵將無得貪功取級以陷賊計故是戰殺傷獨多既而賊遁出江成己率舟師復破之斬首百計八月常州賊遁出海總兵盧鏜等追擊大敗之賊掠江隂無錫為官兵所敗遁出海洋胡公命鏜等追敗之沉其舟數十俘斬三百五十有竒三十八年四月賊據崇明三沙七月遁往揚州賊舟為颶風所擊登三片沙總兵盧鏜與把總楊尚英迎擊之沉其三舟俘斬百餘既而欲突入內地為官兵所截遁過三沙鏜等復攻敗之總督胡公恐其滋蔓檄副使熊桴副總兵劉顯與鏜協攻之通政唐公順之適至乃帥官兵渡海而東與賊相持者月餘官兵屢進撓之賊屢敗舟盡燬賊窮促死拒值提督陳公錠告病而去兵餉不繼遂輟圍而西與胡公議復遣兵往擊且檄沿海嚴為之備賊造小舟數十乘風雨從北面遁往江北官兵追之弗及淮揚嘉靖三十四年四月賊犯海門知縣趙卿敗之時賊首徐海屯松江之柘林知官兵將搗其巢故分掠江北卿敗之斬首一百五十五月參將喬基等擊賊于吕四場敗之基與都指揮張恆通州同知印寀統兵夾擊賊大潰敗俘斬一百六十三十五年四月百户戚繼爵與賊戰于狼山死之都指揮張恆千户羅大爵百户曾沂禦賊於揚州死之時賊一從瓜州入一從新港入一從通州入賊攻瓜州賊攻揚州府同知朱裒等死之賊攻小東門甚急官兵用佛狼機殪賊數人賊乃退去裒與千户賈勇應襲男恩率兵出城禦賊死焉髙郵衛經厯晏鋭為賊虜去五月無為州同知齊恩與賊戰于圌山之北江中死之恩率兵與賊大戰乘勝逐北誤入伏中力戰而死父子兄弟叔姪同時遇害者七人詳見遇難狥節考副使馬慎追賊於狼山敗之賊遁出江慎追敗之既而福山把總鄧城又追敗之沉其舟十一是年犯江北之賊凡五而廟灣之賊尤劇副總兵盧鏜恭將劉顯上舍人彭志顯屢進攻之賊遂敗遁三十六年四月五月賊犯揚州府總兵盧鏜等大敗之賊入海子內為東兵所敗至灣頭鏜等復敗之斬首一百七十餘賊入寶應縣先是揚州東門及瓜州俱有堡賊至揚州不得掠乃從髙郵至寶應寶應素無城焚掠殆盡賊犯天長都指揮沃田把總嶽君寵與戰死之六月副使于德昌參將王元伯劉顯擊泗州賊破之時賊掠泗州為官兵所敗德昌等㑹擊之顯身先士卒殺衣紅賊首一人羣倭大亂元伯督兵乘之賊大潰敗追及于舟所水兵復自下應之賊死者無算既而賊遁出海總兵劉顯敗之於安東千户汪時中又敗之於廟灣匣子港賊竟遁去三十八年四月賊犯如臯官兵擊之時賊新至官兵首挫其鋒斬首一百六十賊犯盧家場千户汪時中擊却之賊從大河口呂四場登者以千計據盧家場時中與把總張大義合兵圍之大義意欲困之且待諸兵齊至然後進擊時中奮然曰我等既受倭任坐視賊之肆虐民之荼毒而不肯前何也大義固沮之遂與有隙時中單騎提雙刀突入賊營斬賊數人賊大驚異相顧錯愕莫敢誰何似有嗼羡其勇而欲收用之意時中繞賊營後賊追之部兵往救賊大敗走為之喪氣官兵進搗廟灣賊巢大破之詳見大捷考參將胡宗義與賊戰於海安兵潰千户趙世勳鎮撫韓𦙍死之賊尋為副使劉景韶所滅時海安故有毛葫蘆營毛兵素貪宗義新任無紀毛兵為賊所餌而敗官兵皆潰世勳與𦙍死於陳提督李公遂檄副使劉景韶率邉兵逐之賊大敗奔張家莊官兵圍之因縱火攻焉賊奔新洲官兵復追敗之俘斬盡絶約三百五十有竒其别支之在曺家莊者亦為景韶所敗奔潘家莊景韶復斬絶之七月副使劉景韶參將丘升擊賊於舊場敗之三沙遁至之賊也既而賊遁仲家莊官兵圍困是夜漏下三鼓賊乘雨潰圍而走官兵復追敗之斬首三百餘賊遁七竈河八月副總兵劉顯曹克新等敗賊於白駒場賊既為劉景韶所敗遁白駒場官兵圍之四面逸出復為官兵敵退回守其巢顯身先陷陳賊死者百餘乘夜遁大海沙洲顯復陷陳攻敗之賊潰走走則陷沙途中官兵又敗之俘斬千餘餘見大捷考賊遁出瞭角嘴副使熊桴敗之賊為劉顯等所窘將遁出海總督胡公預檄蘇松兵備副使熊桴率舟師設伏海上至是賊逸官兵敗之總兵盧鏜又追敗之直𨽻事宜直𨽻東濵巨海北亘長淮中貫大江江南則為蘇松常鎮諸郡江北則為淮揚諸郡其勢不能以相接也故各有巡撫之設在蘇松四府有防海防江二者之責在淮揚二府有防海防江防淮三者之責以其均之為直𨽻也合為一卷江南諸郡松江自金山衛至南滙所官軍各分信地各有定額按金山衛以西守禦獨樹江門二營舊制各設官軍四十名又貼守兵共一百名金山衛以東守禦金山營胡家港堡蔡廟港堡舊制各設官軍四十名又貼守軍共三百五十二名已上正守軍人係金山衛查撥貼守軍係太倉鎮海二衛嘉興千户所調發每歲二月上班十月掣班青襯以東各洪港舊制係南滙官軍把守今查修復海塘須照舊分派但太倉鎮海嘉興同有倭患貼守官軍似難調發相應於金山青村適中如柘林地方南滙吳淞江適中如七八團地方添設陸路把總二員各領精兵一千如募到狼兵邳兵之類若兵數不敷就於沿海招募義勇照依客兵支給口糧各官兵即於柘林七八團暫借民居劄營隨路有警相機策應不許潜住衛所城中各設守禦官軍悉聽鈐轄此松江海防設備之大略也若沿海港口金山以東有翁家港蔡廟港柘林漴缺等處南滙以北有四五六七八九團洪口川沙窪清水窪等處皆宜設船防守按舊制金山衛所造船各有定額左右前後所每百户所造出海哨船四隻共計八十隻青南二所每百户所造出海哨船四隻共計八十隻俱就各衛所派撥巡軍在海巡邏正統間因海患寧謐或以船為虛費題准以江船易馬而哨船之制遂廢矣今議設船隻一馬之資不足以備一船之用官軍窮苦又難陪貱合令每馬二匹造船一隻再於衛所查有地租公費銀兩與松江府庫軍前銀內相兼輳數每船量貼銀十兩金山衛總委一官督造其各船應用器械火器合於原議太倉置造軍器內給發聽用就㸃各衛所知水軍人操習水戰布列港口各分信地如倭賊突至而縱容其停泊者服以上刑則自無規避之患矣此松江海港設備之大略也夫沿海設備固為上策萬一外守不固則黃浦一帶又為蘇松險要守浦乃所以守門户猶有愈於守城也今吳淞江口即為黃浦口子既經設備而吳松江所亦設兵一枝以防深入矣而至於上海之髙倉渡沈莊塘周浦閘港閔行華亭之葉謝曺涇張堰等處賊一等岸搶船渡浦甚易除松江府先後打造雙塔船鷹船各發上海華亭各召募水兵分布沿浦各港巡邏把截又華上二縣各募鄉兵護守城池有警調至浦邉協守但前項兵夫官無専職則事難青成而沿浦二百里之逺本府巡捕官一人勢難管攝合令清軍同知一員帶管華亭鄉兵水兵自豐涇以至閔行皆其信地再設巡捕同知一員住劄上海専管該縣鄉兵水兵自閔行以至嘉定界首皆其信地無事率兵操演有事統兵防守蓋同知名位稍尊威令可行又科甲之左遷外補與舉行之才望升遷者皆得為之庶濟實用若止設通判則為官非樂就而下亦玩視恐不能振作而有為也此松江內地設備之大略也然倭舶之來乘風渡海勢難聨絡每至海外大山必停泊候齊然後深入照得羊山為本府所屬為定海吳淞江二總兵兵船㑹哨之處以地里適均故也本府所造之船數本不多僅可以支把港之用此但可以言守而不可以言戰須得福船蒼山各數十隻沙耆民船二三百隻每至風汛時月分泊港口各住信地更番出至羊山往來逰擊晝夜不絶外則為定海吳淞江㑹哨兵船之羽翼內則為海港把守兵船之捍衛遇有海賊齊力奮擊將見賊船䑸散而少我兵船䑸合而衆盛衰之氣勢既分則勝負之分數自判得海防之上策矣抑猶未也查得沿海民竈原有採捕魚蝦小船並不過海通畨且人船慣習不畏風濤合行示諭沿海有船之家赴府報名給與照身牌面無事聽其在海生理遇警隨同兵船追剿此則官兵無造船募兵之費而民竈有得魚捕盜之益此松江海洋設備之大略也已上都御史方公亷前任松江府呈蘇州沿海一帶險隘甚多舉其大者則常熟有福山港白茒塘太倉有劉家河七丫港嘉定有吳淞江黃窑港皆賊之通衢而東吳之門户此則所謂一府之險要長洲則􅍩湖浩蕩吳江則鶯湖相屬吳縣則太湖交通皆賊之徑道而腹裏之關隘此則所謂一縣之險要以言其次則福山以西有三丈浦斜橋以東有許浦金涇劉家河以北有新塘浪港茜涇吳松江以南有寶山以東有老鸛嘴均之所謂險要而少次焉者况海濵數百里一望平坦非有山風險阻為之扼塞皆可以泊船登岸要害無邉兵力有限而防禦之計當先其大者以海邉惟福山為最以腹裏惟勝墩為最故劉家河吳松江福山港舟師防守不可單弱白􅍩口七了港黃窑港俱當預設戰艦庶與各港相為掎角又如賊自東南而來必由寶山吳松江宜發船一䑸泊於吳家沙以堵截之賊自東北而來必由三沙劉家河宜發船一䑸泊於營前沙以堵截之把總遊兵船隻往來策應而三丈浦新塘老鸛嘴等處亦得以聨絡而并制則蘇之外防或可無憂矣至於風汛時月吳松水兵統發勝墩平望以防嘉興突犯之冦吳縣水兵統發太湖以防蠡里突犯之冦長洲團結水兵統發周莊以防泖湖突犯之冦本府相度緩急發遣水陸之兵以為應援則蘇之內防或可無憂矣然福山港劉家河吳淞江各該把總之官統領兵船在洋堵截似為有備但賊船之來聨䑸接艦乘風駕潮萬一不能盡行邀擊或有一二泊淺閣岸則水兵束手旁觀任其焚劫無可奈何而把總官亦且以為非所事事矣合於常熟縣分撥兵勇一千名屯駐福山港五百名屯駐白茆塘太倉州分撥勇兵一千名屯駐劉家河大鎮二衛原練杆子軍兵五百名屯駐七了港嘉定縣分撥勇兵一千名屯駐吳淞江五百名屯駐黃窑俱聽各該把總選官分領相機調度賊在外洋則水兵擊之賊若登岸則陸兵堵之彼此夾攻逺邇互應各該州縣量為聲援如此則賊亦疑畏而不敢犯矣至於腹裏如崑山縣分撥兵夫三百名屯駐清洋江三百名屯駐千墩吳江縣分撥兵夫五百名屯駐勝墩各張聲勢以助軍威各該領兵官聽其調遣不許退避萬一賊勢重大未易為功則各枝之兵又宜聽府州縣掌印官調回守城庶事體專一可以責成兵勢聨絡不致孤懸矣己上副使溫景葵前任蘇州府議主事唐樞云松江有海防道僉事住劄上海蘇州有兵備道副使住劄太倉則常熟江隂地方自福山白茅奚浦諸港進泊頭山可直趨無錫武進此處頗為空缺應援不及故更設一兵備轄至鎮江一帶住劄江隂賊入海口即為逰擊若深入大江即從腹裏抵京口截禦都御史唐順之云自來禦倭之策無人不言禦之於海則易禦之於陸則難是以海上㑹哨㑹剿事例甚嚴所以圖難於易也滸山去乍浦金山吳淞江三處各是一潮道里適均係㑹哨所在又云海賊入江由江兩岸登陸之路廖角嘴營前沙南北相對海面約濶一百四十五里為第二重門戶周家橋與圌山相對周家橋北岸至順江洲與江南分界江岸約濶六七里順江洲至新洲夾江面約濶七八里新洲來至圌山南岸江面約濶十四五里為三重門户三處領水官兵須整備船艦晝夜緊守三門勤㑹哨以防春汛門户既固堂奧自安若三門哨有踈虞至不得己而守金焦兩岸所謂下策與無策矣又云江北江南事例互相應援况南北共海賊若搶船上岸不冦江南則冦江北是江北之援江南亦自援也若不㑹兵殱之於海中何以獨力禦之於岸上巡撫都御史翁大立題云今日海防之要惟有三策出海㑹哨毋使入港者得上策循塘距守毋使登岸者得中策出水列陳毋使近城者得下策不得己而至守城則無策矣臣周行海壖分布信地視吳淞所乃水陸之要衝蘇松之喉咽也提兵南向可以援金山之急揚帆北哨可以扼長江之險以副總兵統兵鎮之自吳淞而北為劉家河為七丫港又東為崇明縣七丫而西為白茒港為福山又折而西北為楊舍為江隂為靖江又西為孟河為圌山此皆舟師可居利於水戰臣皆設有兵船非統以把總即統以指揮而又以圌山逰兵把總駐劄營前沙㑹哨於江北吳淞游兵把總駐劄竹箔沙㑹哨於羊山常鎮參將統水陸兵據江海之交鎮守於揚舍所以備水戰者亦既密矣但吳淞而南雖有港汊每多砂磧賊可登岸兵難泊舟非選練步兵循塘距守以出中策不可也今自吳淞所而南為州沙堡以把總練兵一枝守之川沙而南為南滙所以把總練兵一枝守之南滙而西為青村所以把總練兵一枝守之青村而西為柘林堡以都司練兵一枝守之此皆不逺六十里聲援易及首尾相應宛然常山之蛇之勢也柘林而西為金山衛西連乍浦東接柘林頻年皆賊所巢窟添設遊擊將軍一員統領馬步遊兵往來遊徼則北可以護松江而西可以援乍浦江北諸郡都御史唐順之云廟灣剿賊之路原有兩條一條從寶應拖船過埧水路自清溝喻口進攻則兵勢既便而饋餉亦易一路從淮安至馬邏陸路進攻則兵勢既迂而饋餉亦難又云通州屯下重兵若有冦則又有客兵屯聚計算通州所出糧彀得兵吃否恐臨期不免騰貴則通州該何路糴買或是先將軍餉銀上江糴米從江路運至通州積下若米價騰貴則銀米兼支與軍家為便柴薪亦須預處又云江北局面與江南浙福不同靠不得水戰止靠陸戰也閩縣知縣仇俊卿云海冦之來每自南而北度南麂山則自廣入閩矣過流江寨則出閩入浙東矣越海門則又浙之西矣踰寶山至吳淞沙上等處則又自浙入江南直𨽻矣沙上以南不暇泛及兹以海道之要害切于江北者言之狼山當江海之吭而廖角掘港皆揚之東南界也胊山據淮海之首鬱州嚶游山皆淮之東北境也中包泰興之周家橋鹽城之射陽湖山陽之雲梯關廟灣等處此皆沿海衝要之區冦盜可以停舶出沒之處乃據守所當先者也近奉欽依東西二海所雲梯關麻洋掘港俱設把總惟周家橋廟灣場二處亦須添設把總其狼山胊山為首尾之勢責令參將分布駐劄堵截海冦中間舊設新添官軍兵快悉聽參將提調凡遇聲息百里之內同日應援不許互相推避致誤軍機各照律例重擬庶心力可一盜冦可禦又照臨清向為北敵添築外城淮郡西湖嘴正人煙稠密處所一遇冦至搬移流離况二城所容有限欲將西湖嘴另築一城又慮財力地勢俱有未便聊將夾城中間聨築為道一自新城東南角樓起抵舊城桃花營一自新城西南角樓起抵舊城北水關共計四百餘丈比之揚外城之工不及十之一二如此則兩城相通糧草兼濟攻守有備矣吳郡監生金魚云倭冦之患起於吳浙而沿及淮陽蓋揚州富甲天下人所素聞三十五年之夏賊以二百餘人或曰止一百三十餘人突至揚州城下城中謹閉自守任其遊逸無如之何大掠而去自是益生歆豔而揚州為賊所必窺之地矣以江北之大勢言之東起瞭角嘴大河口以及吕四盧家等場沿于楊樹港海門裏河通州與如臯泰州稍折而北則為揚州矣過揚州而西稍北則天長滁州抵中都踰海門而北則為徐步營又北則為崛港又東北則為新插港轉而西北則金沙鹽城廟灣劉莊姚家蕩再西北則蛤蜊麻線等港而至大海口矣劉莊東北則安東安東之北則為海州贑榆泰州西北則為髙郵寶應寶應之北為淮安淮安轉西則泗州以達鳳陽此江北形勢之大略也賊入海之道有二其一新港為一道新港即所謂三江口蓋由南江狼山越儀真瓜州而入登岸則卞家墳周家墳稍折而東則揚州矣此可入以登岸亦可從以出海者也此最為便道其二則蛤蜊麻線等港沿北大海口為一道大海口有水陸路南通廟灣與劉莊姚家蕩俱為大鎮賊若據此我兵屯於湯潮岸等處賊南尋新港路出不得則必北尋大海口而出勢所必然也若安東海州之東北有大北海不惟道里迂逺且砂磧甚多此不可運舟者也崛港新插港之東亦有北海砂磧亦多不堪重載此但可從以入而不可出者也是賊出海之路止有二途若其登岸之處則不一東則瞭角嘴吕四場西則楊樹港徐沙營又西則狼山楊樹港北則新插港崛港皆其所從以登岸而入冦之路也夫賊所歆慕惟在揚州一執居民便問其道若登狼山必窺通州而揚州在西使于榆東榆西等處率民以掣其後則賊必敢直前以冦揚州若于瞭角嘴吕四場或新插港崛港以進使于榆東榆西等處屯兵以遏之則揚州可無危故今榆東榆西等處最為要地而當事者欲屯宿重兵以控扼賊鋒者有以也按江北之地細港委蕩固亦有之而平原浩壤則視吳松為多夫西北騎兵倭冦未易以嬰其鋒也既得平地則騎兵可施三十八年之捷以西北騎兵三千為之先衝可見也他有湯潮岸者文范公所築以捍海溢者也故亦名范公堤東南起四吕蕩西北抵姚家場綿亘幾三四百里髙岡平衍可用騎兵為之長驅今東關瓜州俱己建堡賊若於瞭角嘴吕四場及新插港崛港以進或不能襲取揚州必轉之東北而窺淮安安東以據劉莊廟灣我軍茍能彼此夾攻逼之使至湯廟岸以西北騎兵衝其鋒而以火器繼之各路兵隨後擊之賊可以戰成擒矣故我軍惟利賊之至此者有以也新插港東臨北海素有鹽徒數百艘聚泊崇明北海之冦欲劫鹽協徒而不果當事者欲置官于此以提督鹽徒使不為賊用而為我用亦一見也夫冦興以來燒劫屠戮之慘吳浙淮揚所同若獲利之多則未有如淮揚者而賊所必不能舍者在是矣况其地運道陵寢在焉所係尤重乎夫江北之地除安豐等三十六場俱在海內不為要害其要害之處乃通州也狼山也楊樹港裏河鎮也榆東榆西等場也瞭角嘴吕四場也崛港新插港也廟灣劉莊金沙場姚家蕩也今皆己建城堡設戍守非若往日之無備矣其要害之尤者曰新河出入最便逼近揚州也曰北海所從以通新插港且有鹽徒聚艘於此者也曰廟灣以其為巨鎮而可通大海口也故當事者荆川先生欲以把總三人一住新港一住北海近新插港且有鹽艘聚泊也或曰廟灣以北之北海疑未是一住廟灣一為陸路逰擊住劄海安鎮若海安在如臯泰州之間東可以控扼狼山通州海門之入而西可以捍衛揚州也籌海圖編卷六
