body:
  text: 籌海圖編目録經略三兵船廣東船圖説尖尾船圖説大頭船圖説大福船圖説草撇船圖説海滄船圖説開浪船圖説髙把梢船圖説艟􅬋船圖説蒼山船圖説八槳船圖説鷹船圖説漁船圖説網梭船圖説兩頭船圖説蜈蚣船圖説沙船圖説船碇圖説兵船總説兵船稍手論兵器粵兵盔甲圖説燕尾牌圖説挨牌圖説藤牌圖説銅發貢圖説佛狼機圖説鳥銃圖説銃圖説子母炮圖説一窩蜂圖説天墜炮圖説地雷圖説大蜂窠圖説火妖圖説火藥桶圖説火磚圖説噴筒圖説火器圖説炮圖説兩廣藥箭圖説邊箭圖説弩箭圖説伏弩圖説馬箭圖説火箭圖説神機箭圖説標鎗圖説長鎗圖説梨花鎗圖説􅶿筅圖説棍圖説天蓬鏟圖説偃月刀圖説劒圖説銜枚圖説兵總器欽定四庫全書籌海圖編卷十三明胡宗憲撰經略三廣船視福船尤大其堅緻亦逺過之蓋廣船乃鐵栗朩所造福船不過松杉之類而已二船在海若相衝擊福船即碎不能當鐵栗之堅也倭夷造船亦用松杉之類不敢與廣船相衝但廣船難調不如調福船為便易何也廣船非我軍門所轄不似福船之易制禦一也廣船若壞須用鐵栗朩修理難乎其繼二也造船大户倩人駕使任其毁壞而不惜三也造費浩繁其毁甚易移文修造理勢難行四也將欲重價以雇之則此船在廣魚鹽之利自多區區價微不樂于雇五也欲許其帶貨則廣貨之來無資于海蓋福建收港溪水甚逆浙直道逺風濤可畏不如一踰梅嶺即浮長江四通八達故雖帶貨亦非其所願六也向來通倭境漳泉無生理之人廣人自以魚鹽取西南諸畨之利不必如福船之當啖以取利中國七也此廣船之利弊也廣東大戰艦用火器于浪漕中起伏蕩漾未必能中賊即使中矣亦無幾何但可假此以裭敵人之膽耳所恃者有二發礦佛郎機是惟不中中則無船不粉一也以火毬之類於船頭相遇之時從髙擲下火發而賊舟即焚二也大福船亦然福船髙大如樓可容百人其底尖其上濶其首昻而口張其尾髙聳設柁樓三重于上其傍皆護板釘以茅竹堅立如垣其帆桅二道中為四層最下一層不可居惟實土石以防輕飄之患第二層乃兵士寢息之所地板隱之須從上躡梯而下第三層左右各護六門中置水匱乃揚帆炊㸑之處也其前後各設朩碇繫以棕纜下碇起碇皆于此層用力最上一層如露臺須從第三層穴梯而上兩傍板翼如欄人倚之以攻敵矢石火炮皆俯瞰而發敵舟小者相遇即犂沈之而敵又難于仰攻誠海戰之利器也但能行于順風順潮回翔不便亦不能逼岸而泊須假哨船接渡而後可參將戚繼光云福船髙大如城非人力可驅全仗風勢倭舟自來矮小如我之小蒼船故福船乘風下壓如車碾螳蜋鬭船力而不鬭人力是以每每取勝設使賊船亦如我福船大則吾未見其必濟之策也但吃水一丈一二尺惟利大洋不然多膠於淺無風不可使是以賊舟一入裏海沿淺而行則福舟為無用矣故又有海滄之設參將戚繼光云海滄稍小福船耳吃水七八尺風小亦可動但其功力皆非福船比設賊舟大而相並我舟非人力十分膽勇死鬭不可勝之二項船皆只可犂沈賊舟而不能撈取首級故又有蒼船之設參將戚繼光云開浪以其頭尖故名喫水三四尺四槳一櫓其形如飛內可容三五十人不拘風潮順逆者也參將戚繼光云近者改蒼山船制為艟􅬋比蒼船稍大比海滄更小而無立壁最為得其中制遇倭舟或小或大皆可施功但水兵人技皆次於陸兵設使將水兵教練遴選亦如陸兵而後登之舟中則比陸兵戰加一舟險其功倍於陸兵必矣司寄者何憚而不為哉蒼山船首尾皆濶帆櫓兼用風順則掦帆風息則蕩櫓其櫓設于船之兩傍腰半以後每傍五枝每枝二跳每跳二人方櫓之未用也以板閘于跳上常露跳頭于外其制以板隔為二層下層鎮之以石上一層為戰場中一層穴梯而下卧榻在焉其張帆下碇皆在戰場之處船之兩傍俱飾以粉蓋卑隘於廣福船而濶于沙船者也用之衝敵頗便而捷溫州人呼為蒼山鐵參將戚繼光云蒼船最小舊時太平縣地方捕魚者多用之海洋中遇賊戰勝遂以著名殊不知彼時各漁人為命負極之勢亦由賊之入我地是也今應官役便知愛命然此船水面上髙不過五尺就如以朩打棚架亦不過五尺賊舟與之相等既勢均不能衝犂若使徑逼賊舟兩艘相聨以短兵鬪力我兵決非長䇿多見誤事但若賊舟甚小一入裏海我大福海滄不能入必用蒼船以追之此船喫水六七尺與賊舟等耳其撈取首級水潮中可以搖馳而快便三色之中又此為利崇明沙船可以接戰但上無壅蔽火器矢石何以禦之不如鷹船兩頭俱尖不辨首尾進退如飛其傍皆茅竹板密釘如福船傍板之狀竹間設窗可出銃箭窗之內船之外隱人以蕩槳先用此舟衝敵入賊隊中賊枝不能却沙船隨後而進短兵相接戰無不勝矣鷹船沙船乃相須之器也漁船於諸船中制至小材至簡工至約而其用為至重何也以之出海每戰三人一人執布帆一人執槳一人執鳥嘴銃布帆輕捷無塹沒之虞易進易退隨波上下敵舟瞭望所不及是以近年賴之取勝擒賊者多其力焉此船定海臨觀象山一帶沿海地方俱有之其形如梭用竹桅布帆僅可容二人衝風冒亂專入大洋抵下八山取殼菜紫菜打魚之利舟至山麓二三人以舟舁置灘塗避風潮若欲西歸仍舁舟下水不能禦敵但可為哨探之用乃魚船之至小者也參將戚繼光云網船形似織梭內容二人前後用二人以罩罩之風浪大可拖之塗上且不能覆喫水七八寸耳此可走報或用之裏港窄河動以百數每隻內用鳥銃二三人蜂集蟻附沿海沿塗而打之甚妙如賊追逼就可棄走一舟不過一金之費耳兩頭船按大學衍義補有兩頭船之説蓋為海運為船巨遇風懼難旋轉兩頭製舵遇東風則西馳遇南風則北馳海道諸船無逾其利蓋武備不嫌於多慮患不妨於遠莫為之前猶將求之而况設之前者有未泯乎以此衝敵則賊舟雖整可亂也船曰蜈蚣象形也其制始於東南夷專以駕佛郎機銃銃之重者千斤至小者亦百五十斤其法之烈也雖朩石銅錫犯罔不碎觸罔不焦其達之迅也雖奔雷掣電勢莫之疾神莫之追蓋島夷之長技也其法流入中國中國因用之以馭夷狄諸凡火攻之具炮箭鎗毬無以加諸其成造也嘉靖之四年其裁革也嘉靖之十三年數年之間未及一試而莫知其功用之大也葛雉川曰蜈蚣之氣能逼蛇夷之制義毋乃為是故與夫海宴河清萬世所願使長蛇之勢不能盡偃則蜈蚣之制其能不興也乎名器尚存述之以俟採用海行甚速而遲者鬪風故也如大食國在漳州東南每歲通番者必候冬初西北風盛而去夏初東南風盛而來所謂海舟無風不可動也惟佛郎機蜈蚣船底尖面濶兩傍列楫數十其行如飛而無傾覆之患故倣其制造之則除颶風暴作狂風怒號外有無順逆皆可行矣况海中晝夜兩潮順流鼓枻一日何嘗不數百里哉水戰非鄉兵所慣乃沙民所宜蓋沙民生長海濱習知水性出入風濤如履平地在直𨽻太倉崇明嘉定有之但沙船僅可於各港協守小洋出哨若欲出赴馬迹陳錢等山必須用福蒼及廣東烏尾等船沙船能調創使鬪風然惟便於北洋而不便於南洋北洋淺南洋深也沙船底平不能破深水之大浪也北洋有滾塗浪福船蒼山船底尖最畏此浪沙船却不畏此北洋可拋鐵貓南洋水深惟可下朩碇此船當與鷹船説參看太倉生員毛希秉云太祖舊制深嚴雙桅船隻私自下海之禁承平既久法度浸弛雙桅習以為常甚至有五桅者長江大帆一日千里近蒙當道建言申明舊制曉諭改正而未嘗著實舉行故沙船入港頭桅多寄海口或倩人遊説官府航海非雙桅不可冀便其私蓋單桅雙桅無不可行但有大小遲速耳定制沙民止許户船一隻巡船宜快便多桅櫓如糧船有一定之式以便江海識别沙船宜朴實單桅仍禁雙桅眼責令本州縣及守禦官限一月之內改正違者即係賊船許諸人擒獲首告即以充賞惟有副帆副桅以備損壞而桅眼止一者聽庶幾我常強而彼常弱我常速而彼常遲此造船之良法也船􅖼走風捉颶事急追賊車關人力起􅖼遲誤備此臨急解繫尾泛之以便回取都御史唐順之云再三沉思制賊小船衝突之説灘淺處多釘暗樁薄皮船遇之即碎此一説也先發制人一著惟有望斗上做工夫然必須以利使人惜不得銀子每夜楊都司邵把總盧守備等各水軍編定福船十隻每一隻望斗人一夜給與銀一兩使一夜常有人坐在斗上者看賊動靜雖月黑之夜若擡船撑船未必無一把兩把火光我船便可做手腳不患于大船趕賊不上也月明之夜則斗上纎悉必見正與彼四層望樓是對手至如小船叭喇唬八槳船宜多置銃手既不戰亦宜量與給賞多布之八槳叭喇唬中火器既多賊來便死打又有望斗內人先報賊動靜不患于小船制賊不下也一隻船望斗人每夜與銀一兩毫釐不可少就是一月浪費銀三百兩亦説不得支得一月賊必擒矣恐惜費誤了大事望斗人若報賊的當水軍因以成功則望斗人即當給與衝鋒重賞若有誤事定以軍法斬首蓋賞重則罰亦重也每夜與銀一兩分毫不可與頭目人尅落必使望斗人一一得實惠訓導薛俊云水戰東南長技也故國朝瀕海衛所俱置官哨船以偹倭但虛飾美觀少遇風色不便行使遞年走報聲息多賴民船莫使少更無益虛花之制務求堅便實用每官哨船增置小划船或三或四有事則令與大船夾戰無事則令與大船樵山漁海以贍器械修補之費又云聽容沿海居民單桅船隻附近砍柴捕魚則邊氓便於生理聲息便於夾戰實備邊萬一之助也閩縣知縣仇俊卿云地有南北時有冬夏自春徂夏則時多南風而利于北行自秋徂冬則時多北風而利于南行此畨泊往來出沒之候也彼瞰其時輒乘風連雲以出洋我當其衝欲逆濤破浪以邀擊未必其勢之便也盍亦隨時以應之時乎北風必先于北道之防以遏其衝而以南舟曳于後而追之其居中間各寨澚之舟又從旁遞出而擊之時乎北風也亦如前法或遏于前或躡于後或擊于旁此亦迭肄之法長蛇之勢冦未有不困疲而就縛者海上可立京觀矣又云國初置沿海衛所每所船五隻每船軍百名其法備載會典自一所推之則合衛之海船海軍可知其數也自一衛推之則合省之海船海軍可總其實也使法之常存何慮海冦之擾向來修復一二止可用于哨報難以衝敵禦冦及其事急調用不給借發福清鹽船併報各澚民船奈彼不思國家之急皆存繫吝之私原非官物率不如令雖給價值終不直前况福清海船雖大不可以當海冦之夾板船叭喇船漳州之草撇樂清之大鐵等船又不可以當海冦之烏尾尖艚至於東仔銅茭等船又不及也昔人海戰之船大小制度不同今當兼用可也如樓櫓艨衝此船之大者也如直進露撓此船之中者也又如舴艋海鰍此船之小者也以船之大者為中軍座船而當其衝以船之中者為左右翼而分其陳以船之小者繞出于前後兩旁之間伏見于逺近聚散之際使撓其計隨船器械各須犀利完足固不待贅但海冦所恃全在于銃吾亦以銃為應中軍大船之前仍用次等船載佛郎機大銃數架以鎮之兩翼中船之前亦用再次船以載銅將軍大銃數十架以列之其小船亦各載鳥銃鉛筒數百以備于四面各船編定字號每數船列為一行每一陳列為數行晝則麾旗為號夜則振鼓為節迭出更進則彼此衆寡勞佚之勢不同未有不殱此渠醜者也今蒙委官鳩工大造船隻戰船之造必有定議但船之外旁必須護以牛革魚網氊絮之類其大者更用列朩為柵可避炮石又有車船之制令戰士前後踏輪舟自進退所謂中流上下回轉如飛虜衆相顧駭愕者用此法也又須預募能射與善浮之人一遇畨船或以火箭焚之或以水鑽溺之是或皆可用也至于竒正之變大船中船為正則以小船為竒前隊為正則以後隊為竒合之為正則以闢之為竒形難預料變不可窮是在臨機神應之妙不可測者也總兵俞大猷云或問兵船官造與私募孰便曰造易而修難也雖督造之官用之海上衝敵激浪不旋踵必議修矣修船之弊奚啻萬端議修之後閣岸日多浮水日少以之守港則可以之出洋追捕則全不足恃矣在官府不能立無弊之法在民間不能克不可制之情天下古今豈有視官物為已物者哉此惟熟於海務者自知之烏得而盡言或曰民間安有許多私船可募乎曰厚之以稅銀使逐利之民爭造新船以應募何患其不多責府縣以及時給稅責船户以及時修整則經年纍月皆可堅船可用然則用官造之船以守港用私募之船以追捕則如何曰必若是然後攻守各適其用也總兵盧鏜云沿海戰船自國初以來不知幾易其製矣而備料修造或出之軍或出之民或造或雇又不知幾易其法矣然而卒無實用可以行之永久者非製法之未善存乎其人耳方今兵久費繁公私匱乏管船官捕支持不足駕船兵稍口給不敷是以船日敝而兵日餒也豫久在兵間深知其故嘗立麻記疤痕之册以稽代替立薪水通融之法以革虛冒二三年來稍稍就緒為今之計必擇人以管船節財以養兵此經久之良法也若曰置簡便之法以濟緩急之用是治絲而棼之愈棼而愈亂也又何益哉兵船稍手閩縣知縣仇俊卿云沿海居人多便于舟楫雖未習水戰亦易于為教今于出海之數或欲以沿海者居其十七其內地衛所者居十三餘撥防邊以助守望使漸教習人人皆可為勝兵所謂水虎捷凌波軍者不患無其人也如此亦可以節省雇募水稍之費又云水稍之募因軍士之不習于水而始議之也竊念國朝養兵之費嵗有常輸冀籍其力以為用海軍不能效力而又官募兵夫積弊之來不暇追論也訪得其初募水稍之時即將本寨軍之老羸不堪者發回該衛所扣除月糧并行糧銀兩轉給水稍是兵得實用而官無重費今皆不然既有廩軍之糧又加募夫之費况水稍之夫又有老稚羸弱者雜于其中費于無用之地重為可恤中間情弊猶有可言蓋以通畨下海接濟窩藏皆沿海之人其人皆水稍之親故也自小埕以南浯嶼銅山等處此輩皆是也我謀未成彼已先泄間遇將令嚴明不得已從而出兵至于兩船相及之際或以口哨為號或以物色為號揚帆轉柁故意放開不與交兵或放彼先行而我船曲折其行遙躡于後或邀截于港內冦計已窮忽突開一門縱之軼去或追赴將及冦乃丢棄一船以為之餌即不直前撲滅各去搶貨如此之類情弊百端難以殫述彼以受雇于官役之暫時耳非籍于官終身之役者比也一去則若不統屬是以無所顧籍捕盜之弊亦猶是耳甚至有捕盜而為盜者益可慨也或謂周世宗用降人為水師卒賴其力今獨不可乎不知周用降人但假之教習於平時不用之操駕於臨陳况今之水稍亦皆鄉民而非取之於異域者也即令水稍教習沿海軍夫如兵志以一人教十人十人教百人之法則期月之間莫非水稍也兵將一心何慮他患海道副使談綸云凡水戰專係在舵工與管船捕盜舵工使船必近賊捕盜又從而倡之則士卒不得不戰戰則蔑不勝矣故捕盜舵工不可無破格之賞與必罰之法至於分合節制與陸戰同臨陳每占上風使火器得副使茅坤云粵中獨田州甲為善自盔以下並以堅生牛皮而油灌之甲特周前後胸背而已兩肩兩臂手及兩股並别為小牛角片置雲肩敵手等名色蓋取其伸縮如意而便於戰鬭者試令詔田州之工氏或廣中能敏製者而官自為採料製之大略一盔甲則二三金可辦也松江府同知羅拱辰云牌有二式有手牌即燕尾牌也有挨牌用繩索用朩橄欖者用手牌便於用力先以鏢鎗飛擊先挫賊鋒然後用刀則前後左右隔賊枝器施我刀法此手牌之利也用挨牌則以牌上長繩上朩橄欖加入繩圈中挂於項上以左手中指縫中夾牌下短繩上朩橄欖仍以五指挽鎗前半節右手執鎗後半節或伸或縮或出長出短或左或右旋刺非惟護自身且護從牌之兵又云各兵衝進必列牌於隊前以蔽矢石牌乃陳中第一器所不可少者所謂公侯干城所謂干戈戢楊當時子路初見孔子亦執干以為問夫干者質也即今之牌也所以捍外而衛內者也有手牌有挨牌用各不同其利一也副使茅坤云海冦之兵恃強在舞刀每輕我兵不能射反其所輕莫急於習弓弩而破其所疆莫急於倣狼兵燕尾牌之制近日東南之牌皆沉重而不利進退獨粵中燕尾牌以銅朩柁朩為之其長如人之身其廣不滿尺其背如鯽魚然故側身前逼雖當利刃而不能斷其體輕故運如鳥翼而一切矢石皆可蔽廣中狼栁之兵善舞牌者其臨陳如鷙鳥而進不必盔甲而賊皆牆立不能敗此廣中所最尚者欲訪置在浙中惟溫州桐朩柁朩為多可易辦也挨牌上鋭而長步兵所用朱漆金字長可蔽身內施鎗朩倚立於地總兵俞大猷云錯以步戰乃中國之長技今鈎刀虎乂二手隨時教閲充用惟藤牌手出在福建漳州府龍溪縣土名海倉許林嵩嶼長嶼赤石玷尾月港澳頭沙坂等地方此各地方山川風氣生人剛勇善鬬重義輕生若責其本府縣官用心選募約得三千人每名月給工食銀一兩五錢行糧四斗五升俱自家起行之月為始又每名另給衣裝器械養妻子共銀二十兩若至軍病死給棺朩銀六兩陳亡給埋葬銀一十二兩今欲募之先將銀兩解發該府坐委本府佐二官一員知縣一員先募的當頭目六十人每月各加工食銀五錢責其每人各募前項地方壯兵五十人每十人編為一甲每一甲各領一十人千百户一十五員各分領二百人仍委前項府佐知縣兼理錢糧各至軍前聽用其各兵在途行糧水路船隻陸路挑行李夫各官合用衣裝行糧俱要議處此兵可以禦北虜而吾廣産藤宜依其製以代挨牌若征海冦俟其登陸用之參將戚繼光云千古有圓長二色其來尚矣主衛而不主剌國初木加以革重而不利步以藤為牌近出福建銃子雖不能隔而矢石鎗刀皆可蔽所以代甲胄之用在南方田塍泥雨中頗稱極便其體須輕堅密務使遮蔽一身上下四旁無所不備用牌之間復有所謂標者所以奪人之目而為我之疑兵所賴以勝人者也牌無標能禦而不能殺欲將進步然後起標勿輕發以敗其事腰刀用於發標之後以殺敵非長利輕泛則不能接逺其習牌之人須膽勇氣力輕足便捷少年然後可授之以此置於行伍之先為衆人之藩蔽衛以長短之器為彼之應援以之臨敵其衆可合而不可離可用而不可疲進退左右無所不離此藤牌之功也又云試牌跳牌舊法聽鑼聲為度覱牌如壁閃牌如電起伏得宜翻身不露身滚牌不露足惟牌能殺敵能蔽身用之乃拒徑敵以衛兵也每座約重五百斤用鉛子一百箇每箇約重四斤此攻城之利器也大敵數萬相聚亦用此以攻之其石彈如小斗大石之所擊觸者無能留存牆遇之即透屋遇之即摧樹遇之即折人畜遇之即成血漕山遇之即深入幾尺不但石不可犯而已凡石所擊之物轉相搏擊物亦無不毁者甚至人之支體血肉被石濺去亦傷壞又不但石子利害而已火藥一爇之後其氣能毒殺乎人其風能煽殺乎人其聲能震殺乎人故欲放發礦須掘土坑令司火者藏身後燃藥線火氣與聲但向上衝可以免死仍須擇強悍多人為之護守以防敵人搶發礦之患若非攻堅奪險不必用此也或問用之水戰可乎曰賊若方舟為陳亦可用其小者但放時火力向前船震動而倒縮無不裂而沈者須另以朩筏載而用之可也曰城上可用乎曰不可發礦便於攻高不便於攻下故也刑部尚書顧應祥云佛郎機國名也非銃名也正德丁丑豫任廣東僉事署海道事驀有大海船二隻直至廣城懷遠驛稱係佛郎機國進貢其船主名加必丹其人皆髙鼻深目以白布纒頭如回回打扮即報總督陳西軒公金臨廣城以其人不知禮令於光孝寺習儀三日而後引見查大明會典並無此國入貢具本參奏朝廷許之起送赴部時武廟南巡留會同館者將一年今上登極以其不恭將通事明正典刑其人押回廣東驅之出境去訖其人在廣久好讀佛書其銃以鐵為之長五六尺巨腹長頸腹有長孔以小銃五箇輪流貯藥安入腹中放之銃外又以朩包鐵篐以防決裂海船舷下每邊置四五箇於船艙內暗放之他船相近經其一彈則船板打碎水進船漏以此橫行海上他國無敵時因征海冦通事獻銃一箇并火藥方此器曾於教場中試之止可百步海船中之利器也守城亦可持以征戰則無用矣後汪誠齋鋐為兵部尚書請于上鑄造千餘發與三邊其一種有朩架而可低可昻可左可右者中國原有此制不出於佛郎機每座約重二百斤用提銃三箇每箇約重三十斤用鉛子一箇每箇約重十兩其機活動可以低可以昻可以左可以右乃城上所用者守營門之器也其制出於西洋畨國嘉靖之初年始得而傳之中國之人更運巧思而變化之擴而大之以為發礦發礦者乃大佛機也約而精之以為鉛錫銃鉛錫銃者乃小佛郎機也其制雖若不同實由此以生生之耳其石彈之大如升氣力小於發礦而大於鉛錫銃若遇關隘人守堅不可過者以此攻之借勢而渡參將戚繼光云此乃天下通有利器製者多未盡精微其妙處在母銃管得法子銃在腹中亦要兩口得法使火氣不泄又每放得擊出子銃數丈傷人必用鐵閂者佳其妙處在前後二照星後柄稍從低庶不礙托面以目昭對其準在放銃之人用一目眇看後照星孔中對前照星前照星孔中對所打之物若子馬俱大則難出出則力大要座後面人力不能架之若子小則出口鬆而無力歪斜難準法既省下朩馬煩難之功又出口最易凡鑄銃之法子銃口大則子難出要破母銃母銃口大而子銃口小則出子無力且歪務要子母二銃之口圓徑分毫不差乃為精器造鉛錫銃者須知鍊錢蓋鐵中原有查滓夾雜必鍊之不已融盡查滓底於精純方免脆折爆碎之患故十斤而鍊用一斤者為上十斤而鍊五斤者次之其管欲圓而淨其臬欲端而直司銃者須擇手足便捷之人臨敵裝藥入彈覘臬爇火庶不遲誤若但見臬而不見管則失之仰但見管而不見臬則失之俯皆不能中也此器今人類並立而用之逺攻非也須近敵乃用長短兵相夾乘勢速往使賊避銃目睫閃眩之間而我兵已入其隊中矣鉛錫銃之妙全在此也若恃以攻敵不亦繆乎都御史唐順之云虜所最畏於中國者火器也天助聖明除凶滅虜而佛郎機子母炮快鎗鳥嘴銃皆出嘉靖間鳥嘴銃最後出而最猛利以銅鐵為管木槖承之中貯鉛彈所擊人馬洞穿其點放之法一如弩牙發機兩手握管手不動而藥線已燃其管背施雌雄二臬以目對臬以臬對所欲擊之人三相直而後發擬人眉鼻無不著者捷於神鎗而準於快鎗火技至此而極是倭夷用以肆機巧於中國習之者也參將戚繼光云鳥銃之準在於腹長而直火藥之不奪手在於前手拿在銃腹照放之直在於兩手俱托執銃身而無點火之誤鉛子之利在於合藥之方其神機銃用朩馬繁而多誤勢難再發邊銃手執後尾其重在前一手點火眼不能照皆不及此銃之妙而速也豫按鳥鎗之製自西番流入中國其來逺矣然造者多未盡其妙嘉靖二十七年都御史朱紈遣都指揮盧鏜破雙嶼獲畨酋善銃者命義士馬憲製器李槐製藥因得其傳而造作比西畨尤為精絶云此用驚營或夜間遠遠放入賊壘少停於賊壘中銃發無制之兵烏合之衆奪氣之冦勢必驚惶我得乘之此器最妙其狀如鳥銃之鐵幹而短其管口比鳥銃口稍寬容彈百枚燃藥則彈齊出遠去四五里把總顧瀛云鳥銃所發止於一彈所中止於一人中則傷人不中則無所傷矣一窩蜂一發百彈漫空散去豈無中傷者乎其力量真可以為佛郎機之亞但佛郎機器重難帶一窩蜂輕於鳥銃以皮條綴之一人可佩而行戰時以小鐵足駕地昻其首三四寸蜂尾另用一小朩樁釘地止之誠行營之利器也若欲為坐營之用則以朩床載於營門床身左右各置二輪以便進退可以為守營之寶丹陽邵守德云其大斗用法升至半天墜於戰賊巢震響如雷黑夜令賊自亂相殺內有火塊數十能燒賊之營寨必不能救丹陽邵守德云以生鐵鑄成實藥斗許檀朩砧砧至底砧內空心裝藥線一條擇冦必由之地掘地作坑連連數十埋地雷於坑中內用小竹筒通藥線土掩如舊機關藏火賊不知而踏動則地雷從下震起火焰中天鐵塊如飛蝗著人即死乃孔明之祕器也此器戰守攻取水陸不可無者奪心眩目驚膽傷人製宜精妙此兵船第一火器也紙薄拳大內蕩松脂入毒火外煮松脂欍油黃蠟然火拋打煙熖藜截腳利水戰守城俯擊短戰參將戚繼光云火器之法製度甚多其實大同小異皆不甚利于用只此數種盡其妙矣故不繁載至如弓射箭頭用火之類又不如火箭除水陸通用者先附陸兵技藝之後凡陸所不用只可用于水者故備于此以上藥線各處製者俱用一二尺長浮于外每點擲之際一擲鬭風其藥線便滅或擲至别船如賊見線尚長而拔之或反擲我舟今用子母銃藥線法凡火器一件其藥線之處用細竹管一箇直插于腹內至底藥線安于竹腹之內待外點火燃線已入竹管之內不見方才擲下則線在竹內燃至竹底方透火器擲下之時藥線在竹內燃並無閃滅之事且擲于賊舟只見凝然一物並不知點燃何處就擲在水內則線燃于腹火器衝于口水為氣所迎亦不能入雖在水底猶能燃放而後已此極妙極驗萬無一失者參將戚繼光云舊用火藥傾下賊舟此固長策然又别用火藥或炭火再傾擲使之發藥每每或連桶擲入水中或被賊乘藥桶及伊舟以水沃濕亦皆未中肯綮可以必發不如遠則只用飛天噴筒近則只用埋火藥桶至易至便萬用無差除此之外所謂火箭神機火磚噴筒之類皆遠不及此茍用此二種則他種又皆不必用也用地鼠紙筒炮各安藥線每箇排為一層上下二節各二層以薄蔑橫束合灑火藥松脂硫黃毒煙用粗紙包裹成磚形外用線紙包糊以油塗密另於頭上開口下竹筒以藥線自竹筒穿入參將戚繼光云截徑二寸竹裝藥製打成餅修合筒口餅兩邊取渠一道用藥線拴之下火藥一層下餅一箇用送入推緊可髙十數丈遠三四十步徑粘帆上如膠立見帆燃莫救此極妙極妙萬分效策閩縣知縣仇俊卿云火器所及能加於數百步之外今海冦所恃全在火器緣硫黃出於琉球諸夷製造又多巧思惟硝中原所産嚴其禁約不許人下海潛通以資其用則彼失所恃擒之亦易矣豫按海中戰法攻船為上若以吾大船敵小船觸之無不壞者其次則恃火器火器之中火箭銃炮之類亦多無用惟火裘火藥桶二者投入賊舟即時焚燬為至妙也或問我以火攻敵使敵亦以火攻我如之何曰以火攻敵全靠柁工得人持柁得法我常奪據上風則敵之火攻將為風所驅而反攻之矣大抵火攻之法須先自為水備假如一舟五十人只用十人持火器其四十人俱執水斗水桶遇敵火攻羣手傾水滅之烏能焚我耶或又曰設使我用火攻而敵知水備何道以焚之曰敵若知備則雖不能焚敵亦必救火而亂矣我乘其亂而擊之豈有不勝者乎又按短兵相接乃倭奴所長非中國之民所易敵也其所歉者火器耳今鳥嘴銃反為彼之長技而我兵鳥銃手雖多不能取勝何耶倭人忘命我兵望之輒懼而走或鉛子墮地或藥線無法手掉目眩仰天空響議者謂宜禁通畨接濟火藥之人甚善甚善愚謂硫黃出産在彼何禁之有所當禁者熖硝耳此吾中國之物若官司設法不容入畨則倭奴之火器為無用而我以火器攻之彼之短兵豈能加於我哉又按兵家器械甚多有宜於山戰者有宜於陸戰者有宜於水戰者如武經總要所載是也要之利於今日海戰無幾至於火器其名雖有二三百種而海船得用亦惟噴筒火藥桶二件蓋噴筒發去有一百五十步之逺橫占丈餘火藥桶拋入賊舟賊一時不知取而視之內火發矣未發之先水不及沃臨發之後人不能救觸之者碎犯之者死故敵舟離逺則用噴筒燒之敵舟相逼則用火藥桶燒之此二者皆海船利器今日禦倭之切要也炮為守城第一器既省火藥之費又有不乏之資弓弩必採兩廣毒藥以灌其鏃鏃著血縷則立死但浙人不習射當如兩河以北懸射銀錢之利以誘之使習令弓矢而能教百人善弓則善弓者得以一人兼二人之食而弓師且賞之以百金而署之為百人之將矣令弩師而教百人善弩則善弩者亦得以一人兼二人之食而弩師且賞之以百金而署之為百人之將矣如此則不數月而全軍皆善射矣其他短兵鎗棒亦率類此或云毒箭射人遇衣絮沾染藥即脫落箭鏃著肉際毒已緩矣不能殺人也須於鏃上鑽孔以藥嵌入則雖透衣而藥不脫傷者應弦而絶松江府同知羅拱辰云知射長箭而不知射邊箭拿手亦不知用弩之法况各止用竿子雖可取勝殊非長技為照長箭去遲而敵人易見故彼得以閃避且得拾取復射其利在彼邊箭去疾而敵人難窺非惟彼不能避抑且不能回射况邊箭所到倍長箭百步有餘其利在我長邊二箭務令弓手兼習若賊尚遠緩則射邊箭如來追迫則射長箭各從其便也松江府同知羅拱辰云用弩必須力重而機巧其矢之長短輕重大小要與弩弦相比乃能命中而及遠若敵在百步之外我兵必先用弓弩及邊銃以制其鋒及至來近短兵相接尚在三十步內外則用鏢鎗以飛擊之參將戚繼光云弩弓不可遠遠則無益費矢竭力丹陽邵守德云其工價甚簡其功用甚大其用有三若伏於營寨要道可以禦賊之偷營劫寨若伏於山野僻路可使冦不能逃若伏於富家門戶可使賊不能入造法以檀朩柘朩為身茅竹為擔弩後置一朩人上弦或連發二矢或三矢量賊往來必由之路設之以朩架架弩任意髙下或竹徑或稻麥叢茂翳密處設百餘把止用一絲線作機關不須人守賊至不疑而動其機百弩齊發一人不能逃生也倭奴善遁荒村窮谷無處不至豫按馬箭之法有三曰分蹤向前射也曰對蹬向傍射也曰末秋向後射也此武士之常技也愚謂分鬃者以馬之頸鬃為界一邊挽弓一邊發矢乃弄花巧之法邊軍不然以身俯出馬外於此挽弓就於此發矢臨敵倉皇之際庶無繆誤對蹬者主左一邊而言今北方響馬常勒馬由道右而行讓客於左以便發箭亦此義也然是法但可施於途遇一二人耳設使衆敵叢射或敵左右將旋馬以應酬之耶學騎射者須習左右手皆便方可參將戚繼光云火箭亦水陸利器其功不在鳥銃下但造者無法放者無法人鮮知此器之利也大端造法有二或造成用鑽鑽線眼或用鐵桿打成自然線眼但鑽者不如打成者妙鑽易而打成費手匠人多不肯用打成之法其肯綮全係於線眼之歪正深淺桿要直翎要徑羽長而髙禙筒用紙間以油紙夏不走硝可留二年此物最不耐久收又云火箭只著棚帆當中一點打去常髙中則不可救丹陽邵守德云造法礬紙為筒內入火藥築令滿實另置火塊油紙封之以防天雨後鑽一孔裝藥線用箭竹為幹鐵矢簇如燕尾形末裝翎毛大竹筒入箭二矢或三矢望敵燃火能射百步利順風不利逆風水陸戰皆可用用之水戰能燔舟篷用之陸戰能燬巢穴中毒必死標鎗或用稠朩細竹皆可但前重而後輕前稍粗而後稍細為得法參將戚繼光云標鎗非兩船相逼不可用往下打更難準參將戚繼光云長鎗後手要粗可盈把庶有力若細則掌把不壯鎗腰要從根漸漸細至頭而止如腰粗則硬強不可拿如腰細則軟而無力雖手法之妙不能拿打他鎗開去也鎗稍不可輒細要自後漸細方有力最忌太重重則頭沈不可舉動是自棄鎗也鎗頭重不可過兩其桿椆朩第一合朩輕而稍軟次之要劈開者佳鉛開者紋斜易折攢竹腰軟不可用梨花鎗者用梨花一筒繫於長鎗之首臨敵時用之一發可遠去數丈人著其藥即死火盡鎗仍可以刺賊乃軍前第一火具也宋李全昔用之以雄山東所謂二十梨花鎗天下無敵手是也此法不傳久矣布政司報效吏許國得其法而造之嘗試之沈莊果得其用􅶿筅必獵户能使製筅之法用毛竹長而多簹者未鋭包鐵如小鎗兩傍多留長刺其刺每雙用火尉之一直一鈎其直者如戟鈎者如矛然後以熟桐油灌之敷以毒藥利難犯參將戚繼光云􅶿筅之為器也形體重滯轉移艱難非若他技之出入便捷似非利器也殊不知乃行伍之藩籬一軍之門户如人之居室未有門户扄鍵而盜賊能入者故凡用􅶿筅須要節密枝堅杪加利刃要擇力大之人能以勝此者勿為物之所使夫然後以牌盾蔽其前以長鎗夾其左右舉動疾齊必須叉耙大刀接翼然筅能禦而不能殺非有諸色利器相資鮮克有濟兵中所以必於用此者緣士心臨敵動怯他器單薄人膽搖奪雖平日十分精習便多張皇失錯忘其故態惟筅則枝稍繁盛遮蔽一身眼前可恃足以壯膽助氣庶人敢站定若精兵風雨之勢則此器為重贅之物矣少林棍俱是夜乂棍有前中後三堂之外前堂棍單手夜乂也中堂棍隂手夜乂也類刀法後堂棍夾鎗帶棒監紫薇山為第一牛山僧善弄之通虛孫張家為第二河南棍趙太祖騰蛇棒為第一賀屠鉤杆與西山牛家硬單頭皆次之安猴孫棒卞城淮慶人多用之按自古名將未見有用棍者用棍惟宋江諸人形如月牙內外皆鋒刃橫長二尺柄長八九尺或一丈兵馬步戰第一利器也此器直推之可以削手往上推則鏟首向下推則鏟足或鉤敗卒之足或於上風揚塵妙不勝述豫按使刀無如倭子之妙然其刀法有數藝髙而能識破者禦之無難惟關王偃月刀刀勢既大其三十六刀法兵仗遇之無不屈者刀類中以此為第一馬上刀要長須前過馬首後過馬尾方善有五家一曰馬明王一曰先主一曰卞莊一曰王聚一曰馬超豫按古人之戰有三有大戰者有地戰者有人戰者蓋兵器不外乎金朩水火土五器之用五器之中各藏三戰之妙其製器之法製藥之方雖見於武經總要多不切於禦倭紀效新書所載似切矣而亦惜其不多愚見學士大夫談經濟者多有不傳之祕如無形渡之類隨時變化出竒制勝尤為將者之所當知也但不可顯言以示敵故書之所己刋者愚擇而録之書之所未刋者愚不敢録惟提其端以俟將官之自訪而自悟云籌海圖編卷十三
