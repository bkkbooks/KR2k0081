body:
  text: 籌海圖編卷四明胡宗憲撰福建沿海總圖漳州府圖泉州府圖興化府圖福州府圖福寧州圖福建兵防官考福建倭變紀福建事宜福建兵防官考總督軍門駐浙江提督軍務兼巡撫都御史福建原無巡撫因倭亂而設駐劄福州巡按福建監察御史近奉敕兼紀功巡視海道副使福州兵備副使興泉兵備副使汀漳兵備副使北路參將自福寧州起直至寧德縣澚地方止皆其信地中路參將自澚起直至泉州府祥芝地方止皆其信地南路參將自祥芝起直至廣東交界止皆其信地遊擊將軍汀漳守備行都指揮司銅山水寨把總浯嶼水寨把總南日水寨把總小埕水寨把總烽火門水寨把總沿海衛所鎮海衛旗軍一千五百人屯軍六鰲所旗軍一千人人屯軍四十三福州左衛旗軍一千六百九十七人屯軍中左所旗軍屯軍永寧衛內所五共旗軍五千人屯軍七百八十四人金門所旗軍一千人十人屯軍一百三福全所旗軍一千人十四人屯軍二百二崇武所旗軍一千人十四人屯軍二百二平海衛莆禧所旗軍屯軍鎮東衛旗軍一千四百三十二人屯軍萬安所旗軍屯軍梅花所旗軍屯軍福寧衛旗軍七百一十七人屯軍定海所旗軍屯軍大金所旗軍屯軍沿海巡檢司漳州府洪淡後葛金石古雷盤陀九龍青山漳浦小景井尾島尾海門栁營濠門泉州府苧溪髙浦塔頭烈嶼官澚峯上田浦陳坑圍頭鳥潯深滬祥芝獺窟黃﨑小岞興化府小嶼吉了嵌頭青山沖心迎仙福州府壁頭牛頭澤朗松下小祉石梁閩安鎮官母嶼北茭福寧州延廷松山青灣大篔簹水澚蘆門沿海關寨臺烽堠漳州府水寨二銅山西門澚每嵗分鎮海衛玄鍾陸鰲二所官軍一千八百六十員名更畨備倭領於把總以都指揮行事玄鍾每嵗分鎮海衛并銅山陸鰲二所官軍一千一百員名更畨備倭領於衛總受銅山把總節制瞭望臺二陸鰲玄鍾烽堠十二南山黃﨑東灣洋林漸山鹽倉流會白塘安集小澚洪丘峯山泉州府水寨二浯嶼原在海外今移入夏門澚每嵗分永寧漳州二衛官軍二千八百九十八員名更畨備倭領於把總指揮以控泉州郡之南境烽堠四十四髙浦井上劉山東渡徑山龍淵厦門街內流礁頭白石溪東石井下吳蕭下石頭陳坑溢圃安平潘徑葉了石悃洋下坑山青山古雲白﨑白沙古樓埕埭赤山柯山大砟獺窟下頭後任尖山大山髙山峯尾海頭後黃外東門興化府水寨一南日山原在泉州府海外景泰中奏移於莆田之吉了澚官府文移仍以南日山水寨稱管寨事有把總分管寨事有衛總每嵗分興化平海泉州三衛官軍一千五百十人更畨備倭烽堠四十五﨑頭吉了大洪渡邊塔林塔山文甲吳山西山山菴前林邊礪山上歐大崘小澚東山柄榖成山石獅石城下徐湖邊登港東林埋頭山後浦山岐頭蠔山後埔茶浦鯽魚近仙東蔡山岩沁山支頭基山峯嶺山尖頭山西山三江口福州府水寨一小埕每嵗分附近衛所軍士更畨備倭方嶽重臣會推指揮之有才略者總督之瞭望臺一茶林烽堠四十四洪坑蟹嶼壁頭車盤前村塔山俞溪後營仙岩楓嶼白鶴龍下馬頭大丘大壤石門陳場潮井峯前松下山﨑嶼頭蕉山斗湖山前陸石下嶼潭西騎山程角桃源官海黃﨑澚東岸裹頭長﨑官塢大埕北茭福寧州水寨一烽火門今移入豐山地方烽堠三十八下簟關﨑下滸車安石湖羅浮閭峽劉金搭尾小南界石青山南山積石長沙東壁沙松臺澚後﨑賴離離智烽火三山古縣北山頂大青畫梅花金家大峯南金黃﨑白露小青畫南嶺白岩沙埕水澚福建倭變紀嘉靖二十七年正月海冦許二引倭入冦七月官兵討平之先是賊首許二糾畨舶聚浙江之雙嶼港大為福興諸府沿海患上命都御史朱公紈勦之三月朱公以都司盧鏜帥福清兵船泊溫州之海門把總俞亨統燕山兵船協助之以備福寧之北境海道副使柯喬統福清兵船泊漳州専備海戰以遏南逸入廣之路副使翁學淵駐福寧州僉事余爌駐泉州備倭黎秀駐金門所把總孫敖駐流江各分信地水陸截捕仍嚴保甲之令搜羅接濟姦人四月鏜分兵與賊戰於九山大洋百户張燁衝其前指揮張漢等繼之大敗賊衆俘斬稽天新四郎等五十五名顆溺死者無算之六月賊攻沙頭嶴及衝大擔外嶼者再柯喬禦嚴賊乃遁去賊首許二流劫北茭羅浮同知張魯把總王麟指揮閔溶張文旻千户王灝王鑾禦之七月許二與倭合䑸以拒官兵麟等率兵鏖戰自寅至午擒斬八十有竒賊錯愕投水死者千數餘乘潮遁去三十四年十一月賊攻鎮東衛城官兵禦之千户戴洪髙懷德張鑾等死之賊自莆田白湖江登犯過涵頭至海口十三日攻衛城洪與懷德各率軍出戰張鑾遇賊於路皆殁於行陳平海衛千户楊一茂白仁丘球追賊及於東嶽山大敗倭衆一茂等亦戰死三十五年三月備倭劉炌千户王月與賊戰於石壁嶺死之賊亦敗遁福清海口之賊遁至西鄉官兵追之斬其衣紅賊首一人賊敗走炌與月率兵欲伏石壁嶺邀擊之未及設伏遇賊突至山路屈曲遂至敗殁賊流遁福寧州之竹嶼孤山官兵追之或火攻或伏弩賊輒敗走參將尹鳯預置藥酒於胡坪賊中毒者數十人四月及於桐山又破之賊遂入浙江三十六年三月賊犯省城賊於舊臘自連江洪登陸就據為巢至是復自流江至小埕水寨遂犯省城沿城焚掠虜去戰艦二十有竒又焚燬四十餘艘十月賊攻連江縣官兵擊退之賊乃宵遁先是北茭灣原屯倭冦進無所掠乃遁出洋遇新至賊船遂會䑸進攻連江官兵以矢石殪其精悍者四人明日分門四進又擊敗之乃夜遁如拱嶼澚出洋三十七年四月賊入安海城官兵追擊大敗之賊入城居民拒之不得掠僉事盛唐參將黎鵬舉等分兵逐之賊遁至唐店官兵連戰皆捷至水涵賊遁出海水兵又擊敗之沈其二舟陷福清縣賊犯閩安鎮為參將尹鳯所敗進攻福清據門外山頭用炮乘髙擊壞雉堞城遂陷居二日而出攻興化府賊自福清進攻府城越翼日不退廣兵及鳥銃手殞其乘馬衣紅賊首一人從賊四十餘各兵出城追之賊遂敗走攻惠安縣賊自興化為官兵敵退遂至惠安攻城有自水涵潛入者官兵覺而殺之於是連攻五晝夜皆被官兵敵敗賊死者百餘人乃遁官兵截之於洛陽橋又大勝之斬首五十有竒五月賊攻泉州府賊復自惠安進犯府城巡按御史樊公獻科自督兵敵退之入南安縣縣故無城知縣徐光裕統民兵禦之遂被突入時居民己遷避賊無所掠官兵追擊之乃遁往晉江海邊虜船出海而去攻崇武所賊别䑸之新到者攻所城凡五日而後解突犯惠安知縣林咸與戰死之賊自崇武分突惠安永寧等地方咸率兵與戰陳亡官兵繼至擊敗賊衆賊乃退遁攻鎮東衛城提督都御史王公詢遣兵追擊大敗之賊三千餘人自松下突入海口澚登陸攻衛城者二日益以新至賊千餘合勢來攻城幾不守時閩中南北海洋皆賊惟此賊獨劇且逼近會城陸走合䑸勢益滋蔓王公乃多方集兵設伏扼險剪其零黨伺惰合攻仍密令水兵布於海外賊勢窮促乃遁出洋水兵乘勝逐之沈二十餘艘斬首四百餘級賊首洪澤珍引倭入冦澤珍故通畨逆賊積年啓釁引倭內侵至是復引倭泊舊吾嶼盤據為巢三十八年三月賊攻福寧州不克遂陷福安縣賊攻州城者凡五晝夜分守參議顧翀督兵固守賊計無所施乃退往福安適淋雨城崩知縣李尚德恐難堅守督兵出城迎擊賊屯城北山上窺見守垜兵少遂分蹤擁入四月參將黎鵬舉大敗倭賊於屏風嶼海洋鵬舉與指揮盧鼎臣攻賊於屏風嶼鎮下門及三沙海洋沈其四舟擒斬一百五十有竒燒溺者無算時賊乘汛突至未得登劫我兵邀擊外洋擒斬頗多賊皆望風遁去五月賊首嚴山老等遁出海洋參將王麟等追擊大敗之山老連年引倭入冦分蹤四掠麟等兵船按伏海上賊由祥芝石湖南潯出海者麟追敗之于大島圻自峯頭澚出海者都指揮唐修澄追敗之于野馬外洋自閩安洪塘出者參將尹鳯備倭張僑追敗之於梅花外洋山老就擒賊舟沈者七十八艘死者數千人而洪澤珍之徒亦自燬其巢遁去十二月官兵會擊上徑之賊大敗之先是賊徒四千餘人自海壇山登犯副使張情參將曽清督兵勦逐屢摧其鋒賊乃移屯上徑蔓延日久提督都御史王公詢巡按御史樊公獻科令僉事萬民英參將王麟把總朱先等期朔旦搗巢至期官兵夾擊之賊遂大敗死者八百餘人燬其巢死者復千餘人三十九年三月賊攻平和縣賊首蕭雪峯張璉等引倭千餘自大埔及三饒嶺來攻縣城官兵出城夾擊之賊遂退屯承坃攻大金所五月月港之賊敗遁出海官兵追擊大敗之先是賊巢月港官兵於衆州海倉白石鎮海野馬井尾等處擊之皆勝至是遁出海洋參將王麟追及於古浪東砟鎮海山把總鄧一挂追及於剌嶼尾五戰皆勝之沈其舟數十斬獲數百賊首徐老許西池王老及日本頭目尚乾皆就擒所部三千餘徒悉溺水無遺七月賊自廣東來冦官兵擊敗之賊復入廣廣東謝賊等突入走馬溪勢極猖獗把總徐濓沈其數艘賊大敗遁去官兵乘勝追至廣東南澚外洋而回八月賊入安溪縣四十年正月安溪倭賊流犯長泰同安等縣官兵追擊大敗之賊自安溪為官兵所敗遁至長泰典史葉露百户金環敗之乃往同安復為鄉兵所襲奔竄石􅌲海濱五月賊攻寧化縣賊來攻城知縣陳添祥擊敗之攻詔安縣先是賊首陳思達等潛入城內主姦民林勳家為內應外合之計知縣龔有成防詰頗嚴賊計不得施乃自內殺出思達就擒而勳等為內應者凡數十家至是皆敗閏五月賊復攻寧化縣時賊久在縣近郊時來攻城官兵擊敗之遂偽為遁計知縣陳添祥謹防其再至賊果分布四門一時突擊又為雲車一乘覆以牛革屢以大炮佛郎機殪賊而賊之在雲車者來愈力乃出打手二百人下擊之賊乃敗走按倭冦之患自福建始乃內地姦民勾引之也其時為嘉靖二十五年禍尚隱而未彰微而未大都御史朱公紈用海道副使柯喬議欲以海滄月港等澚耆民充捕盜撲之備倭都指揮黎秀獨謂不然上議於巡按御史金公豪曰日本倭夷先年內犯朝廷屢下備倭之詔及委重臣以督海防是以海洋乂安今承平日久軍民趨利忘害而各處輕生之徒攘臂向前私通貿易向嘗緝絶今復啓釁若不預行究治恐禍患日深卒難禁制也既而復上議曰近署安邊館事諗知違禁通畨大船之詳其船皆造於外島而泊於內澚或開駕以通畨或轉售於賊黨而嵩嶼漸尾長嶼海滄石馬許林白石等澚乃海賊之淵藪也本職欲行禁治恐澚甲勢要抗拒不服反速其禍乞行府縣巡捕官親詣各澚密行擒治船隻應燒燬者燒燬應留用者留用庶頑民知警而通畨之風少息矣議上秀遂大為漳泉耆民捕盜怨謗致劾免官後十餘年倭患大熾沿海數千里生靈靡不荼毒人始服黎逺覽而惜其寃抑向使早用其言胡以有是豈非民命之當厄也邪今之士論但知紀録戰功而曲突徙薪謾不之及豫不能無感故志之福建事宜浯嶼水寨福建五寨俱江夏侯所設浯嶼水寨原設於海邊舊浯嶼山外有以控大小嶼之險內可以絶海門月港之姦誠要區也不知何年建議遷入夏門地方舊浯嶼棄而不守遂使畨舶南來據為巢穴是自失一險也今欲復舊制則孤懸海中既鮮村落又無生理一時倭冦攻劫內地哨援不及兵船之設何益哉故與其議復舊規孰若慎密夏門之守於以控泉郡之南境自岱墜以南接於漳州哨援聮絡豈非計之得者哉南日水寨原設於海中南日山下北可以遏南茭湖井之衝南可以阻湄洲岱墜之厄亦要區也景泰以來乃奏移莆田縣吉了地方仍以南日為名舊南日棄而不守遂使番舶北向泊以寄潮是又失一險也今之事體與浯嶼相倣有兵寄者其思為哨守應援之規以撲冦焰於未熾哉烽火門水寨原設於福寧州三沙海中永樂間倭冦犯境議撥福寧衛大金所官軍防守秦嶼羅浮官井洋皆轄焉正統九年侍郎焦宏以其地風濤洶湧不便棲舶徙今松山寨地方其後官井洋雖添設水寨而沙埕羅江古鎮羅浮九澚等險孤懸無援勢不能復舊矣須官井羅浮沙埕南北中三哨羅江古鎮兩哨聮絡䇿應庶可恃為福州之藩户也銅山水寨漳州府所轄地方漳浦一縣最近海嶼設水寨者二銅山西門澚為把總水寨而玄鍾則受其節制者也故今止以五寨為名初水寨在井尾澚景泰間移今西門地嵗撥鎮海漳州永寧衛及玄鍾銅山所軍分畨巡哨而北自金石以接浯嶼南自梅嶺以達廣東險厄所係匪淺淺也須以銅山玄鍾巡哨之兵分守南澚雲蓋寺走馬溪金石等處俾倭舶之自浙趨閩及慣徒之勾引接濟者嚴遏其衝則有以控入閩上遊之勢矣小埕水寨小埕北連界於烽火南接壤於南日連江為福郡之門户而小埕為連江之藩翰也海壇連盤雄踞聳峙若南屏然為賊船之所必泊其所轄閩安鎮北茭焦山諸巡司為南北中三哨無事往來探視有警協力出戰則此寨之設為不虛矣三四月東南風汛畨船多自粵趨閩而入於海南粵雲蓋寺走馬溪乃畨船始發之處慣徒交接之所也附海有銅山玄鍾等哨守之兵若先分兵守此則有以遏其衝而不得泊矣其勢必拋於外浯嶼外浯嶼乃五澚地方畨人之窠窟也附海有浯嶼安邊等哨守之兵若先會兵守此仍撥小哨守把緊要港門則必不敢以泊此矣其勢必趨於料羅烏沙料羅烏沙乃番船等候接濟之所也附近有官澚金門等哨守之兵若先會兵守此則又不敢以泊此矣其勢必趨於圍頭峻上圍頭峻上乃畨船停留避風之門户也附海有深扈福金哨守之兵若先會兵守此則又不敢以泊此矣其勢必趨於福興若越於福興計其所經之地南日則有岱墜湄洲等處在小埕則有海壇連盤等處在烽火門則有官井流江九澚等處此賊船之所必泊者也若先會兵守此則又不敢泊矣來不得停泊去不得接濟船中水米有限人力易疲將有不攻而自遁者况乘其疲而夾力攻之豈有不勝者哉倭冦擁衆而來動以千萬計非能自至也由福建內地姦人接濟之也濟以米水然後敢久延濟以貨物然後敢貿易濟以嚮導然後敢深入海洋之有接濟猶北陲之有姦細也姦細除而後北人可驅接濟嚴而後倭夷可靖所以稽察之者其在沿海寨司之官乎稽察之説有二其一曰稽其船式蓋國朝明禁寸板不許下海法固嚴矣然濱海之民以海為生採捕魚蝦有不得禁者則易以混焉要之雙桅尖底始可通畨各官司於採捕之船定以平底單桅别以計號違者燬之照例問擬則船有定式而接濟無所施矣其二曰稽其裝載蓋有船雖小亦分載出海合之以通畨者各官司嚴加盤詰如果是採捕之船則計其合帶米水之外有無違禁器物乎其回也魚蝦之外有無販載畨貨乎有之即照例問擬則載有定限而接濟無所容矣此須海道官嚴行設法如某寨責成某官某地責成某哨某處定以某號某澚束以某甲如此而謂通畨之不可禁吾未之信也一倭人至福建乃福人買舟至海外貼造重底往而載之舟師皆犯重罪之人也若至沙板雙嶼等處訪之則某家船將至未至及至某澚自有人説而知之一處貨到各處無不知者一漳潮乃濱海之地廣福人以四方客貨預藏於民家倭至售之倭人但有銀置買不似西洋人載貨而來換貨而去也故中國欲知倭冦消息但令人往南澚飾為商人與之交易即廉得其來與不來與來數之多寡而一年之內事情無不知矣一區處福建之法若用福船捕之萬萬不可須用福船而不用福人架使若用蒼山人架使候倭於福建外海而截殺之倭船必非齊來乃一艘二艘以漸而至也至即擒之則後至者將聞風而回矣一八閩多山少田又無水港民本艱食自非肩挑步擔踰山度嶺則雖斗石之儲亦不可得福興漳泉四郡皆濱於海海船運米可以仰給在南則資於廣而惠潮之米為多在北則資於浙而溫州之米為多玄鍾所専造運船販米至福行糶利常三倍每至輒幾十艘或百艘或二三百艘福民便之廣浙之人亦大利焉兵興山嶺戒嚴擔負既難而募調之費又衆大户所積莫肯輕糶海運又厲禁焉民食兵餉如之何而不匱也故經略福建之策莫先於處糗糧糗糧若缺則五澚之兵雖設譬之衣冠之人外貌可觀而五內腐裂四肢痿痺未有不喪亡者蓋不待倭攻之而後地方為難保也今日足食之計有二其一須申明祖宗之意止禁雙桅船隻私通畨貨以啓邊釁所謂寸板不許下海者乃下大洋入倭境也非絶民採捕於內海販糴于鄰省也嚴其保甲令民沿海運糶則廣浙有無相通而福民不患於無食矣其二官府提編銀兩輸解督府春夏給為兵糧時價方貴有銀無米兵甚苦之不如令有司以銀秋糴賤米則米數多春而隨兵所至就以為餉官與兵不兩利乎兵餉既備民食亦充軍門以别省善戰之師三五千人調至於福大振威克豈惟倭夷不能為福建患將使福民之勾引接濟與倭為黨者永永其不敢矣都御史唐順之云賊之根本實在閩中海上經略此第一義況一海相通喘息閩賊亦浙直賊也閩縣知縣仇俊卿云閩之一省北接浙江之界為烽火門水寨原設官軍把守為因勢孤援寡軍門朱公添設流江寨為犄角之勢此誠隨時立法之權但官軍之數不及各寨之半難以助本鄉防護議者欲將流江併入烽火門不若增添流江官軍形勝並據聲援相及此最近是仍令福寧州相近巡司官兵同心哨捕不許役占買間等弊又浯嶼水寨舊址向在海洋之衝可以據險冦不敢近今乃移近數十里在于中左所地方與髙浦所止隔一潮致月港松嶼無復門關之限任其交通其舊浯嶼基乃為冦之窠穴漳州海滄之人悍譎尤甚素號難馴嘉靖年間始置安邊館輪委通判一員治之半年一更上下皆無固心無益于地方海防之助況在前之議猶有紛紜者似為可革又走馬溪畨船直泊近年官軍柯海道等截殺冦盜皆在彼處議者欲令詔安漳浦近縣巡捕官十員更畨住守且與銅山寨玄鍾澚軍民官兵協力相機以便剿捕至于泉之安海向雖通畨猶有避忌邇年畨舶連翩徑至近地裝卸貨物皆有所倚也議者欲令府佐二一員時巡常住或可潛消又云沿海地方人趨重利接濟之人在處皆有但漳泉為甚餘多小民勾誘畨徒窩匿異貨其事易露而法亦可加漳泉多倚著姓宦族主之方其畨船之泊近郊也張挂旗號人亦不可誰何其異貨之行于他境也甚至有藉其關文明貼封條役官夫以送出境至京者及其海船回畨而劫掠于逺近地方則又佯為之辭曰此非此夥也乃彼一䑸也訛言以惑人聽比及上司比責水寨巡司人等間有一二官軍捕獲冦盜人船解送到官彼為巨盜大駔屯住外洋者反役智用幸致使著姓宦族之人又出官明認之曰是某月日某使家人某姓某處糶稻也或買杉也或治裝買匹帛也家人有銀若干在身捕者利之今雖送官報贓尚有不盡法合追給或者有司懼禍而誤行追懲但據贓證與所言之相對不料所言與原情實不同其官軍之斃于獄而破其家者不知其幾也彼巧于讒而計行此屈于威而難辨奈之何哉以致出海官軍不敢捕獲不若得貨縱賊無後患也槩以下海之律彼獨無可罪乎調停之法亦必有道或欲訪廣東市舶司及各邊開市之利使畨徒報貨抽稅嵗可得銀數萬兩以充軍國之用亦且通商惠民上下咸利但恐海邊之人貪利無厭強暴弱智吞愚不免羣聚為姦勢所必至似招之為冦也何以禁其後哉況城狐社鼠之相倚有難以盡詰者則稅之所入將不在公家而咸歸巨室矣又暹羅朝鮮日本瓜哇等國通事照會典各有定數其不通夷語及誤事者法禁甚明今漳泉之人冒濫名色假為通事實多通謀而誤事之孽有不可逭者亦當察而更革之可也都司戴沖霄云閩中事體與浙直不同惟在撫之得宜而已蓋寸板不許下海之禁若行於浙直則海濱之民有魚鹽之利可以聊生而海洋即為之肅清若福建漳泉等處多山少田平日仰給全賴廣東惠潮之米海禁嚴急惠潮商舶不通米價即貴矣民何以存活乎愚聞漳泉人運貨至省城海行者每百斤腳價銀不過三分陸行者價增二十倍覓利甚難其地所産魚鹽比浙又賤蓋肩挑度嶺無從發賣故也故漳泉強梁狡猾之徒貨資通畨愈遏愈熾不可勝防不可勝殺為倭嚮導者官府繫其家屬不敢生還嵗嵗入冦是外冦之來皆由內冦糾引之也福建之亂何時已乎福亂不已浙直之患何時而靖乎唐荆川云倭患始於福建福建者亂之根也諒哉言乎如愚見莫若因其勢而利導之督撫海道衙門令漳泉巨室有船隻者官為編號富者與之保結許其出洋南則哨至廣東北則哨至浙江裝載貨物納稅自賣督之以將官限之以信地交牌報驗其回也南則許販惠潮之米北則許販福寧溫台之米但不許至外國及載畨貨今也海禁太嚴見船在海有兵器火器者不問是否畨貨即捕治之米榖魚鹽之類一切厲禁據其迹雖似犯法論其情海船往來非帶兵器火器無以防海冦之劫奪不有可原者乎明乎此則民情得伸而亂源可塞矣雖然亦未也將欲撫之必先威之練兵足食使在我之威足以制賊則民有所憚而聽吾撫治撫治而不從者然後兵以勦之是故能攻而後能撫知撫而不知攻者吾未見其能撫也豫按福建經略之術有百年之長䇿有一時之權宜何謂長䇿修復海防舊規處置沿海貧民得所使不為賊內應是也何謂權宜今日福建之患有二曰山冦曰海冦海冦乃本地之民糾之而來苦無兵以殄滅之耳然欲練兵須先料理養兵之費費無從出必加賦於民夫福民不受官府約束其來漸矣常賦之額且不可徴況額外加增乎吾知兵未練而變先激矣若非早為之所萬一福建失守則廣東將隔絶而不通而浙江與福連壤其禍亦烈矣與其至此時而動各省之兵馬錢糧孰若早聞於朝請銀十萬兩募兵一萬人到彼操練不假福建之兵不費福建之財先將沿海通畨之人與賊盡行剿滅兵威大振則破竹之勢山冦不攻自平矣由是而選練鄉兵由是而加賦充餉由是而修復海防舊規以為百年經久之計豈有不可行者乎籌海圖編卷四
