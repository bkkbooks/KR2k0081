body:
  text: 籌海圖編目錄經略二禦海洋固海岸勤會哨謹瞭探重隣援散賊黨慎招撫擇守令拯民窮嚴城守築城堡廣團結行保甲降宣諭用間諜附通貢道開互市欽定四庫全書籌海圖編巻十二明胡宗憲撰經略二禦海洋予按防海之制謂之海防則必宜防之於海猶江防者必防之於江此定論也國初沿海每衞各造大青及風尖八漿等船一百餘隻出海指揮統率官軍更畨出洋哨守海門諸島皆有烽墩可為停泊其後弛出洋之令列船港次浙東於定海浙西於乍浦蘇州於吳淞江口及劉家河夫乍浦之地海灘淺閣無山嶴避風之處前月把總周易等所領戰船被賊燒燬僅遺十餘隻近又報為颶風擊碎不若海中洋山殿前窩集反可泊船也吳淞江口及劉家河出海紆迴又非泊船防海處所議者欲分畨乍浦之船以守海上洋山蘇淞之船以守馬蹟定海之船以守大衢則三山品峙哨守相聯可扼來冦而又其外陳錢諸島尤為賊衝三路之要兵部原題副總兵俞大猷統領戰船駐劄海上防賊截殺則如陳錢乃其所當屯泊而提督軍門及海道等官毎於風汛時月相叅巡察有警則我大船火器衝截賊入使不得越過各島則彼毒無所施釁孽不作而内地安堵矣此言哨船當泊於外洋山島又云直𨽻與浙江名雖異地而實則一家若不設官總理則彼此自分門戸賊一入内地隨風南北可以互犯故必共守陳錢分守馬蹟等三道而後賊無遁情兵可夾擊必得總兵官正副二員分駐金山臨山要會之地先守陳錢以春秋分任更畨出入而叅將分畫三道馬蹟等三山各督信地則人易為守而守無弗力矣此言總叅當分任哨責通政唐順之云禦倭上策自來無人不言禦之於海而竟罕有能禦之於海者何也文臣無下海者則將領畏避潮險不肯出洋將領不肯出洋而責之小校水卒則亦躱泊近港不肯遠哨是以賊惟不來來則登岸殘破地方則陸將重罪而水將旁觀矣臣竊觀崇明諸沙舟山諸山各相連絡是造物者特設此險以迂海賊入冦之路以蔽吳淞江定海内地港口也國初設縣置衞最有深意而沈家門分哨之制至今可考合無春汛緊急時月蘇松兵備暫駐崇明寧紹兵備或海道内推擇一人暫駐舟山而總兵副總兵常居海中嚴督各總分定海面南北會哨晝夜揚帆環轉不絶其遠哨必至洋山馬蹟此言海中遠哨近哨又云國初防海規畫至為精密百年以來海烽久息人情怠弛因而隳廢國初海島便近去處皆設水寨以據險伺敵後來將士憚於過海水寨之名雖在而皆是海島移置海岸聞老將言雙嶼列港峿嶼諸島近時海賊據以為巢者皆是言國初水寨故處向使我常據之賊安得而巢之今宜查出國初海防所在一一脩復及查沿海衞所原設出哨海船額數係軍三民七成造者照數徴價貼助打造福船之用此言水寒哨船舊制當復兵部尚書楊博云平倭長策不欲鏖戰於海上直欲邀擊於海中比之制禦北狄守大邊而不守次邊者事體相同誠得先發制人之意國初更畨出洋之制極為盡善至於列船港次猶之棄門戸而守堂室浸失初意宜復祖宗出洋之制此言舊制原禦冦於海中南京工部尚書馬坤等題乞聚船於馬蹟山以為諸路水軍老營仍於揚山設水營以扼賊入乍浦川沙窪由吳淞江口入蘇松之路於大衢山設水營以遏賊入寧波台温之路專設海上總兵特造出海大艦如古拏飛艦飛虎艦戈船樓船將軍之制仍大申出洋之令脩復大青風尖八漿等船以便行使此見與禦冦遠洋大同小異在京各衙門會議云倭奴長技利於陸我兵長技利於水歴查連年用師凡得捷俱在海戰利害較然明矣海中陳錢大衢馬蹟揚山諸島為賊南犯必由之路先該督察侍郎條陳會議海防長策首列此條今又該南京工部尚書馬坤左通政何雲鴈題相同合咨新任總督令總兵官速集太倉崇明嘉定上海沙兵及福蒼東莞等船分為二哨專守揚山馬蹟又將紹興温台捕魚及下八山採捕福蒼東莞等船分為二哨專守普陀大衢其陳錢山為浙直分路之始所宜更畨共守此言禦冦遠洋之策為是略云諸將海戰而勝者常十一其内地戰敗者常十八何勇於海而怯於内也其故有四士卒入海人無還心皆殊死戰無所逃難一也洪艟巨艦易以凌賊勢便二也毒藥火器且戰且焚三也賊載水而飲開口待鹵勢不能持久四也而其後不能禦賊者亦有四犯不測之險以命愽賊而常賞不酬勞其怠心一也海中無人易以為解二也旣不能賞易於姑息將不能驅三也海波不常或利或否四也議者皆言益修戰具反言四失守馬蹟殿前諸山以控吳守大衢諸山以衞越守陳錢諸島以制賊往來之衝夾擊互救三道鼎峙賊不足防矣此言海戰利弊南京兵部尚書張時徹云今之水戰止能要擊去賊而於來者未能遏其烽夫來賊鋭而去賊惰擊惰易而攻鋭難人情所習知也然擊來賊者譬之撲火於方然之始火滅則棟宇可以無虞擊去賊者收燎於旣燼之後此其利害則有間矣自海上用師擊來賊者僅一二見而要去賊者亦不過文其縱賊不追之罪耳今若以擊來賊之賞優於追去賊之賞以縱來賊之誅嚴於縱去賊之誅而當事者同心僇力急如救焚盡遏海外方來之冦則邊鄙又何不寧耶此言海戰以擊來賊為竒功總兵俞大猷云倭賊自彼島入冦遇正東風徑由茶山入江以犯直𨽻則江内正兵之船可以禦之遇東北風必由下八山陳錢里西倒球干邪清水馬蹟蒲嶴丁興長途衢山揚山普陀馬墓等嶴經過然後北犯南直𨽻西南犯浙江請於浙江共設樓船二百隻蒼船一百隻分伏於前項海嶴往來巡探攻捕名之曰遊兵而遠遏之於大洋之外此言當設哨船於浙直外洋又云大洋以外欲就諸山隨處結營隨班分哨常得勝勢似足以賴然萬里風濤不可端倪白日隂霾幾如黒夜故有相遇而不可擊亦有未必相遇者此言外洋禦賊之難主事黃元恭云或者曰我兵長於水戰短於陸戰而倭奴則長於陸短於水故禦之莫要於海中陳錢馬蹟大衢殿前揚山當倭奴往來之衝誠設總兵官駐陳錢叅將三員分駐馬蹟大衢殿前洋山常川督哨禦其來而邀其去賊殆盡殱而魚矣愚竊謂其策甚善而難行蓋海棲經月必有􅄓風巉崕劍峰難於椗泊癸丑春叅將俞大猷圍王直於馬蹟蛟龍驚砲而起幾至覆没師旋賊逸乙卯秋浙直會兵大衢前殿邀賊歸路疾風暴雨大作飄没舟師以千萬計是亦乗危幸功者也夫大海無際何獨稱四山為賊出之衝葢航海者必晝行夜止依山宿泊自倭東南而來望中惟此四山相去各一二日程始至陳錢必泊次泊馬蹟次泊大衢次泊殿前洋山若驛𫝊駐蹕然固非若子午谷東西莫適必由隘中行者賊誠知山有兵東西南北何所不適雖失所依泊然與犯戎兵之必死寧冒風濤之不測且聞長老云起椗揚帆舍山泊而適大洋此避􅄓風之妙術而豈謂必死地哉知戎地而不避有生途而不趨賊必不然矣然則禦其來而邀其去不可為歟曰依此四山但嚴會哨應援之令潛師伺之萬無不中若設官顯駐是示趨避之標耳故是策也宜潜不宜露宜邀其歸不宜伺其來蓋歸路可計日候風信故也此言陳錢諸山但可設伏以撃去賊副使茅坤云方其海冦之舳艫相望必由通海之門戸而入於蘇松之吳淞江劉家港之類是也古人云守險者必先設險於險之外守之其所謂海戰之重兵如各叅將所提閩廣募兵之類當設戰艦備火攻而謹斥堠以迎擊於淞海之上賊未泊岸則當夾水而陣以遮擊之賊旣及岸則當隨其賊艘所泊之處而直搗之此則海上格鬭之兵也將之最猛兵之最精者可以當之此言當禦冦於海中將近港岸之處與陳錢馬蹟遠攻之説異禦海策云備倭之術不過守禦二者而已未聞泛舟大海遠征島夷雖以元世祖之威伯顔孛朩兒之勇艨衝千里旌旗蔽空一遇􅄓作萬人皆為魚鱉此其明驗也而况沙石起伏洲渚驅阻風候向背潮汐髙下波濤洶湧至到淺深彼皆素所諳練以我之迷而蹈彼之危能為必勝哉此與前説相反海道副使譚綸云陳錢馬蹟洋山在内海之外止可出哨不能設守蓋恐糧餉易匱聲援莫及不如荆川備倭之説為善且自來水寨設在沈家門遇有緩急戰守兼得耳此言設險遠洋不如守近洋為穏便都指揮戴冲霄云浙洋諸山沈家門居定海之東相去二潮乃寧紹之外戸也陳錢馬蹟大衢洋山尤為窵遠乃沈家門之外藩也外藩設而門戸固門戸固而後堂室安故有識者咸欲設險于陳錢四山以扼來冦以愚觀之沈家門水寨乃信國公之所設其才識髙遠人所素讓豈見不及此故舍遠而就近哉必其身親相視四山太遠孤懸海中難於聲援不若沈家門與定海哨報易及策應易施熟思審計夫是之處耳不然大海渺茫風潮難犯水兵官可藉以躱閃萬一四山失備致冦直搗追咎無及反致悞矣不若守之近海易於綜覈太祖之所以聴從信國或者在於此耶太祖神明先見毫髪不爽信國公若有疎謬肯遽聴信之而已乎此説與譚副使所論相似而推原舊制當守尤為有見知府嚴中云外洋禦冦豈不是上策但在將官有難於奉行者何也海中無風之時絶少一有風色天氣即昏面對不相見矣須十分晴明方能瞭遠歲在已未􅄓風大作四百戰船一齊覆没利害如此將官出哨豈敢遠浮大洋必尋嶴内收泊令一二小舟行探耳若迎風而上遇敵歸報賊使順風瞬息數百里報至賊亦至矣若順風而去遇敵歸報甚難甚難况遇賊被殺將官不知此常事也故謂海戰為可恃者必其未常親至海洋者也若見海洋自知此説之難行而以固海岸為不易之定策矣此説以固海岸為上策與唐荆川以固海岸為第二義不同又云海防不設險於海岸而設險於海中山沙猶論北方邊務者不可但守近邊須遠守於邊牆之外其見同也昔者俞子俊嘗因修外邊費財甚多其後邊牆反易壞而難守何也離内地太遠照顧之力自有所不迨也且如北邊之制每城垜相去六尺一軍守之積而至於六百丈之遠不過守以千人而已虜來攻城動以數萬計六百丈之間只此千人如何相策應而禦乎此與水兵哨船出海太遠聲援不及備禦甚難同一義也國初信國公不肯設險於險之外豈其智不及此哉可以悟矣此見與譚副使王知州相似海道副使譚綸又云今之談海事者往往謂禦之於陸不若禦之於海其實大海茫茫却從何處禦起自有海患以來未有水兵能盡殱之於海者亦未有能逆之使復回者不登於此必登於彼即十得其一二彼亦視為不幸而遇風者耳僥倖之心固自在也若陸戰一勝即可盡殱賊乃興懼不復犯我此水戰陸戰功用相殊而將官則力主海戰為是者以海戰易於躱閃陸戰則瞬息生死勢不兩立且萬目共覩不能作弊當事者宜坐照之勿墮將官術中自失長算可也此言與荆川之見不合然將官閃避情弊洞燭無遺矣寧波生員陳可願云吾昔使日本經歴海中諸山注意觀之陳錢乃孤山突出極東大洋水深不可下椗又無嶴可泊惟小漁舟盪漿至此即以舟拖閣灘塗採捕後仍拖下水而囘欲以此為期會之地恐不便也馬蹟大衢洋山則不然蓋馬蹟有小潭可以泊舟但有龍窟不可放砲遇敵難戰此山雖在陳錢之西離大衢尚遠賊舟西來一過陳錢即是馬蹟以此為會哨之地可也大衢與長塗相對其西有礁無嶴不可以泊舟且亦有龍窟宜避之其東面有衢東嶴者可容廣福船四十隻但水震蕩不寧舟泊於此久則易壞不如以大舟藏於長塗之北而以哨舟泊於衢東嶴遇警舉號招廣福船𠞰之豈非長久之計乎但大衢在北長塗在南相離不過半潮之遠潮從東西行兩山束縳其勢甚疾哨船戰船遇潮來與落時皆難横渡俟潮平然後可行策應亦有不便者禦海洋之策有言其可行者有言其不可行者將以何者為定乎常親至海上而知之向來定海奉象一帶貧民以海為生盪小舟至陳錢下八山取殻肉紫菜者不啻萬計每歲倭舶入冦五島開洋東北風五六晝夜至陳錢下八分䑸以犯閩浙直𨽻此輩恒先遇之有被殺者有被擄為鄉導者因此諸山曠遠蕭條無居民守禦賊得以深入此禦海洋之議所由建也國初以來從來無人發此然事理雖長而未經試練嗣後將官遵而行之或謂其間有不便者何也離内地太遠聲援不及接濟不便風潮有順逆􅖼舶有便否蛟龍之警觸礁之險設伏擊刺之難將官之命危於磊卵無惑其爭執為難行也然自禦海洋之法立而倭至必預知為備亦甚易非若乙卯以前倭舶岸人猶未覺其為冦也茍因將官之不欲而遂已之是因咽而廢食也烏可哉如愚見哨賊於遠洋而不常厥居擊賊於近洋而勿使近岸是之謂善體立法之意而悠久可行矣固海岸通政唐順之云賊至不能禦之於海則海岸之守為緊闗第二義賊新至饑疲巢穴未成擊之猶易延入内地縱盡殱之所損多矣然自來沿海戍守莫不以擁城觀望幸賊空過謂可免罪而不顧内地之殘破内地戌守亦幸賊所不到而不肯策應沿海今却不然宜分定沿海保䕶内地内地策應沿海地方沿海力戰損兵折將宜坐内地不能策應之罪内地殘破沿海幸完宜坐沿海縱賊之罪又如同是一様沿海地方賊由寧紹登岸寧紹却不殘破而殘破温台賊由温台登岸温台却不殘破而殘破寧紹自來則坐地方殘破者之罪今却不然宜并坐賊所從入其沿海文武將吏有能連次鏖戰抵遏賊鋒阻賊下船不得登岸深入者雖無首級以竒功論一准平倭事例如此則人知謹於海岸之守不敢幸賊空過以覬免門戸常扄堂嶴自安矣此言沿海之兵與内地之兵宜相策應主事唐樞云國初湯信國經理海防北起乍浦南迄蒲門縈紆二千餘里設九衞及諸所諸巡司總有百城又營寨烽堠彼此聯絡援應接濟血脈貫通谷都司集侍郎嗣為葺潤巳甚周密至今絶好能任事者只圖自守其城其附近地方有事及鄉村殺掠坐視不理殊非立法本意此言與唐荆川所見脗合太常寺卿魏校云晉溪在三邊欲分軍守邊邃菴聞而訝之使人往問晉溪答曰三邊數千里欲一一守之雖盡天下之兵不能也只是擇要害處為朔部素所出入之路把截則可耳晉溪威令素行凡遇有警衆軍爭相救援無不擒獲邊境稍安此言北邊設險之法愚謂海防亦然則兵不費而冦可遏鎮撫蔡汝蘭云環海兵船之設其法不為不善其備不為不周矣邇年倭冦往來兵船未收全功者必有説焉夫茫茫巨洋極目無際雖於要害之處聯艦設備而疾風怒濤不時亦必擇善地而停泊焉豈得揚帆起椗常出洋口而能盡阻賊船之不入盡遏賊船之不歸哉但能於大數内打得分數中幾分耳必欲其盡收全功以為經久不易之圖在於水陸夾攻盡之矣夫倭冦之發䑸犯我也毎徒止備一月行糧而飄泊二月者有之毎船可載百徒而滿載二百者有之及其抵岸困憊莫甚使得焚舟登陸奪險鼓勢養鋭蓄精然後出我兵以臨之近者十日遠者一月方得與賊相望反主為客轉佚為勞豈能得志於彼哉為今之計宜於春汛小汛先期一月將各道兵士督發各海口要害之處如在嘉湖者出三闗在紹興者出龕山出臨山出觀海出三江在寧波者出定海出昌國出象山在台州者出海門出新河出松門在温州者出楚門出盤石出金鄉等處安營操練與兵船相表裏以為防守萬全之計設或賊船潜入海口則水兵星羅於其外陸兵雲布於其内其將至也擊其困憊既至也擊其先登既登也擊其無備以疲憊倉遑之賊而當我養盛豫備之兵一鼓成擒可不血刅而收其全功矣春汛之期不過三月將終四月將半小汛之期不過九月將終十月將半過此則非風汛所利而倭警不必防矣今宜於毎年三月九月初將各道統兵官分與信地令其督領部兵出沿海兵船停泊之處守營操練防守賊至即擊春汛至五月終小汛至十月終方令撤兵歸道嚴立限期通行浙直廣福提督總叅衙門永為遵守則防禦周而賊無返棹先聲播而賊無伺志矣謹瞭探兵備副使凌雲翼云哨探者兵之耳目也哨探既真則先事有備今沿海守把官員遇賊初至皆不聞知及已近岸倉遑失措甚則我船亦有被擄以為賊資者今後把總官務要督同各哨官員多置蜈蚣梭船精選熟知水性之人遠出外洋分投哨探如有聲息先來傳報其附近各港官兵一聞警急隨合䑸約㑹截擊大洋庶可獲制勝之功如賊從某官某信地登岸把守官不先期傳報附近官兵聞報不即時策應以致深入腹裏貽害地方聴本道查實指名叅究坐以失悞重罪其有與賊相拒衆寡不敵者原情另處庶人心兢惕海防可固矣予按哨探與間諜不同間諜者使人於敵中設法離其腹心覘其虚實之謂也哨探者將欲進兵預分遣人裝作田夫漁樵之類於兵所經行險阨路口宵行晝伏窺輯於我兵將到之前夕某處有伏某處無伏逐路預報兵得以安心前進也此惟極其機警熟知道路之人方可任使乃將之腹心所托兵之安危所係也非平日恩信相孚者不可勤會哨廣福浙三省大海相連地畫有限若分界以守則孤圍受敵勢弱而危戢捕之謀能不有賴於相須乎曽考入番罪犯多係廣福浙三省之人通夥流刼南風汛則勾引夷船由廣東而上達於漳泉蔓延於興福北風汛則勾引夷船由浙江而下達於福寧蔓延於興泉四方無賴又從而接濟之嚮導之若欲調兵𠞰捕攻東則竄西攻南則遁北急則潜移外境不能以窮追緩則旋復合䑸有難於卒殄此夷船與草撇船之大勢也又有一種姦徒見本處禁嚴勾引外省在福建者則於廣東之髙潮等處造船浙江之寧紹等處置貨糾黨入番在浙江廣東者則於福建之漳泉等處造船置貨糾黨入番此三省之通弊也故福建捕之而廣浙不捕不可也廣浙捕之而福建不捕亦不可也必嚴令各官於連界處會哨如在福建者下則哨至大城千戸所與廣東之兵會上則哨至松門千戸所與浙江之兵會在浙江者下則哨至流江等處與烽火之兵㑹在廣東者上則哨至南澚等處與銅山之兵㑹遇有倭患互為聲援協謀㑹捕賊勢豈有不孤窮而海患豈有不戢寧者哉福建五寨烽火門水寨設於福寧州地方以所轄官井沙埕羅浮為南北中三哨其後官井洋添設水寨則又以羅江古鎮分為二哨是在烽火官井當會哨者有五小埕水寨設於福州府連江縣地方以所轄閩安鎮北茭焦山等七巡司為南北中三哨是在小埕寨當會哨者有三南日水寨設於興化府莆田縣地方以所轄沖心莆禧崇武等所司為三哨而文澚港哨則近添設於平海之後是在南日當會哨者有四浯㵰水寨設於泉州府同安縣地方上自圍頭以至南日下自井尾以抵銅山大約當㑹哨者有二銅山水寨設於漳州府漳浦縣地方北自金山以接浯嶼南自梅嶺以達廣東大約當㑹哨者有二由南而哨北則銅山㑹之浯嶼浯嶼㑹之南日南日㑹之小埕小埕㑹之烽火而北來者無不備矣由北而哨南則烽火㑹之小埕小埕㑹之南日南日㑹之浯嶼浯嶼㑹之銅山而南來者無不備矣哨道聯絡勢如常山㑹捕合併陣如魚麗防禦之法無踰於此浙江六總浙海諸山其界有三黄牛山馬墓長塗冊子金塘大榭蘭秀劍山雙嶼雙塘六横韭山塘頭等山界之上也灘山滸山羊山馬蹟兩頭洞漁山三姑霍山徐公黄澤大小衢大佛頭等山界之中也花腦求芝絡華彈丸東庫陳錢壁下等山界之下也此倭寇必由之道也海防莫急於舟師舊制邊海衞所各造戰船有七百料五百料四百料二百料尖之殊向因賊舟不大七百料停造久矣其餘五百料之類亦以不便海戰改造福清等船復調發廣東横江烏尾船顧税蒼沙民船又有小哨草撇船軍駕八漿船裝火器出竒埋伏划網船四叅六總分哨守各洋港叅將原設二人分守浙東西後分為四曰杭嘉湖曰寧紹曰台州曰温處把總原係指揮四人今因地方多事衞所窵逺分而為六曰定海曰昌國曰臨觀曰松海曰金盤曰海寧裁去備倭總督而各把總以都指揮體綂行事轄諸衞毎值春汛戰船出海初哨以三月二哨以四月三哨以五月小陽汛亦慎防之毎年六七八月風漸險惡正月十一二月不常舟皆不可行三月至五月東北風多倭來便易十月小陽汛亦可渡海冦有停泊海島乗間而至者故春秋二汛皆當嚴為預防也其南哨也至鎮下門南麂玉環烏沙門等山交於閩海而止其北哨也至洋山馬蹟灘滸衢山等處交於直海而止陳錢為浙直分綜之處則交相㑹哨遠探窮搜復於沈家門列兵船一枝以一指揮領之馬墓港列兵船一枝以一指揮領之舟山駐劄把總兼督水陸賊若流突中界也則沈家門馬墓兵船北截過長塗三姑而與浙西兵船相為犄角南截過普陀青龍洋韭山而與温台兵船相為犄角賊若流突上界也總兵官自列港督發舟師北截之於七里嶼觀海洋而叅將自臨山洋督兵應援南截之於金塘﨑頭洋而石浦梅山港兵船為之應援是故今日之設險自内達外有三會哨於陳錢分哨於馬蹟羊山普陀大衢為第一重出沈家門馬墓之師為第二重總兵督發兵船為第三重備至密也所患者海氣溟濛咫尺難辯風濤歘忽安危叵測兼之潮汐有順逆哨報有難易奸將往往藉以規避吾何從而綜覈之哉自海上用師以來擊來賊者僅一二見而要去賊者不過文其故縱之愆識者謂宜以擊來賊之賞優於追去賊之賞縱來賊之罸嚴於縱去賊之罰風汛時月正副總兵不拘警報有無而親出海洋嚴督各總僇力用命以遏海冦於方來則何邊鄙不寧之有福浙直海洋浙東地形與福建連壤浙西地形與蘇松連壤利害安危各有輔車相依之勢故上命浙江巡撫總督浙直福分哨各官互為聲援而不許自分彼已畫地有限責任相聯此廟謨之所以為善而海防之所以為固也愚考海中山沙南起舟山北至崇明或㫁或續暗沙連伏易於閣淺賊舟大者不能東西亂渡如遇東北風也必由下八陳錢馬蹟等山以犯浙江而流突乎蘇松如遇正東風也必由茶山西行以犯淮揚而流突乎常鎮如遇正北風也必由琉球以犯福建而流突乎温台三途窵遠瞭望難及須總兵官撥遊兵把總領哨千百戸等船往來㑹哨以交信票為驗其在浙江也南則沈家門兵船哨至福建之烽火門而與小埕兵船相㑹北至馬墓兵船哨至蘇州洋之羊山而與竹箔沙兵船相會其在蘇松也南則竹箔沙兵船哨至洋山而與浙江之馬墓兵船相會北則營前沙兵船哨至茶山而與江北之兵船相㑹諸哨絡繹連如長蛇羣力合并齊如扛鼎南北夾擊彼此不容豈惟逐寇舶於一時殆將靖冦患於無窮矣閩縣知縣仇俊卿云國初沿海相近地方轉相哨報勢合情聯承平既久人多好逸事機漸疏即以東南沿海直𨽻與各省相近之勢言之浙之海寧等處則北與直之金山崇明等界相接其蒲壯等所則南與閩之流江烽火等寨相接閩之銅山𤣥鍾等澚則又南與廣之柘林寨蓬萊驛相接向來各省自分彼此不相哨報緩急難備今欲與各省相近衞寨轉相會哨往來絡繹使萬里海洋無懸料叵測之患其㑹哨官軍船隻須各給字號牌票以防憸細混雜為姦併註到銷日期以杜偷玩又云兵法地有所必爭言其險要也嘗聞海冦往來其大船常躱匿外洋山島之處小船時出而為剽掠在浙常於南麂山住船雙嶼港出貨若東洛赭山等處則皆其别道也在閩常於走馬溪舊浯嶼住船月港出貨若安海崇武等處則皆其游莊也自浙迤北則極於料角而屬於直𨽻自閩漸南則灣於南澚而屬於廣潮中間所泊所經之處可以得其槩也以澚屬經廣潮重隣援兵部尚書楊博題云南北總督總兵職專閫寄欽奉勅諭一應事宜聽其處置並無中制之意至於止以血戰應援為功不以損軍擅離為罪又節奉俞㫖永為定額合行各官從實舉行以後隣封如果有警本鎮無警即便發兵策應共保萬全如敢自分彼此秦越相視者聽巡按御史指名叅奏策略云列地定制犬牙相入所以相衛也封疆相錯所以相保也緩則相安急則相救非為自全而已也故春秋隣國不能救則譏之桓公不能恤小則譏之此天下之大誼也漢右渠之伐兩將軍異同而朝鮮幾危唐祿山之變而賀蘭擁兵睢陽遂陷此天下之大機也今地壤相接而坐視勝敗令賊長驅深入而無顧忌之心此甚不可長也愚以為宜特嚴其法約曰賊攻西則東出鋭師擊其左賊東則亦如之賊攻南則北出鋭師繞其後賊北則亦如之賊攻中則左右前後各出鋭師四面而起非其守地而兵先至者有異賞坐視其隣之敗者與同罰則賊腹背受敵我多樹兵也賊亦安能肆而不顧哉此最多弭賊之道今日之要務也舉人王文祿云今當著為合救之令若攻一省諸郡救之若攻一郡諸邑救之若攻一邑隣邑救之正猶子弟之衞父兄手足之捍頭目保家保身而不可緩也夫所謂救之者非盡撤居守之兵以救之也蓋毎郡毎邑毎所抽其精者而救之則合少而成多也惟抽其精者而勵之以敢死之志歆之以信賞之榮或負砲夜偷或繞擊不息則冦腹背受敵驚潰莫支解散而不暇攻矣蓋城既被圍兵不能出以應敵必得隣境外兵始能救之不然坐待其斃也况東南郡邑有數唇亡齒寒竹破瓦解將安救哉必在位者調元氣倡大義震赫斯怒大為之處凡有坐視而不救者與失陷同罪則庶乎衆志一而援助之廣可以望其平也散賊黨都御史唐順之云逋逃不特如王􅌯李華山洪迪珍等有名賊首力能搆倭為亂者而已以臣所親見三沙千餘倭子起自𤓰洲一被擄人馮三嗾其揚州取寶遂至鬨然遠來馮三之在中國不啻一蟣虱及在島中却作此一番風浪雖旋就誅殛而流毒已多矣然則逋逃不歸東南誠未可以息肩也此説恐難行蓋逋逃之人在彼得利招之不來况殺王直誰其信之昔秦璠王艮之叛也當道嘗誘其降而殺之莊渠先生曰後日招降之令從此更不可行矣蓋招而處之則可招而殺之則不可寧可不招招後必不可以失信胡靜菴令軍門之條曰已降者不殺再叛者不饒新起者必撲滅於微至哉言乎太常寺卿魏校云海冦須開其自生之路自古豈有二三千人致死命不開其生路而欲盡殱之者諸人能不以克勝受賞為心方與上帝之心合其事可成功兵部尚書王守仁云出給告示凡脅從皆不問雖嘗受賊官爵能逃歸者皆免死斬賊徒歸降者給賞使内外居民及鄉道人等四路傳播以解散其黨副使吳子孝云中國昔年下海之人不得歸其鄉土故反為海寇之用彼豈無父母妻子之思哉請開其求生之路出給小方紙榜萬張以付彼來間諜之人往彼散給招撫曰昔日吾民脅從海寇原非本心今日執此投降悉免本罪願充行伍願歸鄉土者聴能自相擒殺者賞如前説今松江上海招而殺之失信可惡當以守信為主庶有功也副使茅坤云於閩之漳福泉州浙之寧波等處當行有司嚴為保甲之法各籍其里之名氏而鈎考之而為之鈎考者亦非欲據籍而罪之也特令見在土著者不得望風而煽誘入海既羣聚入海者廣令招諭曲為緩其罪而出且為之下令大略賊從以下有自縛來歸者並得免死有能手刅其黨來歸者仍按給賞銀二十兩三級以上仍命爵一級有能誘衆而縛來歸者亦如之有能手刅所稱佐亂劇賊如某某者賞銀五百兩仍世襲千戸其嘗佐亂劇賊而能率所部來歸少或數十人多或百人以上者賞亦如之所部人獲免死仍優恤以差其能手刅首亂某某來歸者賞銀一千兩仍世襲指揮使其為首亂能自歸者亦除罪免死而能率所部二三百人以上自縛來歸者賞亦如之其所部人亦得免死仍優恤以差凡賊中有能自縛告以賊情引導官兵擊死得勝者毎二級准手刅一級爵亦如之有能焚溺其舟并輜重兵仗因來歸者而告官驗實亦賞如手刅佐亂之賊又下令於閩之漳福泉州及吾浙寧波等處各賊犯之父母妻子兄弟朋友隣佑有能自行首鳴者勿連坐其為若父母妻子兄弟朋友隣佑不能首鳴而他人告發驗實則以其罪罪之仍量以所犯之貲充賞有能私縳所犯來歸者並亦得免死賞如之有能以姓名聞官因而詐入賊黨本圖誘所犯來歸所犯率不聽因而諜知賊情告官而令官兵擊殺得勝或左計陷賊或自賊中焚溺其舟而出者賞亦如之其故行黨而不以告者並得論罪如律又下令傳示海島諸夷有能手刅首亂之賊或擊滅其黨數十百人以上効首虜以聞者賞萬金加之封爵願歲通貢入市者聴主事唐樞云内地人入賊夥者須許親識的當人甘結令其自新以散賊黨并可因而行間閩縣知縣仇俊卿云海寇之聚其初未必同情有寃抑難理因憤而流於寇者有凴藉門戸因勢而利於寇者有貨殖失計因困而營於寇者有功名淪落因傲而放於寇者有傭賃作息因貧而食於寇者有知識風水因能而誘於冦者有親屬被拘因愛而牽於冦者有搶掠人口因壯而役於寇者諸如此類中間不無可矜雖在冦盜之日未必皆無求生之心樂於犯法以甘必死者豈人情之通好哉招徠撥亂轉移亦易吾將為攻心之謀伐交之計必明掲榜於通衢或書黄旗標插冦所内地之人有願歸籍許令不時投首官給口糧押赴各該鄉井有親隣識認者即時放釋並不加罪中有豪傑能以智力取倭首來獻者另行重賞若能説誘謀主出降者題封見任官職如此彼心危疑其黨易散又聞冦至地方必先擄其土著之人以為鄉導吾即以鄉人之知巧者遺之擄去反行間諜或假作接濟之人與之往來使不相疑或暗貽之財使厚相結兼餽飲食使日相狃如此未有不可得彼情形以行吾計取者也慎招撫兵部尚書王守仁云招撫之議但可偶行於無辜脅從之民而不可常行於長惡怙終之寇可一施於囘心向化之徒而不可屢施於隨招隨叛之黨何也寇亂之始被害之民恃官府之威令猶或聚衆而與之角鳴之於官而有司者以為既招撫之則皆置之不問盜賊習知官府之不彼與也益從而脅之民不任其苦知官府之不足恃亦遂靡然而從賊由是盜賊益無所畏而出刼日頻知官府之必將已招也百姓益無所恃而從賊日衆知官府之必不能為已地也夫平民有寃苦無伸而盜賊乃無求不遂為民者困征輸之劇而為盜者獲犒賞之勤則亦何苦而不彼從乎是故近賊者為之戰守遠賊者為之嚮導處城郭者為之交援在官府者為之間諜其始出於避禍其卒也從而利之故曰盜賊之日滋由於招撫之太濫者此也兵部尚書胡世寧云自古盜賊之興即當撲滅於微若其既久而多則不得不撫捕兼行者蓋以情則脅從當罔治以勢則延蔓難根誅也故如漢武帝以南征北伐之威不能盡殺盜賊及後輪臺下詔休兵恤民盜賊不見其迹又如漢龔遂當宣帝彊盛之時下令渤海諸持田器者為農民吏無得問固不聞其誘使釋兵而盡殺之也自古招撫之失有當戒者如唐宋金元之季官其渠帥授以土地假以兵權更或因其懈弛而遂行誘殺見其跋扈而復事妒忌以是威信兩失紀綱大壞坐致衰微又云已招者不殺再叛者不招新起者必撲滅於微又云齊民無故首亂必遏絶其萌決不可用招安之策萬一不得已而用焉必播告之曰除首惡某人不赦外其同黨有能自首及縛其人來者皆宥其罪量加以賞擇守令策略云將之所轄者廣而守令之所守者專如使守令能用其民則諸郡邑皆兵也否則將以賊所至而用兵兵不得不寡如使守令能率其民以禦賊則賊所至皆其敵也否則將禦其東而賊轉西將禦其南而賊轉北賊無端而將所向之方有限將不得不勞兵寡而將勞立敝之道也故李廣守北平而匈奴避邊魏尚為雲中守而虜不敢犯龔遂為渤海而盜賊散魯恭至樂安而渠帥降此其已然之效也其法莫如部使者察東南諸郡守令之宜而易置之又使天下部使者皆察其可為東南守令者上之銓司又使諸臺諫徧察中外以請又使銓司按諸察舉擇其宜而授之如賊小至則各以其地戰大至則固其地以待援能守者與勝賊者同賞賞必速玩冦者與將敗者同罰罰必重如此則守令與將同心而諸郡邑與幕同體合而為一以禦賊尚何賊之不滅哉此言守令若皆得人則處處自能守禦不全倚靠將官裕州知州王宇云募調客兵措置錢榖以是禦倭非探本之論也治道須有根抵擇守令是已蓋守令得人則一方之民悉被其澤茍可以利民者無所不用其極食如何而充兵如何而練民心愛戴逃亡自歸無有乎勾引無有乎接濟無有乎嚮導倭豈能自至乎即有外患民將樂於效死以戰則克以守則固矣若守不賢則倭未至而民先困倭將至而民益擾離心離德咸懷叛亂之思矣兵食雖充何益乎此言守令若得人則小民之從賊者皆歸化而捍賊否則民且為賊兵食有無何足恃哉觀於此言其人牧民之賢可知矣副使吳子孝云治兵以得民心為本今海隅之民富者遇刼掠而盡其資財貧者謀逃遁而死於溝壑田不得種種不得收困不可言矣在城郭者官役其力而無所給取其有而無所償遠近憤怨愁泣不絶上之人何由知之書曰怨豈在明不見是圖必須軫惻怛愷悌之念十分撫綏之而後可以得其親上死長之心撫綏之道奈何曰緩催科輕徭役禁酷暴戒科罰視之如子孫則民視上之人如父母而緩急濟用矣此言冦至之時若有司不得其人則但知科派大戸與通逼小民苦無所訴可見守令當擇副使茅坤云近海郡縣有司尤當别議者何則國無雞犬之警則廉靜長厚之吏當為治最矣時有羽檄之馳則長駕遠馭之士亦所急使矣故語曰寛則寵名譽之人急則用介胄之士方漢匈奴大入雲中上黨雖有龔黄卓魯之賢無益於用矣故漢武帝方聞匈奴如雲中上黨諸郡並出材官騎士若李廣程不識之徒以為守尉竊謂今日近海之州縣也亦然為撫巡者當合郡縣長吏及其佐貳並量其材而器使之大略近海者則擇其彊智精悍之材一切練軍實築城堡謹斥堠嚴部署皆藉之以備緩急而其餘腹裏郡縣則擇其寛和柔靜之士慎出納謹筦籥特務與民休息而已此郡縣有司之略也此言擇守令當分有冦無冦地方因材器使太常寺卿魏校云欲重郡守之職惟是揀天下太守治行髙第者拔擢為都御史則監司不敢捃辱之其職自重兵部尚書胡世寧云知府知州知縣三等親民之官使非其人則上司雖有好官行得好事不能實到百姓所以自古國家慎重此職漢制郎官出宰百里郡守入為三公唐制不歴刺史不得任侍郎列卿不歴縣令不得任臺諫給舍我國初取中進士俱選縣官徴至賢才多選守令正統以來知府俱責大臣保舉知州知縣另委吏部揀選所以得人且又立為定制知府知州見上司不行跪禮以重其職其久任卓異者不次超擢如何文淵由知府即陞侍郎胡儼由知縣竟陞檢討所以人多樂為此官𢎞治初年又責其備荒積穀多寡以為殿最所以民受實惠固得邦本如此久長正德以來此官不重輕選驟陞下焉者惟圖取賄要錢以防速退上焉者惟事奉承取名以求早陞皆不肯盡心民事以致民竆財盡一遇凶荒多致餓死今宜遵復先朝舊規知府令在京堂上官於京官七品以上在外在閒五品以上官内保舉在外撫按及布按二司掌印官於叅議僉事同知知州内保舉其知州知縣俱聴吏部預行揀選仍責撫按布按二司於府通判推官州同知知縣内保舉堪任知州之人於判官縣丞主簿儒學教職司府衞首領官内保舉堪任知縣之人俱必其有愛民之誠有守已之操有處事之才三者俱備而後可任此職後有不稱舉主連坐誤舉者先能自首則免到任之後察其奉公守廉而不盡心民事才力不稱者改任品級相應職事貪酷罷輭者即時罷黜其稱職者留以久任知府九年上者即陞四品京堂并布按二司長官次者照常陞叅政副使等職知州九年上者即陞叅議知府郎中僉事次者照常陞員外府同知運同等官知縣上者三年行取到京考其文學德行出衆者選翰林忠直剛正識治體者選為科道才識明敏者分任部寺屬官其有深得民心願留久任者超擢府州正職次者九年六年照常遷轉如此選任方得民受實惠地方雖遇凶荒盜賊可保無虞矣其在外知府知州知縣并凡方面有司等官陞選俱合註於原籍相近地方廣西雲貴有司尤宜查照𢎞治以前事例只以本省人員内陞選庶免其不服水土且得到任易不致地方曠官悞事此二條言重守令之法嚴城守唐節度使杜佑守城法在相機以應敵扇棧必塗泥城門扇及門上木棧皆以泥塗之厚可三五寸備火樓櫓必芘籬上建候樓以板為之跳出為櫓芘籬戰格于女牆去跳出㭬牆去三尺内著横括㭬端安轄以荆栁編長一丈濶五尺懸㭬端用遮矢石橋有轉闗一梁為橋梁端著横括去其橋轉人馬不得渡皆傾水中堞有積石毎一城堞積石百塊大小隨事或積長木如標狀皆以備抛乂竿竿如鎗刄為兩岐用之又合為飛梯或兩旁曲刀以鈎搭連棒如打禾連枷狀用打女牆外土城敵人布幔椱布為之以弱竿懸挂於女牆七八尺四折抛石之勢則矢石不復及牆水弩以黄連疑桑柘為弩弓長一丈二尺徑七寸兩稍三寸絞居疑張之大矢自副一發聲如雷疑吼敗陣之卒行爐融鐵汁鑪也舁行於城上以灑敵人遊火以鐵筐盛火加脂臘鐵鏁懸縋城下燒穴中孔城之人灰眯灰糠粃因風於城上擲之以眯敵人目因以鐵汁灑之松明積松明燒之夜以鐵鏁縋城下巡城照敵人防其乗城而上燕尾炬縛葦草為炬尾分為兩岐如燕尾狀仍以油臘灌之加火縱城墜下便騎朩驢而燒之鹿角鎗斬朩及竹如角狀為鎗或交對突突槎牙女柵狀髙一丈或五尺大小不等以繩或藤篾縛而聯之列於城下以拒敵今九邊用之為擡營名鹿作柞朩柵無城壘去處乃建立朩為之方圓髙下隨事深埋朩根重復彌縫其闕内重短為閣道外柱朩重長出四尺為女牆皆泥塗之内七尺又立閣道内柱上布板朩為棧立䦨籌柵上懸門擁牆濠塹拒馬以守鐵菱狀如鐵蒺藜要路中置之以刺人馬陷馬坑長五尺濶一尺深三寸坑中埋鹿角鎗竹簽其坑似亞字相連狀似鈎鏁以草及細塵覆其上軍城營壘要路皆設之拒馬鎗以朩徑二尺長短隨事十字鑿孔縱横安鎗長一丈銳其端可以塞城門巷要路人馬不得奔馳近日九邊製兩頭裹鐵中施横棍長七尺五寸毎七寸七分鑿二孔用鐵鎗五扞以小棍五杆交界之連以鐵索令游軍伏其前後烽臺於髙山四顧險絶處置之無山亦於孤迴平地置下築羊馬城髙下任便常以三五為准臺髙五丈下濶二丈上濶一丈形圓上建圓屋覆之屋徑濶一丈六尺一面跳出三尺以板為上覆下棧屋上置突竈三所臺下亦置三所并以石灰飾其表裏復置柴籠三所流火繩三條在臺則近上下用屈膝梯上收下乗屋四壁開覷賊孔及安視火筒置旗一口鼓一面弩二張抛力壘朩停水甕乾糧麻藴火鑽火箭蒿茭狼糞牛糞毎晨及夜平安舉一火聞警戒舉二火見烟塵舉三火見賊燒柴籠及毎晨及夜平安火不來即烽子為賊所捉一烽六人五人為烽子遞如更刻觀視動靜一人烽率知文書符牒轉牒馬鋪毎鋪相去三十里於要路山谷間收馬二疋與遊奕計㑹有事警急烟塵入境即奔馳報探游奕於軍中選驍果諳山川泉井者充常與烽舖上河計㑹交陴日夕邏候於停障之外捉生問事其軍中虚實舉用勿令游奕人知副使子將亞久軍行人取善騎射者兼令人枕空胡祿卧有人馬行三十里外東西南北皆響見於胡祿中名曰地聴則先防備城池接近蠻冦者不可不豫備也至於攻蠻冦破營寨則有火攻水攻二法焉火攻者火兵以驍騎夜銜枚縛馬口人負束薪麻藴懷火直赴敵一時舉火營中警亂急而乗之靜而勿攻凡火攻皆因天時旱舍茅竹積蕙糧軍營於結草宿莽之中因風而焚也又有火戰以艾煴火置瓢中瓢間四孔繫瓢於野猪獐鹿項下擊其尾端向敵營而縱之奔入草中瓢敗火發火禽以胡桃剖分空中實艾火開兩孔復合繫野雞項針其尾而縱之奔草中器敗火發也火盜遣人暗伏與敵人同者夜竊號遂便懷火偷入營焚其積聚火發必亂而出火弩以臂張弩射及三百步者以瓢盛火符矢端以數百張中夜齊射敵營芻草積聚火箭以小瓢盛油冠矢端射城樓櫓板朩上瓢敗油散因燒矢焚鏇内中射油散處火立燃復以油瓢翼之則樓櫓盡火杏磨杏子中空以艾實之繫雀足上加火薄暮羣放飛入城壘上棲宿其聚廬舍須臾火發毒藥煙毬毬重五斤用硫黄一十五兩草烏頭五兩焰硝一斤十四兩巴荳五兩狼毒五兩桐油二斤半小油二兩半木炭末五兩瀝清二兩半砒礵二兩黄蠟一兩竹茹一兩一分麻茹一兩一分搗合為毬貫之以麻繩一條長一丈二尺重斤半為絃子更以故紙一十二兩半麻皮十兩瀝清二兩半黄蠟二兩半黄丹一兩二分炭末半斤搗合塗傅於外若有氣薫人則口鼻血出二物並以砲放之害攻城者煙火藥毬即煙火架上所用作四方架綴毬其中遇風勢便用火攻以小艇先潜使人架于敵舟上㸃著疾囘駛艇敵隨之則敵舟盡焚矣水攻者以水因地而成勢為原髙于城而斜小可以遏而止可以決下流故平水可以灌安邑汾水可以浸平陽先設水平可以漂城灌軍沈營殺將而照版度竿亦不可無也水平槽長二尺四寸兩頭及中間鑿為三池池横濶一寸八分長一寸深二寸二分分開相去一尺五分中間有通水渠濶二分深一寸三分池各置浮水朩濶狹微小施巨厚二分上建立齒髙八分濶一寸七分厚一分槽下置轉開脚髙下與服等以水注之三池浮朩齊起眇目視之齒齊平則為天下准或十步一里乃至數百里目力所及置板度竿亦白繩計其尺寸則髙下丈尺分寸可知照版形如方扇長四尺下二尺黒上二尺白濶三尺柄長一尺大可握度竿長二丈刻作二百寸千分毎寸内小刻其分隨向遠近髙下立竿以照版映之眇目視三浮朩齒及照版又以度竿上尺寸為髙下遞而往尺寸相承則山峒溝澗水源髙下深淺可以分寸而度此古人守城之具以其詳悉故採之以為式凡賊圍城必須選募勇敢夜斫其營或夜舉銃砲使賊警其圍自解此言解圍之法一凡賊可結巢去處如松江柘林陶宅等地方必諭令居民盡行搬移入城房屋拆卸務使賊難棲止此言清野之法誠與城守相兼一大兵進攻賊巢城内不無空虚恐墮誘敵奸計或賊出我之背乗虚來襲吁則危矣必須嚴加防守仍撥人把截往來要路此言備賊乗虚來襲之道嚴城守者不可不知海道副使譚綸云自來城守攻破者少襲破者多此嚴夜巡詰奸細為第一要𦂳事也此總言城守要法其詰奸細之規詳具於後一城守之器佛郎機發熕鳥嘴銃床子弩旋風砲最利弓弩次之到用刀斧是最下策矣然亦不可不備也一凡城有敵臺者最好守若無敵臺架櫓起望臺亦善或皆未備則用絮被挑懸出垜外五尺以蔽矢石庶臨敵無失耳一凡敵在城外不獨當為守具亦當為修城之具如朩石灰磚之料與匠皆不可不備也一守城用燭不如用松明一松明可代十燈也已上四項俱言守城之具當預為備者一凡遇勍敵則須在城外為三面壘屯兵拒守與城中為犄角勢至為上策敵築甬道架雲梯以攻我或穴地道以襲我則又當隨事有應免至臨時倉皇無措也此言遇大敵攻城則城守之法又不可拘於常格一凡敵夜襲我多在五更悉衆攻我多在黎明出我不意也一凡敵環而攻我至曠日持久計内乏薪芻則佯退數舍夜則還襲之或伏賊雜為採薪者入城為内應此皆不可不知也一凡敵用雲樓攻我必先驅吾人負土填濠我即當為之備矣一敵毎擄吾人縶其父母妻子使為間諜内應此最難辨識當事者須嚴察之巳上四項俱料敵攻城必用之計守城者所必嚴為之備者也一凡詰姦須立朩柵在濠之外百歩陳兵守衞而詰之城門之下又嚴兵以待之遇警則閉今人聞警輒將城門盡開或止開一門或日開二次而詰奸又在城門之内外避難之人一擁而入又孰從而詰具辨之此言詰奸細之法一凡敵在城外攻我不得須懸重賞選敢死士時出竒擾之或焚其資重攻具待其走而邀擊之乃為得策也此言守城者當知攻賊之法叅議唐爰云一守城之法毎垜口五個為一伍置朩牌牌上寫趙甲錢乙孫丙李丁周戊毎夜一人守一更四人穏卧毎更置一小旗上寫更分夜巡兵姓名在上如趙甲為一更錢乙為二更之類巡更者執持在手只瞭望五垜口城下有無奸細一有賊至呌醒同伍四人執持灰瓶石塊器械攻打如此庶使五垜不過數步之内易於瞭望一人巡更四人休息精力不疲緩急有備餘垜照此式若毎垜口原編二人牌上備開十人毎更止用二人瞭望尤為加慎酌行之一守城各垜兵夫勤惰不一不可不稽察使人人㸃名更更喧嚷則守垜者不能睡卧精神困疲非計也城小以城門為限如自東門至南門南門至西門西門至北門毎門用巡邏兵十名毎更分二名巡視垜口不許呌喝搖打梆鈴止挑燈巡視若有輪更守垜兵夫熟睡不行瞭望者則暗掣更旗明早稟治仍喚醒防守不得警擾擅自責打賣法并究五垜之内燈火㫁滅即記輪更之人并治城夫自東門某窩舖至某窩舖巡邏週而復始毎更二人稽查均照前式一設巡邏之役又恐疎虞誤事毎門另選職官一員各與以馬給以更牌更箭如東門巡至南門時值二更東門巡警官將一更箭交付南門城樓上官驗收南門官隨付二更牌與東門官為號彼此各收次早送總巡官處查考若各官將牌箭私換不親巡警者查出以軍法重治其巡警官先察巡邏十人為先次查各垜口偶有睡熟失瞭者許即責治執其更旗次早連巡邏人并送總巡官處究治巡警官止許巡視亦不得呼喝㸃名搖打梆鈴以警擾守垜之人此周圍夜巡之大略也若城有衞所者衞官有司分門巡警不必另選職官馬各自備尤便一城上白日止張旗號非寇臨城不許鄉夫上城以疲其力臨晚登埤俱要雨具器械遶城不許喧嚷屏去鈴析若無人者使寇不知城上虚實且城上不譁城外有警庶可傳報以便策應各門另設遊兵五十人各持利器鳥銃俟有警脅力禦敵仍先示約凡遇夜間賊集衆攻門方許放火箭三枝再緊發銃三箇十分緊急鳴鑼三通原派本門遊兵一面禦敵總管另帶枝兵應援一門有警各門堅閉固守不得輕動以防聲東擊西之患尤禁垜兵警擾離次至於疾風暴雨半夜黎明人易懈弛困倦賊毎乗間登城此當嚴加申諭可也一守城之具甚多急用惟灰瓶石塊為便俟圍久勢急因時出竒又當措備城上燈籠毎五垜口止用燈一盞用新紙油者方明亮燈上用一油紙蓋以防雨蓋上仍壓以一小瓦片以防風毎燈製一挑竿索懸城下離地七尺庶使賊抵城下我能照見我瞭垜口賊不見我換燭即輪更之人不許誤事若官府給燭五人輪管使兵夫自備恐曠日持久所費不給未免誤事油燭官處為便不當靳小費可也一守城官兵至城邊向内射放箭銃城上不得喧嚷俟賊近城令慣熟銃手善射者乗便打射務要巧發竒中得斃賊人一二其餘自退更不知我兵伎倆虚實毋得一槩亂發以窮矢藥若四面雲梯攻圍當并力齊禦又難拘泥一閒雜人等不許無故上城垜口窺視擾亂軍伍且防城外矢石誤中旁人趨避不便驚惑衆心倘有姦細亦難防閑相應嚴禁如賊向城射箭放銃守城官軍各帶綿被或用牌盾取便掩掛垜口露隙瞭望以防矢石一警報緊急城中居民近城者不宜堆積稻草蘆葦恐防城外火箭飛入在内柴堆亦易發火故宜禁諭少則收藏多則遠置隙地為便倘城中偶有失火去處城上訛言賊入警亂為害不細平日有司分定坊隅編立保長小甲名色各分信地多備水桶籐斗鐵鉤麻搭竹梯斧鋸毎一坊隅火起即以本坊火甲捄之不得亂攘守城兵夫各顧垜口就使本家失火不許離次若係本坊火甲捄援不力致有延蔓及不係本坊居民乗機搶火者查出一體以軍法處治如此緩急有備防守無虞此在平日素講而預備可也一城門多備水缸水桶一以濟渇次備火攻樓櫓城門當路間設火器品窖蒺痢以防衝突若賊囊土束薪填塹登城者此無别法惟鳥銃並發人不敢近此無庸慮然亦在臨時計策之一城包山者峻處城垣宜增培髙厚或内立一敵臺瞰外以便瞭望運發矢石城峻處賊不敢近則城中虚實不得窺測而平城易於防守矣若繞山築城勢若仰盂賊憑髙窺見城内更當盡驅老弱為兵多用鮮明器械旗幟虚張聲勢使賊不敢易此不得已之策又在臨期應變何如耳難以懸諭也一城外民居近城者如賊勢重大將逼城下須用拆燬不然賊將藉為遮欄且登城尤便於雲梯是不當姑息若水門柴米出入所須尤急但要視勢緩急委官嚴加盤詰不致疎虞可矣一槩閉絶適以自困此守城者所深戒也若城中無水宜多穿井無米者宜多預備或勸富戸積粟許其乗時取利官弗為禁或官移幣金先期買米以備緩急至於鳥鎗火藥燈籠油燭之類邊海衞所縣分賊毎登犯者尤當早為計處庶為有備一城外沿濠攔馬牆此不可不堅築用髙六七尺内多留穴空以便窺伺更容放鳥銃毎城一面另募敢死士百人各執鳥銃利器潜布在内賊夜攻城必渡濠踰牆而入使内有備不必喧嚷俟半銃擊之近牆手刅之城上城下俱不得傳呼呌喊使賊不知伏兵故輕犯而多敗馬牆有備城上更無虞矣此詳言守城事宜松江府同知羅拱辰云頻年賊來野獲多得是以無攻城之志今各鎮刼掠遷移己盡如其再來寧不垂涎於城哉切照各城雖有濠河之險必須附城濠邊挑起淤土離城脚丈餘臨隄圍築五尺髙牆使賊雖或渡濠難抵城下此古人羊馬城之制也况不時出竒兵數十人於城下得此遮蔽可以藏伏窺視如賊近對濠我兵即於牆内潜發火器使彼不知我兵在城下者多寡有無所謂有有無無虚虚實實者此也且四鄉逃難男女得此可以暫容其身既有此牆只須謹閉城門俟賊到城方去吊橋亦不為晚况賊畏城上銃砲決不敢近毎敵臺左右各置小吊車四五架以便兵上下及逃難者吊人之法婦女隨即吊上若係男子須審其聲音貫址方許吊入其城無敵臺則不能眺遠顧下何以言守必貼城增築毎座相去五六百步或七八百步或二三百步各隨城勢曲直以為遠近臺下須離濠水丈餘有近濠水者釘品字樁朩百餘根於水中髙出水面尺許防其樓船臨衝我也各城樓設遊兵二隊毎隊約兵二十五名左右往來巡警毎垜派兵一名專守之其敵臺上垜口毎垜用兵三名選擇精勇者傾身外望以背向裏遠近彼此互相顧視其守之法最禁諠譁庶臨敵不亂又必將各臺編以字號分以信地别以號旗金鼓响器之類日則觀旗色夜則聞號聲各將字號大書垜牆使各熟認各分信地俱以敵臺為準如天字號敵臺左邊向地字號敵臺管垜若干地字號敵臺右邊向天字號敵臺管垜若干兩臺中分信地如天字號該管四十垜以一十為一號第一號十垜用紅旗用鼓則大書日觀紅旗夜聴鼓聲八字於垜牆第二號十垜用黄旗用鑼則大書日觀黄旗夜聴鑼聲八字於垜牆第三號十垜用青旗用喇叭則大書日觀青旗夜聴喇叭八字於垜牆第四號十垜用白旗用朩梆則大書日觀白旗夜聴梆聲八字於垜牆其餘敵臺垜口皆然如賊日犯天字第一號信垜城下該管臺上摇紅旗而該垜亦䜿紅旗夜犯天字第一號信垜城下該管臺上起鼓而該垜亦擂鼓信守兵夫一齊戒嚴俟擊左右城樓各遊兵到彼應援而兩邊附近敵臺相向䕶為催擊其餘臺垜官兵非信地者不許亂動各門雖無警亦加戒嚴不許擅離應援恐賊聲東擊西乗虚而上庶防守嚴備而靜治不亂矣又慮賊攻日久我兵疲倦必更番休息又恐乗怠而入須於垜外蓋出浮棚毎扇約濶三四尺或長七八尺環城架設其法或朩或竹毎根比棚濶三四尺以一半横出垜外一半斂入垜内其外閣浮棚棚上壓以磚石天晴加石灰數包於上其内用繩縛墜石虚懸若賊加梯棚上則棚軟不能勝梯縛石將墜擊城下而牆内守垜者且自警覺若賊置梯棚下而上登其棚觸首移動而亂石又墜矣若欲再加嚴固沿城垜上堅架柰何朩其制豎立架朩二根機闗横挑朩各一根上閣一朩謂之柰何朩朩上錯綜釘以竹簽其朩之輕重與挑朩相稱賊來攀援則其朩自然下擊人旣不能攀駕又不能放脱也敵至城下我兵輕動其朩墜下又可擊之此棚朩易於成造費又不多今各縣城低難守相應速製至於夜間守城燈燭費多且皆髙懸垜上是使賊得視我我不得便視賊利在彼矣必造鐵火毬中燃柴朩則柴朩之價比油燭相去倍蓰况火光散遠比燈相去十倍毎垜口二十箇或三十箇止該用火毬一枚挑出垜外墜於城半則火光在下我視在上其光不悖我得以見賊而賊不能見我其利在我矣又如製造紙糊圓砲今製者不過震响而已無益也因此舊物而變為新製待糊成紙殻之時中含小鐵刺菱二三十枚地火鼠一二十枚入藥於内然後緊糊其口毎砲一枚開藥線眼四處賊近城下時燃之砲一响而砲中刺菱自然布散其中火鼠飛走賊被焚身必走而刺菱又傷其足城上且擊之矣若城中一時火發恐姦細為内應或居民失慎守城兵夫未免驚疑往救家宅必棄所守請先出示禁諭庶免疎虞各鄉村鎮蓄積米穀之類須於冬末春初盡遷入城則村野既清城郭又固賊不得食則饑攻城不下則勞饑且勞必思去矣我出兵以要擊之有不勝乎此亦詳言守城事宜與唐叅議互有異同主事唐樞云守城之法近日東南全不知此女牆不可太髙厚堵空之欲如圭首斜鋭所以便外瞭便俯瞰城上傳箭不敲梆所以便聴聞守者必更番所以養精力陟降有號頭夜有火晝有旗所以一衆伍違犯有決罰所以定心志風雨露日有遮避所以安體力火器石塊灰油懸槌鐵蒺藜諸物畢備所以供急用須叅酌定規遍諭各城守習此言守城之法兵部尚書胡世寧云城門可去土塞止於門扇中當胸開鑿五孔以五弓弩守之賊不能近矣又云戰卒不睡恐賊夜乗其疲而竊入焉不若晝令輪班休息又云箭將盡不宜亂放有號纔放發又云無先閉門以示賊怯而使屬邑被殘又云僧徒多善少陵棍法宜收進城内毋為賊用此言守城當戒者五舉人王文禄云海冦之來我兵俱守城中城外之民棄之而不復顧不敢出一兵以撓之冦反多疑誠恐我兵出城與敵佯以數冦為攻城之勢以綴遏我兵使不能出乃得深入内地横行而無阻是皆我兵不知攻守互應之法也自古用兵非執於一攻之中有守守之中有攻攻而無守則為無根守而無攻則為無榦且一城之中不下數萬家若定守之而不外攻圍困日久食盡兵罷冦雖不攻而我亦自潰矣安用其守乎凡冦攻城不過數次甚急扞禦已過冦亦必怠乗其怠而懸兵夜出負砲偷營冦亦撓亂自救之不暇而何暇攻我若狷焉定守冦知我兵虚實併力夾攻曠日不解而援兵不至則我坐守以待斃無益也昔者已已北狩也先南侵攻圍京城精兵皆出城外石亨于謙督兵於城北孫堂江淵督兵於城西毎攻也先營殺傷相半也先退去若使文臣謙淵無謀武臣亨堂無勇皆守城中不亦危哉而大事去矣惟其知攻守之一道故攻不忘守而守不忘攻是以克濟時艱也此言守城必須時出兵以攻敵鎮撫盧闕云守城之法斷不可毎垜口一人守之止許三垜口用一人垜口之下用灰瓶五七箇大石子三五百滚朩擂石皆設備凡守城切不可用貧民預用鄉士夫舉監生員吏承義官與各有產之家或弟男子姪或家人各帶器械編成隊伍急則上城緩則斂於教場操練則各自為戰各自為守不惟可省有司錢糧而亦不致貧民怨咨矣此言派城夫之法吳郡生員沈栻云凡冦賊未至城下則城守之夫晝夜不輟者似為贅設宜於晝日止令保長甲長在城俟有冦警約鳴金鼓為號聚集人夫料不誤事俾人夫得在家作業酉時方使之乗城其夜間守城亦有法夫人之常情未有能終夜不寢者若使終夜不寢疲憊困倦勇如闗張亦不能操戈赴敵矣是徒自弊其民而無益於用也愚謂夜間城夫宜用五人為伍之法凡城垜口必取大石塊方五尺髙稱之於五人中止令一人登而擊柝站立旣髙得以俯瞰城下其餘四人聴之休息俟一更徹捱次番換是名雖終夜之守實則一更之勞勞逸有節彼將勵精任役不敢偷安矣如有偷安者巡更官吏痛責記仍罰之達旦不得番代則彼雖昏愚必不肯任竟夕之勞而易一時之安也五垜之間其地甚近一有冦警休息四人呼之即應何誤事之有此言城夫晝夜更番之法吳郡生員蘇獻可云倭冦生發大戸有饋餉之煩小民有調遣之役實為民窮財盡柰何城上管夫之官索要常例有銀者則老弱不計㸃缺不究無銀則百般刁蹬小民旣勞其力而又費其財苦楚何似至於府縣吏胥皂甲賄賂尤甚或報大戸或拘舖戸莫不賣放其九而拘認其一拘認者固當其費而賣放者亦損其財官府之所用者有限而吏隸之所取者無窮人民瘠而官吏肥可哀也已此言守城須禁官吏刻剥之苦又云地方有事之秋所賴者富家而已今富家往往變產遷徙地方若富者盡去貧者僅存其誰與守必將各圖里甲人等取具執結不容逃散是亦保城之大端也此言守城須寛縻富家若逼走之則城空虚矣為有司者所當深念也御史邵惟中奏稱要轉行督撫二臣嚴令該府州縣衞所出示曉諭沿海居民各將妻女財貨糧米及時搬運入城僦居存貯仍留壯丁在家防守并將當年糧長人等預令將應辦糧石收送城倉以聽運兑如有積粟數多不搬入城者則官為扣糶給償時價即貯附近屯兵衞堡以充軍餉支用此權宜之術民必樂從事寧之日仍復舊業則城中積粟萬餘財貨充盈賊外無所掠而我内有所資矣此篇專言積聚不當留在城外以資盜賊海道副使譚綸云島夷志在得財因糧於我無他轉運我能堅壁清野則失其入冦初意衆旣可離勢亦難久乗其敝而擊之在我將易如拉朽在彼且終身創艾矣攘夷安夏計無出於此者顧其事言之甚易而行之甚難何者邊氓習知利害故行之輒有成効今浙直之民被害處少倖免處多凡聞冦至則彼此觀望不為遷徙即有徙者又近在山林之間計小費而忘大計此行之甚難一也世家宦族蟬聯鱗凑一令之出競相是非煽惑齊民甘同燕雀有司督行之嚴輒飛語流布此行之甚難二也浙直之地沃野千里宫室器用習為奢僭棄徙為難冦至倉卒各以牛酒鏹幣開門延納以圖僥倖又預集舟楫以資其去彼此顧其廬舍焉念法度自為一家一時之利曽無遠大之謀此行之甚難三也夫安土重遷惡勞好逸古今所同然勞之固所以逸之擾之實所以安之而况乎勞之擾之者暫時之事而所以逸而安之者甚久且大也為今之計惟在責成有司親詣各鄉多方譬曉使之預於二月初旬盡將婦女積聚徙入附近城郭仍㑹同衞所掌印官為之安插得所其倉廪搬運不盡者即及時發賣有司嚴督糧長糴買上倉一切兵餉有可以徵本色者作速改議徵收凡城中榖粟止許於城中糶賣不許顆粒糶運出城其有不肯預期搬運臨時棄遺在鄉致資盜糧及以牛酒鏹幣開門延冦即係通賊之家查照律例從重問遣其有巳遺棄而偶未遇賊亦通查入官以充兵餉有司務要用心毋事姑息間有成績者即註以上考部院特加奬勵其有偏抝悞事者即與失事武職官員一體從重叅究如此庶法令必行而長䇿畢舉成効可臻矣此言倭冦深入皆由鄉民不遷積聚入城之故善反之則冦念息矣都御史唐順之云春汛時月倭患雖熾然禦之於海禦之於江又禦之於海塘禦之於江岸豈至盡是無策國家平時養兵設官將何用之而稍聞警報只有塞城門塞水闗風縫不通委城外於虎口遂為竒策甚至不論有害無害輕意將城外房屋拆毀除塞城塞門任從有司自行本部不敢干預外其近城房屋茍非倭患逼近及與城垣委實干碍不許輕易拆毁使民無所棲若因不拆屋以致失事本部自認其罪不以累有司丹陽邵芳云善守者必以城視地以人視城以粟視人三相視而墨翟之衞宋可得而言矣何謂以城視地蓋無不備則無不寡烏得城而守之必守一處足以保障數十處扼一里足以牽制數百里斯能視地矣何謂以人視城蓋除四門中軍應敵出竒外毎人轄地幾尺而又有幾人更代休息幾人搬運器械幾人輪管炊爨如百雉則用若干人與伍法無異斯能視城矣何謂以粟視人彼探殻煑弓不鬭自困雖古名將不免有此者失於不審也蓋必計其積聚料其丁口毎粟幾斗可供幾月斯能視人矣故余嘗曰以城為可恃則古有不破之城乎以城為不可恃則古有必破之城乎亦在乎守城之人何如耳予按城一也有闗係一方之利害有闗係數十里數百里之利害者闗係一方之利害者一守令慎之而足矣此守令之事也闗係數十里數百里之利害者豈宜以一守令支之乎為將帥者須提重兵以鎮之合羣帥以援之其城無恙則敵人不敢越此而他攻即有所攻亦無闗係而非敵之所必欲取以為巢者矣是所守者雖一城而所庇者吾不知其若干城也此將帥之事也若為將者不論城之輕重緩急而漫焉以居之其身之所居則力為之救而其所不居者雖有闗係亦聴賊攻取萬一失守則樞要為賊所握而其餘所守皆無用也曾是為善守城乎譬之海防焉自廣至遼迢迢數千里賊舟無處不可登泊港堡無處不當設備若一一而照拂之則將帥之精神有限分用於無闗係之地則其有闗係者反有遺而不到者矣惟諒倭所從來之道哨之於遠洋𠞰之於近洋倭在洋先後而來星散而行風濤警其心跼蹐苦其形吾以衆而待其寡以逸而待其勞以飽而待其飢以備而待其所未備至簡至易之道也若其近岸也惟擇總要之處為水寨陸寨以扼其衝以遏其入其餘港堡堅營清野賊進不得攻退無所掠計自窮矣予聞論守城者多矣率局於區區一方之見惟邵子與予合惜其引端而未竟也故詳之以為將者之助蘇州府守城條件分信地一六門城樓各派定府佐一員專督該門守城夫役府佐不足以所屬州縣佐内科目出身謫官之才能者充之一城中心本府與長吳二縣掌印官住劄𤣥妙觀一以居重馭輕一以接應各門事宜一以近憲院謀議一以便士友叅謀就以陳把總統兵六百名屯處其中作中軍名色府主上城縣尹不宜同事但係一邑之主諸事藉以奉行故須同處一府有府庫縣有縣庫獄囚皆須防守府中用守領官一員縣中用佐貳官一員看守一各城門另設府首領或縣佐貳有才官一員典守城上一應器用隨時給發一分屯守城池之兵於六門附近寺觀無寺觀者近門公廨屯劄一請鄉宦分守各城門各就其家近便與情之合者分配分職掌一設法大戸米穀進城右一項長吳二縣掌印官專督之一設法守城物料進城稻草石灰磚石鉛鐵火藥油燭右六項府佐一員專督之一設法竹朩遠去與進城右一項府佐一員專督之一查修城屋城門閘板製造城垜燈架燈籠燈架燈籠俱照崑山縣式右一項府佐一員專督之一製器械發鑛佛郎機鳥嘴銃鉛錫銃火毬火箭噴筒煙鑵箭匠竹匠朩匠造火器架子用銅匠鐵匠合火藥人右火器府佐一員專督之長鎗刀鐵盔鐵甲皮披牌紙甲弩弓箭太倉州取弓匠來造鐵匠皮匠竹匠朩匠裁縫弓箭手右兵器府佐一員專督之先揀選舊時所蓄可者用之不可者作急製之某人某人長於揀選者也某人某人長於置造者也與府佐相協贊庶不為各匠所欺備儲蓄一區處米榖入城著長吳二縣正官先行密訪城外及各鄉鎮大戸有田收米在家者與夫田少用銀糴米待價者查審的實密稟察院差官二員著落兩縣糧塘嚴催搬運入城任民堆積開糶其時價髙下官府並不叅與期定某日糧塘開報已經搬運入城者幾家本官親行勘驗恃頑不搬留資盜糧者治以養倭重罪糧塘囘䕶親故之家混開己運入城者許貧民出首一體加罪仍給賞首人十分之三其七分没官作養守城兵夫之用一區處鉛鐵入城鉛鐵資火器之用闗係匪輕不可棄以資敵蘇城客販冶坊俱在城外須先查鋪行及冶坊等姓名賊有警報著本地方總甲押催依期搬運鉛鐵鐵鍋鐵器入城任從放置專督官再行逐一查訪不搬入城者本家治以與賊交通之罪總甲不行開報一體問罪鉛鐵等入官公用一區處火藥入城蘇州硝黄之類進城有限務先查定各南貨舖行賊有警報著本地方總甲押催依期搬運入城任從堆置如有公用照時價將銀見買專督官查訪不搬運入城者治以私販火器與賊交通之罪總甲不行開報一體問罪一區處磚石入城城夫不閑武㙯須用磚石擊賊賊警急時城門已設盤詰矣軍民人等毎人各城門要帶磚一塊置於月城内空地守城軍搬運上城毎五十垜作一磊以石灰封識聴用如不帶磚者盤詰人員不許放入本職仍差湖船裝載西山石片交與把門人員運置城上助用如不移運上城作磊罪加把門員役一區處石灰入城灰瓶毒藥修砌等項俱資石灰仰各窑戸領價依期送運石灰入城封識沿城寺院以須急用一區處稻草入城城上燒賊必資稻草先期派價與各糧塘領買若干萬束不拘蘆柴稻柴茅柴堆置空閑倉厫以須急用一區處城外竹朩竹朩行俱附城郭若不遷徙皆賊攻城之具也須仰各商將竹朩行依期輪運入城開賣其在水各排移去五六十里外隠僻港中暫置以待賊退復業如不遷徙俱取入官公用一區處油燭入城賊臨城下缺乏油燭必無處置查各城門外一應油行及出販舖家仰總甲於有警之日押民依期搬運菜油荳油欍油銅油白蠟等項入城聴從開舖交易如有公用照時價將銀見買如不依期搬入專督官挨查連總甲枷號問罪其油入官一守城器用明燈燈架三千六百三十副毎副價銀五分通計一百八十一兩五錢著長吳二縣設法處造勿累保長等人蠟燭毎夜二萬七百九十枝連六門城樓用通計三萬枝以一月計之計九十萬枝計銀一百一十兩長吳二縣分備鐵鍋四百隻冶坊備之事已給還行竈四百隻毎隻價銀二分該銀八兩毎縣出銀四兩置辦水缸八百隻毎隻價銀三分該銀二十四兩以二徒罪贖銀辦之酒瓶三萬毎十箇價銀一分該銀三十兩簔衣篛笠一萬一千副毎副價銀三分該銀三百三十兩兩縣置辦勿累城夫草薦二千七百五十條連預備三千條該銀十五兩大様蘆蓆一萬一千領毎領價銀一分該銀一百一十兩將賍罰銀給各區糧長辦之竹朩罸臨時不搬竹朩行者用之其餘物料先行預置寺觀公廨去處差官封識有事隨以本官給發慎防禦一某官見練兵千餘名已有武舉三員統領若賊臨城某官帶兵六百名屯處𤣥妙觀中䕶衞以為中軍復以原統兵武舉一員統兵二百名屯處府前防守庫藏并司獄司獄囚再用武舉二員各統兵一百名屯處長吳二縣前防守二縣庫藏獄囚若賊未臨城之日上司有調遣之事先分若干應命賊入腹裏即收其兵入城原如前法處置名曰聴調之兵一擇用官生六員俟其俱到即令會議各人平日所知精兵召募一千二百名團聚北寺中以團練府佐一員專督官生六員叅謀其中合聚訓練務期可戰可守以須實用待賊臨城毎門分遣原練兵官生一員各帶兵二百名屯處於府近城門寺觀中一處有變隨以本處兵應之别處不動若賊攻城危急應該用兵攻擊亦待中軍方略己定有信牌發遣然後行動名曰實用之兵一城中先計道里適均定作十二處派定地方某處某處止分遣省祭雜色等官十二員毎一員率領火夫五十名屯處所分地方庵院中給與水桶水斗撓鈎等項以防一方火患假知某方火起止許信地火夫救䕶撲滅城上人夫不許亂動城中居民亦不許喧嚷奔走擾亂地方仍給虎頭火牌一面上書專委救火與夫禁緝擾亂地方等字樣以專委任亦便夜間救火執照以開巷門其火夫著各該啚舉報極貧人戸毎名日給米二升自贍共計火夫六百名毎日該給米十二石通計一月不過用米三百六十石此法一行名雖救火實則處置飢民得所一賊將臨城先集保長給與連坐信牌使之各保自行曉諭各甲自相糾察如有容留奸細者一甲連坐軍法重罪不得與平時止坐直日者輕罪例論其寺觀給與住持使各房互相糾察待賊一退即收信牌不准此例及今閑時著官一員先刻小牌計在城甲數毎甲一張印完以便臨時給發一盤詰奸細之法差官帶領知事人役在城門外吊橋邊逐一仔細認辨各色人并檢驗物件用衞官一員有精力教官一員省祭雜色官一員兼領其事守門官員再行查驗不可但恃官㕔為盤詰之地定夫役器械附一姑蘇城垜九千七百九十新増敵臺大約不過一千毎一城垜用一人守之通計城夫一萬一千人派夫照依先任温公之法大戸五名中戸不過二名下戸用二人三人朋充一名實為情法兼盡今長吳二縣除仕宦舉監生員外通將居民合二萬二千人之數分作兩班城夫雖有兩班口糧止用一班上城之日第一班直一晝夜至次早第二班人夫更替及今閑時先就居民近住城垜處寫定班名於各城垜上賊在百里外先用保長甲長到城看守俟賊近城五十里保長唤集散夫上城其法以百人為率常以五十人分立一百垜口看守將身向外觀望五十人食息便厠則二垜常有一人看守至夜間亦用五十人立一百垜口看守五十人睡至半夜代換後半夜巡城官生至則五十人起而交代此勞逸適均之法也一城上各敵樓毎處派定舉人一人或監生一人各帶家丁生員二人不拘家丁有無專在上歇宿督視本處垜口城夫晝夜防守若各該地方有賊攀援上城坐名申呈憲院提問亦不許科擾保甲長人等一指揮六員毎員派定一門白晝各行巡視以整齊保甲長散夫人等站立觀望及防不測之變其官生六人毎人派定一門給與巡視虎頭牌面上寫遇夜各行巡視信地站立人等至交界處方囘循環不息官生毎人給馬一疋一各城樓及對城外衝要之處各置佛榔機一座隨用裝火器二人帶火藥一桶備急用其城樓下預置合用火器鋒利器械弓矢及堅固防牌使賊臨城隨取隨足官㕔庫中置放石灰油燭火藥等項備用若庫中封識不盡更用沿近居民空房一二間封鎖亦可須差官一員常時看取給發一保長毎人青衣裝束各帶腰刀一把號旗一面其散夫各備長柄鎗刀一把又帶鐵錐一箇或斧頭一把任從其便如缺一件即加重責毎三垜備明燈一碗燈架先置城垜外可照城足其燈毎一保長給與二十三碗毎日著一縣佐次第分派本日一夜之燈與保長毎保長派好燭一百八十九枝任其分散丁夫以備一夜之用若保長有弊許丁夫口告罰燭一夜其合用煎油煎糞鍋竈等項毎保長一名預給鐵鍋二隻行竈二隻水缸四隻酒瓶二百箇檑朩二根備用如有警急再行分派物料至於暑雨合備細密堅厚篛笠簔衣毎保長一名給與百付分散丁夫穿用遇夜合備草薦等項毎保長一名給與草薦二十五條大小竹一百根蘆蓆一百領以作蓋棚歇息城夫之用一打牲船上弩矢百發百中此船吳淞江陽城湖陳湖太湖水鄉多有之著各區圖報舉入城不許容隠其人官府照養兵口糧給與工食計名分派城上緊要去處有功仍加重賞一城外濠内週圍空地多有居民占造房屋賊若攻城必先渡濠頓住城足城足有屋賊可隠身城上矢石難施且賊登屋可以發火器矢石攻城前任巡按御史孫下令焚燬實萬不得已也不二三年愚民貪昧又行蓋屋若姑息之是將在城數萬之命而為僥倖之圖也今後賊將入境務要拆卸如不從者臨時照前院法無悔此雖蘇州一府守城條件但區處得宜綜理周密錄之以為他郡守城者式予按從來城守攻破者十一襲破者十九襲破之説有二其一是伏奸細於城中放火守城者奔救則敵乗間而登其二是暗約奸細上城照㑹疎虞處用雲梯登至垜口揮刀殺人守者驚散賊從此上故守城之法須設兵一枝專司救火不許守垜者下城守垜者各持一斧分班專視城足凡賊登城多在下半夜乗人疲倦故也亦多在黎明守者散班故也把守之嚴賊豈能襲我乎所苦者盤詰奸細甚難蓋奸細乃本地之民賊拘其家屬刼其内應吾烏從而覺之今之詰者多在城門内使賊假裝吾民從此擊殺門豈能遽闔乎又或閉城太早止通一二門出入人愈衆則詰愈難不若大開各門門外盤詰而兵衞設於門下方善築城堡策略云守必以戰而守城必以野自法有陷城之誅而未嚴殘野之罸賊至茍負孤城而棄其四境煙焰相望號聲相聞所至蕭條有不忍見聞者又安望其援乎故李牧備邊先收保而不失不能收保是資賊也後將軍燉煌先在乗隊列陣校聯不絶賊不敢犯使疏而可犯是自敝也愚以為略倣墩堡之制使民各聚為市市列為堡約其道里之中使勢可相及毎賊至則墪堡固守而郡縣急趨而助之而又特嚴其法使四境殘其者與失城同罪則人各為戰地各為守賊入而無所得其勢自困矣都御史章煥云北邊城堡相望凡以防衝突備侵掠也南方之畜侈於北邊風帆之力疾於馬足茍無城堡賊何畏而不來民何恃而不散且夫賊勢之熾凡以鄉民奔竄奸民惑亂助其聲也有城堡則居者守逃者歸耕者斂且遠近按堵什伍相保奸民無所容無奸民則無鄉導何以能深入居民不散田野不蕪賦税不乏根本之要也及今秋冬宜令諸鄉大者為城小者為堡而聚民其中城堡羅列賊必不敢越境而内侵東南世世之利也或曰公私俱竭如冗費何夫軍興不止費且不貲民散不復賦將何出城堡所以省軍需足國計者也何謂費也昔皇祖嘗命湯和視海上擇要地築數十城以備倭使治倭有他策也聖慮當先之矣今安用紛紛為也又云賊遠來人持數日之糧未達岸多苦饑者賊之死命制於數歩之内矣徒以海濱廪藏露積故賊至而掩據之因糧以為食因財以為用故奸人為之黨而竆民為之役所向無前乗人不備如使蓄積收斂而野無所掠此賊坐困之道也不數日乃成擒耳故議守者莫要於城堡城堡相望遠近相倚少則不能攻城多則所掠不足供所食賊不能持久破之必矣夫賊不能宿飽則不能深入不能深入則不能多獲不能多獲則來者無利而聞風者不來内地可不煩兵而守矣愚聞倭夷揮刅成風天性好鬭誠難與爭鋒獨其久饑乃為易制邇者我師三捷皆乗其饑剖腹視之類多青草禦冦之要可知也副使茅坤云近聞嘉善平湖蕭山諸縣已皆繕城然而桐鄉崇德尚未聞議及者此特邑而已至於市鎮如湖歸安之雙林菱湖璉市烏程之烏鎮南潯所環人煙小者數千家大者萬家即其所聚當亦不下中州郡縣之饒者並當按其市居之田宅積貯而量其力之大小為之均其費之多寡各列丈尺而築之有司特為之約束期㑹鈎考布算以責其成功而已而其材不必藉入於官入於官則多出没之弊其他敵樓城門并水寨之屬非民間可以例辨者官糧藉庫貯以助之至於鉅姓勢族而野處田間者或二三家或五七家或一二十家所願隨便築堡者亦聽近聞甘肅諸邊總督楊公嘗遍行之雖有數萬控弦而下亦不敢窺數家之堡而仰攻何者彼不過利之而已一攻堡則其内伏火器下􅓓石非擊殺數十百人必不能下彼所得不足以償其所失故僕竊以為吳越之間凡近海一二百里者並當令著姓居民遍為列堡而守可也兵部尚書胡世寧云擇人而守之重其權而久其任使得為萬全久遠之策可也或舉地利不如人和之説及懲秦之滅亡而築城勞民為病者是不然夫自古王公設險以守其國使倚將和卒練一時善戰之功而不為設險守國長久之計智者不為也况戎狄長於野戰短於攻城而我中國之人毎與之反故吾乗城拒敵是用所長而乗其所短且以土石而蔽血肉也若無險可恃而專以戰為守是勉所短而校其所長且以血肉而代土石也仁者將孰從乎况築城雖勞而為之以漸則亦不至如秦之害人矣孟子之言為專恃地利而不恤人者發也秦之政亂由其暴虐之極非專由築城也其築城之卒數十萬餘而南戌五嶺乃五十萬餘驪山阿房之役又各七十萬餘是其勞民致怨豈專在築城哉後世懲秦之失而忘古設險之制是因噎而廢食也此篇本為北邊而設其實海防亦然故錄之廣團結城外團結法愚嘗廣詢博訪宜以二十家為一團除租房單丁外毎一團令養客兵一名毎家各設器械一件出人丁一丁以為團兵凡二團四十餘家各出銀一錢造一巷門門上蓋一更舖舖内置鼓一面鑼一面鐵銃三口香盤一方就四十家毎夜輪人夫二名守之居常無事止鳴金鼓巡更一有冦警則本處即連放三銃四十團兵各執器械追截諸團皆應之其所養山東兵官嚴立法不許擅離本團騷擾團尸毎日有暇即教習本處團兵軍門復時時委官查省之責成之衆既以勢分而不得為非團兵之布列者又以聯絡而相為友助况一團有賊諸團應之四郊之外固有隨地皆城隨民皆兵而大城屯守之卒將有不必用者矣行保甲兵部尚書王守仁云本院近行十家牌諭誠亦弭盜安民之良法而今之有司槩以虚文抵塞莫肯實心舉行雖巳造冊繳報而尚不知其間所屬何意所處地方該道仍要用心督責整理誠使此法一行則不待調發而處處皆兵不待屯聚而家家皆兵不待蓄養而人人皆兵矣工部尚書馬坤等題欲將土著之人各就一鄉編入保甲盡歸團練五人為伍十人為甲五十人為保上下聯絡委各府州縣佐貳官賢能者不時就其一鄉團兵閱其武藝又因而稽其人丁如有潜入賊中勾引或探聴者坐罪若有隠弊互相連坐副使譚綸云連年倭患皆為私通貿易而起浙人多詐竊買絲綿水銀生銅藥材一切通番之貨抵廣變賣復易廣貨歸浙本謂交通而巧立名曰走廣不此之禁則履霜之漸馴至堅冰欲行究詰則奸宄之雄彌縫百端徒滋擾耳為今之計莫若稱此議練鄉兵之時立為保甲之法委所轄各府佐貳官公同屬縣掌印官省約輿從親詰地方不問腹裏沿海與城郭鄉鎮去處官吏生徒舉監之家務逐戸挨查毎十家編為一牌牌内分十直格皆以巷道為准如是東巷門起則於牌格内左甲尾下填註東巷門字樣從西順挨一趙甲二錢乙三孫丙四李丁五周戊六吳已七鄭庚八王辛九馮壬十陳癸各填註人丁生理明白即於右甲頭下填註褚子姓名是為第一甲其第二甲牌格内左甲尾下填註陳癸姓名亦從順一褚子二衞丑至十家止三牌四牌亦依次聯絡挨填如一巷之内人家已編十牌外有零者即將大家中人丁煙多者報足編之如村鎮無巷道者亦依村鎮編之就於本名下坐定日期毎一家輪值三日第一家輪初一十一二十一日第二家即初二十二二十二日以次填註按日於本家門首懸掛仍毎一牌年輪一名為甲長管領九家毎十牌年輪一名為保長領百家其中若有遠出不歸或私收絲綿火藥等物假名走廣潜往通番或逋逃海外久不還鄉者許牌内值日之人抱牌赴首官為拏究敢有隠不覺舉一家有犯十家連坐毋容姑息其有原犯通番但逃囘自首免罪編完之日府縣仍將牌毎甲一樣再填一張類釘成冊存留在官巡捕官時加查考一體稽察若有假公濟私乗此害人從重懲治如此庶通番之黨自消而地方之不逞亦可以禁絶矣太倉生員毛希秉云凡海賊一起陸地賊乗機竊發假海賊之名以縱暴地方不能抗禦惟保甲可以除之如太倉初編保甲陸地賊無所容身逃縊擒首散亡略盡嘗有海賊廿人夜刼城南十八都時其家潜報保甲總甲及有船者預待賊出追之且擊且行逐至海口天明賊之器械盡矣把港百戸陳璋鼓率人船直追半洋擒囘送道又十五都沿江地方白晝有海賊上岸打刼適潮落舟閣被保長盡數擒獲此皆從來未見之事而保甲之功大矣今法久人玩乃復罷宜修飭以保地方但不可使之迎送受詞以生事耳降宣諭南京工部尚書馬坤等題朝鮮居東北日本居正東偏北故日本諸夷凡由海上入中國交通生事舟必經過朝鮮海面先年倭首宗設等犯我海道大肆叛逆屠害中國軍民數多時朝鮮國王李懌聞賊歸由彼海憤其作孽盡遮殺之隨即具奏倭奴打刼上國致殺官兵不伏天誅過境仰仗皇威𠞰殺幾盡并將擒獲賊倭中林望古多羅等及賊首級三千顆與長箭船牕等物連搶囘人口王樣等差刑曹叅判成洗昌等先後齊獻闕下此固未暇深究其故但朝鮮能殺日本之人與日本之人之畏朝鮮則驗矣請乞宣諭朝鮮國王查賊經由海面既與日本密邇王須益申初議盡行截殺仍行國王就近轉查日本管國者近年倭冦是否由其縱放若果知情速令悔改若係左右奸宄或係中國逋逃假借妄為就令其盡將首惡擒斬獻報是亦一策也此言當令朝鮮轉諭日本在京各衙門㑹議云查得先該巡視浙江都御史王忬題臣聞東南之倭冦猶西北之匈奴詛詐勇猛强不可禦乗風迅速來不可測故我朝備倭北自山東南抵閩廣規畫經制不減西北且嚴通番下海之禁明十年一貢之規使常修舉不失豈有邊患但數十年來事皆廢弛番商海冦俱至浙洋寧紹蘇杭姦宄射利之徒接濟交通勾引貿易自嘉靖二年宋素卿入擾之後邊事日隳遺禍愈重閩廣徽浙無賴亡命潜匿倭國者不下千數居民里巻街名大唐有資本者則糾倭貿易無財力則聯夷肆刼巨室為之隠諱官府惟務調停日就月將年深歲積識者固知有今日之變矣臣詢訪在海賊首約有百人其雄狡著名王五峰徐碧溪徐明山毛海峰徐元亮沈南山李華山洪朝堅皆廣布奸細包藏禍心計算則未能就擒捕急則逃遁無跡雖恃海洋遼濶亦由倭國為之淵藪也節據被擄在倭歸人供稱本國酋長請有入貢勘合得行則利歸於上今各倭私自貿易利歸於下彼中酋長甚是不樂嘗禁各倭西犯昨刼黄巖去者多被擒殺今春闗隘亦加嚴禁曾追囘倭船二十餘隻并審擒獲賊首李哪噠亦稱渠魁沈南山等安住倭國分遣其黨同倭入冦此輩不除海無寧日若差人曉諭國王定將各逆并島夷𠞰逐此雖得賊擄之口未可輕信而國王感恩慕義之心亦豈盡無查得永樂年間倭夷入貢又有倭冦犯邊令來使追捕得倭賊若干許以彼國法治之以次蒸死數十餘年海洋平靜海道副使李文進屢以議呈欲臣具請特旨北行朝鮮南行琉球轉諭彼國及令布政司咨行述其許貢之由勉以藩屏之義令將中國逋逃盡摉起發嚴密各島不得出闗庶使賊勢日孤兵力可逞但恐夷性叵測國體攸闗未敢遽陳即今警變異常正多方圖濟之日乞要查酌議擬務求事體穏便等因本部咨行禮部查議訖又該刑部河南司主事郭仁題云今之倡亂者已經兵部明言有賊首王直盤據海島招納叛亡然必竟勾引倭奴張大聲勢故敢猖獗一至此也臣承乏刑曹凡遇朝鮮國解至日本薩摩州失風流賊望古三甫羅等轉行到部有被鎗火銃朩牌刻有軍門及松江府字號則倭奴之流刼江南也無疑常考洪武二年遣臣趙秩諭日本來貢五年復遣僧祖闡無逸往宣佛法諭其來貢太祖為賜詩送行實重厥事也乃十餘年得安堵焉永樂初命太監鄭和等招撫諸番日本獨先納貢并擒獻犯邊賊二十餘人就命來使治以其國之法於鄞地令一人執炊一人上甑盡行蒸殺至十五年復入冦邊將執其酋首送京師成祖待以不死遣刑部員外郎李􅚡等使日本降璽書責以敬天事大之義次年􅚡還其國王源義持亦遣刺史奉表稱謝成祖特釋其罪宴賚有加嗣是終成祖世不復入冦此仁義並用祖宗駕馭倭奴之長策也即今海島羣盜旁午使舟或未能達昔太祖嘗以三佛齊梗化阻絶使臣商賈命禮部移文暹羅國王轉達𤓰哇俾以大義告於三佛齊合無查照故事遣使朝鮮諭令差官齎送璽書前往日本宣揚聖朝威德戒令斂戢屬夷該本部覆議移咨總督㑹同操巡撫按等官轉相計議題奉聖㫖已經通行督撫等官議處未報近又該督察侍郎趙文華咨送通事一名降倭二名前到兵部譯審得入冦海賊俱係日本所屬野島小夷被中國逋逃之徒糾同打刼倭王未必盡知所據南京工部尚書馬坤題請前因佀亦有據及要宣諭朝鮮一節又與王忬郭仁所奏大略相同且日本原係朝貢之國載在典制遣官傳諭於義無乖合無從禮部酌量查照祖宗故事差官齎捧璽書前至朝鮮諭令傳諭日本國王以示君臣之義禍福之機令其禁戢屬夷擒斬華逆以効臣節如果罪在夷屬國王無預輸誠聴命海氛肅清許其遣使奏報另議褒奬是亦不戰屈人之一策也此言行令琉球朝鮮轉諭日本之疏為是海道副使譚綸云照得倭夷諸島種類雖繁部落相聯亦有酋長衆所尊者號曰天文其法最嚴其威懾衆一人為盜一家盡滅一島有犯隣島移平即奉令勘合以時來貢者彼中故事毎遇閏年則諸島富倭各出已貲輸於天文請得勘合方來入貢寔則貿遷有無以侔厚利利權在上天文所欲者後因海禁廢弛奸民通番殷實之倭徑自貿易不請勘合利權下移天文所不樂者加之王徐林陳輩假稱名號竊錄勘合妄具禮儀私通酋長遂至招呼益衆往來無稽天文所不知者此皆彼中情狀博訪似實故本職在昔具呈題請許令省諭蓋嘗反覆思之審矣若頒降璽書特遣使命恐偶不敬反生事端若令琉球髙麗就近傳宣事在彼中難於取必不如止行浙江巡撫得以從宜省諭當如永樂事例取髙僧數人移文乗桴直至天文詳為傳諭宣累朝許貢之恩禁近來倭夷之擾發王徐之偽收逃叛之民許修常貢操利權天文雖愚必知所擇蓋日本所需絲綿藥物器用之類悉皆仰給中國不能缺者若或海禁皆嚴通番盡止彼日用不足勢必請貢惟命是從而我所欲為亦無不遂此又拔本塞源之術也此言朝使宣諭及隣國轉諭總不如撫臣自移諭之為善通政唐順之云宣諭日本浙江軍門常請命遣使矣竟不能盡得其要領使者坐罪而其事遂罷嘗考平倭略所載洪武永樂間遣使日本者不一而足髙皇帝又嘗與劉基議以倭國重佛特遣僧往諭古之王者於四夷之不貢不臣則有威讓之令文告之辭兵交使在其間以深得敵情而處之切中其機也然自葉宗滿之坐重罪而逋逃欲自歸者不免自疑自蔣洲之得罪而人以使絶域為諱或宜減宗滿之罪以示信於逋逃之徒寛蔣洲之獄以留使絶域詗敵情之一路此言宣諭當行兵部主事黄元恭云策者曰倭夷犯順乃羣小之僣竊其君不知也誠遣使諭之彼王必能禁其下海境安矣百萬之師何如一介之任耶竊恚之昔晉率隂戎伐潁周景王以弁髦之敝告晉辭直獲免而説者以為不如東周之伐秦夫君臣上下古今之所以臨事統屬分也臣有干於其君殺無赦下有犯於其上殺無赦夫其所以殺無赦者乃天憲也周天子顛分壞憲屈體卑辭以祈一日之存孰與􅂸國舉義存綱常於萬世之愈哉今堂堂天朝玉帛萬國威迅九垓雖倭奴為患譬則蟁蝱之螫耳未若唐之囘紇宋之困金元何至甘衰周之不屑耶或曰是舉也請命於天子擇布衣之士假朝臣之服而以藩省之辭將之非害大者夫曰請命則實意開於天子而識者黙思之必有元首居下之恥曰假服則名器頒於朝廷而匪人卑用之必有衣冠掃地之辱實意卑名器玷而猶曰無害大可乎且夫中國天子猶家之主也倭王猶家僕也倭之羣小則家僕之臺從也臺從肆然凌犯其主既不能奮草薙於其來又不能正其根誅於其主而顧修文告之辭豈不忸怩當代含羞百世也哉抑人有言茍可以息干戈而全民命何憚於枉尺夫逋法網以為盜於外境華夷皆有其人吾中國豈不明掲憲典密布機宜迺不能禁吾民之竊出顧責倭王盡禁其竊入者乎勢不行矣且倭奴狡猾素無慕義之誠其臣服數十年不為梗特通貢之利足羈縻之耳今入冦之利百倍通貢充其貪心何所不至猶恃中國之威懾服者素而羣小之囘誘説未通若迺遣使諭之假其重以寢其兵示弱明甚矣安知不啓通國之貪乎此言宣諭害義之大必不當行海道副使譚綸云移諭日本之言似不可行何也通查接濟乃吾中國沿海之人也中國之官不能自禁而欲倭王禁其所屬不為所笑乎欲望倭王之禁其屬必先自禁始此言降宣諭為不當行太常寺卿魏闕云琉球國未嘗親來朝貢決不可使朝臣往封以致之死地但以勅命封付福建布政司彼國來領可也國初朝臣親往者以其國主親來朝故也今不來朝久矣中國豈可使朝臣親往乎此言乃為使琉球國而發琉球世為不叛之臣待之且尚如此况日本乎可例推矣近年督撫議遣使諭日本不用王官而用布政司移諭甚為得之用間諜都御史唐順之云用間使其自相疑而自為鬭最是攻夷上策然非深得敵情則不能用間非熟於地形則不可以成掎角之勢而夜襲敵營且我兵形既露虜人亦日夜為備而匿實示虚匿近示遠匿精壯而示羸弱百計以疑我者宜亦深是故得敵情為難通貢道通政唐順之奏云據總兵官盧鏜手本内一欵撫處夷情以尊國體開稱祖宗以來給與日本金印勘合十年一貢船不得過三隻人不得過百名既申遠夷慕義之情遠夷亦得交易中國之貨以為利而中國亦以羈縻遠夷使常馴服不為冦賊百餘年來自嘉靖二年宗設宋素卿等爭貢讐殺貽害地方因而絶貢至嘉靖十八年正使碩鼎等齎獻貢物并進表文伏罪荷䝉皇上擴天地之仁雖非貢期復准入貢嘉靖二十六年正使周良等坐船四隻復貢議者計方九年之期有違事例徑自阻囘從此貢路不通倭夷素性貪詐利我中國之貨既不與貢則無復望矣因此遂被姦徒勾引同利為冦不止則以偶蹉一年貢期阻囘之故也為今之計乞題請聖裁行令各衙門遵照今後夷人復來求貢果有真正表印勘合别無詐偽姑不計其限例就與奏請起送赴京譯審來冦之端勅彼國王令其查治惡逆斂戢屬夷使不敢再犯則倭夷知有貢路之可通而詭計自銷黨類自攜勾引之徒亦可暫縛矣鏜老將也三十餘年在海上熟諳夷情其言當不甚妄乞勅該部查議可行與否臣又聞先時陜西總制王瓊論西夷事以謂能絶其入貢之路不能絶其入冦之路今亦可借以為喻也此言夷人來貢不必拘定貢期但有表印勘合即當准其貢兵部尚書張時徹云倭奴悔禍或揚帆稱貢而至將何以處之昔楊文懿公嘗著却貢之議曰倭奴狙詐狼貪云云見楊守陳條下且前此入冦之少蓋以通番下海勾引嚮導者多也乃不嚴禁姦之令而欲開非時入貢之門是止沸而益之薪也况倭王微弱號令已不行於國中即使通貢果能禁諸島之冦掠乎且貢夷止數百計而冦邊者動以千萬計豈冦邊之賊皆欲貢而不得貢者乎請宣頒明詔申命海道帥臣益嚴守備貢則却而驅之出境冦則草薙而禽獮之則奸謀狡計破阻不行矣今之議者復曰昔三代盛王九夷八蠻五戎六狄莫不來王聖人之作春秋於荆楚猾夏則書人以黜之至遣椒來聘復書爵以進之招攜以禮懷遠以德蓋王政之所不廢也倭奴自祖宗朝効其職貢已非一日邇者朝廷准令遣使移檄往諭實屬招來之意以開其補過之門但奉使者不能直達倭王以宣布聖天子威德而徒以簡率行之如其欵邊納貢而峻却之恐永塞其自新之路而益堅其稔惡之心東南未知所息肩也夫為是説者猶治疾之標而未察其本者也王者内夏外夷修之有道軍志亦曰毋恃其不來恃吾有以待之使在我者未修而疏於所恃也則通之適所以招侮絶之亦足以啓釁此豈安攘之長策哉邇者臺省部寺會疏奏行九事一曰選武將二曰任文職三曰精選練四曰慎徴調五曰處軍餉六曰守要害七曰明職掌八曰明賞罰九曰行撫諭酌以時議之允協者而兼行之於以内收順治之功而外樹威嚴之績如其且冦且貢反復不情則用威讓之令文告之辭以却絶之是恪遵太祖髙皇帝之明訓義之所以為盡也如其引慝伏罪重譯効欵必欲率賓王化以自納於覆載之中則必質其信使堅其誓約勅令禁戢各島不復犯我邊疆期以數年為㫁其命不渝而後如先朝著例容令入貢此成祖文皇帝綏徠之方仁之所以為至也是故明徴定保君子監成憲而行之爾巳是故修治垣隍慎固城守一策也編立保甲内寓卒伍一策也譏察非常嚴禁出洋一策也綏撫瘡痍以固根本一策也此皆所以治内也修復墩堡嚴明烽堠一策也繕治器械查復戰船一策也出哨㑹哨悉遵舊規一策也據險守要聯絡響應一策也此皆所以治外也至於練土兵而免調募之擾足財用而資軍興之需聚芻糧而給餉以時嚴賞罰而功罪不掩設畫樹防出竒應變為吾之不可勝以待敵之可勝則在中外任事之臣加之意可也或云許貢一説決不可行蓋成祖之許入貢先有威以制之也今威未行而遽許之非惟無益恐彼借入貢之名來無常期人舟不遵定數反生事端矣此二條言貢不宜輕許尚書楊守陳云倭奴僻在海島其俗狙詐而狼貪自唐以至近代已嘗為中國疥癬矣國初洪武間嘗來而不恪朝廷既正其罪復絶不與通著之為訓至永樂初始復來貢而後許之於是往來數知我中國之虚實山川之險易因肆奸譎時拏舟載其方物戎器出没海道而窺伺我得間則張其戎器而肆侵夷不得間則陳其方物而稱朝貢侵夷則捲民財朝貢則沾國賜間有得不得而利無不得其計之狡如是至宣德末來不得間乃復稱貢而朝廷不知其狡詔至京師燕賞豐渥稇載而歸則已中其計矣正統中來而得間乃入桃渚犯我大嵩刼倉庾燔室廬賊殺蒸庶積骸流血如陵谷縛嬰兒於柱沃之沸湯視其啼號以為咲樂捕得孕婦則計其孕之男女剔視以賭酒荒淫穢惡至有不可言者吾民之少壯與其粟帛席捲而歸巢穴城野蕭條過者隕涕於是朝廷下備倭之詔命重帥守要地増城堡謹斥堠大修戰艦合浙東諸衞之軍分番防備而兵威振於海表肆七八年間邊氓安堵而倭奴潜伏罔敢揣焉兹者復來窺伺而我軍懷夙昔之憤幸其自來送死皆瞑目礪刅欲食其肉而寢處其皮彼不得間乃復稱貢而我師遂從其請以達於朝是將復中其計矣今朝廷未納其貢而吾鄞先罹其害芟民稼穡為之舍館浚民脂膏為之飲食勞民肋力為之役使防衞晝號而夕呼十徴而九斂雖雞犬不得寧焉而彼且縱肆無道强市物貨善謔婦女貂璫不之制藩憲不之問郡縣莫敢誰何民既譁然不寧矣若復詔至京師則所過之民其有不譁然如吾鄞者乎矧山東郡縣當河決歲凶之餘其民已不堪命尤不可使之譁然也且其所貢刀扇之屬非時所急價不滿千而所為糜國用弊民生而過厚之者一則欲得向化之心一則欲弭其侵邊之患也今其狡計如前則非向化者矣受其貢亦侵不受其貢亦侵無可疑者矣昔西旅貢􅋙召公猶致戒於君越裳獻白雉周公猶避讓不敢受漢通康居罽賓隋通髙昌伊吾皆不免乎君子之議况今倭奴乃我讐敵而於搆釁之餘復敢懷其狙詐狼貪之心而施其奸計以罔我其罪不勝誅矣况可與之通乎然彼以貢獻為名既入我境而遂誅之則類於殺降不武不義若從而納其所貢則中其奸計而益招其玩侮不可謂智取一而損十得虚而費實不可謂計弊所恃以事無用俾其不兵甲而騷不水旱而窘不可謂仁有一於斯皆非王者之道竊以為宜降明詔數其不恭之罪示以不殺之仁歸其貢獻而驅之出境申命海道帥臣益嚴守備俟其復來則草薙而禽獮之俾無噍類若是則奸謀狡計破沮不行若日之所照月之所臨物莫能遁故天下咸知朝廷之明貢獻不納貨賄不貪雖有遠方珎恠之物無所用之故天下咸知朝廷之廉自浙江以達京畿且數千里之民舉不識輸運之勞不知徵斂之苦父哺其子夫煦其妻而優游衣食故天下咸知朝廷之仁裔夷知吾國有禮義而不敢侮奸宄知吾國有謀猷而不敢發桴鼓不鳴金革不試故天下咸知朝廷之威舉一事而衆善備焉斯與勞民費國而幸蠻夷之服者萬不侔矣開互市主事唐樞云我太祖髙皇帝定鼎之二年遣使趙秩招諭日本次年國王艮懷奉表入貢五年復遣僧祖闡往諭之隨遣人奉方物時祖闡之使也宗渤以詩别而髙皇帝親和之有同仁無遐邇之句十三年貢使無表文俱發三邊安插十四年貢使表有前使姓名乃悉放還自十五年賊臣胡惟庸黨備倭指揮林賢入倭搆亂十六年冦金鄉十九年進巨燭暗藏火藥兵器佐惟庸為不軌於是髙皇帝立訓絶其往來夫招之者帝王無外之仁也無驗而拘之及得其真而即歸之中國柔遠之禮也其奸深禍結示以永拒聖人誅罪之義也然不即勤兵於討以訓令代鈇鉞明於勢之所不及不欲以全律之也况罪以罪乎其人豈終罪其國無可宥之日耶是則艮懷世而聖怒宜息矣故當文皇帝繼世定貢加賚遣使給符封其鎮山初禁似與全釋蓋後先殊局彼此異宜而其致一也嘗考大明律凡將物私出外境貨賣及下海者罪止杖一百將人口軍器出境及下海者絞因而走泄事情者斬及考問刑條例擅造二桅以上大船將帶違禁貨物下海往番國買賣潜通海賊同謀結聚反為嚮導刼掠良民者處以極刑若止將大船顧與下海之人分取番貨及糾通下海之人接買番貨發邊衞充軍若小民撑使單桅小船於海邊近處捕魚採朩巡捕官兵不許擾害欽測皇猷防民以惡交而不强遏其販貿杜民以奸搆而不直撓其生業故海上境外之貨實與夷為市罪惟杖而不過謂不勝其重也其誅斬焉則人口軍器恐資冦兵益盜黨耳違式巨艦雖成濟具而原其所欲為若只從互市罪亦不列死欵夫然後知先皇制律之意嚴奸宄以沮其漸復因利用以體其情茍當事者不意論慎一切矯枉而踰於直豈先皇大道為公之謂哉此言海禁當寛通政唐順之云國初浙福廣三省設三市舶司在浙江者專為日本入貢帶有貨物許其交易在廣東者則西洋番船之輳許其交易而抽分之若福建既不通貢又不通舶而國初設立市舶之意漫不可考矣舶之為利也譬之礦然封閉礦洞驅斥礦徒是為上策度不能閉則國收其利權而自操之是為中策不閉不收利孔洩漏以資奸萌嘯聚其人斯無策矣今海賊據峿嶼南嶼諸島公然番舶之利而中土之民交通接濟殺之而不能止則利權之在也宜備查國初設立市舶之意毋洩利孔使奸人得乗其便此言開市舶為是主事黄元恭云或者云中國繁華之盛四夷慕之吾民之出而勾引彼夷之入而横暴皆此為之媒故浙之定海有闗號稱要害誠於此立市多設防兵以通諸番之貨易則夷人有自通之便吾民杜竊出之端凡所欲物以好取不以戎取夷酋何憚而不為廣中歲通市舶百姓安堵足明徵矣難與諸番類觀廣浙事體大不侔也嘗聞海島諸夷惟倭狡猾為甚出没無時所在登刼故沿海諸郡盡設守備把總等官軍以禦之曰備倭蓋患之深矣廣東舊有諸番之舶而無倭故通市無恙若乃定海本倭入貢之道定海通市舶倭奴原在不拒之中矣昔在太祖朝猶慮倭奴通貢之擾而不與成祖嘉其擒獻叛冦之忠始許之自劉江擒斬盡絶之後憲臣有司能束以法恪守陪臣之分帖帖者數十年至嘉靖癸未夏宗宋與倭搆孽中國莫能禁自是遂萌驕桀貢不及期獻不盡物爭屠牛剥狗之故相予環視者屢矣當是時守臣已難禁輯况通市於大亂未懲之後誰復能以綱紀馴擾之昨倭自寧波登刼者八十人南京横行兩省而後殱之計市舶之倭當不減八十其或外順内姦乗吾不備甚易易也就令無他安保吾民不有奸貪愚弄以起隙又安保彼中不有淫酗驕恣以生戎一有不虞將何以禦之此端一啓朝夕慄慄官除者必掛納㕓處者必播遷昔人倡為馬市之説以彌亂得乎失乎鑒不在遠矣此言浙江開市舶之不可兵部尚書張時徹云或謂定海沿邊舊通番舶宜准閩廣事例開市抽税則邊儲可足而外患可弭殊不知彼狡者倭非南海諸番全身保貨之比防嚴禁密猶懼不測而况可啓之乎况其挾貲求利者即非脯肝飲血之徒而捐性命犯鋒鏑者必其素無賴藉者也豈以我之市不市為彼之冦不冦哉殷監不遠元事足徵當商舶未至而絶之為易貿易既通而一或不得其所將窮兇以逞則將何以禦之矣今之冦邊者動以千萬計果能一一而與之市乎内地之商聞風膽落果能驅之而使市乎既以市招之而卒不與市將何詞以罷遣之乎夷以百市兵以千備夷以千市兵以萬備猶恐不足以折其奸謀我之財力果足以辦此乎且市非計日限月之可期也彼之求市無已則我之備禦亦無已果能屯兵而不散已乎此皆利害之較然者也乃謂可以足邊儲而弭外患不已大繆乎此言浙江互市必不可行大意與黄元恭同而剖析利害尤為明備或云互市之説即入貢之説也若我之威有以制之則彼以互市為恩不然則互市之中變故多矣予按今之論禦冦者一則曰市舶當開一則曰市舶不當開愚以為皆未也何也貢舶與市舶一事也分而言之則非矣市舶與商舶二事也合而言之則非矣商舶與冦舶初本二事中變為一今復分為二事混而言之亦非矣何言乎一也凡外夷貢者我朝皆設市舶司以領之在廣東者專為占城暹羅諸番而設在福建者專為琉球而設在浙江者專為日本而設其來也許帶方物官設牙行與民貿易謂之互市是有貢舶即有互市非入貢即不許其互市明矣西番琉球從來未嘗冦邊其通貢有不待言者日本狡詐叛服不常故獨限其期為十年人為二百舟為二隻後雖寛假其數而十年之期未始改也今若單言市舶當開而不論其是期非期是貢非貢則釐貢與互市為二不必俟貢而常可以來互市矣紊祖宗之典章可乎哉何言乎二也貢舶者王法之所許市舶之所司乃貿易之公也海商者王法之所不許市舶之所不經乃貿易之私也日本原無商舶商舶乃西洋原貢諸夷載貨舶廣東之私澚官稅而貿易之詳見後附録廣東海道囘文既而欲避抽稅省陸運福人導之改泊海倉月港浙人又導之改泊雙嶼毎歲夏季而來望冬而去可與貢舶相混乎何言乎二而一一而二也海商常恐遇冦海冦惟恐其不遇商如隂陽晝夜判然相反為商者曷嘗有為冦之念哉自甲申歲凶雙嶼貨壅而日本貢使適至海商遂敗貨以隨售倩倭以自防官司禁之弗得西洋船原囘私澚東洋船通布海洋而向之商舶悉變而為冦舶矣然倭人有貧有富有淑有慝富者與福人潜通改聚南澚至今未已日本夷商惟以銀置貨非若西番之載貨交易也福人利其值希其抽稅買尖底船至外海貼造而往渡之雖驅之冦不欲也此固無待於市舶之開而其互市未嘗不行者也貧者剽掠肆志毎歲犯邊雖令其互市彼固無貲也亦不欲也此非開市舶之所能止而亦不當反錫之名目者也故不知者謂倭冦之患起於市舶不開市舶不開由於入貢不許許其入貢通其市舶中外得利冦志泯矣其知者哂之以為不然夫貢者夷王之所遣有定期有金葉勘合表文為驗使其來也以時其驗也無偽我國家未嘗不許也貢未嘗不許則市舶未嘗不通何開之有使其來無定時驗無左証乃假入貢之名為入寇之計雖欲許得乎貢既不可許市舶獨可開乎或謂日本國王號令不行山口豐後互相雄噬金葉勘合燬於兵久矣如責其期拘其驗則彼終無繇貢而市舶終無繇開矣須𢎞包荒之量昭無外之仁可也又不然夫貢而無驗招冦之囮也貢而無期弛備之階也緩其期稽其驗隄防猶難矧可頻貢而勿驗哉大抵善施恩者施之於威伸之後則人知恩今冦犯順數年雖屢大捷而禍猶未殄倭未知畏也此須肅清之後俟其請罪求貢或如永樂初擒斬對馬臺岐故事夫然後許之則撫下之仁事上之義兩得之矣兵部尚書鄭曉云洪武初設市舶於大倉名黃渡市舶司尋以近京師罷改設於福建浙江廣東七年九月又罷未幾復設蓋東夷有馬市西夷有茶市江南海夷有市舶所以通華夷之情遷有無之貨收征税之利減戍守之費又以禁海賈而抑奸商也市舶不復利歸豪强而國家坐受其害若慮各夷并至市舶司難於防閑查照西蕃闡化闡教輔教三王貢使自四川入贊化王貢使自陜西入事例而今日本等國至浙江市舶司琉球等國至福建暹羅滿剌加等國至廣東亦可近見箬溪先生言都憲陳金西漸集中有開市舶十利疏大抵事體宜然今不設重臣賊必不退退必復來設重臣退賊後因民情震懼可築城矣不復市舶夷人必欲售貨奸民必欲牟利為盜必不已重臣無可召還之期蓋非設重臣無以戡目前之棘禍非復市舶無以塞日後之亂源開設市舶㑹典中有之諸巡撫及信國各誌墓誌行狀傳中皆有之矣予按倭國服飾器用多資於中國有不容一日缺者安能待十年一貢之期而限以三船所載之數哉若禁其貿易則入冦刼奪一定之勢也蓋倭國雖小亦有君臣朝貢燕享禮儀使無絲線等物則無禮文而不成乎國矣彼既不容不資於我而利重之處人自趣之豈能禁民之交通乎故官法愈嚴小民寧殺其身而通番之念愈熾也但朝廷無命孰敢私許互市以干國典哉此只消一海道有機敏有力量者活動行之不失於縱不失於激如某海嶼某老歴年商舶之頭也欲律以通番死罪罪未必及而亂先激矣必申明朝廷之法寛處而羈縻之且重其責成曰商販貿易姑聽其便但一方之責皆係於汝一方有倭變即汝一人之咎也彼以利為命者利既不失而又不峻繩以法則感恩畏威必不僨事矣一面修吾海防不容夷舶近岸販貨出海者闗口盤詰勿容夾帶焰硝之𩔖載貨入港者官為抽税以充軍需豈不華夷兩利而海烽晏如也哉此之謂以不治治之也見今廣東市舶司處西洋人用此法若許東洋島夷亦至廣東互市恐無不可籌海圖編巻十二
