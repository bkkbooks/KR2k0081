body:
  text: 籌海圖編巻七明胡宗憲撰山東沿海總圖登州府圖萊州府圖山東兵防官考山東倭變紀山東事宜遼陽圖遼陽兵防官考遼陽事宜山東兵防官考提督軍務巡撫都御史巡察海道副使管領民兵叅將總督登萊沿海兵馬備倭都指揮登州營把總文登營把總即墨營把總沿海衛所安東衛京操軍一千五百七十六人屯軍三百九十一人城守軍餘三百五十八人捕倭軍二百六十九人石舊所城守軍餘四十八人靈山衛京操軍一千二百十三人屯軍二百八十七人城守軍餘一百十六人捕倭軍一百九十一人夏河所守城軍餘六十七人鰲山衛京操軍一千六百三十一人屯軍二百九十人城守軍餘一百七人人捕倭軍三百八十五浮山所守城軍餘五十六人雄崖所京操軍五百七十一人屯軍七十七人城守軍餘九十七人捕倭軍一百一十人大嵩衛京操軍一千四百九十一人屯軍四百二十八人城守軍餘三百五十八人捕倭軍二百四十六人大山所守城軍餘二十六人靖海衛京操軍一千五百九十三人屯軍二百一十一人城守軍餘一百五十人捕倭軍三百十三人海陽所京操軍四百九十六人屯軍六十六人城守軍餘一百二十六人捕倭軍一百二人寧津所京操軍五百二十九人屯軍六十八人城守軍餘一百六人捕倭軍六十八人成山衛京操軍一千二百五十六人屯軍二百四十人城守軍餘二百六十一人捕倭軍二百三十四人尋山所守城軍餘九十四人寧海衛京操軍一千六百十五人屯軍三百九十一人城守軍餘一千一百一十人捕倭軍三百五十四人竒山所京操軍四百九十八人屯軍六十人城守軍餘一百一十二人捕倭軍七十五人威海衛京操軍一千三百六十八人屯軍二百二十四人城守軍餘七十五人人捕倭軍二百八十五百尺所守城軍餘三十五人金山所守城軍餘一百十四人登州衛京操軍二千九人人屯軍一百一十四城守軍餘二百五十人捕倭軍八百二十八人福山所守城軍餘一百十四人萊州衛京操軍一千七百二十人八人屯軍四百四十七城守軍餘三百二人捕倭軍四百十三人王徐寨所守城軍餘四十八人膠州所京操軍四百六人屯軍七十七人城守軍餘九十四人捕倭軍四十四人青州左衛京操軍三千六百二人人屯軍四百五十三城守軍餘七百二十人沿海巡檢司弓兵數附青州府夾倉鎮在日照縣八人弓兵一十信陽鎮同前一十八人弓兵南龍灣同前二十一人弓兵髙家港在樂安縣四人弓兵二十登州府赤山寨在文登縣七人弓兵二十辛汪寨同前二十七人弓兵温泉鎮同前二十四人弓兵東良海口在招逺縣四人弓兵二十乳山在寧海縣三人弓兵二十髙山在蓬萊縣四人弓兵二十楊家店同前二十一人弓兵馬停鎮孫夼鎮在福山縣一人弓兵二十行村寨在萊陽縣二人弓兵二十萊州府魚兒鋪在昌邑縣五人弓兵一十古鎮在膠州十一人弓兵二逢猛同前二十一人弓兵栲栳島在即墨縣一人弓兵二十海倉在掖縣五人弓兵十柴葫同前一十二人弓兵沿海墪堡守軍數附安東衛守墪堡軍餘三十九人墪九蘭頭山泊峰鴨髙山張落大河口滔洛黒漆子小皁兒堡八三橋鋪昧溝虎山木寨烽火山孤嘴闗山董家石舊寨所守墪堡軍餘四十人墪十温桑溝魚南石舊泊北石舊口釣湘子金線清泥石河董家湖水堡三古城滔洛滕家嶺夾倉鎮巡檢司守墪弓兵一十二人墪四蔡家口三乂焦家相家信陽鎮巡檢司守墪弓兵一十二人墪四西大嶺東沙嶺南黄檻黄石南龍灣海口巡檢司守墪弓兵九人墪三陳家臺瑯琊臺胡家髙家港巡檢司守墪弓兵六人墪二石牌司西靈山衛守墪堡軍餘八十人墪二十㡌子峰黄埠將軍臺李家島沙溝唐島安嶺嶺長城風火山臧家疃黄山山捉馬野山埠張家庄劉家溝敲堯山孫家巷酉子埠胡藍嘴沙嘴堡十三青石山交差澗崇石山焦家村東石山石𠻳差麂角河丁家庄大河口白塔夼花山沙嶺本寨東門夏河寨所守墪堡軍餘三十九人墪七徐家埠沙嶺紫良庄黄埠海王庄大盤車疊山堡六趙家營北顯溝走馬嶺小灘封家嶺王家庄古鎮巡檢司守墪弓兵九人墪三西庄北青古積逢猛巡檢司守墪弓兵九人墪三互埠河島兒彭家港膠州所守墪堡軍餘八十一人墪九汪家庄石河杜家港塔埠沙埠孤埠洋河沙嶺大埠堡七辛庄陳村鹿村欒村石河河柘溝八里庄鰲山衛守墪堡軍餘六十九人墪十七汾水嶺横擔小勞山栲栳島石嶺羊山龍口黄谷石老人俞家嶺峰山髙山走馬嶺蕭旺庄狼家嘴捉馬嘴劈石山堡十八桑園大村營前監望馬山中村那城孫仝桃林塔兒雙山東城錯破嶺轉頭山狗塔埠萬口爐瓮窑頭石張口浮山寨所守墪堡軍餘四十五人墪九麥島樓山程陽姑山女姑紅石程家庄張家庄斬山栲栳島巡檢司守墪堡軍餘九人墪三丈二山望梅金錢山雄崖所守墪堡軍餘三十人墪八王家山北塹公平朱臯望山山陷牛米粟山白馬島堡三段村青山王騫大嵩衛守墪堡軍餘四十二人墪七楊家嘴擒虎山劉家嶺望石山新安寨麥島草島嘴堡五青山小山管村黄山界河行村寨巡檢司守墪弓兵九人墪三髙山靈山田村大山所守墪堡軍餘十人墪二大山山虎巢堡二雙山黄陽乳山寨巡檢司守墪堡弓兵七人墪三裏口庄髙家長角嶺靖海衛守墪堡軍餘七十二人墪二十大灣口長會口頭姚山石崗山青島嘴浪浪苽蔞寨郭家口標杵頂赤石唐浪頂紅土崖鐸木山黑夫厰石脚山明光山柘島山狗脚峰窩馬頭路家堡八店山憨山望將山孤西山起雨頂望將山蒸餅山墳臺頂赤山寨巡檢司守墪弓兵三人墪一田家嶺寧津所守墪堡軍餘四十二人墪八孟家山慢埠青埠山龍山柴家山萬口芝蔴灘羊家島堡九㡌子山王家舖大頂山上現口髙樓山龍虎山拖地岡崮山寨固山海陽所守墪堡軍餘四十一人墪七㡌子山白沙乳山山峰子驢山山小龍賊子港堡十窄山湯山孤山扒山猪港桃村黄河利孔家庄老埠港撇雪山成山衛守墪堡軍餘四十一人墪十狼家頂北峰頭裏島仲山馬山崮嘴髙山太平頂俞鎮山大姑堡九神前石础堆前洛口祭天嶺歇馬神報信口北留村張家尋山所守墪堡軍餘三十八人墪八張家嘴楊家嶺古老石馬山黄連嘴青魚島小勞山葛樓山堡七曲家埠老翅青山埠紀子大水泊蒸餅山勝佛口温泉鎮巡檢司守墪弓兵六人墪二可山山半月威海衛守墪堡軍餘三十八人墪八陳家庄斜山焦子埠磨兒山遶達頭古陌麻子峰廟後堡四曹家庄峰山豹虎天都百尺崖所守墪堡軍餘二十四人墪六曹家島蒲䑓頂百尺崖嵩里老姑頂望天嶺堡三轉山崖竇家闕辛汪寨所守墪弓兵三人墪一辛汪寧海衛守墪堡軍餘四十二人墪六後至山馬山戲山草埠小峰山貉子巢堡十二宋家湯西曲水修福管山現石子辛安板橋杏林修福蕪蔞栲栳金山所守墪堡軍餘一十七人墪五廟山駱駝鳯凰山小峰金山堡四鄒山石溝清泉朱家清泉所守城軍餘一十五人守墪軍餘八人墪二清泉石溝竒山所守墪堡軍餘一十八人墪四現頂熨斗埠東木柞堡二黄務西牟孫夼鎮巡檢司守墪弓兵九人墪三崗崙旗掌塔山登州衛守墪軍餘一十八人墪六抹直口西庄教塲閣蓬萊林家庄田横寨福山所守墪軍餘二十五人墪三單山皁河三山柴葫寨巡檢司守墪弓兵一十八人墪六小皁兒諸黄武庄庄諸髙上司大原馬埠寨所守城軍餘四十人守墪軍餘九人墪三海廟馬埠扒埠海倉巡檢司守墪弓兵一十五人墪五海鄭後竈白堂東闗上山魚兒巡檢司守墪弓兵十五人墪四黑山韓城河口烟火塘頭寨所守城軍餘七十六人守墪軍餘三十人墪九寗家墳田水河荆埠八面宅科堂公母官臺上司黄種河山東倭變紀永樂六年倭賊襲破寧海衛殺掠甚惨指揮趙銘以失機被刑冦成山衛白峯頭寨羅山寨及大嵩草島嘴鰲山羊山寨隂島張家庄以次被掠入于家庄寨百戸王黼死之入桃花閘寨百戸周盤死之嘉靖三十四年五月賊登犯日照縣三十五年四月賊登靈山衛養馬島官兵討平之犯海陽所官兵討平之山東事宜登州營登萊二郡凸出于海如人吐舌東南北三面受敵故設三營聨絡毎營當一面之寄登州營所以控北海之險也登萊二衛併青州左衛俱𨽻焉其策應地方語所則有竒山福山中前王徐前諸所語寨則有黄河口劉家汪解宋蘆徐馬停皂河馬埠諸寨語巡司則有楊家店髙山孫岕鎮馬亭鎮東良海口柴胡海倉魚兒舖髙家港諸司三營各立把總二員以總轄之其在海外則島嶼環抱自東北崆峒半洋西抵長山蓬萊田横沙門鼉磯三山芙蓉桑島錯落盤踞以為登州北門之䕶過此而北則遼陽矣此天造地設之險也然諸島雖登州而居島中以取魚鹽之利者乃遼陽之編伍非山東之戍卒也呌呶跳梁可畏而不可恃詳見後總論中故北海之濵既有府治而設險者復建備倭城于新河海口以為屏翰且有本營之建焉沿海兵防特重其責非若他省但建水寨于島嶼良有以也夫島嶼既不設險則海口所係匪輕自營城以東若抹直石落灣子劉家汪平暢蘆洋諸處自營城以西若西王莊西山欒家孫家海洋山後八角城後芝罘莒島諸處皆可通畨舶登突嚴外户以綏堂閫其本營典守之責乎文登營文登乃泰山餘絡突入海中文登縣尤其東之盡處也成山以東若捍門灘九峯赤山白蓬頭諸島縱横沙磧聨絡潮勢至此衝擊騰沸議者謂倭船未敢猝達然考之國初倭冦成山白峯寨羅山寨延大嵩草島嘴等處海側居民重罹其殃倭果畏海奚而有是哉故文登縣東北有文登營之設所以控東海之險也寧海威海成山靖海四衛皆𨽻焉其策應地方語所則有寧峯海陽金山百尺崖尋山諸所語寨則有清泉赤山等寨語巡司則有辛汪温泉鎮赤山寨諸司逶而北則應援乎登州迤而南則應援乎即墨三營鼎建相為犄角形勝調度雄且宻矣有干城之寄者其思國初成山之變而儆戒無虞也哉即墨營山東與直𨽻連壤即墨縣南望淮安東海所城左右相錯如咽喉闗鎖邇年登萊海警告寧然淮陽屢被登刼自淮達萊片帆可至犯淮者犯萊之漸也故即墨所係較二營似尤為要自大嵩鰲山靈山安東一帶南海之險皆本營控禦之責其策應地方語所則有雄崖膠州大山浮山夏河石洞諸所語巡司則有乳山行村栲栳島逢猛南龍灣古鎮信陽夾倉諸司其海口岩唐家灣大任陳家灣鵝兒栲栳天井灣顔武周瞳松林全家灣青島徐家庄諸處俱為衝要隄防尤難國初倭冦鰲山毒痛甚惨即本營所轄之地也殷鑒不逺封守者其可以弗慎乎一倭患之作嶺㠐以北達于淮陽靡不受害而山東獨不之及豈其無意扵此哉亦以山東之民便于鞍馬而不便于舟楫無通畨下海之人為之嚮導接濟焉耳然邇年青齊之兵多為所擄安知其中無識海道而勾引者乎予觀山東諸郡民性强悍樂于戰鬭倭之短兵不足以當其長鎗勁弩倭之步戰不足以當其方軌列騎萬一至此是自䘮其元也所虞者登萊突出海中腹背受敵難于隄備國朝専設備倭都指揮一員巡海副使一員分駐二郡衛所森嚴墪堡周備承平日久不無廢弛申明振厲庶㡬其無患乎一予聞宋以前日本入貢自新羅以趨山東今若入冦必由此路但登萊之海危礁暗沙不可勝測非諳練之至則舟且不保何以迎敵而追擊乎故安東以北若勞山赤山竹篙旱門劉公芝界八角沙門三山諸島乃賊之所必泊而我之所當伺焉者也若白蓬頭槐子口橋雞鳴嶼金嘴石倉廟淺灘亂磯乃賊之所必避而我之所當逺焉者也嚴出洋之令勒㑹哨之期交牌信驗習熟有素則他日廟堂或修海運亦大有賴焉獨禦倭云乎哉一山東今日之患有二其一曰班兵懐䟦扈之志久矣其一曰登萊島民原係遼陽所徙不受法制地方癰毒宜早治而亟平之不然潰决之虞不能免也一山東闗係大要尤在海運予考元時海運故道南自福建梅花所起北自太倉劉家河起迄於直沽迢迢五千餘里永樂以來㑹通河成海運遂廢運者皆由漕河所以避開洋之險也然海險莫甚於成山以東白蓬頭等處危礁亂磯湍流伏沙不可勝紀非熟識水洪則不敢行宗伯席書云海運一失人不復生河運有失尚幸不死以生易死輕重昭然是海運之罷端為山東之海險也以愚觀之漕河自王家閘以北至於徳州千有餘里乃國家咽喉命脈其通其塞所係匪輕况黄河漸徙而南或衝而北易為漕患及今承平修復海運以備不虞豈非國家之大計哉今上初年廟堂嘗議及此或建議欲於膠州鑿山濬土以達海倉以避洋險山東撫巡病其煩難而止惜小害大可慨也夫㑹通河也膠萊新河也登萊海險也皆山東所轄之處今之論山東海患者但知備倭而不知備運愚故及之其法詳見大學衍義補海道經等書附録生員毛希秉云洪武永樂間海運江南粟以太倉給遼東北京從太倉劉家河過崇明三沙放洋至直沽交卸南北貨物往來近海居民甚得其利而無鹽盗之害自海道絶而沙民争魚鹽之利往往仇殺拒捕矣今黄河日徙于南漕運漸有難行之勢莫若講求海運召募沿海魚人竈丁鹽徒畨客尋認海洪以開運道如廣東船能至漳州漳州船能至寧波寧波船能至崇明崇明船能至通泰海州自此以北豈無識認之人故老相𫝊崇明至海州風順無需一日海州至登州六百里轉過登萊環抱千餘里從利津至直沽亦六百里近故嘗考之元史至元三十年千户殷明畧開海運新道自浙西至直沽不過旬日又濬山東膠萊新河直達天津以避迤東海道之險今未通者僅五里耳且漕船大者三四百石海船大者八九千石漕運一年毎三石致一海運一月不兩石而致一其便利較然也所憂者風濤之害耳然聞南洋通畨海舶専在琉球大食諸國往來而海島州縣常年度海未見有覆溺之患宜兼漳船蜈蚣船制度而酌其中冇風則帆無風則楫打造有法處置得宜何憂費人之說嘗觀沙船載蘆山船載竹者如浮筏然故鮮漂弱議倣刳朩為舟之制上留一竅出納米粮悉以油灰黏縫附于海舟兩旁萬一漂失米無沉濕人有搭救庶為萬全之策若夫料淺占風之法定盤望星之規放洋泊舟之處詳載大學衍義補山東通誌海道經採試有效即令崇明各沙大户及沿海巨室自備人船海運許載私貨囬鹽以償其勞連年有功者量授以官則不惟公私兩便而海盗亦可以不作矣或曰海運通則漕河塞京官家室未免舍舟而車孰若安流之為利邪督運者或不得人而應募之夫鮮則將仍舊定派里甲軍餘輪運而泣送悲迎之害興又胡以善其後乎愚曰不然自遷都北平以來東南財力竭矣今復海運則田耗可以量減運卒得以少休江西湖廣江東之粟仍從漕運惟浙東西蘇松常閩廣貢賦則從海運斯固並行而不害矣又云客難曰漕運費財海運費人古今以為確論故罷海而漕今且百三十年矣子欲復之豈非知惜財而不惜人者邪子曰不然天下事利多害少者為之害多而利少者弗為也朱子非仁人與何為䟽諸海運閩廣之米于浙東我太祖非仁君與何為詔令海運江南之粟于遼左亦以道近而省民也矧今㑹通河常弗利漕船不行可不為之所乎果曰費人請以耳目之聞見者徴之近如蘇之崇明縣西至太倉二百餘里南至寧波北至海州各千餘里捕魚販鹽賫文應役公私往來者無日庶之又如寧波東南有茶山牛頭山玉環山逋民衣食器用不能不仰于内地彼此往來者無日無之近聞寧波勢家毎至漳州販木顧白船往來海中並無覆溺之患逺如廣之瓊崖儋萬其至省城也風順則半月風阻則一月甚至浮海三月者有之他如南洋西洋諸國其隔閩廣也近則數千里逺則數萬里通畨海舶無日無之使其下海必遭漂沒人亦何苦舍生而求死哉况東洋有山可依有港可泊南北不過三千里往來不過二十日非若南洋西洋一望無際舟行而再不可止也海運何難之有哉客曰海運果不費人何為永樂十三年㑹通河成罷海運萬民歌舞且為開漕河者立生祠其故何哉予曰以不教民戰是謂棄之欲人出死力弗與同其利自古未有能濟者也元人海運召募兩浙富户素習海濤者而以沙民朱清張瑄羅壁為之使且禁網踈濶能與同其利自至元二十九年至天厯二年六十餘年間海運不廢總其所失米數盖曽不能以十一我朝遷都北京後議行海運編定里甲矣􅉍年輪差夾帶私鹽者沒入之且置以法焉况造船多不如武督運多不得人故鄉人數逢其害咸以為弗便漕運通而軍七民三之例定宜乎民之歌舞而頌徳也若打造有法處置得宜何憂乎費人邪區區之議非欲驅民于死也亦曰因民之利而利之耳朝廷誠下詔江南有能尋復元人海運故道者當銀萬兩授以某官海道既通復下詔曰有能自備人船海運者毎運米萬石給與耗米月粮四千仍許私貨囘鹽永不抽税仍嚴私自下海之禁毋得浸其利人誰不願運乎但當自募畨客竈丁鹽徒及傍海大户慣習海濤者聽其所欲不可强定腹裏軍民不習水性之人以敗乃事斯可久行而無害矣客曰雖慣下海素習水性者汪洋浩浩舟覆可以得生予曰海洋雖大有洲有島専募下海善沒之人而又多置脚船盡備浮筏雖遭風波亦可以幸免况又變通船制以為萬全之策乎客曰丘文莊欲照例工部造船軍夫運粮而子乃欲召募漳人沙民及沿海大戸自備人船者何居曰從來公事不如私事之勤勞官物不如民物之堅厚嘗間漳船費銀萬兩莫若召工估價而寛給海運大户自造免私貨之税以備修理軍夫不習水性素怯海濤豈可强所不能而驅之以冐險邪行丘之議是陷赤子于湯火也從吾之説是蠻夷水㓂皆將為我用也豈但不為中國良民害哉客曰丘議一如畨舶之制斯亦善矣而子欲兼蜈蚣船者何哉曰海行甚連而遅者守風故也如大食國在漳州東南毎歳通畨者必候冬初西北風盛而去夏初東南風盛而來所謂海舟無風不可動也惟佛郎機國蜈蚣船底尖面濶兩旁列楫數十其行如飛而無傾覆之患故兼二船之長則除􅄓風暴作狂風怒號外有無順逆皆可行矣况海中晝夜兩潮順流鼓楫一日何嘗不數百里哉客曰丘議毎艘運米八百石許載私貨二百石而子乃云海運大者八九千丘議運軍私貨三十税一客商附載者如常例而子乃許税貨囘鹽永不抽税何大小多寡之懸絶邪子曰取海運者載重而行疾也故漳船能容人三千貨倍之盖不止于萬斛也漕運正米四百萬公私費米八百萬今海運止給耗米月粮一百六十萬歳省六百四十萬矣而又欲税其私貨毋乃遺大較細計近而忘逺乎葢聞遼東天井之國百貨難出登萊苦鹽之地物産不多而登遼隔海甚近風順半日可達太祖舊制歳運登萊花布以給遼軍遼陽之貨亦得載于山東彼此軍民交受其利既而捕巡官軍假公濟私報稱官船不許私載之律往往搜捕攘奪故海船不敢入港逺泊大洋潜以小舟私渡數被風濤損失官費脩造咸議其不便遂奏折銀陸運海道既絶遼東生儒大比赴山東非迂過北京以來不啻五千餘里勞費不貲士民俱困此可以為鑒矣客曰通畨海船毎放一艘出年例得二三千兩畨貨進港船戸分其半人猶冐禁為之利多故也今海運既給耗米月粮而又容載私貨囘鹽且不征其税毋乃貊道不可行于中國乎予曰異哉言與計小利則大事不成故沛公間楚趙王備邉宋祖任將與夫劉晏造船虞集墾地皆有得于夫子之計而成功其為國家之利甚大故區區之見不但弗征其税而已海船能載萬石者止運六千許以四分載私貨囘船悉聴帶鹽附載而嚴私自下海之禁盖恐侵其利也將使官民富饒樂于海運自出方畧以備不虞不至漂失萬一有之即如漕船亦間有遇風而連數幇損壊者豈能保其萬無一失之理哉所失之利甚少所得之利甚多後世因占小便宜而失大便宜者衆矣可不戒哉客喜再拜曰不啚海運之利若是也沙民富而海之鹽盗息矣解綱省而農之田耗減矣運卒休而衛之行伍實矣南北貨通而物價不至于湧貴官民船便而漕河不至于擠塞水戰習而足以制東南之夷民力寛而足以備西北之狄若更省漕卒十萬以興北方之地利積餘粟數年以減南方之綱運軍民冨庶上下安樂遼東兵防官考遼東兵防之設始于永樂己亥廣寧伯劉江至為精宻自望海堝之㨗而倭不敢犯者盖百六十年矣墩堡闗隘日就廢弛一旦有變寧不張皇矣乎安不忘危今日之急務也愚故詳録之以俟當道者修復焉亦愛禮存羊之意云爾提督軍務巡撫都御史鎮守總兵官分巡遼東東寧道僉事分守遼海東寧道叅議廣寧叅將遊擊將軍靉陽守備備禦都指揮金復一義州一廣寜前屯一廣寧右屯一海蓋一一廣寧城沿海衛所廣寧前屯衛中右所中前所中後所廣寧所屯衛中左所廣寧左屯衛廣寧右屯衛中左所金州衛復州衛蓋州衛義州衛沿海闗城墩臺廣寧前屯衛闗一山海墪九覺華島桃花島龍宫島望天島連海島歡喜嶺泰洋島大旺庄慶春山堡二十廣積永豐樹林海濵海山興安古城杏林泰新三山老軍錫安海泉新安長安慶春城南永安積粮安家廣寧中左二屯衛墪三望海岳家孤山堡十六嘉和順陽樂安長豐富有順寧時和興穡仁和廣盈得安豐稔永豐西杏福寧南陽廣寧右屯衛闗一三岔堡五東海枯樹枯菱河女直常豐金州衛守墪堡官軍一千七百二十六員名城四望海堝伯母山旅順南城旅順北城墪三十六石門山大黑蕭家島海清島老鸛嘴孛蘭店雙廟山石洞鴈島島馬椎鐵山島蓮花小沙河島大沙河島黄谷島盧家島長沙嘴花裏島青山島杏園島鴈練島七蘭山野雞島團山島沙河島和尚島鶴兒島紅崖島磨盤山島鞍山羅家島兎兒島黄家島鹽塲島太平島南門島臺一三王山堡四三淮島黄骨新寨寨劉家紅嘴復州衛守墪堡官軍六百四十七員名城二魏霸山城得利瀛城墪九龍王山松山萬灘島北青海中島塔山張生島石家島駱駝山堡四富川寨楊官臨溪驛奕古蓋州衛守墪堡官軍二千四百六十四員名墪九韋子島白狼山歸州山觀家兎兒島神仙山象井口梁房遼針山堡五梁房口八角湖中山寨馹熊岳馹五十義州衛城一靉陽墪四塔兒山擦牙三山城西堡三石家林青榆八塔山遼陽事宜遼地負山阻海屹然為東北雄鎮北隣沙漠而遼海三萬瀋陽鐵嶺之統於開原者足遏其衝南枕滄溟而金復寧蓋旅順諸軍聨屬海濵者足嚴守望京師翰屏可謂固矣然觀今日遼陽邉防頗為有賴而備倭海防視為虚文盖自遼江金線島之㨗而海氛久熄自山東海運之費而墪寨益廢於是旅順諸堡亦無復用識者謂遼東沿邉五路得分守應援之規沿海衛所亦當如其制如旅順而西以金州轄之三岔河而南以盖州轄之三岔河而東以三屯轄之總兵撫按之統其青者秋汛以防邉為重防海為次春汛以防海為重防邉為次則雖島夷窺伺豈能遽犯哉予按遼東倭患較諸省似可緩所虞者地千餘里衛所軍旅將十萬員名止藉山海闗一線饋餉我朝北都燕而逺漕江南粟又自京師達於遼陽飛輓不繼邉卒輒呌呶待哺萬一歳歉宻邇畿輔突騎乘間何以禦之此其患不在兵之不强而在食之不足食足則兵强兵强則守固矣邇者登萊運米達遼甚便惜其不多愚謂國初軍屯商中之制至為精當而大壊極弊司國計者深念而亟圖之可也籌海圖編