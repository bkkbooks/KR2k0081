body:
  text: 籌海圖編巻三明胡宗憲撰廣東沿海縂圖㢘州府圖雷州府圖髙州府圖廣州府圖惠州府圖潮州府圖廣東兵防官考廣東倭變記廣東事宜廣東兵防官考提督兩廣軍務兼廵撫都御史駐剳梧州舊嘗設總督兩廣都御史事平即歸非常設故不載鎮守兩廣總兵官駐劄梧州廵按廣東監察御史廵視海道副使額設專為備倭并防捕海盗整􅅚瓊州兵備副使整􅅚清遠兵備副使整􅅚清遠僉事整􅅚髙肇兵備僉事整􅅚恵潮兵備僉事整􅅚雷廉兵備僉事市舶提舉司提舉駐剳廣州分守瓊崖叅將分守髙肇韶廣叅將分守恵潮叅將總督廣東備倭以都指揮體統行事守備恵潮以都指揮體統行事沿海衛所廣州衛旗軍九百五十二名鎮州所旗軍二百十七名靈山所旗軍二百五十四名永安所旗軍三百九十名雷州衛旗軍一千三百八十名樂民所旗軍三百四十五名海康所旗軍三百二十三名海安所旗軍一百八十一名錦囊所旗軍二百三十五名石城後所旗軍二百三十四名神電衛旗軍一千五十八名寧州所旗軍四百五十七名雙魚所旗軍一百七十七名陽春所旗軍二百十名廣海衛旗軍一千一百六十五名海郎所旗軍新㑹所旗軍六百六十四名香山所旗軍四百二十八名肇慶衛旗軍陽江所旗軍新興所旗軍二百五十二名南海衛旗軍一千一百十四名東莞所旗軍三百二十八名大鵬所旗軍二百二十三名碣石衛旗軍一千二百八十四名平海所旗軍四百四十七名海豐所旗軍四百二名㨗勝所旗軍五百八十二名甲子門所旗軍二百八十七名潮州衛旗軍一千三百二十八名靖海所旗軍二千八十二名海門所旗軍二百二十五名蓬州所旗軍三百八十八名大城所旗軍三百八十三名海南衛清閑所旗軍五百八十七名萬州所旗軍四百六十九名南山所旗軍二百十五名沿海廵檢司弓兵數附廉州府管界弓兵二十名長弓兵二十名西鄉弓兵二十名如昔弓兵二十名沿海弓兵二十名林墟弓兵二十名髙仰弓兵二十名珠塲弓兵二十名永平弓兵二十名雷州府東塲弓兵三十名清道弓兵三十五名潿州弓兵三十名海寧弓兵三十名湛州弓兵三十名黑石弓兵三十名髙州府凌綠弓兵三十名寧村弓兵三十名赤水弓兵二十五名肇慶府直將弓兵五十名海陵弓兵六十名恩平弓兵五十名廣州府城崗弓兵五十名牛肚弓兵五十名沙岡弓兵五十名邁逕弓兵五十名望髙弓兵五十名沙村弓兵五十名大瓦弓兵五十名潮道弓兵五十名三水弓兵五十名江浦弓兵五十名江村弓兵五十名都寧弓兵五十名馬岡弓兵五十名馬寧弓兵五十名紫泥弓兵五十名神安弓兵五十名黄鼎弓兵五十名香山弓兵五十名茭塘弓兵五十名五斗口弓兵五十名沙灣弓兵五十名鹿歩弓兵五十名白沙弓兵五十名小黄浦弓兵五十名福水弓兵五十名缺口弓兵五十名官冨弓兵五十名京山弓兵五十名恵州府内外管弓兵五十名碧甲弓兵五十名長沙弓兵五十名甲子門弓兵五十名潮州府神泉弓兵五十名吉安弓兵五十名門闢弓兵五十名桑田弓兵五十名招寧弓兵五十名鮀浦弓兵五十名楓洋弓兵五十名闢望弓兵五十名黄崗弓兵五十名瓊州府清瀾弓兵三十名舗前弓兵六十名澄邁弓兵三十名青藍弓兵六十名調囂弓兵六十名藤橋弓兵六十名牛嶺弓兵六十名抱歲弓兵六十名巡徳弓兵六十名鎮南弓兵六十名安海弓兵六十名田牌弓兵六十名沿海烽堠雷州府那宋對樓八燈踏磊包西清安討綱調㴝寧海調陳陳家草綠南門淡水通明南浦北品北鵝北月石歲麻障髙州府調髙山南尖連頭輔弼北白山輔弼南門浮廣州府南海赤水那浮蛤浦譚村北津黄村丹章南洋逭田那貢豐頭安民峯前處儒石門白蒙竒㴝寨南雙鎮口陳村放火南白石角企觀黄岐北寨水南大人嶺亭子角馬鞍白沙稍潭節尾四㑹煙石門長洲青藍員攬白岐岡村黄浦南山青紫鰲灣英村冷水福漏藍田赤岡角秋風嘴角凹風門疊福恵州府舊大鵬野牛澳水頭凹背沙澳長沙沙江虎白芳茅河田白沙湖古逕東坑石山大麻新設平安吉頭新涇桑州麗江前標麗山後標競山闕平鉛鍚安充闕州潮州府文昌前岡鈎簾沙尾南山下嶺石城大塲石牌新村浮山鴻山錢塘鴉䯻環山闕洲白峰黄崗闕沙沿海衛所戰船舊制毎歲春末夏初風汛之期通行府衛所縣捕巡備倭等官軍出海防禦倭冦畨舶動支布政司軍餉銀僱募南頭等處驍勇兵夫與駕船後生毎船分撥五十名毎艚船四艘一官統之三路兵船編立船甲長副字號使船水手教以接潮迎風之法長短弓兵弩時常演習使之出入往來如神如無字號者長副鳴鑼迫逐俱待秋盡無事而掣中路東莞縣南頭屯門等澳大戰船八二鳥艚船十廣海衛望峒澳戰船四東路潮州府柘林澳戰船二哨船二鳥船十五碣石靖海甲子門等澳哨船六西路髙州府石城具川灣澳各哨船二廉州府海面戰船二瓊雷二府海港東莞鳥艚各六新㑹横江船四雷州海港大戰船六廣東倭變紀洪武二年倭冦恵潮諸州時天下初定海内乂安倭夷竊發濱海一帶皆被騷擾乃命行人楊載使日本以璽書諭其國王書詳見使倭事畧中四年倭冦海晏下川指揮楊景討平之時海冦鍾福全李夫人等自稱總兵挾倭船二百冦海晏下川等地廣州左衛指揮僉事楊景追捕至陽江平之永樂七年冬十月倭陷廉州教授王翰死之詳見遇難狥節考九年三月倭䧟昌化所千戸王偉死之時副總兵李珪等擁兵不救城遂䧟王偉力戰而死軍士死者甚衆城中人口粮食軍噐皆被刼掠十九年正月辛巳李珪敗倭於潮州靖海海濱珪先以昌化之䧟戴罪殺賊大敗賊于靖海生擒十五人斬首五級悉送京師嘉靖三十三年海冦何亞八等引倭入冦提督侍郎鮑公象賢總兵定西侯蔣公傳討平之先是亞八與鄭宗興等潛從佛大坭國引畨舶于沿海刼殺逸往福建收叛亡數千人與陳老沈老王明王直徐銓方武等流刼浙福復回廣東鮑公遣副使汪栢指揮王沛黑孟陽督兵捕之及於廣海三州環生擒亞八等賊一百一十九名斬首二十六級餘黨脫迯徐銓方武等又自福建流突潮州為黒孟陽所破徐銓授首分廵兵備等官兵於潮州柘林等海洋擒斬一千二百有竒亞八宗興武與陳時傑等俱斬于市海島遂平三十七年正月壬午倭犯揭陽入蓬州所官兵擊敗之先是壬子歲倭冦初犯漳泉僅二百人其間真倭甚寡皆閩浙通畨之徒髠顱以從至是船十三艘賊八百人自漳泉犯楊陽縣適蓬州千戸所城崩賊遂擁入殺百戸李日芳等提督都御史王公鈞遣副使林懋舉僉事經彦寀叅將鍾坤秀知府李春芳統官兵擊敗斬首一百七十名顆是戰也鄉夫之功居多焉十月甲子倭賊自漳州如饒平攻黄崗民鎮據其城官兵敗之經彦寀等大敗賊衆俘斬一百四十六名三十八年二月冦圍揭陽官兵大破之時軍門駐潮州肇慶同知吕天恩與僉事經彦寀率鄉兵合擊之斬獲甚多冦復趨揭陽圍城彦寀帥師救之鄉夫斬金甲賊酋一人賊大敗走俘馘無筭㑹彦寀報罷僉事殷從儉代之乗勝逐北賊望風而靡黄崗鎮賊亦遁去十一月庚午賊攻海門所官兵敗之走犯潮陽復破之先是賊在福建之平和與饒平黄崗鎮隔界而疊至是賊首許老等三百餘賊引倭千餘自磊門登陸攻海門所官兵擊之賊死甚多壬申南丹主目莫善等追賊與指揮孫敏擊敗之賊遁還平和丙子許老等犯潮陽縣丞范南卿等兵擊走之賊由分水關犯黄崗鎮城通判翁夢鯉指揮李榮知縣熊炅林叢槐率兵捕之巳卯賊至南洋灣指揮馮良佐統目兵莫真莫善分為二哨千户黄昇等統募兵打手為一哨南洋三灣諸鄉兵又協助之大破其衆賊奔聚闢望港口甲午賊出掲陽蓬州都水沙村焚掠皆為我兵所敗十二月巳亥賊棉冦隴外莆都辛丑賊自平和營於赤寮村掲湯湖寨丁未新賊自福建雲霄突入黄崗戊申闢望賊出掠彩塘甲寅新賊與闢望賊合踪出掠甲子棉湖賊突徃蘆清官兵連戰皆破之俘斬凡一百八十有竒三十九年正月官㑹擊闢望之賊大破之時賊為官兵追急移屯潮陽貴山都屯指揮武尚文及鄉兵連戰皆㨗賊改營古埕乙酉賊遁往南洋灣典膳秦金與官兵合擊大敗之斬首三百七十賊潰渡河官兵邀之復大㨗戊子賊祭江而來誓復南洋灣之􅄷尚文等官兵又大敗之甲午古埕營賊出掠官兵又敗之二月戊戌賊復回平和沙嶺已酉賊至大􅝱橋官兵又勝之戊午賊復來掠守備兵擊之賊大潰俘馘八百有竒四月僉事齊遇與海道㕘將㑹師追之斬三百六十殘賊悉遁廣東事宜東路廣東列郡者十分為三路東路為恵潮二郡與福建連壤漳舶通畨之所必經議者謂潮為嶺東之巨鎮柘林南澚俱係要區枕吭撫背之防不可一日緩而靖海海門蓬洲大城諸所又皆跬歩海濤所頼以近保三陽遠衛東嶺者也恵州海豐東南濱海其捷勝平海甲子門皆瞬息生變恵潮守備劄於衛治城有以嚴其防矣然未知柘林為尢要也柘林乃南粤海道門戸㨿三路之上㳺畨舶自福趨廣悉由此入舊例風汛之期各澚皆設戰艦秋盡而掣回泊水寨此在他澚猶可柘林去水寨一日之遠警報未易逹倘賊視我無備批吭搗虛不亦危乎無柘林是無水寨也無水寨是無恵潮也為今之計東路官軍每秋掣班必以柘林為堡慎固要津附近大城所戌卒互為聲援不得規避空所縱賊馳驟若遇􅄓霧塵霾尢宜加之意焉其外碣石靖海甲子門海澚雖視柘林稍次而舟師防禦各有信地之責者又可少懈乎中路嶺南濱海諸郡左為恵潮右為髙雷亷而廣州中處故於此置省其責亦重矣環郡大洋風濤千里皆盗賊淵藪帆檣上下烏合突來樓船屯哨可容緩乎嘗考之三四月東南風汛日本諸島入冦多自閩趨廣柘林為東路第一關鎻使先㑹兵守此則可以遏其衝而不得泊矣其勢必越於中路之屯門雞栖佛堂門冷水角老萬山虎頭門等澚而南頭為尢甚或泊以寄潮或據為巢穴乃其所必由者附海有東莞大鵬戌守之兵使添置往來預為巡哨遇警輙敵則必不敢以泊此矣其勢必歴峽門望門大小横琴山零丁洋仙女澚九竈山九星洋等處而西而浪白澚為尢甚乃畨舶等侯接濟之所也附海有香山所戌守之兵使添置往來預為巡哨遇警輙敵則亦不敢以泊此矣其勢必歴厓門寨門海萬斛山綱洲等處而西而望峒澚為尢甚乃畨舶停留避風之門戸也附海有廣海衛新寜海朗所戌守之兵使添置往來預為巡哨遇警輙敵則又不敢以泊此矣夫其來不得停泊去不得接濟則雖濱海居民且安枕而卧矣况㑹城乎按今設禦之法浪白望峒二所各置戰艦慎固封守而南頭宜特設海道駐劄居中調度似有以扼嶺南之咽喉矣應援聯哨其中路今日之急務乎西路議者曰廣東三路雖並稱險阨今日倭奴衝突莫甚於東路亦莫便於東路而中路次之西路髙雷亷又次之西路防守之責可緩也是對日本倭島則然耳三郡逼近占城暹邏滿剌諸畨島嶼森列㳺心注盻防守少懈則變生肘腋滋蔓難圖矣可弗講乎故髙州東連肇廣南憑溟渤神電所轄一帶海澚若連頭港汾州山兩家灘廣州灣為本府之南翰兵符重寄不當托之匪人以貽保障之羞也雷州突出海中三面受敵其遂溪湛川洄洲樂民等四十餘隘固為合衛三道門戸而海安海康黒石清道并徐聞錦囊諸隘所以合防海澚以操縱反側俾不敢梗化焉者尢可齷齪玩愒已哉若亷州則尤為全廣重輕海北扼塞兩有攸寄故兵符特劄於靈山逹堡増屯於衛北海冦獠外夷之憂視三嶺獨勞焉西南雄郡如瓊為亷之外戸五指腹心盡為黎㨿郡邑封疆無不濱海備倭之制若白沙石瓊舘頭文昌海安海康對峙畨島飄風突來防禦甚艱近雖駐叅將於厓州責有攸寄而守禦營戌舊額歳乆寢弛凡此皆西路今日所當汲汲經畫焉者深念預防俾幕南稽顙重譯來庭非長民若兵者之責乎一廣東兵餉舊制于潮州府民壯數内抽追工食選募打手駕船後生分守三路後因山賊竊發念城池為重寄留民壯守䕶而前項兵食每年於鹽利内處補後議以兵貴精而不貴多食宜預而不宜匱於東路兵夫正選三百名防守遇有警報則増僱三百以足六百原數其中西路一千五百名内量减七百名止募八百名通計見該一千一百名約計東路三百名西路二百名中路六百名各路將三之一哨巡三之二營守毎兵夫五十名艚船一隻兵夫一名毎月工食六錢口糧三斗船一隻脚價一兩五錢或一兩二錢兵船毎四隻則以一官統之日逐守巡或閱月半月更畨相代又於朔望量加魚鹽之犒永為定額所費俱於軍餉内取辦遇有警報又許徑自動支添募應選不必直俟文移動經旬月以致噬臍無及凢所應辦逐一登記毎月造報迨掣兵之時截日住支於以釐革浸漁冗濫之弊此嶺南海防之大畧也一廣東濱海諸邑當禁船隻若增城東莞則茶窖十字􅝱畨禺則三漕波羅海南海則仰船岡茅􅝱順徳則黄涌頭香山新㑹則白水分水紅等處皆盗賊淵藪也毎駕峻頭小艇藏集兇徒肆行刼掠勾引倭奴殘戮甚慘為今之計莫若通行各縣令沿海居民各於其鄉編立船甲長副不拘人數惟視船之多寡依十家牌法循序應當如船二十隻總統於船甲長内以十隻分統於甲副仍於船尾外大書某縣船某甲下某人十字翻刻黒填為記其甲長副各置簿一扇備載鄉中船數并某様船隻某項生理一一直書毎歳具呈於縣以憑查考如遇刼掠則被害者能識其船速投首於甲長副鳴鑼追究俾逺近皆知無字號者即係為非人人俱得拏送舊時沿海居民明知賊盗懼其反攻而不救今後坐視者罪以通同則船有統紀而行刼之徒忌畏况操舟之時可以按簿呼召給價差用而不致賣放之弊乎議者謂欲令毎縣取無碍官銀千餘兩造船百艘分給軍民生理令河泊等官歳課入息五年當抵造船之銀如朽爛更以歳課銀更造此法固善終不若無事處事如前法之為善也一南澚當閩廣交界之處周圍皆山中有田百頃乃國初起遣居民遺棄之地也四面蔽風大潭居中可以聚舟其大視金塘二倍五六年來因浙直攻捕之嚴倭泊無所容俱于此互市福建捕急則奔廣東廣東捕急則奔福建定期於四月終至五月終去不論貨之盡與不盡也其交易乃搭棚於地鋪板而陳所置之貨甚為清雅刀鎗之類悉在舟中若能宻令人於濱海沉滅其舟則在岸上之倭生擒也何有籌海圖編卷三
