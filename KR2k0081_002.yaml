body:
  text: 明胡宗憲撰王官使倭事略魏正始元年遣使如倭太守龔遵遣使建中校尉梯檇等奉紹印綬詣倭國拜假卑彌呼爵命並齊詔賜金帛錦罽刀鏡等物六年賜倭臣綬詔賜難升米黃幢付帶方郡假綬八年遣使詔諭倭王太守王傾到官卑彌呼與狗奴國王卑彌弓呼交兵遣其臣載斯烏越等詣郡説相攻擊狀郡遣塞曹椽史張政等因齎詔書黃幢拜假難升米為檄告諭之卑彌呼已死宗女臺與嗣政等以檄告之隋煬帝大業三年遣使倭國帝遣文林郎裴清渡百濟行至竹島南望耽羅國經都司麻國逈在大海中又東至一支國又至竹斯國又東至秦王國其人同於華夏以為夷洲疑不能明也又經十餘國逹於海岸自竹斯國以來皆附庸於倭倭王遣小德何輩臺從數百人設儀仗鳴鼓角來迎後十日又遣大禮歌多毗從二百餘騎郊勞既至彼都其王與清相見大悅曰我聞海西有大隋禮義之國欲遣朝貢我僻在海隅不聞禮義是以稽留境內不即相見故清來道飾館以待天使兾聞大國維新之化清答曰皇帝德並二儀澤流四海以王慕化故遣行人來此宣諭既而清就館其後清遣人謂王曰朝命既逹清即戒塗於是厚設燕享以遣復令使者隨清來貢方物先時其王冠服仍其國俗至是如賜與衣冠乃以綵錦為冠飾裳皆施襈綴以金玉云唐太宗貞觀五年遣使持節撫倭倭使入闕帝矜其遠詔有司無拘歲許貢遣斯州刺史高仁表持節撫之浮海數月方至仁表無綏撫之才與其王爭禮不宣朝命而還元世祖至元三年遣使往諭日本不逹而還以髙麗人趙彛等言日本國可通乃命兵部侍郎哈達給虎符充國信使禮部侍郎殷𢎞給金符充國信副使持國書使日本書曰大蒙古國皇帝奉書日本王朕惟自古小國之君境土相接尚務講信修睦况我祖宗受天明命奄有區夏遐方異域畏威懷德者不可悉數朕即位之初以高麗無辜之民久瘁鋒鏑即命罷兵還其疆域反其旄倪高麗君臣感戴來朝義雖君臣歡若父子計王之君臣亦已知之髙麗朕之東藩也日本密邇髙麗開國以來亦時通中國於朕躬而無一乘之使以通和好尚恐王國知之未審故特遣使持書布告朕志兾自今以往通問結好以相親睦且聖人以四海為家不相通好豈一家之理哉以至用兵夫孰所好王其圖之哈達等道由髙麗髙麗國王王植以帝命遣樞密院副使宋君裴偕禮部侍郎金贊等道詔使哈達等往日本不至而還至元四年遣使如日本六月帝謂王植以辭為解令去使徒還復遣哈達等至髙麗諭植委以日本事以必得其要領為期植以為海道險阻不可辱天使九月遣起居舍人潘阜等持書往日本留六月亦不得其要領而歸五年遣使日本九月命哈達復持書往至對馬島日本人拒而不納執其塔二郎稱二郎而還至元六年遣使如日本六月命髙麗金有成送還所執二人俾中書省牒其國亦不報有成留其太宰府守護所者久之七月命祕書監趙良弼往使書曰蓋聞王者無外髙麗與朕既為一家王國實為鄰境故常馳信使修好為疆場之吏抑而弗通所獲二人令有司慰撫俾齎以還遂復寂無所聞繼欲通問屬髙麗權臣林衍搆亂坐是弗果豈王亦因此輟不遣使或已遣而中路梗塞皆不可知不然日本素號知禮之國王之君臣寧肯漫為弗思之事乎近巳滅林衍復舊王位安集其民特命少中大夫祕書監趙良弼充國信使持書以往如即發使與之偕來親仁善鄰國之美事如或猶豫以至用兵夫誰所樂為也王其審圖之良弼將往乞定與其王相見之禮廷議與其國上下之分未定無禮數可言帝從之逹十二月詔與髙麗王植送良弼通日本期于上必仍以呼嚕蘇王國昌洪察球爾將兵送抵海候國信使還姑令金州等處屯駐至元十年遣使如日本六月趙良弼復使日本至太宰府而還至元十一年命將征日本三月命經略使實都髙麗軍民總管洪察球爾以千料舟巴圖魯輕疾舟汲水千舟各三百共九百艘載上卒一萬五千期以七月征日本冬十月入其國敗之而官軍不整又矢盡惟虜掠四境而還至元十二年遣使日本二月遣禮部侍郎杜世忠兵部侍郎何文著討議官蘇都爾丹往使亦不報至元十七年日本殺使臣杜世忠二月日本殺國使杜世忠等征東元帥實都洪察文球爾請自率兵往討廷議姑少緩之五月召范虎議征日本八月詔募征日本士卒至元十八年再征日本正月命日本行省右丞相阿嘍罕右丞范文虎及辭實都洪察球爾等率十萬人征日本二月諸將陛帝敕曰始因彼使來故朝廷亦遣使往彼遂留我使不還故使卿輩為此行朕聞漢人言取人國家欲得百姓土地若盡殺百姓徒得地何用又有一事朕實憂之恐卿輩不和耳假若彼國人至與卿等有所議當同心協謀如出一口答之五月日本行省參議裴國伊等言本省右丞相阿嘍罕范右丞李左丞先與實都洪察球爾入朝時同院官議定領舟師至髙麗金州與實都察球爾軍會然後征日本又為風水不便再議定會於伊岐島令其水工畫地圖因見近太宰府西有平户島者周圍皆水可屯軍船此島非其所防若徑往據此島使人乘間船往伊岐呼實都察球爾來會進討為利帝曰此不悉彼中事宜阿嘍罕輩必知令其自處之六月阿嘍罕以病不能行命安哈代總軍事八月諸將未見敵喪全師以還乃言至日本欲攻太宰府暴風破舟猶欲議戰萬户厲德彪招討王國佐水手總管陸文正等不聼節制輒逃去本省載余軍至合浦散遣還鄉里未幾敗卒于閶脫歸官軍六月入海七月至平户島移五龍山八月一日風破舟五日文虎等諸將各自擇堅好船乘之棄士卒十餘萬於山下衆議推張百户為主師號之曰張總管聼其約束方伐朩作舟欲還七日日本人來戰盡死餘二三萬為虜去九月至公角島盡殺蒙古高麗漢人謂新附軍為唐人不殺而奴之閶輩是也蓋行省官議事不相下故皆棄軍歸久之莫青與吳萬五五亦逃還十萬之衆得還者三人耳至元二十年遣使征日本不果命安塔哈為日本省丞相與徹爾特穆爾右丞劉二巴圖爾左丞募兵造船欲復征日本淮西宣慰使昂吉爾上言民勞乞寢兵大德三年遣僧往説日本遣僧寧一山者加妙慈𢎞濟大師附商舶往使日本而日本人竟不至國朝太祖高皇帝洪武二年遣使招夷遣使臣趙秩往日本招來倭夷泛海至析朩崖入其境關者拒勿納秩以書逹其王良懷乃延秩諭以中國威德而詔旨有責讓其不臣之語王曰吾國雖夷僻在扶桑未嘗不慕中國之化而通貢奉惟前朝自恃其強大而以小國視我使趙姓者訹我以好語初不知其覘國也既而發水犀數十艘一時雷霆風波漂覆幾無遺類自是不與通者數十年今新天子帝華使亦趙姓得非蒙古使之雲礽乎亦將訹我好語而襲我也命左右將刃之秩不為動徐曰今聖天子聖神文武明燭八表威加四海開誠布公故以恩信結汝爾若悖逆不我信即先殺我則爾之禍不旋踵矣我朝之兵天兵也無不一當百我朝戰艦雖蒙古戈船百不當一况天命所在人孰能違豈以我朝之孔懷爾者與蒙古之襲爾國者比耶於是王氣沮下延秩禮遇有加秋使行人楊載齎璽書諭日本國王倭冦惠潮濱海上命載往使賫書諭其國王書曰上帝好生惡不仁者向者天降喪亂趙宋失馭中原板蕩東南半壁曰尋於干戈自救不暇固未能經略四荒也逮元自辛卯以來又復擾攘被倭來冦山東不過亦乘其衰耳朕以布衣提三尺劍義聲一唱振旅興師爰宅函夏宵衣旰食垂一十年自去嵗以來羣盜止息海宇乂安惟四夷未服間者山東來奏倭兵數冦海邉生離人妻子損傷物命故修書特報正統之事兼諭倭兵越海之由詔書到日如臣則奉表來廷不臣則修兵自固永安境土以應天休如必為冦朕當命舟師揚帆諸島捕絶其徒直扺其國縛其王豈不代天伐不仁者哉惟王圖之洪武五年遣僧往諭日本先是天寧寺僧祖闡以高行召至會朝廷將遣使詔與瓦罐寺僧無逸俱往祖闡毅然請行上壯之賜以緇器禪衣之屬令大官饌享於五樓下且諭其國敬浮屠喻以善道設化時天界寺僧宗渤嘗賦詩餞之其詩上獻凡十八韻首言王化無遐邇一視同仁次言宣誘以善道庶契西來祖意次言經涉海波雖甚艱險君臣大義勿忘次言平等法行之無有彼此之異末言使旋方盡終始之義太祖俯賜和之常聞古帝王同仁無遐邇蠻貊盡來賓我今使臣委仲猷通洪玄倭夷嘗往至于善𨗳凶人不負西來意爾僧逰逺方毋得多生事入為佛弟子出為我朝使珍重浦泉經勿失君臣義此行非瀚海一去萬里地既辭釋迦門日日宿海涘艨艟挂飛飄天風駕萬里平心勿憂驚自然天之使休問海茫茫直是尋根際詣彼佛放光倭民大欣喜行止必端方毋失經之理入國有齋時齋畢還施禮是法皆平等語言休彼此盡善化頑心了畢才方已歸來為拂塵見終必見始祖闡受命而行自翁州啓棹五日至其國境又踰月始入王都館於洛陽西山精舍一遵聖教擢演正法無非約之以善聼者聳愕以為中華之禪伯亟白于王請主天龍寺乃夢窗國師道場實名剎也祖敷以無上命力辭之且申布威德罔間內外所以遣使者來之意王恱命僧奉方物稱臣來貢既歸上喜怡愈賜白金一百兩文綺二縑成祖文皇帝永樂九年遣使日本遣三寶太監王進奉使日本收買竒貨至寧波選壯軍顧通號大漢將軍同往彼夷初御以禮後起别議輒下瀼江龍于港口得支港潛出彼夷婦密引而還永樂十五年遣使如日本倭冦沙園所邉將執其酋首送京師詔貸以不死遣刑部貟外郎李淵等使日本璽書責以敬天事大之義次年淵還其國王亦遣刺史奉表稱謝宣宗章皇帝宣德八年遣使弔喪倭王源道義卒上命太監雷春少卿潘鍚等出使垂弔以盡懷柔之意今上皇帝嘉靖三十四年七月遣使移諭日本先是海商王直挾倭以要互市不得遂紏島夷入冦而身為之調度浙直廣福沿海悉被殘破倐往倐來訖無寧嵗御史胡宗憲按浙亷知其情奏乞遣使宣諭日本國王令其禁戢島夷以弭邉患實欲行間諜以鈎致王直而絶禍源也疏入上命廷臣議之咸稱曰便乃令布政司為檄致之宣布朝廷德意募能使者寧波生員蔣洲陳可願請行於是假以市舶提舉服色充正副使以往檄曰王國自我太祖髙皇帝御極以來世秉恭順貢獻天朝天朝待王恩亦不薄上下安和恪承天道各保生民今爾倭劫掠居民念惟王國法令嚴明部民盜一雞一犬者必殺無赦豈有縱民侵劫之理必是欺蔽國王私出為非故特遣正使蔣洲副使陳可願移檄報知王若能守祖宗之大法思聖朝之厚恩憤部民之橫行分投遣人嚴加約束不許私出沒海洋侵擾中國使邊境寧靜釁隙不生共享和平之福如此本司即為王奏聞天子必有大旌勞之典史册書美光傳百世豈不快哉否則姦商島民扇禍不巳黨類益繁盤據海島窺伺竊發恐非王國之利如昔年安南國王陳氏之禍可鑒矣今日移文報知亦非為中國也王其深體而速行之洲等捧檄以行十一月望日至其國五島地方偶遇直飬子毛海峯在焉洲等以移諭事告之遂引見直洲等諭以朝廷遣使之意及軍門招徠之心直為感德然不欲國王之知之也謂洲等曰夷意惟在求互市而已既朝廷有曠蕩之恩吾當為若等謀之然天文國君孱弱不能號令於其國其能禁戢諸部耶須歷島諭之亂可弭也遣毛海峯輩送可願回而留洲在島者數月海峯以報效為名實伺內地虛實與當道待直之意何如以為進止時宗憲已總督軍務洞燭其姦乃故示以寬厚之意準令立功報效而為之奏請賞賚優渥海峯還報直始挺身而來謂市舶可通而榮顯可致也然猶慮中變仍挾倭數千而來遷延海上者又兩閲月遣方大忠反覆説之又攜二其黨與始入見軍門於寧波而生致之斬之市曹傳首京師自此海上少戢矣後御史趙孔昭以洲專命往使不達其王謂為直黨惡奏繫詔獄論死巡視軍情郎中唐順之謂不赦洲將來必以使絶域者為諱而阻宣力報效之心後奏釋之太倉使往日本針路見渡海方程及海道針經太倉港口開船用單乙針一更船平更者每一晝夜分為十更以焚香枝數為度以木片投海中人從船面行驗風迅緩定更多寡可知船至某山洋界吳淞江用單乙針及乙卯針一更平寶山到南匯嘴用乙辰針出港口打水六七丈沙泥地是正路三更見茶山茶山水深十八托一云行一百六十里正與此合自此用坤申及丁未針行三更船直至大小七山灘山在東北邊灘山下水深七八托用單丁針及丁午針三更船至霍山霍山用單午針至西後門西後門用巽已針三更船至茅山茅山用辰已針取廟州門船從門下行過取升羅嶼廟州門水深急流升羅嶼用丁未針經﨑頭山出雙嶼港升羅﨑頭俱可泊船﨑頭水深九托雙嶼港用丙午針三更船至孝順洋及亂礁洋雙嶼港口水流急孝順洋水深十二托泥地亂礁洋水深八九托取九山以行九山西邊有礁打水行船宜仔細一云亂礁洋水深六托泥地九山用單卯針二十七更過洋至日本港口打水七八托泥地南邊泊船又有從烏沙門開洋七日即到日本若陳錢山至日本用艮針福建使往日本針路梅花東外山開船用單辰針乙辰針或用辰巽針十更船取小琉球小琉球套北過船見雞籠嶼及梅花瓶彭嘉山彭嘉山北邊過船遇正南風用乙卯針或用單卯針或用單乙針西南風用單卯針東南風用乙卯針十更船取釣魚嶼釣魚嶼北邊過十更船南風用單卯針東南風用單卯針或用乙卯針四更船至黃麻嶼黃麻嶼北邊過船便是赤嶼五更船南風用甲卯針東南風用單卯針西南風用單甲針或用單乙針十更船至赤坎嶼赤坎嶼北邊過船南風用單卯及甲寅針西南風用艮寅針東南風用甲卯針十五更船至古米山古米山北邊過船有礁宜知畏避南風用單卯針及甲寅針五更船至馬屺山馬屺山南風用甲卯或甲寅針五更船至大琉球大琉球那霸港泊船土官把守港口至此用單卯及甲寅針行二更進那霸內港以入琉球國中那霸港外開船用單子針四更船取離倚嶼外過船南風用單癸針三更船取熱壁山以行熱壁山南風用單癸針四更船取硫黃山硫黃山南風用丑癸針五更船取田嘉山又南風用丑癸針三更半船取夢加刺山南風用單癸針及丑癸針三更船取大羅山大羅山用單癸針二更半船取萬者通七島山西邊過船萬者通七島山用單寅針五更船取野顧七山島內各呼兵之妙是麻山嶼野顧山用巽寅針二更半船旦午山用艮寅針四更船取亞甫山一云野顧山對面行六十里有小礁四五箇最宜畏避在北邊過船用艮寅方行一百五十里至旦午山用艮寅方行二百四十里至亞甫山亞甫山平港口其水望東流甚急離此山用艮寅針十更船取亞慈理美妙若不見此山用單艮針二更船又艮寅針五更船取沿灣奴一云沿渡奴烏隹眉山沿渡奴烏隹眉山用單癸針三更船若船開時用單子針一更船至而是麻山而是麻山南邊有沉礁名套礁一云名佐沉長礁東北邊過船用單丑針一更船是正路却用單子針四更船取大門山中大門山傍西邊門過船用單丑針三更船取兵褲山港兵褲港循本港直入日本國都按已上針路乃歷代以來及本朝國初中國使臣入畨之故道也頻年倭冦之入往往取間道突至便利特甚豫已稍從入冦圖中指畫然不欲條書之者恐傳者或貽姦孽以幸釁也有志於經世者須以意會之而得豫之所以不詳書焉斯善矣倭奴朝貢事略漢武帝建武中入貢帝滅朝鮮使驛始通使者自稱大夫光武中光六年入貢奉珍朝賀賜以印綬安帝永初元年入貢來獻生口百六十人願相見魏景初二年朝獻公孫淵誅後卑彌呼遣其大失難升米牛利等帶方物求詣天子朝獻太守劉夏遣使吏將送詣京師明帝詔賜卑彌呼為親魏王假金印紫綬以難升米為率善中郎將牛利為率善校尉假銀印青綬正始四年入貢卑彌呼遣大夫伊耆掖邪狗等八人獻方物詔拜掖邪狗苛率善中郎將各假印綬八年入貢卑彌呼死宗女臺與立率善中郎將掖邪狗來獻生口百珠雜錦物晉泰始初年入貢臺與遣使朝獻臺與死其國復立男王安帝時通表倭王讃通表江左文帝元嘉二年入貢讃遣司馬曹逹奉表獻方物讃死子珍立遣使入貢自稱使持節都督倭百濟斯羅任那秦韓慕韓六國諸軍事安東大將軍倭國王表求除正詔除安東將軍倭國王珍又求除正倭洧等十三人平西征虜冠軍輔國將軍等號詔並聽之二十年入貢倭王濟遣使奉獻復以為安東將軍倭國王二十八年加封王復入貢加使持節都督倭斯羅任那加羅秦韓慕韓六國諸軍事安東將軍如故并除所上二十三人職濟死子興遣使貢順帝升明二年入貢倭國王武遣使上表言自昔祖彌躬環甲胄跋涉山川不遑寧處東征毛人五十五國西服衆夷六十六國陵平海北九十五國王道融泰廓土遐畿纍葉朝宗不愆於嵗道經百濟裝飾船舫而句麗無道欲圖見吞臣亡考濟亡兄興並欲大舉問罪不幸奄喪父兄使垂成之功不獲一簣今欲練兵申父兄之志竊自假開府儀同三司其餘咸各假綬以勸忠節詔除武使持節都督倭斯羅任那加羅秦韓慕韓六國諸軍事安東大將軍倭王隋文帝開皇二年入貢倭王多利思北孤遣使詣闕上令所使訪其風俗使者言倭王以天為兄以日為弟天明時出聼政跏跌坐日出便停理務去委我弟文帝曰此大無義理訓令改之煬帝大業二年遣使入貢多利思北孤復遣使朝貢使者云聞海西菩薩天子重興佛法故遣朝拜兼有沙門數十人來學乾道國書曰日出處天子致書曰沒處天子無恙云云煬帝覽之不恱謂鴻臚卿曰蠻夷書有無禮者勿復以聞大業三年入貢報使也唐太祖貞觀五年入貢倭使入闕帝矜其逺詔有司無拘嵗許貢仍遣髙文表往撫之使者不宣朝命而回遣詳見出使事略永徽初年貢寶物遣使獻琥珀大如斗瑪瑙若五升器時斯羅為髙麗百濟所暴髙宗賜璽書令出兵援斯羅永徽二年夷使偕蝦蛦入貢倭使協蝦蛦人偕朝蝦蛦亦居海島中其鬚長四尺許珥箭于首令人戴瓠立數十步射無不中咸亨元年入貢遣使賀平高麗後稍習夏音惡倭名更號日本使者自言國近日所出以為名或云日本乃小國為倭所併故冒其號使者不以情故疑焉又妄誇其國都方數千里南西盡海東北限大山其外即毛人云長安元年入貢時遣真人粟田貢方物彼國真人猶唐尚書冠進賢冠頂有華四披紫袍帛帶粟田好學屬文進止有方且求書籍武后宴之麟德殿授司膳卿開元初年入貢仍遣粟田復朝請從諸儒授經詔四門助教趙玄默即鴻臚寺為師獻大幅布為贅悉賞物貨書以歸其副朝臣仲滿慕華不肯去易姓名曰朝衡歷佐補闕儀友文多所該載久乃還開元四年入貢彼國寶龜二年遣僧正玄昉入朝貢物開元二十四年入貢遣二僧靈仙行賀入唐禮五臺山學佛法元和元年入貢夷遣騰元葛野與空海大師及延厯寺僧澄入唐詣天台山傳教會昌元年入貢遣僧貢物入唐禮五臺佛法光啓元年入貢遣僧宗睿貢物入唐傳教大歷十二年入貢遣使表貢方物天寶十二年朝貢時朝衡復入朝貢物上元中擢左散騎常侍安南都護求內外經教及傳戒新羅梗海道更由明越州朝貢建中元年入貢夷遣使真人興能獻方物真人蓋因官而氏者興能善書其紙似繭而澤之莫曉何物所造貞元末年遣使入朝其王柏武遣使入朝其學子橘免勢屠空海願留肄業歷二十年使者高階真人來請免勢等俱還詔可貞元四年入貢遣文明使貢物後梁龍德中入貢遣僧寬建入貢方物宋雍熙元年入貢夷遣僧使大周然與其徒五六人浮海而至獻銅器十餘事并本國職員及年代紀各一卷大周然衣緑自云姓藤源父為真連真連官名其國五品職也大周然善𨽻書不通華言問其風俗但書以對云國中有五經書及佛法白居易集十七卷並得自中國交易用銅錢文曰乾文大寶銀以貢賦國王自古傳襲于今六十四世文武僚吏皆世官其皇系詳見年代紀上聞之嘆息謂宰相曰此島夷耳乃祚遐久其臣亦繼襲不絶此蓋古道也中國自唐季之亂郡縣分裂梁周五代享歷尤促大臣世胄鮮能嗣續朕雖得繼往聖嘗夙夜寅畏講求治本不敢暇逸建無窮之業垂可久之範亦以為子孫之計使大臣之後世襲祿位此朕之心焉又云其國多中國典籍大周然來復得孝經一卷即鄭氏注越王孝經新義第十五一卷即唐太宗子越王真新義者記室參軍任希古第撰也皆金縷紅羅標水晶為軸復求詣五臺許之令所過給食又求印本大藏經詔復許之端拱元年夷僧奉表來謝並貢方物大周然遣弟子喜奉表來謝曰日本國東大寺大朝法濟大師賜紫沙門大周然啓傷麟入夢不亡漢主之恩枯骨令歡猶亢魏氏之敵雖云羊僧之拙寧忘鴻濡之恩周然誠惶誠恐頓首頓首死罪大周然附啇船之離岸期魏闕于生涯望落日而西行十萬里之波濤難盡顧信風而東别數千里之山嶽易過妄以下根之卑適詣中華之盛於是宣旨頻降恣許荒外之跋涉宿心克協歷觀宇內之環竒况乎金闕曉後望堯雲于九禁之中巖局晴前拜聖登于五臺之上就三藏而稟學巡數寺而優遊遂使蓮華回文神筆出於北闕之北貝葉印字佛詔傳於東海之東重蒙宣恩忽趂來迹季夏解台州之纜孟秋逹本國之郊爰待明春初到舊邑緇素欣待侯伯慕迎伏惟陛下惠溢四溟恩髙五嶽世超黃軒之古人直金輪之新大周然空辭鳯凰之窟更還螻蟻之封在彼在斯只想皇德之盛越山越海敢忘帝念之深縱分百年之身何報一日之會染筆栻淚伸紙搖魂不勝慕恩之至謹差上足弟子傳燈大法師位嘉因併大朝剃頭受戒僧祚乾等拜表以聞稱其本國永延二年嵗次戊子二月八日又别啓供佛經納青朩函琥珀青紅白水晶紅黑朩槵子念珠各一連並納螺鈿花刑平函毛籠一納螺柸二口葛籠一納法螺二口染皮二十枚金銀蒔繪莒一合納髮鬘二頭又一合納三議正四位上藤佐理手書二卷及進奉物數一卷表狀一卷又金銀蒔繪硯一莒一合納金硯一鹿毛筆松煙墨金瓶水瓶鐵刀又金銀蒔繪扇莒一合納檜扇二十枚蝙蝠扇二枚螺鈿梳函一對其一納赤朩梳二百七十其一納龍骨一撅螺鈿書案一螺鈿書几一金銀蒔繪平莒一納白細布五匹鹿皮籠一納豹裘一領螺鈿鞍轡一副銅鐵鐙紅絲鍬泥璋倭畫屏風一雙石琉黃七百斤咸平五年來貢建州海商周世昌遭風飄至日本凡七年得還與其國人滕朩吉至上皆召見之世昌以其國人唱和詩來上詞甚雕刻膚淺無所取詢其風俗云婦人皆被髮一衣用二三縑又陳所記州名年號上令藤朩吉以所持朩弓矢挽射矢不能逺詰其故國人不習戰鬪賜木吉時裝錢遣還景德元年入貢遣僧寂照等八人來朝寂照不曉華言而識文字繕寫甚妙凡問答並以筆札詔號圓通大師賜紫方袍天聖四年入貢却之十二月明州言日本國太宰遣人貢方物而不持本國表詔却之其後亦未通朝貢南賈時有傳其物貨至中國者熙寧五年夷僧獻方物僧誠尋至台州止天台國清寺願留州以聞詔使赴闕誠尋獻銀香爐朩槵子白琉璃五香水晶紫檀琥珀所飾念珠及青色織物綾神宗以其逺人而有戒業處之開寶寺盡賜同來僧紫方袍是後連貢方物而來者皆僧也元豐元年入貢使通事僧仲回來賜號慕化懷德大師明州又言得其國太宰府牒因使人孫忠還遣仲回等貢絹二百匹水銀五千兩以孫忠及海商而貢禮與諸國異請自移牒報而答其物直付仲回東歸從之乾道九年入貢始附明州綱首以方物入貢倭船火兒滕大明歐鄭作死詔械太明什其網首歸治以其國之法淳熙二年入貢元至元八年遣使入朝九月髙麗王植遣其通事别將徐稱導送趙良弼使日本日本始遣彌四郎入朝帝宴勞遣之至元九年遣使來朝却之二月樞密院臣言奉使日本趙良弼遣書狀官張鐸來言去嵗九月與日本國彌四郎等至太宰府西守護所守者云曩為髙麗所紿屢言上國來伐豈期皇帝好生惡殺先遣行人下示璽書然王京去此尚逺願先遣人從使回報良弼遣鐸回其使二十六人至京師求見帝疑其國主使之來云守護所者詐也詔翰林承旨和爾果斯以問姚樞許衡等皆對曰誠如聖算彼恐我加兵故發此輩伺吾強弱耳宜示之寬仁且不冝聽其入見從之是月髙麗王植致書日本五月又以書往令必通好大朝皆不報至元十四年遣使易錢日本遣商人持方物交易錢許之大明洪武二年入貢太祖髙皇帝混一寰宇薄海之外莫不臣僕惟日本未至乃遣使臣趙秩往諭之詳見使倭事略其王良懷乃遣僧祖來進表箋貢馬及方物并僧九人來朝詔賜祖來等文綺及僧衣比辭遣僧祖闡克勤等八人護送還國仍賜良懷大統厯及文綺紗羅洪武十二年入貢夷船一隻稱貢緣無表文却之來人分發雲南川陜三邊安插洪武十三年入貢遣僧貢馬及茶布刀扇之類亦無表文以其私貢不納來人仍發三邊安插洪武十四年入貢十月國王良懷遣僧如瑶貢馬十匹及方物通有前來人船花名乃命行取赴京宴賞歸國會典記十二年貢者作七年十四年貢者作發三邊安插與南京禮部案不同必記者之誤耳通志作却其貢洪武十五年入貢使歸廷用入貢方物厚賞回還明州備倭指揮林賢在京隨駕時交通樞密使胡惟庸潛遣宣使陳得中密與設計令將歸廷用誣為倭冦分用賞賜中書省舉奏其罪流賢日本洪武十六年詔絶日本之貢賢流三年逆臣胡惟庸暗遣人充宣使私往日本取回就借精練兵四百與僧如瑶來獻巨燭中藏火藥兵具意在圖亂上大怒磔賢于市乃降詔責其君臣絶其貢祖訓云以日本隔海僻在一隅得其地不足以供給得其民不足以使令故不興兵致伐著為訓章絶其往來永樂二年入貢上命太監鄭和統督樓船水軍十萬招諭海外諸畨日本首先納欵擒獻犯邊倭賊二十餘人即命治以彼國之法盡蒸殺之今銅甑猶存爐竈遺趾在蘆頭堰降勑褒奬給勘合百道定以十年一貢船止二隻人止二百違例則以冦論制限進貢方物馬鎧硫黃貼金扇牛皮鎗盔蘇朩手箱塗金裝綵屏風刀劍灑金厨子灑金朩銚角盥灑金文臺描灑金金粉匣珠描金筆匣銚水晶數抹金提銅瑪瑙宣德元年入貢入貢人船踰數刀劍過多特諭來使令後貢船不過三隻使人毋過三百刀劍毋過三千不許違禁宣德七年入貢來使不知禮法甚擾于民禁之宣德十年入貢並奉表謝恩以八年遣使吊喪也正統七年入貢時貢船九隻使人千餘分發境清天寧各寺安歇朝廷雖責其越例以逺人慕化亦寬容之八年六月使回迷失使頭普福二人在樂清沙嵩膝嶺坊長孔希名護解把總遣回普福在途悲感有詩云來遊上國看中原細嚼青松咽冷泉慈母在堂年八十孤兒為客路三千心懷北闕浮雲外身在西山返照邊處處朱門花柳巷不知何日是歸年天順二年入貢至京師燕賞豐渥稇載而歸成化二年入貢時都指揮張翥洞燭其偽貢之姦而去成化十一年入貢諸使詣京沿途騷擾朝廷為禁約之成化二十年入貢六月使臣周璋入貢勑諭彼王也知會自後宜恪遵宣德中事例𢎞治八年入貢五月差使夀蓂入貢方物赴京沿途生事至濟寧強買貨物彼此殺傷罪及解官府照磨童釗指揮魏政提舉王昭俱降調通事林春充軍次年使歸司府失于檢點致鄞人朱縞填欠貨物而去正德四年入貢五月正使宋素卿副使源永春貢方物請祀孔子儀注朝議孔子中國聖人不當為夷狄褻瀆不許素卿者即鄞人朱縞其家鬻于夷商湯四五郎越境亡去至是充使入貢重賂逆瑾蔽覆其事蓋縞在倭國偽稱宗室苗裔傾險取寵輔庶奪嫡爭功要利而夷夏之釁遂釀于兹正德八年入貢五月夷船三隻使僧桂梧貢方物越嵗而去嘉靖二年入貢四月夷船三隻譯傳西海道大內誼興國遣使宗設謙道入貢越數日夷船一隻使人百餘復稱南海道細川髙國遣使瑞佐宋素卿入貢導至寧波江下時市舶太監賴恩私素卿重賄坐之宗設之上且貢船後至先與盤發遂至兩夷讐殺毒流廛市宗設之黨追逐素卿直抵紹興城下不及而還至寧波脅寧波衛指揮袁進奪舟越關而遁時備倭都指揮劉錦追賊戰沒于海定海衛掌印指揮李震與知縣鄭餘慶同心濟變一日數警而城以無患賊有漂入朝鮮者國王李懌擒獲中林望古多羅械羅京發浙江按察司與素卿監禁候旨法司勘處者凡數十次而夷囚竟死于獄倭奴自此懼罪伏誅不敢欵關者十餘嵗嘉靖十七年入貢五月夷船三隻使僧古鼎副使僧周良持方物表貢且求還前遺物法司以事巳經亂貨應入官且無從索之良等乃不敢言朝廷復申十年一貢之例責令送還正德巳前勘合更給新者遵照入貢嘉靖二十三年入貢是年六月夷船一隻使僧仆夀光等一百五十八人稱念無表箋且以非期却之嘉靖二十六年入貢四月使臣周良人船踰例且非貢期朝議欲却之以其逺來效順且貢期止隔一年乃發外海嶴山停泊至明年而後納之倭國事略日本即古倭奴國也去中土甚逺隔大海依山島為國邑隋書記在百濟新羅東南其地形類琵琶地勢東髙西下東西數千里南北數百里九州居西為首肥前肥後豐前豐後築前築後日向大隅薩摩陸嶴居東為尾至山城旱程七十五日舊云陸嶴為頭薩摩大隅為尾者非山城居中乃彼國之都也其國君以王為姓以尊為號後改稱皇初居日向築紫宫後徙山城國文武僚吏皆世其官有德仁義禮智信大小十二等及軍尼伊尼翼諸名山城以東地方廣邈雖倭奴逺服賈者不能閲歷而知况華人乎故其島之數可考按舊圖山城以東中為近江伊賀尾張三河美濃飛彈信濃上野陸嶴北邊海為但馬州後若佐加賀越前越中越後出羽甲裴常陸南邊海為攝摩攝津太和河內逺江駿河伊豆相摩武藏下野東北懸海則為佐渡在南懸海則為志摩七島上總下總安房而其間廣狹至到有不能考者今姑據豫之所聞者而述之山城之南為和泉其南海嶴泊舟者為阿賣介撒几為歪打阿波為于撒几為天王者為沙界衣又其南為沙界其地方甚小沙界之東南為紀伊東為三河出海之口為濵大海其島為康大為科什麼為奴智紀伊之西為伊勢北為三河其嶴為腰大為阿乃奴子山城之西為丹渡左為攝津其嶴為飄船谷為阿家世奴乎辣為素埋為男女懷東南懸海為安防州左之西為攝摩其嶴為那敗為舍箇世為抗茄為我這古為磨羅右為但馬右之西為因幡丹渡西為美作左為備前其嶴為兀什麼舵為茄賣茄里為多大左之西為備中出鐵其嶴為山子加為言奴乎為那什摩其南為連島懸海三十里右為因幡右之西為伯耆沿海俱白沙無嶴可泊其鎮為阿家殺記為倭子介為他奴賀知其北為竹島懸海三十里美作之西為備後之北境其嶴為一子該一知為子奴鼻為和奴密知為拿敗為赦東大出雲之南境其嶴為畨你為山子介為欽子溪為户流為非咑為失喇哈咑為也生忌為密和奴失記其北為隱岐懸海三百五十里備後之西為安藝其嶴為翁家搭曰昆敗為法子加一知為窟撒子為谷也為他加歪喇其南為宫島懸海三十里出雲之西為石見出銀與銅其嶴為南高番馬為畨馬搭為哥為撮奴市為有奴子北至海三十里安藝石見之西為山口國即古之周防州也橫直二百四十里其南邊海之嶴為翁哥里為密大遊里為東大為陀奴迷為哈迷奴失記為奴羅市米其北邊海之嶴為斯殺為賣抵哈扣為夜市為髙奴烏北至三島海面三百五十里山口之西為長門橫直皆二日程嶴為花浦為薰州為番記為倭委北至三島懸海三百五十里關渡在焉其西旱關為阿介馬失記抽分司設於此渡此而西為豐前橫五百里直四百里其嶴為可苦馬喇介襪次為大義地為野慢茄為阿世夜為暮治為一賣其南為豐後橫直皆六百里其嶴為福乃為倭几奴法賣為鎖孤舟為由奴烏喇為撒一基為烏四基又其南為日向橫直皆三百六十里其嶴為多故奴甫治豐前之西北為築前橫六百五十里直四百里其嶴為右勢為加菩里為加打也馬為多賣里為一萬字為奴打為世加為經字里為多罷為密那多為法哈噠即博多之别名也其北離伊岐島海面五百里西南為築後橫直皆二百五十里築後之南為大隅其南濱海之島為什麼烏思迷今之人訛傳為懸海懸海乃大漁舟也大隅與日向薩摩等連壤名為九州大隅之西為薩摩橫直皆三百六十里其嶴為暗孛喇為起麻子記為羊理南為康國什麼為罷里為拖馬里為強頭馬里為鸚哥里為年市米為仙臺為審孛署豐後東南懸海為土佐為伊豫為阿波阿波相近懸海為炎路土佐豐後之間為佐加關土佐至佐加關海面一百八十里佐加關至豐後海面七十里薩摩之北為肥後橫直皆五百里其嶴為牙子世六為阿麻國撒為昏為一種國撒介烏為開懷世利為噠加什為什噠加又其北為肥前橫直皆五百里其嶴為鐵來為言奴氣子為法司奴一計為客舍其內沿河泊舟交易之處為倭磨為知十歪為法一溪為夜間迷為坐迷子為迷坐骨知為一掃拂為愛奴乎喇為世子為迷古里為失撒為喃哥牙為雄婆哥為松本一名馬子喇為法麻撒几肥前西懸海為平户東西海面十里西北至博多海面四百五十里平户之西為五島五山相錯懸海而生其中有嶴可泊乃日本西境之盡處也過此西行越五六日四望無山直抵陳錢壁下此島與薩摩相去一千五百里與肥前相去四百三十里與平户相去二千五十里五島至山口必由平户經過其嶴為乃路為倭齊家為衣屋奴密為通記為達奴烏喇為烏苦為話哈噠北為多藝為伊岐橫直皆七十里至對馬島海面五百里為對馬島橫三百里其南嶴為哥為甘大哈東南為拂乃哥世西北為堆沙几為山谷為撒思乃為知六磨為你打北為倭奴烏喇其西北至髙麗也必由對馬島開洋各島之人俱至堆沙几撒思乃山谷三嶴開洋至髙麗之則失多順風一日約五百里南至琉球也必由薩摩州開洋順風七日其貢使之來必由博多開洋歷五島而入中國因造舟水手俱在博多故也貢舶回則徑收長門因抽分司官在焉故也若其入冦則隨風所之東北風猛則由薩摩或由五島至大小琉球而視風之變遷北多犯廣東東多則犯福建彭胡島分䑸或之泉州等處或之梅花所長樂縣等處若正東風猛則必由五島歷天堂官渡水而視風之變遷東北多則至烏沙門分䑸或過韭山海閘門而犯溫州或由舟山之南而犯定海經大貓洋入金塘蛟門犯象山奉化由東西厨入湖頭渡犯昌國入石浦關犯台州入桃渚海門松門諸港正東風多則至李西嶴壁下陳錢分䑸或由洋山之南而犯臨觀過漁山兩頭洞三姑山入蟶浦則犯紹興之臨山三山過霍山洋五嶼烈表平石則犯寧波之龍山觀海犯錢塘過大小衢徐公入龞子門赭山則薄省城或由洋山之北而犯青南過馬迹潭而西犯太倉過馬迹潭而西北或過南沙而入大江過茶山入瞭角嘴涉谷櫝狼福山而犯瓜儀常鎮若在大洋而風歘東南也則犯淮陽犯登萊過步州洋亂沙入鹽城口則犯淮安入廟灣港則犯揚州再越而北則犯登萊若在五島開洋而南風方猛則趨遼陽趨天津大抵倭舶之來恆在清明之後前乎此風候不常屆期方有東北風多日而不變也過五月風自南來倭不利於行矣重陽後風亦有東北者過十月風自西北來亦非倭所利矣故防春者以三四五月為大汛九十月為小汛其停橈之處焚劫之權若倭得而主之而其帆檣所向一視乎風實有天意存乎其間倭不得而主之也向之入冦者薩摩肥後長門三州之人居多其次則大隅築前築後博多日向攝摩津州紀伊種島而豐前豐後和泉之人亦間有之乃因商于薩摩而附行者也日本之民有貧有富如攝摩伊勢若佐博多其人以商為業其地方街巷風景宛如中華富者各數千家有積資至百萬者又如和泉一州富者八萬户皆居資貨殖有淑有慝如薩摩之鸚哥里方數千里其邑長安慶能納民于軌物無一人為盜又如宫島人不嗜殺人有不平事但請神廟罰錢乂如紀伊之頭陀僧三千八百房専習武藝殺人而不犯中國富而淑者或登貢舶而來或登商舶而來凡在冦舶皆貧與為惡者也山城君號令不行徒寄空名於上非若我中國禮樂征伐自天子出大一統之治也山口豐後出雲開三軍門如中國總督府之義各以大權相吞噬今惟豐後尚存亦不過兼并肥前等六島而巳肥前肥後築前築後豐前豐後山口出雲以貪滅亡山口原并國十二日石見長門安藝備前備後備中出雲伯岐丹後因幡但馬後出雲奪歸其地山口長子死焉其君亦為陶殿所殺豐後君以其弟攝山口事吞安藝安藝殺之嘉靖三十六年山口無君豐後獨稱雄焉山城君金印勘合久為山口所有向來入貢俱山口自主山城惟出名而已陶殿之亂宫殿勘合俱焚金印亦損一角不知所歸貢自此絶矣欲望彼國之約束諸夷斷斷乎不能也畿內部州五山城太河河內和泉攝津右共統五十三郡畿外郡道七東海道十四州伊賀三河伊勢逺江志摩駿河尾張伊豆甲裴上總相摩常陸武藏安房右共統一百一十六郡西海道九州竺前肥前竺後肥後豐前日向豐後大隅薩摩右共統九十三郡南海道五州紀伊伊豫炎路土佐阿波右共統四十八郡北陸道七州若佐加賀越前能登越中佐渡越後右共統三十郡東山道八州近江上野美濃下野飛彈陸嶴信濃出羽右共統一百一十二郡山陽道八州攝摩備後美作安藝備前周防備中長門右共統六十九郡山隂道八州丹渡伯耆丹後出雲但馬石見因幡隱岐右共統五十二郡海曲郡島三伊岐對馬多藝右各統二郡驛凡四百一十四户可七萬餘課約八十八萬三千三百二十九寄語島名山城羊馬失羅築前職骨前太和野馬多築後職骨骨河內茄懷知豐前孛前和泉因字米豐後蓬哥攝津子弩囚你肥前非前伊賀衣加肥後非谷伊勢衣舍日向兄加志摩大隅阿思米尾張倭阿里薩阿撒子馬三河迷茄懷逺江紀伊乞奴苦藝炎路山奴計駿河阿波挨懷齊伊豆因慈讃耆甲裴慨怡苦藝伊豫伊右相摩土佐拖撒武藏朩撒暑山口即周防羊馬窟諸安房阿穵美作迷馬撒家備前避然上總茄迷倭撒下總什麼倭撒備中避晝常陸備後避卧若佐壞加柵安藝阿計越前曰智前攝摩法里馬越中日晝長門奴茄多越後日清谷丹渡丹白加賀坑茄丹後丹哥能登奴朵但馬噠什麼佐渡沙渡因幡奚奴白近江多島米伯耆花計美濃米奴出雲因字朩飛彈非大智石見信濃申阿農隱岐和計上野康子計伊岐尢計女島下野什麼子計陸嶴話收多藝出羽迷外宫島迷挨什麼五島我島男島賀什麼小島科什麼對馬島則什麼連島卒賴什麼種島他尼什麼博多花哈嗒竹島他計什麼平户佐加關三島密什麼寄語雜類天文類天天帝日虛露月秃計星付泥風有朱加前雲雨挨迷霧吉利雪計伏六攸計霜名末辟滿落雨挨迷付魯時令類早來運梭梭發耀夜搖落午非路晚搖撒田午明挨介水暗骨辣水冷三孛水暖挨掇水今日詐以呼雞聲介喬明日挨迷亞失日後日亞撒里昨日傑奴前日阿多惟日暮非故路路今日來個阿耶俚明日來挨戊打俚後日來挨殺核阿耶俚地理類地大樣禿智山羊賣耶賣水明東海烏彌沙何吉大水石闕水在朩古火非鄉羊埋俚江扛谷計方向類東熏加南迷南來西義西北尢兀俚前日皆門利婆後吾失利珍寶類金空措泥銀失祿揩泥珠他賣錢前移黃銅中若佐紅銅鶯更楷尼水銀明東楷尼好銅錢姚禮善尼人物類皇帝大利天王家里官大米烏野雞百姓别姑常公翁知大官大大烏野雞婆猶蒲翁妃父阿爺母發發兄挨尼嫂阿尼尢尼弟阿多多妹亞尼多一沒多姊亞尼嬸完多子莫宿哥姪何義女莫宿眼孫阿奚胡來丈人子多丈母子多謬叔何治王官老前丈夫夀山婦人倭家倒老秃古要個男子何奈公姑後生倭家逹孩歪鼻親眷新雷姐夫不哥迷朋友道門大聖滿門大帝女壻米哥僕三三字郎小厮歪皆水和尚才老烏索老實人埋骨多艱難人胡奈故人門厥人強盜六宿鼻隨瞎子眉骨賴獨眼人密皎關鴻你撫哥了梭里誰人搭梭我何埋俚阿奴利徒弟加食難財主妻斗島賣生得好眉眉月失眉眉姚水外甥萌哥長子難解水媳婦嫌妙報長吊年少華蓋主人床杲朵生得醜魯歪失聰明力哥貴他介水賤那塑羊㵨富烏多哥貧腮東旦乞丐寬需計好淫梭羅年紀一故都麻子莫入骨水村孫拐科水非計賊陸宿人人事類要坡水水不要依也立達子等待埋祖眠羊逹路烏將卒拿來未低吉反俚未得哥巳拿去未底於古相擾括計括盆亂説思量骨多莫話介反俚看覔見迷路不送何埋解邵賣嬉挨核蒲坐移路阿將梭病羊埋依子揖罵寬彼計乃俚話鸞褪皮鼾因彼計詈烏論羊埋水烏蠻爺計睡密路去漫陀罷獺俚旦多在何故伊虜何耶路不在論速持疏來何耶俚吉人便來羊佯地何爺俚慢陀的如回來慢慢的耶俚便去密路快來發下何耶俚法古送與我面皮愛惜搖落扛滿怕倭踈路路出去一一計前行殺雞倭行挨龍門喜一啜水咷羅打步説話未納恝打俚怠慢難利骨多罵山奴飲那慕獨樂哥賣羞愧畨助山水水喫何賣利安排蘇路不來未旦盧賈矢走法古快去法古計打人生亞達達個借脡路各夾買賣烏禮加不吃了禁哥唱嘔天莫怪哥面乃禮多喫酒何賢鼻旦教何水尢路喫酒麻黑殺雞那里去陀姑移姑添所有路路行路的益磨滅曉得個個俚打夫大賣烏路無六呌人多奴老實説話買多溢多痛一水起身倭達的援多多喫了前行哥遊西孫步還了諧也數不曉得措賴路不失打殺其奴瞎呾郎請人家那多慢慢的買得買得害夭不賣烏魯賣加恁麼賣難烏禮作肚飢勳大路水哭乃古多少一故賴介打胡子有情亞姊吉乃無情亞姊吉乃乃水醉邀帶換皆賀無工夫一孫水怪發賴旦多堅固死身大腫剌大喚加右笑歪罷活吉打買加利輸埋計打利傷寒雞骨寫字加計身體類耳眉眉口骨上鼻發奈眉賣手鐵足挨身心個個路頭客成賴鬚薰計髮措勝夾迷肚發賴指尢皮􅏨卒齒法器用類小刀厯過乃空客打乃中刀歪計柴需大刀濶中撻打奈刀柄脫介俚甲大買路弓油米盒子剛白哥紙揩袂加迷硯孫助俚尊力子砂石揩路依水筆粉地墨踈煤薄紙沃蠻子扇黃旗鎖哥利素厚紙沃速子船浮泥針快利法利鑰匙坑其鑊難皮磨刀石依水泥銅扇法古黃旗帚花雞泥金扇空措泥黃旗等子發介俚小箱法哥硯箱孫助利法哥酒盞曬加藤計鋸拿剛繫利碟曬賴沙賴銀硃失祿挨揩水鏡坑皆彌枕麻骨賴埋骨賴麝香射哥漆烏論水席不奴朩香朩哥傘隔落隔曬盤何水雞沉香沉哥筯法水碗倭吉貼灣酒瓶哭笋昆皮梯課水飛計香宣哥衣服類衣服乞麻俚靴骨都鞋水托里失其里箬帽搖婆俚錦歪帶氊衫迷奴手巾避昻個綿布朩綿夏布奴奴綿被伏思麻飲食類茶解素酒曬箕白酒明東曬箕燒酒隔辣曬箕老酒福祿晒飯密黍飲酒晒加乃鹽失河收河喫飯密黍阿羅醬彌沙米科眉科眉油挨蒲賴大麥烏蒙﨑小麥柯蒙﨑榖暮米倭米羮水路豆磨米肉恕恕笋乾大吉糯古醬瓜可羅米糯花朩類杉松計檜去那雞松埋止梅子面婆水芥恝辣水菜奈瓜烏埋麻莫入骨水茄乃沈皮鳥獸類牛胡朩狗意奴豬豕豕雞􅎲泥掇地泥環多禮鵝解加馬烏馬魚遊河蟹揩泥蝨失辣水羊羊其鼠眠助米數目類一丢多子丢徵多一箇個利二扶達子丢咀多三密子倐呾多四學子搖搖做五意子子難難多六後子七乃乃子八效子九個個乃子十多十一多多丢達子五十大百法古千借一貫萬慢亦通用類有挨路迷路無乃好髙髙的姚鎖盧極好明哥多不好由無乃大加小思姑奈何計小發篩少索古乃水多快都河河水逺多俟近的個廋牙十大短迷加細相快大引骨蒒路厚挨卒水薄溫卒水歪貨不髙歪賴水破羊鈸里里不是松田乃係要緊馬多合子緩慢大慢大無用設計多有何何水未慢大香于牌水臭骨蒒水倭船日本造船與中國異必用大朩取方相思合縫不使鐵釘惟聨鐵片不使麻筋桐油惟以草塞鏬漏而巳名短水草費功甚多費材甚大非大力量未易造也凡冦中國者皆其島貧人向來所傳倭國造船千百隻皆虛誑耳其大者容三百人中者一二百人小者四五十人或七八十人其形卑隘遇巨艦難于仰攻苦于犁沉故廣福船皆其所畏而廣船旁陡如垣尢其所畏者也其底平不能破浪其布帆懸于桅之正中不似中國之偏桅機常活不似中國之定惟使順風若遇無風逆風皆倒桅蕩櫓不能轉創故倭船過洋非月餘不可今若易然者乃福建沿海姦民買舟於外海貼造重底渡之而來其船底尖能破浪不畏橫風鬪風行使便易數日即至也凡倭船之來每人帶水四百斤約八百碗每日用水六碗極其愛惜常防匱乏也水味不同海水鹹不可食食即令人泄故彼國開洋必與五島取水將近中國過下八山陳錢之類必停舶換水所以欲換者冬寒稍可耐久若五六月蓄之桶中二三日即壞雖甚清洌不能過數日也海洋浩渺風濤叵測程不可計遇山而汲亦其勢耳盥沭浴海水山水皆可用或云浴海水令人膚裂近訪之不然但黑肌膚而巳倭奴有一祕法煮泉一二沸置之缸缶能令宿而不壞然亦不過半月久則不能也其至普陀必登者非換水亦非真欲焚香乃覘兵防虛實耳倭好昔賈誼上三表五餌之術知倭國之所好則餌在是而悟所以制之之術矣故志之絲所以為織絹紵之用也蓋彼國自有成式花樣朝會宴享必自織而後用之中國絹紵但充裏衣而巳若畨舶不通則無絲可織每百斤直銀五六十兩取去者其價十倍絲綿髠首裸裎不能耐寒冬月非此不暖常因匱乏每百斤價銀至二百兩布用為常服無綿花故也綿紬染彼國花樣作正衣服之用錦繡優人劇戲用之衣服不用紅線編之以綴盔甲以束腰腹以為刀帶書帶畫帶之用常因匱乏每百斤價銀七十兩水銀鍍銅器之用其價十倍中國常因匱乏每百斤賣銀三百兩針女工之用若不通畨舶而止通貢道每一針價銀七分鐵錬懸茶壺之用倭俗客至飲酒之後啜茶啜巳即以茶壺懸之不許著物極以茶為重故也鐵鍋彼國雖自有而不大大者至為難得每一鍋價銀一兩磁器擇花樣而用之香爐以小竹節為尚碗碟以菊花稜為尚碗亦以葵花稜為尚制若非觚雖官窑不喜也古文錢倭不自鑄但用中國古錢而巳每一千文價銀四兩若福建私新錢每千價銀一兩二錢惟不用永樂開元二種古名畫最喜小者蓋其書房精潔懸此以為清雅然非落欵圖書不用古名字書房粘壁之用廳堂不用也古書五經則重書禮而忽易詩春秋四書則重論語學庸而惡孟子重佛經無道經若古醫書每見必買重醫故也藥材諸味俱有惟無川芎常價一百斤價銀六十七兩此其至難至貴者也其次則甘草每百斤二十金以為常氊毯馬皆氊王家用青官府用紅粉女人搽面之用小食籮用竹絲所造而漆飾者然惟古之取若新造則雖精巧不喜也小盒子也亦然漆器文几古盒硯箱三者其最尚也盒子惟用菊花稜圓者不用醋按日本所貢倭扇描金盒子類皆異物也其所悅於中國者皆用物也是彼有資於我而我無資於彼忠順則禮之悖逆則拒之不易之道也若徇其求而愆期許貢無端互市斷斷乎不可冦術倭奴之勝我専以術也即以其術還治其人不必用古兵法蔑不勝矣故志之倭夷慣為蝴蝶陳臨陳以揮扇為號一人揮扇衆皆舞刀而起向空揮霍我兵蒼皇仰首則從下砍來又為長蛇陳前耀百腳旗以次魚貫而行最強為鋒最強為殿中皆勇怯相參賊每日雞鳴起蟠地會食食畢夷酋據髙坐衆皆聽令挾册展視今日劫某處某為長某為隊隊不過三十人每隊相去一二里吹海螺為號相聞即合救援亦有二三人一隊者舞刀橫行人望之股栗逺避延頸授首薄暮即返各獻其所劫財物毋敢匿夷酋較其多寡而嬴縮之每虜婦女夜必酒色酣睡劫掠將終縱之以焚煙熖燭天人方畏其酷裂而賊則抽去矣愚紿我民勿使邀擊自為全脫専用此術賊至民間遇酒饌先令我民嘗之然後飲食恐設毒也行衢陌間不入委巷恐設伏也又不敢沿城而行恐城上拋磚石也其行必單列而長緩步而整故占數十里莫能近馳數十日不為勞又陳必四分五裂故能圍對營必先遣一二人跳躍而蹲伏故能空竭吾之矢石火炮衝陳必伺人先動動而後突入故乘勝長驅戰酣必四面伏起突繞陳後故令我軍驚潰每用怪術若結羊驅婦之類當先以駭觀故吾目眩而彼械乘慣雙刀上誑而下反掠故難格耙鎗不露竿突忽而擲故不測弓長矢巨近人則發之故射命中斂迹者其進取也張揚者其外遁也故常橫破舟以示遁而突出金山之圍造竹梯以示攻而旋有勝山之去將野逸則逼城欲陸走則取䑲或為穽以詐坑或結稻稈以絆奔或種竹簽以刺逸常以玉帛金銀婦女為餌故能誘引吾軍之進陷而樂罷吾軍之邀遊俘虜必開塘而結舌莫辨其非倭故歸路絶恩施附巢之居民故虛實洞知賞豐降虜之工匠故器械易具細作用吾人故盤詰難向導用吾人故進退熟預籍富室姓名而次第取之故多獲宿食必破壁而處乘髙而瞭故襲取無機間常一被重圍矣餌以偽䤋而逸之或披簔頂笠沮溺於田畝或雲巾紵履蕩遊於都市故使我軍士或遇而投賊或疑而殺良江海之戰本非其所長亦能聨虛舟張弱簾以空發吾之先鋒捐婦女遺金帛以弭退吾之後逐凡舟之裙墻左右悉褁布帛被褥而濕之以拒焚擊交閧間或附蓬而飛越即雷震而風靡矣冦虜我民引路取水早暮出入按籍呼名每處為簿一扇登寫姓名分班點閘真倭甚少不過數十人為前鋒冦還島皆云做客回矣凡被我兵擒殺者隱而不宣其鄰不知猶然稱賀倭刀刀有髙下技有工拙倭之富者不吝重價而制之廣延髙師而學之其貧者所操不過下等刀耳善運刀者在前衝鋒可畏頗有限也中國人不知望之輒震而避焉擒獲夷刀亦莫辨高下混給兵士故志之大小長短不同立名亦異每人有一長刀謂之佩刀其刀上又插一小刀以便雜用又一刺刀長尺者謂之解手刀長尺餘者謂之急拔亦刺刀之類此三者乃隨身必用者也其大而長柄者乃擺導所用可以殺人謂之先導其以皮條綴刀鞘佩之於肩或執之於手乃隨後所用謂之大制又有小裁紙設機刀出長門號兼常者最嘉又有作贄禮賀禮不拘大小名雖為刀其實無用上等上庫刀山城國盛時盡取日本各島名匠封鎖庫中不限嵗月竭其工巧謂之上庫刀其間號寧久者更加世代相傳以此為上次等備前刀以有血漕為巧刀上或鑿龍或鑿劍或鑿八幡大薩蕯春日大明神天照皇大神宫皆其刑著在外為美觀者如匠人製造之精不論刀大小必於柄上一面鐫名一面刻記字號以為古今賢否之辨鎗劍亦然籌海圖編卷二
