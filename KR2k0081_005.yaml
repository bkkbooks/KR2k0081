body:
  text: 籌海圖編卷五明胡宗憲撰全浙沿海總圖溫州府圖台州府圖寧波府圖紹興府圖杭州府圖嘉興府圖浙江兵防官考兵制附浙江倭變紀浙江事宜浙江兵防官考總督浙直福軍務兼巡撫浙江都御史専駐本省巡浙江舊無撫嘉靖丁未因海冦作亂始設提督軍務兼巡視浙江福興泉漳地方僉都御史以朱紈為之紈去王忬代忬去李天寵代天寵去胡宗憲代時乙卯七月也先是宗憲以巡按御史督兵王江涇大獲克捷詔許論功之日不次擢用故有是命其總督之名則因廷臣建議福浙直事權不一設自張經始周珫楊宜相繼後命宗憲庚申以剿賊首徐海王直等功纍升太子太保兵部尚書仍節鎮云巡按浙江監察御史兼紀功督察直浙軍務侍郎嘉靖三十四年因倭特敕趙文華任事寧即歸非常設也視軍情官嘉靖三十七年因倭冦不靖兵部奏設敕命職方司署郎中事主事唐順之任歷升太僕少卿右通政仍在地方行事未幾升鳯陽巡撫去總督備倭舊以公侯伯領之洪武三十年改領於都指揮今革巡視海道副使舊制以侍郎都御史領之洪武三十年後始領於按察副使統理浙海住劄寧波近因地方多事各郡俱設兵備以分巡兼之其沿海兵糧則海道督理如故不分也整飭杭嘉湖兵備副使整飭溫處兵備副使整飭寧紹兵備副使添設台金嚴兵備僉事鎮守浙直地方總兵官分守杭嘉湖參將分守溫處參將分守寧紹參將分守台金嚴參將遊擊將軍定海備倭把總以都指揮體統行事昌國備倭把總以都指揮體統行事金鄉備倭把總以都指揮體統行事臨觀備倭把總以都指揮體統行事海寧備倭把總以都指揮體統行事松門備倭把總以都指揮體統行事統領遊兵把總沿海衛所洪武十七年信國公湯和經略沿海備倭凡衛所城池巡司關隘寨堡屯堠皆其所定金鄉衛屯軍六百八十四名蒲門所壯士所沙園所溫州衛屯軍二千七百一十七名海安所瑞安所平陽所盤石衛寧村所蒲岐所盤石後所松門衛旗軍一百九十七名屯軍楚門所隘頑所海門衛屯軍六百八十三名新河所海門前所健跳所桃渚所昌國衛爵溪所錢倉所石蒲前後二所定海衛大嵩所霩􅛾所穿山後所舟山中中中左二所觀海衛龍山所臨山衛三山所瀝海所紹興衛三江所直𨽻都司海寧所海寧衛屯軍一千二百四十名澉浦所乍浦所沿海巡檢司溫州府龜峯弓兵一百名舥艚弓兵一百名江口弓兵一百名仙口弓兵一百名梅頭弓兵一百名中界弓兵一百名館頭弓兵一百名蒲岐弓兵八十名三山弓兵八十名小鹿弓兵八十名沙角弓兵八十名台州府盤馬弓兵八十名長浦弓兵一百名蛟湖弓兵一百名蔓嶴弓兵一百名竇嶴弓兵一百名越溪弓兵一百名鐵場弓兵一百名石浦弓兵三十名長亭弓兵一百名陳山弓兵三十五名趙嶴弓兵一百名塔山弓兵一百名鮚弓兵一百名寧波府太平弓兵一百名霞嶼弓兵一百名穿山弓兵一百名長山弓兵一百名甬東弓兵一百名管界弓兵一百名螺峰弓兵七百名岑江弓兵一百名岱山弓兵一百名寶陀弓兵一百名松浦弓兵一百名紹興府向頭弓兵一百名三山弓兵一百名眉山弓兵一百名廟山弓兵一百名黃家堰弓兵一百名三江弓兵一百名白洋弓兵一百名杭州府赭山弓兵一百名石墩弓兵七十名嘉興府澉浦弓兵七十名海口鎮弓兵七十名乍浦弓兵七十名白沙灣弓兵七十名沿海關臺寨烽堠金鄉衛寨十一廟背大嶴嶼門炎亭舥艚大獲小獲野小魚石塘野大魚石砰烽堠十五半塘馬跡尖山鳯凰白﨑猫頭上洋東山畢灣䝉灣東岡蘭頭嶺門門舥艚奠山蒲門壯士二所臺二髙陽水竹烽堠六雷嶴四裘尖山南堡時家懸中沙園所寨四陡門仙口眉石北眉石南臺一眉頭烽堠四冷水仙口宋埠烽火溫州衛海安所寨二上塢東山平陽所寨三風火口汶路江萊臺二山項山蔡家烽堠三福泉峯瑞半嶺盤石衛臺二黃華灣白沙烽堠十岐頭章嶴平山沙角嶼山三嶼池嶴雙峯洋田日團海村所寨三沙溝長沙沙寧烽堠六黃石浦七甲沙溝長沙沙村九甲蒲岐所臺二髙嵩下堡烽堠八東山鏵鍬南浦婁嶴海塘頭下山前塘門雙陡松門衛臺一小高烽堠十甘嶴車路蒼峯沙腳烏沙磊石荒嶴盤馬蛤浦寨松門隘頑所臺一白巖烽堠九長沙後灣岐門江館驪頭靈門長山坑雀海㑹蓬楚門所寨堡一楚門烽堠十五漁井泥湖洋坑楚門梅嶴丫髻石橋苔山清港山小青東門山大青西門塔山馬鞍山海門衛臺三眉山束中中鎮烽堠五磊石外水輕盈中山長沙新河所烽堠五洋嶴盤馬泥嶴新場淨應桃渚所臺一桃渚烽堠十二石柱涸井停嶼蒼埠長跳山大荆獅子山下舊城嶼頭樓望火舥孛頭中舊城健跳所臺一髙鸞烽堠五茅頭西小漁拆頭西大魚後沙昌國衛烽堠九仁義前山赤坎後山黃沙山頭松嶴烏石何家爵溪所烽堠二公嶼沙嶺錢倉所烽堠五石浦前後所烽堠六定海衛寨二江北長山關一南關烽堠十一高山鸕鷀竺山山淘小山山打鼓張師鋪長山風大尖閘季嶼大魚灣大嵩所烽堠八大干尖﨑崑亭港口黃巖橫山慈嶴蛤嶴舟山所寨三千西碶沈家門臺一青雷頭烽堠二十一外湖石同石牆鹿頸包家蒲沙西山竒嶴碇小展赤石弔嶼接侍程家石禪碶即宋謝浦碶袁宋舟山螺峯沈家門穿山後所臺一神堂烽堠九西山鍋蓋碶頭白峯所後所嵩子山嶼山黃﨑撩蝦埠霩􅛾所臺一三塔山烽堠五盛嶴觀山髙山蝦􅦟梅山觀海衛關三丈亭柱湖長溪烽堠六向頭新浦瓜誓古窑西隴山西隴尾龍山所臺一龍山烽堠五龍頭青溪頭尾山施公石塘臨山衛臺一羅家山烽堠九趙港池荷花烏盆方路廟山道塘周家路下蓋山四門瀝海所臺一西海塘烽堠三槎浦槤樹胡家池三山所烽堠七歷山撮嶼眉山蔡山徐家路吳山滸山紹興衛三江所臺一蒙池山烽堠六杭塢山宋家樓馬鞍山周家墩烏峯山桑盆直𨽻都司海寧所寨一黃灣臺六下館格路松林浦潘家丁家村禇家圖烽堠五尖山赭山廟前山石墩巖門山海寧衛寨二北鋪藍田臺六南臺北臺麥家涇九里亭朱家亭三間塞烽堠一藍田澉浦所寨四西山嘴混水閘南海口葫蘆灣臺二東園缺烽堠五青山墻山西山廟山泰駐山乍浦所寨七獨樹林蒲山外梁莊大金家灣梁莊舊唐家灣長沙灣臺七獨樹林聖妃宫益山惹山西山嘴東山嘴蒲西山烽堠三陳山觀山髙公山浙江倭變紀洪武二年倭犯溫州中界山永嘉玉環諸處皆被剽掠六年掠海濱七年靖海侯吳禎敗倭於琉球洋倭擾海邊禎遣舟師追逐之及於琉球洋中斬獲甚衆悉送京師十六年冦金鄉小濩亭官兵敵却之二十六年冦小尖亭二十七年冦小尖亭三十四年九月冦蒲岐所永樂二年四月冦穿山百户馬興與戰死之日本國王源道義知之出師獲其渠魁來獻黨類悉就擒朝廷嘉其勤誠降敕褒論餘詳見出使事略卷中二十年冦浙東朱亮祖徐忠擊敗之亮祖破之於溫州忠破之於桃渚斬獲獻俘由是賊始知戢斂云二十二年冦象山縣縣丞宋真教諭蔡海死之直持竿擊賊海罵賊不屈皆被害正統四年陷大嵩所昌國衛賊舟四十餘夜入大嵩港襲破所城轉冦昌國衛城亦陷備倭等官以失機被刑者三十六人惟爵溪所以獲賊首畢善慶得免八年六月冦海寧乍浦諸處十月冦壯士所景泰六年冦健跳所成化二年冦陷大嵩所賊僞稱入貢官軍不為嚴備遂襲破大嵩官兵夜圍其舟檣燈達曙不移舟巳乘潮遁去燈皆懸於蒿端蒿卓沙上蓋設詐以疑追兵也臺閫大臣以失機獲罪嘉靖十九年賊首李光頭許棟引倭聚雙嶼港為巢光頭者福人李七許棟歙人許二也皆以罪繫福建獄逸入海勾引倭奴結巢於霩􅛾之雙嶼港其黨有王直徐惟學葉宗滿謝和方廷助等出沒諸畨分跡剽掠而海上始多事矣二十七年四月都御史朱公紈遣都指揮盧鏜副使魏一恭等搗雙嶼港賊巢平之賊首李光頭就擒時海壖多警軍無紀律浙福二省互相抵牾賊得肆志議者請設巡視都御史以節制之上命朱公紈行公至即行二省守巡諸官各分信地或戰或守皆有専責而以福建都指揮盧鏜諳海上事即以委之鏜乃與海道副使魏一恭備倭指揮劉恩至張四維張漢等部署兵船集港口挑之賊初堅壁不動逮夜風雨昏黑海霧迷目賊乃逸巢而出官兵奮勇夾攻大勝之俘斬溺死者數百人賊酋許六姚大總與大窩主顧良玉祝良貴劉竒十四等皆就擒鏜入港燬賊所建天妃宫及營房戰艦賊巢自此蕩平餘黨遁往福建之浯嶼鏜等復大敗之翼日賊船有泊南麂山女兒礁洞門青嶴者知巢窟巳破無所歸去之下八山潜泊五月官兵築雙嶼港朱公初欲於雙嶼立營戍守為一勞永逸之計而平時以海為生之徒邪議螽起搖惑人心沮喪士氣福兵亦稱不便朱公歎曰濟大事以人心為本論地利以人和為先不得已從衆議聚木石築寨港口由是賊舟不得復入而二十年盜賊淵藪之區至是始空矣時二十五日也六月賊首許棟就擒二十日金鄉衛指揮吳川追攻於近山海洋賊船為我所迫又遇暗礁舟覆所遺才二人棟與其弟社武也官兵擒之積年巨冦一旦生俘之蓋天意假手云王直徐惟學毛烈收其餘黨復肆猖獗廣東賊首陳思盻自為一䑸與直弗協直用計掩殺之由是海上之冦非受直節制者不得自存而直之名始振聾海舶矣直以殺思盻為功叩關獻捷求通互市官司弗許三十一年王直移巢烈港直既破陳思盻求市不得乃引倭夷突入定海關官兵却之遂移泊金塘之烈港亡命之徒日益附之由是邊海郡邑無處無賊矣四月攻遊仙寨百户秦彪戰死詳見遇難徇節考五月攻瑞安縣百户李潮髙良戰死初十日賊自江口登犯嶺門岐頭等處入坡南滙至暸髙山下潮等與戰死之遂乘勝攻縣城把總夏光知縣劉畿率官兵擊却之賊乃退泊東山港陷黃巖縣二十八日福清賊首鄧文俊等率倭夷二千直入縣中焚燬縣治居七日而出時縣無城而賊乘潮猝至故陷六月賊攻霩􅛾所指揮樊懋力戰死之二十日賊以破黃岩得利復攻所城二十日夜半乘雷雨先以草人用竹揭試遂入城懋急督兵力戰死之時守禦指揮魏英督兵夜戰至天明賊從北門而出十一月參將湯克寬追擊賊於馬下洋大敗之擒賊首鄧文俊等十二日克寬統兵追黃華之賊與戰於下馬海洋越三日復戰遂擒文俊以歸三十二年閏三月官兵追搗烈港賊巢王直敗走烈港地形曲折賊負固盤據卒難進剿都御史王公忬躬至溫州閲圖審形謂兵船雖多難以直騁乃令參將俞大猷湯克寬分為二哨部署既定大猷由列表門進以當其前克寬由西後門進以防其逸謂賊一出則一哨可以追剿不動亦可以全制也至是大猷募熟諳山脉徑路之人侯得等潜入賊營期以十一日舉火為號而自移營本嶴距賊巢止隔一山分遣把總張四維屯龍山黎秀屯霩􅛾遙為聲援夜四鼓侯得等縱火賊營烟焰蔽天官兵乘之賊驚奔爭舟死者無算乃大敗走直率精鋭潰圍而去泊馬蹟潭軍門以大猷并兵獨進雖破賊巢而違我節制使賊得逸深責之四月賊攻海鹽縣初四日賊自太倉上海而來攻縣城三日始解去城外民居悉為煨燼矣尋至海寧衛把總馬呈圖等與戰死之初六日賊至海寧衛馬呈圖督官兵禦之弗勝遂與指揮宋煉百户王相姜楫吕鳯姚岑皆殁于行陳既而把總王應麟率兵追逐之與戰于海口巡司大勝之賊以伏兵衝我師我師遂潰千户王繼隆百户楊臣康綬亦死焉參將湯克寬破賊於鱉子門初九日犯平湖官兵追之連戰皆敗蔡指揮等死焉王公命克寬往剿之及於鱉子門大破之俘斬二百六十有竒賊薄省城指揮吳懋宣禦之於赭山死之懋宣率僧兵禦之力戰而死賊攻松門衛把總劉恩至追擊於舟山岑港大敗之賊初至勢甚猖獗攻衛城弗克而去蓋依王直為窩者也陷昌國衛百户陳表死之詳見遇難徇節考賊犯定海官兵擊敗之賊皆雞鳴山人沿海為患十二日都司劉恩至破之於蘆花港口官兵進剿馬蹟潭王直敗之十四日湯克寬等兵船進搗賊巢大敗之因炮聲驚起蟄龍官兵覆溺者甚衆直遂走直𨽻地方俞大猷又追敗之所存僅百餘人陷臨山所參將俞大猷等追擊大敗之草四日大猷與都指揮劉恩至俘斬三百有竒犯長沙灣參將湯克寬敗之五月賊攻海寧衛破乍浦所百户陳綬指揮陳善道死之賊自金山而來城破綬死之善道從湯克寬率兵來援與賊戰於長沙灣與冠帶總旗張儒皆死之攻新河所時兩浙之賊充斥郊野所過殘破村落為墟而乍浦以東達於直𨽻之柘林二百里之地皆為賊巢矣湯克寬兵勝於葉謝港副使李文進副總兵俞大猷兵勝於蓮花洋俘斬雖多而賊猶不知戒云七月賊攻台州寧海縣初四日攻城凡七日而解三十二年八月都指揮劉恩至等迎擊直𨽻遁賊於普陀山洋敗之先是賊首蕭顯屯直𨽻之崇明南沙修船為遁歸計都御史王公忬計其勢必流入浙境預令都指揮劉恩至指揮張四維百户鄧城等分為二哨一自觀海臨山趨乍浦遏賊來路一自長途沈家門設伏邀擊賊果南遁官兵與遇於普陀落伽山臨江海洋連與戰皆勝之零賊敗登普陀依險為巢掘塹自衛參將俞大猷督官兵進攻之二十二日夜自石牛港進張疑整衆而不與交戰潜遣竒兵由西北巡檢嶴直入百户鄧城武舉火斌黎俊民陷陳先登賊遂敗走茶山絶頂翼日鄧城由東北淺步沙進火斌由鸚哥岩進黎俊民由中路進劉恩至等統大兵居其後四面齊進俘馘無遺九月都指揮盧鏜敗賊于乍浦十二月賊攻瀝海所千户張應奎百户王守正張永死之三十三年三月都指揮劉恩至等敗賊於三嶽山賊至三嶽山恩至與指揮張四維督舟師進攻勝之尋與指揮潘亨㑹兵再戰又勝之賊乃由赭山遁去歷曹娥三江歷餘姚直走定海之王家團賊首蕭顯流突海鹽官兵追擊大敗之於二十里亭追至慈溪平之顯叛結倭夷連䑸入冦首犯直𨽻之上海盤據南沙劫邑攻城號稱劇冦自松江敗衄遂率精悍數百遵海而南王公命官兵設伏於要路賊至二十里亭復大敗走顯復統百餘梟鋭南奔官兵乘之逐於三江銼於龍山圍于定海困于慈溪分道夾攻賊遂就滅賊據普陀山分蹤流劫內地參將盧鏜邀擊於石墩洋大敗之先是賊入冦歸棲普陀為息肩之地官兵守之既浹旬將搗其巢先一日遣諜覘之傍無一舟至是四合鼓噪而前值他島賊自彼來精悍異常遂合攻官兵官兵腹背受敵輒敗衄亡者什六因罷歸賊以先所得貨蒲新舟令其半先歸而留其梟悍者入掠由是海鹽龍王塘乍浦長沙灣嘉興嘉善皆被其害而石墎洋之捷僅斬馘二百餘級云四月參將盧鏜擊賊於平湖敗之賊自金山張堰而來至平湖廣陳新倉鏜迎擊之賊遂敗走五月賊攻嘉興府參將盧鏜追擊石墩之賊大敗之賊久盤據海寧縣之石墩為巢至是出洋鏜追敗之俘斬二百有竒六月賊犯金鄉指揮王希禹陳區擊敗之九月浙西之賊分掠浙東蕭山臨山瀝海上虞攻嘉興府官兵追之與戰於孟家堰等處指揮李元律等死之孟家堰之戰元律與千户薛綱朱應蘭死焉既而賊走嘉善參將張欽等敗之賊奔百家山百户趙軒梁瑜戰死賊冦沈家河都指揮周應禎亦死之十月百户張曜禦賊於湖頭死之賊自霓嶼登劫突溫州之湖頭曜統兵禦之敗績乃力戰而死賊尋至東陽南午嶺巡檢朱純死之賊自湖頭之敗走樂清越盤石嶺趨台州黃巖縣仙居遂至南午嶺純統鄉兵邀擊之力戰而死指揮戴祀等與賊戰於芙蓉海口死之祀與江九山千户崔海鎮撫劉彧百户易次皆戰殁賊攻觀海衛攻乍浦所賊自金山而來攻所城不克乃分掠平湖嘉興等處復回柘林十一月賊入嘉善縣遂至湖州賊復自柘林而來入縣治又越嘉興府而西流劫湖州諸縣十二月賊復入嘉善縣百户賴榮華死之賊歸自湖州復入縣治榮華統福兵禦之乘勝逐北賊預伏鳥銃手以待兵潰榮華死焉翼日賊焚縣治自是而後賊入縣治凡十冇七次無城故也三十四年賊首徐海攻乍浦所自柘林而來攻平湖縣破崇德縣時築城未完賊以小舟潜從南水關入賊至湖州橫塘官兵與戰敗績福建副理問陶一貫溫台守備周奎等死之時同死者清州指揮孫勇羽林百户陸陵𤣥鍾百户周應辰山東把總梁鄂武生郭問張景安朱平姚清孫魯故青齊驍將也是役亦手刃數賊以衆寡不敵故敗歿二月攻嘉興府賊掠湖州而回復攻府城四月賊攻乍浦所不克遂至嘉興府巡按御史胡公宗憲敗之於王江涇詳見大捷考浙東賊犯紹興百户葉紳韓綱死之賊自錢倉白沙灣入奉化仇村經今峨突七里店寧波衛百户葉紳與戰而死賊由甬東走寧海崇兵鄉復折而趨鄞江橋歷水溪樟村寧海衛百户韓綱與戰亦死之至㑹稽副使許東望率知事何常明典史吳成器圍之困於絶地幾盡斃知府劉錫縱之走由白米堰沿海塘過蕭山入富陽趨直𨽻徽州等處大餘見直𨽻倭變紀及捷考五月賊犯餘姚省祭杜文明死之文明團練鄉兵纍立戰功至是統土兵禦之斬賊首一人從賊三十二人文明亦戰死焉其父杜槐亦死於楓樹嶺之戰父子忠勇人所難及既而賊犯鳴鶴參將盧鏜敗之賊犯平湖指揮李希賢敗之賊自柘林分掠平湖希賢邀擊大破之無何賊益衆攻城月餘始解攻乍浦所賊攻爵溪所及餘姚縣賊新至即攻所城不克進攻餘姚賊攻三山所把總指揮劉朝恩擊敗之時朝恩巳承院檄他委離所一舍聞報即馳還率軍民固守值霖雨城圮者數十丈賊歡呼謂唾手可陷賊中洶洶或勸朝恩突走朝恩叱之曰我祖宗世受國恩今日正我報效之秋豈可以事權去巳而規避邪且我去則一身之利得矣其如生靈何遂以身蔽圯所督戰甚力復以木城障之時城上矢石如雨而未有中賊者朝恩悟曰此幻術也投以生犬首發矢即中其酋帥貫喉而斃賊驚潰走朝恩復追躡之斬馘數級是役也內外居民全活者三四萬人六月賊犯省城燒北關市總督尚書張公經統兵禦之大戰於塘棲敗績初賊敗於王江涇精鋭者多死柘林諸賊亦驚愕破膽胡公計乘勝進搗賊巢欲令永保二兵由金山海塘而進瓦氏兵合遊擊鄒繼芳由閔行黃浦而進狼兵攻其東苖兵攻其西海洋戰艦截其遁歸之路必使賊無噍類以絶後患張公不能用竟分永保兵以援蘇州等處二兵困于奔疲且衆寡不敵故有是敗賊尋走吳江之平望浙直官兵㑹擊大敗之詳見直𨽻倭變紀賊從嘉善縣遁去嚴州府推官劉泉復大敗之賊既不能取道蘇州乃折而東南從嘉善乍浦以趨舊穴泉率鄉兵禦之于三店塘復大破之斬首四百六十餘級焚溺中毒死者復千餘人蓋不藉客兵之援而專督鄉兵之功也浙東賊犯餘姚鄉兵擊敗之賊自觀海遁歸官兵追敗之于霍山洋賊自觀海出洋都指揮王霈與把總閔溶張四維等邀擊于霍山海洋悉沈其舟參將盧鏜敗賊于馬鞍山新林復追敗於勝山龜鱉洋八月副使孫宏軾等破賊于大陳山嶴擒賊首林碧川賊首林碧川自柘林遁出海為颶風沮回泊台州之螺門宏軾與兵備許東望參將盧鏜知府宋治都司王霈等督舟師追之賊敗登山官兵圍之月餘碧川與髙贈烏魯美他郎等一百五十人俱俘斬無遺參將盧鏜擊賊於全塘敗之九月賊巢舟山之謝浦十一月官兵追賊于龕山平之詳見大捷考賊登犯海鹽知縣鄭茂指揮徐行健即日討平之賊自秦駐山登泊茂等率兵撲滅之是戰也賊雖止於八十有竒然以是日登陸而官兵以是日盡殄之則前此未之有也十二月賊犯平陽三港守備劉隆等死之賊尋平賊自南麂山流入金鄉至平陽之三港官兵邀擊大破之賊佯為我兵裝束繞出陳後而以精悍者衝其前腹背夾擊我兵遂潰隆與千户鄭綱百户張澄死焉賊尋至嵊縣提督軍門胡公令副使談綸剿之授以成算仍令典史吳成器為鄉導引官兵由新昌繞出賊後期容美田九霄兵至夾擊之百户王世臣等又各分守要害以防賊遁至是官兵分作五哨四面埋伏止以一哨誘敵賊出戰伏兵四起賊遂大潰走清風嶺烈女廟官兵乘勝攻之斬馘無遺餘詳見大捷考樂清賊犯寧海主簿畢清死之清善騎射屢立戰功至是禦賊於楓樹嶺力戰而死尋至平陽壆指揮祁嵩等死之嵩與百户劉愍俱力戰而死指揮閔溶亦戰死于舟山三十五年正月官兵擊賊于後梅大破之詳見大捷考二月賊圍寧海衛賊據近城蓋厰為巢日夜攻擊三月官兵進擊舟山謝浦之賊勝之參將盧鏜知縣宋繼祖生員李良民武生婁揇等㑹兵進攻大破之賊移屯邵嶴柘林賊攻乍浦所賊首徐海陳東等自柘林沿海而來欲取乍浦為巢進攻杭州次及蘇常以至南京兵備副使劉燾疾馳應援與賊相持官兵大勝斬首五十有五賊勢少挫翼日賊自金山而下者復萬餘遂圍燾于城中日夜攻擊燾督官兵禦之賊不得間九日乃解去由海塘而西燾尾追之斬首一百三十賊過海鹽轉塘灣指揮徐行健禦之因衆寡不敵而死賊因野無所掠分作二支一徑至長安一由硤石章婆堰與長安賊㑹知杭州有備不敢攻而去四月攻嘉興府指揮程祿死之賊回至王店復分為二半由海鹽塘半出長水塘期㑹攻府城時嘉興兵俱往杭州賊覘知之故乘空而至也適程祿所統陸兵五百至與金州等水兵夾攻之斬獲頗多賊後至至衆其陸行者徑趨城下我兵為其所綴賊遂過城下而西急赴皂林以趨烏鎮祿追之賊預伏民房以待祿遇害時官軍死者千餘人浙東新賊攻觀海衛龍山所進陷慈溪縣時賊自鳴鶴場臨山三江登者各千餘越數日始攻觀海龍山生員李良民統兵禦之賊乃往慈溪時慈溪無城知縣栁東伯率民兵禦之而賊分蹤繞出兵後衝縣市都長沈宏率族屬土兵剿之斬首百餘賊即遁去賊首為周乙豐洲酋也參將盧鏜敗賊於慈溪之丈亭時賊將掠餘姚鏜遏之於丈亭大敗其衆賊乃不得至餘姚餘姚士民感之為勒石頌功云佐擊將軍宗禮與賊徐海戰於崇德三里橋海統賊萬餘流劫烏鎮胡公遣千總錢燦等率鹽兵百餘人僞為亡命投入賊中以為內應而檄知縣張冕剿之賊內外驚擾不得寧居欲仍往杭州至崇德三里橋禮與鎮撫侯槐何衡忠勇官霍貫道率兵九百禦之三戰三逐北賊死者以百數賊分畨死鬭禮等以孤軍力戰多寡不敵遂皆死之賊攻平湖縣指揮翟文擊之賊退走指揮劉岱預伏潘港復追賊至瓦山皆勝之五月浙東賊復入慈溪焚縣治攻龍山所賊分二支一入縣治一攻所城為龍山兵所擊死者數十人乃解去賊首周乙就擒乙統賊四千餘劫慈溪不己而延及餘杭為浙東之大患至是就擒福建流賊破仙居縣入據之時方築城未完且值霖雨新城崩壞賊進攻者三知縣姚本崇悉力禦之賊夜分三支攻城西南而以一支潛由東北登陴遂入縣治先是賊自莆田岐頭流劫北至清田百户方存仁死焉賊遂猖獗攻破縣城巡檢劉岱率兵來援亦死之浙西賊圍桐鄉縣宗禮兵既敗殁賊益縱肆提督阮公鶚入壁桐鄉賊就圍之副使劉燾遣指揮朱文王彥忠來援擒斬賊二百六十餘人衆寡不敵我兵遂却總兵俞大猷盧鏜敗賊于山馬跡洋松浦口之賊自古窑遁出山海洋鏜與指揮張四維等追及之沈其數舟擒斬二百大猷復追及于馬跡洋俘斬百餘桐鄉圍解徐海陳東攻圍桐鄉勢甚危迫總督胡公新受命引鄉兵千餘駐敵樓防守杭州無他兵可遣援者乃與中書羅龍文謀曰方今徴兵未集而阮提督久困孤城萬一有失損國威多矣今欲用間用餌以紓時艱而無可使者奈何龍文曰我世受國恩願以死報請往說之公曰君京官也而無朝命往且不測況與賊素無一面之識誰則信之適陳可願自松浦回以王直義子毛烈通事童華夏正朱尚禮邵嶽等欵定海關稱報效胡公喜曰吾事濟矣乃留毛烈於舟山而亟召童華等來見因厚撫之華等感悅胡公察其可使乃推誠與之計華遣關朱尚禮持書往說海海故畏公威名欲解去而惡無名得書大喜欲與華面議龍文因請監督以行胡公從之遂偕詣海所宣布朝廷威德因勸樹功以圖顯榮海固唯唯而隂與華曰吾固願為報效而費倭人金且數萬奈何華曰此易事耳胡公豁達大度爾能與之立功富貴可望也豈直數萬金而巳邪海大悅遂以降劵付龍文等還報即日解桐鄉圍而去既而下硤石逼塘棲華亟馳問進兵之故海曰以倭人金無所償耳華曰若然是挾兵以要重賞也兹豈效順之義胡公一怒我亦不能為若謀矣爾第出海須軍門有厚賞持以償倭未為晚也海懼從之即退屯李港華恐其反覆難保因索其弟洪來質云副使劉燾遣指揮王彥忠等敗賊於斜塘賊有復自松江來者屯斜塘風涇玉帶等處勢甚滋蔓燾令彥忠等逐之賊大敗復由橫浦東去六月官兵進擊仙居之賊平之賊據仙居胡公咨阮公往救之又檄副使許東望知府談綸總兵盧鏜等從東路進賊聞大兵至乃走斷橋彭溪官兵圍於林同知家指揮伍惟員犯其前鋒俘斬三百死水火者不計餘賊六十人遁往天台復為鄉兵所殺而福建流賊遂無孑遺矣應襲管懋充中書羅龍文誘擒賊首葉明陳東等徐海既解桐鄉圍而去與陳東葉明分屯吕港新場旋復合於乍浦城南黨與甚盛督察趙公數趨進兵總督胡公曰今衆寡不敵進兵豈為勝算且海所以退去者貪吾餌也若進兵而勝固是美事不勝當奈何今日之事法當先撫而後剿以金數萬勾至其心遣諜離其黨與剪其羽翼而後徐為之圖萬全之計也於是遣龍文童華等行間適麻葉僞為胡公虎符潜出硤石虜祝氏婦胡公怒復遣華等往語海曰爾一心欲投降而陳東麻葉反復不常恐為爾纍非我所以曲全爾命之意海猶豫未決龍文曰彼二人者已密啓趙公約縛爾生致之矣海大怒乃誘麻葉至管懋充舟所縛送軍門復約龍文以舟載貨陽與貿易童華以金二百與倭人之桀黠者誘東偕來至舟所即執之以歸海自此勢孤以至於亡八月官兵敗賊於夏蓋山三江海洋既而又戰于金塘馬墓之間復大敗之俘斬二百三十餘人兵部郎中郭仁副使劉燾擒賊於秦駐山時諜報秦駐山支嶺之上有羣倭棲之其舟為觸礁所破不能長往仁與燾時駐乍浦即欲遣兵擊之將士皆云窮冦據險難以仰攻乃計令兵士挾降倭一人往說之許其送付徐海其黨五十餘人悉棄兵而來因次第縛之官兵敗賊於乍浦詳見大捷考賊首徐海乞降陳東黨既為官兵所破海內不自安隂修戰備為死鬭之計胡公知之復令羅龍文童華等往慰之且諷使入見海猶豫未決龍文宿其營安寢如家海以足躡之覺曰此虎狼之穴何酣睡若此邪龍文曰我為爾百口且不顧況此身邪今爾乃心持兩端何也海曰聞趙必欲殺我恐公不能救龍文曰趙公初意如此今也則否海曰焉知非誘我而執之邪華曰胡趙二公欲為爾題請封爵使爾専提一旅之師捍海上冦若不入見彼何所據以正請也海曰蹈不測之險奈何龍文曰我京官也且胡公姻戚爾第入見我則質爾營中萬無一失矣海始首肯華既馳報軍門軍門許之為之期日諜使復數四給既定海猶慮中變先期而至入見胡趙阮三公及巡按趙公孔昭于平湖城中受犒而出謂龍文等曰鑒諸軍門之貌吾禍終不免嘆息者久之既而復叛據沈家莊總督侍郎胡公宗憲率官兵討平之時官兵四集軍威甚盛海偵知之隂收陳東葉明餘黨謀拒自全胡公復遣華往解之每迎謂曰吾以爾言結怨諸倭今軍門既受吾降而復徴兵漸逼非為我而誰邪叱左右縛華將殺之華大笑不止海曰爾尚何言華曰吾笑爾不識人以忠為姦使吾枉死爾海曰何謂也華曰陳葉二黨尚多且心跡不一今陽為附爾實為豫讓之計軍門恐爾入其彀中故遣我相聞官兵壁近郊者防其變也爾何不悟邪海曰然則如之何華曰今沈莊有東西二所爾曷不分其黨各自為巢而密約官兵殺之爾後患絶矣海深然之卒用其䇿由是二黨互相猜疑胡公知之遂部署大兵進搗其巢是時賊壁甚堅據敵樓以拒四面皆掛白布覘我我不得覘賊也諸將以佛郎機攻之畏矢石不敢近七月弗克胡公怒命都指揮戴沖霄攻之沖霄率兵士逼賊壘立於矢石之下燬其西南正西敵樓各一座賊失據沖霄及把總楊永昌等督永保等兵大進搗巢于半日之間實沖霄燬敵樓之功也海既敗歿其黨散走一支據定海丘家洋阮公與總兵俞大猷盧鏜合兵圍之賊潰走踰桃花嶺渡寧奚歷鄞奉化寧海與官兵戰於台州兩頭門把總指揮范闕死焉賊突走溫州至福寧得舟而遁一支自直𨽻出海為大猷兵所滅一支自浙江出海為鏜兵所滅其得脫走者突登慈溪縣伏龍山阮公率官兵滅之由是賊無生還者矣總督胡公宗憲佯縱賊酋辛五郎出洋命總兵盧鏜擒之詳見大捷考副使許東望擊賊於馬墓福山洋敗之賊酋二曪表及從賊七十餘皆就擒九月百户郎官追賊於臨海兩頭門死之副使王詢總兵俞大猷擊舟山賊平之俘斬一百五十餘十二月官兵進搗謝浦賊巢平之先是賊據吳家山官兵自秋及冬屢攻弗克胡公命把總張四維以麻陽兵當嵗除夜襲破之俘斬無是年兩浙之賊數踰二萬皆次第就擒而謝浦之冦即舟山之餘孽云三十六年四月賊犯定海關應襲百户俞憲章死之賊亦敗遁賊舟漂至沈家門副使王詢總兵俞大猷令把總張四維誘降五十三人至定海關適别䑸賊殺憲章恐其中變悉斬之而移兵擊新至者賊敗宵遁十一月賊首王直欵定海關要互市總督胡公誘擒之王直擁倭稱降志在互市總督胡公檄總兵盧鏜駐中中所授以成算必欲生致之鏜殫心竭力撫循備至直猶豫未决計無所出胡公復遣生員方大忠往說之與把總劉朝恩陳光祖指揮夏正通判吳成器等偕行鏜以城外倭刃森列慮變不肯啓鑰朝恩曰若是是益疑賊也不若以禮諭之以誠招之保無他虞鏜從之朝恩等馳至賊所直見皆單騎伏迎道左大忠反復開諭直曰公等皆督府親信輕身臨辱直小人也敢不惟命遂聽大忠計見鏜於城中誘至定海而執之夏正以此不得還詳見遇難徇節考三十七年二月賊酋毛烈據舟山之岑港王直既就擒毛烈等欲為之報仇不肯還島而據岑港分蹤出掠官兵屢攻之弗克都指揮戴沖霄等擒王直謝和餘黨頭目陳秀山等秀山王信郭喬恕等直部下酋項松吳九等十五名和部下酋也賊攻樂清縣城賊舟入石馬港者甚衆即進縣城副使袁祖庚參將張鈇逐之至和尚嶴與太平流冦合兵五千餘人金盤指揮劉茂朱廷錀千户周賓百户李爵劉深與戰而死鄉宦僉事王德良醫王沛督鄉兵禦賊亦死之四月賊攻台州府賊衆二千餘人臨海島朱門劫松門寨冦台州象山桃渚又有繼至之賊與合為一攻府城僉事李三畏知府談綸率兵剿之至隘頑所海濱大敗之溫州賊過太平縣典史葉宗與戰死之攻寧海縣攻溫州官兵討平之時台州賊復合樂清賊攻溫州府總督胡公遣參將戚繼光追之及於盤石館大敗之賊遁出巷參將張鈇預奉胡公方略艤舟師江濱以待斬首百餘焚其舟數十賊死者無算先是賊分劫象山寧海仙居知府談綸悉擒斬之戚繼光又追及於海洋賊遂全滅八月官兵進剿舟山賊巢平之詳見大捷紀三十八年三月賊巢象山何家副使談綸討平之賊自何家登犯者三百餘據險為巢樹朩營以自固總督胡公檄副使談綸剿之綸與總兵俞大猷計曰堠者報賊甚多而今登犯者止於三百其嘗我乎乃令大猷率舟師備之於海而自率陸兵往禦之至定海即欲進兵將士請曰兵士逺來乞休三日而戰綸曰賊數不及三百久掠不去者蓋謂我無兵耳今聞大兵四集不走且嚴為備宜出其不意急擊之乃進兵至馬岡賊繼至者五百自金井頭而來至近綸即移兵先擊之前鋒既接綸分兵從中衝之賊遂大敗追至落頭斬級以百計賊避入山中竟宵遁焉翼日綸率軍進搗何家賊巢賊殊死戰綸遣竒兵從間道出賊後擊破之賊潰入舟中因縱火焚之俘斬略盡賊攻桃渚所攻楚門所賊千餘自泥湖礁而來賊犯樂清參將張鈇敗績千户胡鳯等死之賊自梅嶴劫次日至窑嶴鈇迎敗之乘勝進攻賊伏麥田中官兵入其伏遂潰千户胡鳯朱璠百户姚憲皆死焉賊犯定海把總陳其可與戰敗績武生蔡啓元死之賊自丘家洋入犯為參將戚繼光所敗至奉化之蔣家鋪副使談綸遣其可擊之其可違綸節制乘勝逐北為賊所乘遂潰敗啓元死焉賊攻松門衛賊攻夏公嶴入犯即日攻城既柵浦賈子為巢皆去衛不逺數里四月賊攻樂清縣賊自石馬港入者二十張鈇射死其酋二人賊黨潰奔舟桃渚圍解時賊攻所城甚急幾至陷歿總督軍門檄談綸往應之綸至入所城與戚繼光合攻之俘斬頗衆賊遁菖埠依山為固官兵又進攻之復大捷賊遂併入柵浦敗巢參將張鈇敗賊於白沙嶺賊自松海登陸及太平遁至之冦合蹤至白沙嶺鈇預設伏以待賊至入伏正兵方合伏兵繼起大敗之賊遁出海去五月柵浦賊夜襲松門衛城副使談綸等擊破之綸既破桃渚之賊即回軍向松門擊柵浦賊既入衛城以守城卒久而疲且風雨晝暝恐賊乘官兵初至來攻城乃令諸偏禆悉軍通衢以備巷戰而令戚繼光軍分配城守諸偏禆皆竊笑之夜漏下四鼓果有賊數百襲西門先登者且三十輩殺城卒火城館守者紛紛墮城走章延廩陳其可督兵大戰斬數賊賊乃退遁綸與繼光尾賊後計賊必出金清閘鑿二舟塞之賊果至起塞時綸駐新河所城偃旗示弱詐為新河老人遺書于賊約饋千緡令勿攻城賊信之乃不起塞明日繼光軍出璧牛橋誘賊賊果悉衆往綸盡鋭兵出南門復遣人搜賊伏悉走之賊依舟以拒官兵攻之沈其二舟賊大敗奔陸復大敗乃棄輜重越過南岸官兵追之及於南灣嶺賊復據濱海髙山分五部以拒官兵蔡汝蘭等進搗其巢先令竒兵間道奪其巔以拊其背張左右翼以貫其中遊兵復四面環攻之賊遂大敗斬首三百生擒數十百人賊潰圍奔樂清黃華據舟出海而去副使劉存德參將張鈇進搗海游賊巢平之先是存德鈇預令把總任錦等設伏石所莊港口而自督兵進剿之賊知大兵將至即遁出洋伏兵擊敗之追至猫頭洋又敗之進至青門洋又敗之沈其舟數十俘斬數百餘賊改屯海游官兵擊斬盡絶九月福寧賊流至桐山指揮盧錡等敗之賊掠福建而去為颶風所擊復至桐山錡與梅魁等搗其巢預遣人伏賊巢中約被虜人為內應而令指揮李光佐典史黎喬伏兵北䇿應之夜二鼓賊巢火起各兵乘亂夾攻賊大敗奔前岐官兵復追及之斬首一百三十十一月賊遁往福建盧錡等復大敗之錡等知賊將遁設伏秦順港口伺之賊至大敗官兵追至同坑適仙居知縣復益以杭兵來㑹前後夾擊復大捷俘斬二百有竒十二月王直伏誅初直自列表之敗而之日本也居五島之松浦僣號徽王頻嵗入冦皆直之謀其黨倚其方略輒以倭人藉口故海上之冦概以倭子目之而不知其為直遣也巡按御史胡公宗憲首發其奸人初未之信及賊首董二老被擒譯供與胡公所料不爽毫髮人始服其明鑒御史陶承學金浙等交章論曰方今總督大臣調集大兵尅期剿滅將兵非不鋭也斬獲非不多也而四面之侵擾愈甚者何也蓋以逆賊之名未正則討賊之義未明討賊之義未明則人心之從違靡定但彼逆之為計也狡為謀也祕是以東南士民雖疑為王直主使而莫可致詰今乞皇上敕下該部㑹議明揭黃榜正逆賊之罪以明討賊大義率衆入冦助惡煽虐者乃王直之羽翼爪牙也必誅無赦又曰兵威雖振而禍本不拔亂終未已即如王直搆亂二十餘年潛形遁跡莫能誰何煽禍連嵗此非所謂大奸惡者乎茍欲制其死命在懸非常爵賞見今賞格固亦匪輕然爵未及侯伯賞未及萬金人誰樂為我用以建非常之功哉臣愚以為宜敕督撫及各有司等官募有能善設謀計俘馘賊首王直者成功之日封拜侯伯其餘量功大小授以都指揮指揮千百户等官俱與世襲命既下胡公䇿曰王直逺在松浦居室扈從僣擬王者且不自來其孰能擒之不若以宣諭為名遣人用間用餌以勾致之禍本塞矣於是交章論列大意欲宣論日本國王令其禁戢島夷以絶亂階上從之由是遣寧波生員陳可願蔣洲充市舶提舉以行時胡公己為總督矣指授可願等方略期必生致之可願等至松浦見王直如胡公指直方欲肆志中華以官兵防之嚴未有計得可願語大悅先遣義子毛海峯來探胡公意公知其謀因厚撫之海峯還報直益感悅率諸倭來求互市胡公預遣總兵參將等官兵水陸按伏無慮數萬計直至舟山泊列港固己入公彀中而不自知矣然胡公猶以困戰死鬭為慮陽許題請開互市授直官爵俾専主海上艘而隂遣人誘之入見直初猶豫未決胡公令諜入賊中攜二其黨其黨稍稍思變直不得已始入見公于定海遂執之歸杭州直既就擒黨與無主圖脫走輒為兵船所追不得去久之因颶風起意我兵不之隄也突走海中輒為颶風所擊無有存者而王直之黨盡滅矣既而胡公列狀上請得㫖即杭州市曹斬之𫝊首京師東南二十餘年積冦至是乃絶自時厥後海舶失發縱指示之人始灰入冦之念間有至者輒為官兵所破若摧枯拉朽矣四十年四月官兵擊賊于馬嶴沙大敗之賊新至官兵遇之于海洋中追逐至馬嶴沙大敗之賊奔陸適冠帶把總章延廩守于舟山引兵設伏又約水兵合擊之賊遂大敗賊犯新河所官兵擊敗之賊自周洋港登劫僉事唐堯臣遣指揮劉意等擊敗之復用火攻賊死者百餘遁太平漁嶺復追敗之賊犯台州參將戚繼光敗之賊自桃渚登陸流至台州為繼光所敗追至新橋賊又敗走死者百餘而繼至者復二千餘人至黃沙為繼光所敗乃登山以拒官兵復追敗之圍於白水洋民居火攻之賊遂盡絶是役也賊多兵寡而我兵九戰皆捷俘斬千餘焚死者稱之五月賊犯大嵩官兵擊敗之賊為我兵所逐出至橫嶺枙於水兵不得去乃奔入鮚副使王春澤檄總兵盧鏜由南路奉化以入象山而自引兵由大嵩望湖頭裘村進期與合擊適賊至裘村官兵擊之賊大敗潰斬首四百五十浙江事宜金盤總金鄉盤石二衛立把總一員其分守溫處參將即此總所轄之地也海港守備黃華水寨東接大海大小門電嶴南枕港口乃溫州之咽喉也舊制戰船四十餘艘南㑹飛雲北㑹白岩塘交相巡哨嵗久撤備嘉靖三十七等年倭從此港入溫州抵處州之青田補造福蒼等船三十餘隻比舊反減似宜添設江口水寨東臨大海至五嶼等嶴北至平陽縣外接琵琶長腰陌城陽嶼等大洋為平陽門户舊制戰船三十餘艘嵗久撤備嘉靖三十一年倭犯平陽前蒼涇口麻圓等地從本港入今造兵船戍守比舊制量加南至舥艚炎亭北至瑞安飛雲鳯凰往來㑹探似為得之飛雲水寨溫州適中之地也舊名中軍水寨南臨海港外接鳯凰山內逼縣治實衛護府縣之門户也舊制戰船四十餘艘嵗久撤備今議江口黃華二處兵船於此往來分哨此在無警之時則可若風汛之候倭舶分䑸衝突二港自衛不暇何暇顧此哉鎮下門水寨東距大海倭若登犯徑抵瑞安所城則平陽赤哨諸處無䇿捍禦極為衝要舊制戰船二十艘南㑹福建烽火門流江北㑹江口港巡哨嵗久撤備今議將江口兵船於此往來存留旗軍防守限於財匱不堪復設舟師也更宜添置方為慎固白岩塘水寨東濱於海實蒲岐所之外户也舊設戰船二十隻北㑹松門楚門南㑹黃華港巡哨嵗久撤備今議併入黃華港兵船存留旗軍四十名防守亦因限於財匱不堪設舟師也添置慎固方可海岸設備舥艚寨東北皆濱於海倭賊屢次于此登犯至前倉腹裏見撥旗軍防守炎亭寨在海濱賊若登犯突入腹裏從本衛城外可至平陽縣孫湖地方見撥旗軍防守大小漁野二寨聮坐海濱極為衝要賊入登犯若突入腹裏從本衛城外可至平陽縣南鹽場等處地方見撥旗軍防守小濩寨與龜峯巡司相聮南臨海至竿山一潮比枕山巡司逼臨海濱賊易登犯額設弓兵旗軍防守已上四寨俱金鄉衛平陽縣所轄皆係冮口港兵船往來巡哨程溪寨南至海西抵鎮下門水寨頗為蒲門要區嘉靖三十四年賊嘗登犯見撥旗軍防守菖蒲洋寨在海濱先年賊曾登犯見撥旗軍防守已上三寨俱蒲門所所轄亦係江口港兵船往來巡哨眉石北寨東至大海南㑹陌城寨西平陽所北㑹陡門極為衝要先年賊嘗經登犯若突腹裏從陌城可至前倉等地方又可通平陽坡南見撥旗軍防守江口港兵船於此往來哨守眉石南寨東濱大洋鳯凰山嶴一潮可至西抵仙口極為險要賊若突入腹裏從仙口可至平陽縣沙園所原設飛雲港戰船今併入江口港往來巡哨見撥旗軍防守仙口宋埠二寨東臨大海近年本處居民建立堡城捍禦撥軍防守已上俱屬沙園所其外港口兵船往來巡哨黃華山寨西離水寨二里先年賊嘗登犯極為衝要見撥旗軍瞭守外有水港兵船巡哨沙角寨東臨大海界於黃華章嶴之間嘉靖三十八年經賊船登犯若突入腹裏從芝嶴可至三條嶺抵樂清見撥旗軍防守已上俱盤石衛所轄章嶴寨在海濱賊船易登頗稱險要防禦慎固則東衛塔頭而西衛沿盤南衛百華北衛長林倭舶雖至不敢犯也見撥旗軍防守白沙寨東南濱海嘉靖三十七年賊犯樂清縣治自此地入乃水陸要害之道也見撥旗軍防守已上俱樂清所轄嶼山寨坐臨海口賊可登泊若於此突入西可犯天仙南可犯雙峯北可犯後所勢難猝禦見撥旗軍防守平山寨西接後所南接嶼山北接白沙為樂清唇齒嘉靖二十七年賊嘗登犯若突入腹裏南從石馬可至本縣白石等處見撥旗軍防守已上俱後所所轄後塘寨東南入海地勢險要嘉靖三十一等年賊屢登犯其南為李嶴西為清冮渡北為雙陡冦若突入則諸地悉受焚劫矣見撥旗軍防守髙嵩寨為蒲岐門鎖鑰東臨大海極為險要嘉靖壬子等年賊嘗登犯若突入腹裏從楊婆橋可至長山地方見撥旗軍防守下堡寨為蒲岐之南藩南臨大海頗為險要見撥旗軍防守已上俱蒲岐所所轄龍灣寨東援寧村西捍府治坐臨深水頗為險要嘉靖戊午等年賊自黃華港登犯突入腹裏從新建蒲州地方直抵府城見撥旗軍防守沙溝寨坐臨濱海賊可登犯見撥旗軍防守沙村寨北至寧村所東至海見撥旗軍防守長沙寨東臨海塗地勢頗險見撥旗軍防守已上俱寧村所所轄丁田前後岡三寨俱海安所所屬雖撥旗軍協守然丁田地勢稍緩惟前後岡俱臨深水極為險要嘉靖癸丑等年賊嘗登犯若突入腹裏可至溫州府城及瑞安縣見有黃華港兵船往來巡哨東山上二寨東西分峙有犄角之勢坐臨海濱極為險要賊若自東山而入由九里可至府治自上而入由丁田可至海安見撥旗軍協守陌城陸路二寨東南濱海極為險要賊若自陌城突入從營山可通樂陽城自陸路突入從江口港可至錢倉等處見撥旗軍協守外港有兵船往來巡哨汶路口寨東臨海洋陽嶼門南以䇿應江口水寨北䇿應眉石南北二寨地勢險要先年賊曾登犯平陽沙園二所撥軍協守分水隘嶺係浙福交界賊自福省突來必由此嶺至平水過牛皮嶺一可至蕭家渡本縣城外而抵瑞安地方一可經莒岡至泰順青田地方且可通桐嶺至溫州府城等處遇有聲息必調兵遏截方可扼其吭而固全浙之南境也已上俱平陽所所轄海外設備大巖頭山賊船自南麂鳯凰霓嶴蒲岐楚門玉環而來俱經此山今撥黃華港兵船每遇風汛於此巡哨海島玉環山與蒲岐所相對此山懸居海中聮絡深長山背即台州府所屬太平松門楚門交界海洋賊自北來必經乎此處今撥黃華港兵船於此巡哨霓嶴賊船南北向往多泊於此可至盤石衛最為險要今撥黃華港兵船於此巡哨南龍山賊船自北洋來必經此山黃華港兵船於此巡哨南麂鳯凰山此嶴澗大坐臨深海山外大洋别無山島賊自國初以來俱經此棲泊實巢穴也風順一二潮可至飛雲港先年設兵船一枝哨守廢壞未復今撥江口黃華港兵船巡哨松海總松門海門三衛立把總一員其分守台金嚴參將即此總所轄之地也海港設備中州港南往海中茅堰山與蒲岐港接境北往海中坯山與靈門港接境此處見有兵船巡哨更設八槳小船以搜玉環諸山之穴則善矣靈門港東接海中雞臍山與松門港接境南接楚門洋坑下接硐礁山原無兵船之設嘉靖壬子等嵗倭犯江綰犯後灣始議立戰艦己未賊犯靈門跳頭從腹內流突沿嶺江竊舟遁海將前船掣守東門又以單弱不足防禦併入松門港大䑸哨守革之誠便也竊謂松門寨港大䑸兵船去此密邇可以徑顧其地彼港舟師每每潛遁哨報不時為今之計當重責於松門港之水兵而専嚴以哨船之號令松門港其東為島米門外積谷山及下洋大陳嶴等處外即大海直抵日本北往化嶼龍王堂鯉港橫門大潭深門等處與新河水三㲼港接境南往雞臍弔崩硐礁鹿頭片嶼驪洋邳山等處與靈門接境隘頑居其南如隘頑有賊此港之船直搗其䑸隘頑緩急此港之責守也海內碎山極多若賊自溫州而來此為匯嘴捷徑登竟抵城下若自外國而來止過大陳邳山大鹿岸皆為賊巢甚難防守今雖稍增戰艦僅堪小敵之禦而港內迂回屈曲難以捍賊必出大陳山而迎戰於海中乃為得之新河港港口淺狹大船未易出入不必舟師防守止陸備舊設椿關動稱門户之固司事者未皆親履遂相駕重以為險阻實惟小松木二三十株於半港中耳既無險可恃無據可守左右南岸平於如掌豈能為坦港之重輕哉海門港一名椒江渡港水流入二十里之中一分台州城下一分黃巖城下此我朝開國以來之重鎮台黃府縣之咽喉也視寧波定海關不同其定海關水港既狹港外舟山長塗馬嶴金塘逺近皆堪泊船分哨海中復有舟山二所且設重鎮於定海戰艦數百是以海外之功屢有成績而港口之守永無內患今海門港一潮之逺止冇三山一座形小直削並無港次四望汪洋我之兵船欲泊於港內則不可禦敵欲出於外洋則更無山嶼可抱風浪洶湧自國初迄今倭之犯台悉由於此國初全浙設備倭都司一員而獨駐守海門其所係之重可知邇來諸港皆設備獨此一港與海門衛未嘗經理雖有兵船率為故事舊有二百餘艘尚不能沮其黃巖之入今所造船隻分其半於松門衛港不知此港之兵必當倍於松門庶克有濟何也松門港之船可以盡出外洋截賊此港口必須多留船隻防守若不嚴禦港口使賊一入則其舟西去台州隨潮僅九十里我之陸路隔渡阻山無由追躡必由黃巖逺抄勢不相及故全賴水兵阻截港外有台境之寄者其慎圖之桃渚港議者謂桃渚離海門甚近可以䇿應戰艦不必設不知海門所由裏路至桃渚止四十里形似弓弦若由海中轉達聖塘而下必出大洋其程兩日不似桃渚至長沙巡司一帶亂山叢砌羣峯散走或出或入縈紆紛峙海邊淺潮之中直深出大海極為綿逺而桃渚所北往健跳一帶如鹽塘除下仙巖處處海灣突進其港健跳之舟北禦昌國海郵一帶力巳足矣桃渚之外接大海總港亦當設船一䑸如健跳之數但額舟有限松海二關已為不足若量抽數舟棄之萬山之外孤海之中勢分力弱亦竟何益哉健跳港原設長洛一渡逼近東所城側渡濶四百餘丈出海直往茅頭大洋上接海中查盤山與練陀等處下接海中青嶼黃毛與牛頭桃渚地方接境此處宜設兵船一䑸必得福蒼海滄二十餘艘方可守禦松海二關巳稱疏薄無力分應若又量抽數隻分守此港則港大船寡無益於事此城孤懸以船為命今雖有守似為單弱不足恃也按台州海門不出此數港分守合備似不可緩若春汛之期當以松海二港合為一大䑸在大陳洋嶴伏截以為南䑸桃渚似當添船與健跳相等亦令㑹合外洋以為北䑸其在南䑸也則海門港必當留大小兵船十餘艘守港而松門可盡發其在北䑸也則健跳港必當留大小兵船數艘守港而桃渚可盡發陸路設備楚門所賊犯楚門必屯雞臍山下其心戀船不過二三日既還而走如往隘頑則歷所城藤嶺慢遊料我兵阻之不得已方棄船陸行也其往三山大荆以由溫州不如徑由水中對過蒲岐港為便南隔一小港為玉環山周圍百里舊有民居國初遣入內地台溫二境乃賊去來泊船之淵藪也對岸則溫州府蒲岐所近被勢豪據以耕種夫耕田則起屋起屋則招賊釁端雖不宜開然當事者誰肯任怨哉又由西北至太平城江下地方謂之東門港沿山濱海而行山林密茂水港出入又十五里乃南彎地方髙山環海舊戰場也舊賊據萬仞山腰進兵之路皆鳥道魚貫我兵分為四枝松林如織相戰犯兵家之大忌仍成全捷以收竒功信乎地利不如人和也隘頑所北為太平縣藩籬南可以阻楚門之冦城外東北山下長沙面水民居一村畨舶至此可以屯泊若棄舶登突决由藤嶺內外皆可至溫川地方夫賊屯聚於藤嶺則太平之路既阻於藤嶺松門之路又阻於慢遊設賊屯據面水背山可以髙枕久住可以從容困城楚門所在其南非駐兵之地決不能北援大松二路又絶將何以為計也所賴只有松門港兵船抵城下賊若有船在水定可逐之賊若在陸水兵無所用力但咱船逺瞭松門港兵船急出過隘頑之南大海中截之庶可保全萬一疏虞而致賊舟登犯城四面皆山髙插天表既不能守而城身欹矮又不足固其若靈門關有賊雖屬險難我兵統入城內從容南出攀接而進亦可應援過大嶺皆夾山而行進退路徑皆艱兩鼠鬭於穴中勇者勝耳可不深長思乎若賊流走我兵當星夜先馳江下預處戰地設伏以待若尾而追之則無及矣松門衛若止駐兵城內而賊由西來則我兵瓠繫諸處難顧若城內未嘗駐兵而賊據松門寨為巢以一枝徑兵守北門山麓下則我兵無路可援故城內城外皆當防守有警則將人由泥塗用馬報約城內之兵刻期以一枝由新河一枝由隘頑海邊進戰城內兵鼓噪應之庶為一䇿其由隘頑而來多水窟難行必由北裏山㑹合新河一帶而往遇雨則潦不可涉旱則可進大兵沿塗皆硬沙實土有潮不可行無潮可列堂堂之陳今有大䑸兵船諒多無虞新河所論形勢之急在海門港論適中之地在新河所該所去松門隘頑海門黃岩皆五十里去太平縣三十里三面俱有大路可以進兵應援但北至海門皆由塍雨久潦溢水皆沒人其藤嶺橫山頭敵所必由我可設備以阻賊衝者也蓋此帶沿海陸地四散賊出溫嶺少有阻則即由路橋繞出黃岩以往溫州黃岩之賊決不復由海門新河蓋知椒江有舟師新河有陸兵故也海門衛衛城當置於髙嶺乃為據險每嵗賊攻垂破而卒不陷者乃保障之力非形勝之據也此為浙東三台門户水陸重鎮三面阻水賊舟可泊實為險要惟恃兵船以為命禦畨舶於未登此守海門之上䇿也失此則為中䇿矣如賊在柵浦則水兵截於大港陸兵進剿一由海門近攻一由泉井一由路橋一由三山逺截合力亦捍禦之一術也又失此則無䇿矣前所與海門衛對壘中隔大港即椒江也其形勢利害與海門相同剿前所之賊多過江或由府治或下城門嶺往仙居出溫州賊若在長沙連盤一帶屯住連盤港深而長背山面水健跳桃渚二港㑹于此處可為巢穴分投出掠飽載而歸我兵由裏路至隘口轉南出其巢後自山上攻下仍以一枝截住山頭庶我不為賊抄兵勇者勝耳桃渚所其城可守但濠狹而城卑今議濬濠即以土增城庶為海門衛及府冶之藩翰也所城東北有菖埠港與本所港相類皆委蛇細曲賊之大船必不能入若泛小舟而我之兵船不能進追則其去海門甚近也外海諸山皆可以截賊須預設伏俟賊出而擊之乃可以成功也其他若安聖寺可伏截以阻賊菖埠之衝白蓮嶺可伏截以阻賊後嶺之衝肯埠嶺盡頭可伏截以阻賊肯埠之衝若賊至東所棄城而不之顧則必往府治自仙居走溫州我兵即當馳赴府城以截之也健跳所健跳城三面阻山皆峻嶺而東面山前距海若非兵船預伏探哨冦舶卒至何以禦之故健跳戰艦之設不可一時而不戒嚴也其去桃渚一百里或攀峻嶺則鳥道魚貫或涉羊腸則潮濱梗陷或行山地則溪石坎坷馬不能馳人不能列非二日不能至設賊舶舟城下江中桃渚一路決不可以進援東去昌國衛隔大洋彼處有賊所當時時防禦去寧海去台州俱一百四十里路徑皆如桃渚緩急之際松海大兵必不能猝達若徑過台州府從寧海而入必由黃巖台州相巖桑州寧海竇嶴計一日餘方到東所援兵至此賊必已遁海而别犯矣豈能望以成功邪若報至即調海門關兵船抵所城東海山內設伏以邀擊之萬無一誤也昌國總沿海設備昌國衛坐衝大海極為險要石浦關切近壇頭韭山乃倭夷出沒進貢等船咽喉必由之路懸海南北等山可設舟師往來巡哨以為東路聲援其西象山縣石浦巡司則恃之以為右翼者也懸海金齒八排朱門等處可設舟師往來巡哨以為南路聲援其北牛欄基旦門青門茅海竿門則恃之以為門户者也見撥福蒼兵船於此關哨守金井頭相對旦門直衝大海嘉靖已未夷船由此港登岸本港原設兵船近因船少力弱掣併石浦關見撥本衛北哨兵船往來巡哨前後二所南臨關口近三門要衝之路本所附城設有東西南北中哨伏兵厰五處每處撥軍瞭望遇警走報錢倉所東臨大海至大嵩港水程一潮南為塗次烽堠外接竿門蒲門地方西北至湖頭渡海為大嵩所界乃昌國之藩籬與大嵩相為犄角者也爵溪所城懸海口直衝韭山東逼大海西並錢倉南以遊仙寨為外户北以象山縣為喉舌見撥旗軍防守海中設備韭山形勢巍峩島嶴深逺對衝日本此山之外俱遼逺大洋故夷船東來必望此山為凖此昌國總第一險要今撥北哨兵船於此巡哨三嶽山係外海懸島乃昌國衛前後二所喉襟如賊船從韭山來每經此過嘉靖三十四年倭船于此盤據最為險要今撥中軍哨船往來巡哨旦門係懸海大洋外有東旦山與韭山相對如賊船出韭山來必望本門突入以往南路內近何家仁義南盤一帶老岸今撥北哨兵船往來巡哨三門乃石浦巡司土灣番頭一帶沿海居民喉舌如賊從閩廣遁歸由台溫來必經於此最為險要今撥南哨兵船往來巡哨金齒門島嶴甚多便於棲泊賊船往來必經此假息誠南路要衝之處與石浦關相隔二潮今撥遊兵及南哨兵船往來巡哨大佛頭山內有斗底蝦嶴烏頭青後城壺底等澚係賊船往來棲泊之處極為險要與石浦關相隔一潮今撥南哨兵船巡哨朱門山相對大佛頭係外海險要之處如賊由南來必至此假息與石浦關相隔二潮今撥南哨兵船往來巡哨八排門相連南田內多膏腴田地下便棲泊若倭船停棲甚難𠞰滅與石浦關相隔二潮今撥南哨兵船巡哨林門乃金齒朱門等山喉舌島嶴亦多先年夷船從壇頭海洋突入結巢于此係起遣之地極為險要石浦關至此相隔一潮今撥南哨兵船巡哨牛欄基係石浦關後門外洋必由之路有山環抱可避東北颶風如分哨南北兵船往來必於此為適中哨守之處與石浦關相隔丰潮今該中軍遊兵船南北往來㑹哨壇頭山有南北壳菜藍等嶴可以避風泊船賊由日本而來每望此山收泊與石浦關相隔一潮今該中軍哨兵船於此巡哨雞籠嶼在壇頭山外此外一望大洋别無島嶼如賊從韭山來必由此過與石浦關相隔一潮今該中軍哨兵船巡哨茅灣切近錢倉所與韭山相對先年畨船嘗棲泊于此原設兵船一枝因船少兵弱掣聚石浦關今派北哨兵船巡哨與石浦關相隔二潮竿門貼附錢倉所夷船每棲泊原設兵船一枝因船少不敷掣收石浦關併䑸今派北哨兵船巡哨與石浦關相隔二潮青門貼附爵溪所有山回抱可以避風泊船內接公嶼居民地方外衝四礁與韭山相對極為衝要原設兵船一枝因船少力弱掣聚石浦關今撥北哨兵船巡哨與石浦關相隔二潮定海總沿海設備定海衛南臨港口定海關有靖海營團兵操守招寶髙聳海口極為要害山巔築威逺城屯劄軍兵使有犄角之勢其隔江南岸自甬東巡司竺山等堠接連後所碶頭烽火相望遇警馳報小浹港內通東江出穿山寧波極為險要昔為海賊孫恩所據邇倭賊亦曾登此近打椿數層泛期撥船防守似亦未為慎固宜更密之後千户所東南為霩􅛾所南為大嵩所北為碶頭烽堠坐臨黃﨑港先年賊船由﨑頭海洋突入本港最為險要每堠撥軍瞭望黃﨑港東至舟山中中中左二所水程計一潮北至金塘山水程半潮最為險要見有兵船往來巡哨舟師單弱似未足以遏賊之衝也大謝山離後所城二里南臨黃﨑港北由犬猫海洋至金塘鹿山最居險要乃先年起遣地方也內設黃﨑西山等七堠撥軍瞭報又該中軍哨兵船往來巡邏霩􅛾所濱海對雙嶼港先年賊嘗登犯極為孤險春汛時月添撥官兵協守又該大嵩港兵船往來巡哨梅山港東至﨑頭大洋南至雙嶼港俱約半潮雙嶼港先年為賊巢今填塞矣西至大嵩港計一潮北五里至三塔烽堠最為險要今撥大嵩港兵船及本所軍船哨守大嵩所東連霩􅛾南接錢倉以大嵩港舟師為命大嵩港對峙韭山直衝外海先年賊由此犯所城突慈嶴地方極為險要今撥戰船巡哨海外設備舟山螺峯巡司雖有官署之設而巡檢弓兵俱散處民居螺頭嶴與螺峯烽堠離城十五里賊易登犯須遷居民入城則可鹿頭烽堠近海民少勢孤常被賊登犯須遷入而後可岑江巡司乃衝要海口也賊纍登劫見今居民雖築墻自衛亦被賊壞近又自葺理終難備禦須為慎固之計可遏賊衝天同嶴居民百餘家氣勢頗壯但力不支內有紫皮嶴居民千數若協力出守彼此可以無事內又有鹿夫善射曾勝倭冦宜令悉力防禦碇齒隘與外港相對居民勢孤纍被登劫其原守軍餘又已取回必遷居民入內地則可竒嶴烽堠即大沙地方賊常於此登舶原有隘己廢二嶴居民大户約有千數合力出守方可恃也郎家碶西碶寨相連又小沙居民殷庶有隘軍共守但地勢散濶難以設備賊嘗登劫以碶頭海塘築堡協守則可袁家碶即沙嶴地方原有馬嶴千户所軍民併逃民約計二千若遷入城以合其勢庶可相接濟也山江烽堠與沙嶴相連有隘軍防守賊嘗登犯軍己取回須遷居民入袁家碶等處則可岱山巡司與于碶堠寨相連居民自築垣防守賊嘗登犯該司居隆教寺內亦為虛應須併力捍禦則可吊嶼因近海口每被登劫須與小展居民協守則可沈家門寨原係水操之地冇軍防守近皆取回畨船去來皆泊於此內有趙嶴南嶴蘆花嶴大嶴去寨三五里向者居民築牆大嶺阻截總路近賊徑由水路或門道而入纍被劫掠更須慎禦庶克有濟臨觀總臨山觀海二衛設一把總分守寧紹參將即此總所轄之地也海岸設備三江所海濱地勢梢緩然海上有警則去省城八十里烽火之通於此攸寄瀝海所東衛臨山西捍黃家堰有蟶浦等堠撥軍瞭望臨山衛坐當衝要東接三山西抵瀝海設烽堠者十撥軍瞭望三山所界於臨觀之間西以聲援臨山東以䇿應觀海者也撥軍瞭望觀海衛西有三山為右翼東有龍山為左翼居中調度聮絡應援烽堠七處每堠撥軍瞭望龍山所北對金山蘇州大洋東對烈港況伏龍山獨臨海際去所僅十里乃賊船往來必由之路臨觀一總之咽喉也封守慎固省城安枕而卧矣金家嶴丘家洋連界東對烈港海洋北望洋山三姑大洋嘉靖丁已倭舶盤據本嶴及丘家洋月餘為我兵所捷若突腹裏由鴈門嶺鳯浦湖一帶至慈溪縣直抵寧波內地極為險要今撥烈港兵船哨守海港設備三江港港口深濶外通大洋甚為險要賊船若自宋家漊突入腹裏從陡門一帶海塘可至紹興地方越港而北為浙西赭山乃省城第一關鎖也蟶浦港北對浙西石墩南至紹興府城通連大海極為險要嘉靖三十二年賊船泊西匯嘴登犯若突腹裏由沿江塘路至百官梁湖直抵上虞縣兵船哨守不可一日少緩臨山港切近衛城直衝大海倭舶屢犯見設舟師屯守西哨浙西澉乍二浦東哨觀海龍山如遇臨觀海洋有警馳報烈港兵船合䑸截剿泗門港為餘姚縣東北之喉襟越港而北為浙西澉浦最為隘要嘉靖丙辰倭舶由東北烈表突犯本境今撥本衛兵船巡哨勝山港港深而廣倭舶可乘潮以入嘉靖丙辰由此登犯三山所官兵敵退之近議築塞港口又建墩臺於山上古窑港為慈溪之咽喉北對乍浦東哨觀龍西連平石極險之處嘉靖三十五年賊船盤據突犯慈溪地方今撥兵船巡哨金墩浦為定海慈溪相界之地北連大海西連伏龍山此處坐臨海塗賊船自東北而來必由此繫泊嘉靖已未賊曾登犯見撥軍船往來巡哨烈港所係甚大蓋賊船之入臨觀也非由澉乍則由烈港誠臨觀之門户甚為險要先年議設三江蟶浦臨山勝山古窑五港以衛臨觀後因各港沙硬水淺難泊而止今議派臨觀把總兵船改調烈港出哨臨觀一帶地方海寧總海寧衛立把總一員其分守嘉湖參將即此總所轄之地也海岸設備海寧演武場枕海曾經倭泊實為險要舊設陸路厰倭據為巢厰毁今撥旗軍哨守澉浦鎮巡司外與秦駐山大步門相連山灣潮浚賊船曾泊此可通內地宋停村紫雲等處接近嶼城此衛南之衝也今派龍王塘兵船巡守海口巡司此處海灘沙汙船隻難泊迤北乍浦相連內有白馬廟八團墟民叢集遞年倭冦突犯將向南北必先住此觀望虛實其地內通嘉興平湖嘉善等處乃衛北之衝要也今撥龍王塘兵船巡哨南海口操備厰離海半里與東海口陸路厰俱為衝要金家灣此處潮深山僻遞年賊船登泊若犯腹裏直抵平湖沿海則侵乍浦直抵海鹽實為險要今撥西海口兵船巡哨梁莊寨倭冦屢登為巢實為險要赭山寨東南逼大海面對蕭山與錢塘江口相連先年倭嘗突犯實為險要石墩山寨東南倚海山下有一小港外通大洋遞年倭冦登據為巢船泊港內極為險要原設寨軍防守後掣回所城止於石墩烽堠撥軍瞭望鳯凰山寨南臨大海坐對膺衝門倭嘗犯此實為險要黃灣寨東與澉浦接界南對大洋北通腹裏硤石地方昔年倭冦屯據為巢實為險要海港設備東關外龍王塘外即大洋直對浙東臨觀等處迤南半洋中有白塔山賊船可泊賊若登岸向南則侵澉浦往西則侵腹裏天寧寺水陸通衢直抵嘉興實本衛之咽喉沿海之首衝也近議立為關隘今委官兵出哨西海口九王門澉浦等處黃道廟港南濱海與臨觀相峙倭冦登犯極為衝要西海口南通大洋北近平湖係折西之咽喉平湖之門户也本港海塗高硬潮水長涸不一船難繫泊恐倭船來潮突進則我之兵船髙閣關係匪輕當踏勘開濬建立水閘將各兵船浮泊活水遇警出剿此第一預防之計也今撥兵船出哨灘許金山青村一帶海洋與吳淞江兵船相㑹一國初定海之外秀岱蘭劍金塘五山爭利內相仇殺外連倭夷嵗為邊患信國公經略海上起遣其民盡入內地不容得業乃清野之䇿也趙工侍近奏令民開種以給幕租若興此利金塘一山即可墾田數萬畝嵗入米幾萬石玉環諸山計之每嵗可得米幾十萬石大為海防之助但其患二故當道屢議屢止其一是倭人藉以為糧結巢於此兵費反多其一是大家爭佃秋糧難徵且無益于小民以愚計之須丈量為屯田召民耕種輸賦軍門耕者塔棚厰而居不挈妻孥不得賣買逐嵗更始如大家放租之法則官民兩利而爭奪之患免矣官差石工伐山造堡海洋有警小民避入賊知堡中無子女財帛自無結巢之念矣一台州沿海近漲灘塗長數十里濶十里若做范蠡圍田之法令民耕種外設海塘一條以捍鹹潮俾不得傷稻每嵗起科以給幕租可得若干萬石一浙江寺田甚多勢豪吞占動以千萬畝計若每千畝抽其二百畝以給幕租每嵗可得米幾萬石主事唐樞云杭州居腹裏之地而以錢塘港海門為分户南岸為寧紹北為松嘉極西盡底為杭東臨大海若戰艦嚴守聞警即出把截賊難直搗副使茅坤云浙江所幕客兵當量緩急以為聲援䇿應則可爾恐不得為常而沿海郡縣所自部署勒習以為嵗戍之兵必於土著之兵擇其膂力猛悍之士若杭嘉湖販鹽處州礦徒并一切亡命者為之大約杭州三千嘉興三千而湖溫台寧紹亦各一二千量多寡以差其費當括十一郡縣民壯弓兵之屬而通計之腹裏郡縣則減去其半或三分之二特量留什之二三以給城庫刑獄之役而已其餘並籍其費以歸於官令各兵備道親為按歷州縣或擇諸州縣長吏破常格而募之且各州縣民壯弓兵之所食故額人七兩二錢然其民間所私相轉雇募一倍再倍者有之追呼道塗之費尤不可算約者請量為每名額徵一十五兩籍二人之所食而募二人其數可三十金把總指揮蔡汝蘭云東南自倭變以來議者不少然於台州獨無說焉何也夫台州遼處海濱誠四寨之國南有桃嶴金竹北有桑洲桐巖西有關山衛墅疊嶂層岡重關鳥道真一大可禦之險而且南去盤石楚門僅百五十里東南去松門僅百里東去海門僅八十里設或倭奴棄舟登陸皆可卒至城下自海門而上者則一潮直達實一時難禦之變也三面阻山一面瀕海孤懸於數百里之外救援接濟所難卒至者惟此耳曩者戚參將駐兵桃渚而倭奴屯聚桑洲遣輸糧銀經月不至孤危之勢誠可畏也今宜於台州専立督餉方面積聚糧餉訓練兵士以為重鎮而且西控溫處金衢北衛寧紹權非遙制而威可近飭也如是則糧餉無臨時輸運之難而士卒有先時設備之佚以至出海兵船衛所官軍悉知警備而防禦益固矣夫督餉既立則糧餉聚糧餉聚則兵士充兵士充則訓練精如是則先聲足以破其膽而防禦足以杜其釁衝突足以挫其鋒行之三年而海不揚波矣此督餉所當議也近雖添設兵備參將然於糧餉無禆雖增兵亦何益哉總兵俞大猷云自潭岸山以北以西之海水淺沙硬大船誤閣則破壞且無避風安嶴兵船至彼如遇夜必須當洋下碇碇不能堅每被急流飄去或夜半發風則尤危然多賴天幸非安計然則宜如何曰錢塘江烏嘴頭浦內船兵一枝不可無餘則練陸兵精卒一枝以待而嚴龕赭哨探逺諜焉庶救倉猝或曰賊舟何能至此曰賊用單桅小舟徑抵山邊閣乾登劫故必用陸兵追捕方不走脫若以兵船必髙大方能勝賊如與賊舟等則勝負未可必也今言禦賊於海也易要非通論海本遼濶舟行全藉大風與潮人力能幾風順而重則不問潮候逆順皆可行若風輕而潮逆甚難夏秋之間西北風起不日必有極大西北風也操舟者見此風候須急收安嶴兵船在海海舟遇晚俱要酌量收舶安嶴以防夜半發風至追賊亦要預計今晚收舶何嶴若一意前追遇夜風起悔無及矣又云沿海之中上等安嶴可避四面颶風者凡二十三處曰馬蹟曰兩頭洞曰長塗曰髙丁港曰沈家門曰舟山前港曰潯江曰烈港曰定海港曰黃岐港曰梅港曰湖頭渡曰石浦港曰猪頭嶴曰海門港曰松門港曰蒼山嶴曰玉環山梁嶴等嶴曰楚門港曰黃華水寨曰江口水寨曰大嶴曰女兒嶴中等安嶴可避兩面颶風者凡一十八處曰馬木港曰長白港曰浦門曰觀門曰竹齊港曰石牛港曰烏沙門曰桃花門曰海閘門曰九山曰爵溪嶴曰牛欄磯曰旦門曰大陳山曰大床頭曰鳯凰山曰南麂山曰霓嶴其餘下等安嶴只可避一面颶風如三孤山衢山之類不可勝數必不得已寄泊一宵若停久恐風反别迅不能支矣又潭岸山灘山許山之類皆圑土無嶴一面之風亦所難避可不慎乎都御史唐順之云往時浙直軍需多倚各省協濟自例罷協濟之後而窘急甚矣胡總督近有乞留運米借鹽銀之奏蓋以軍需無處甚不得已全仰此一著救急又云江南控扼在崇明浙東控扼在舟山天生此兩塊土大海中以障蔽浙直門户諸哨船皆自此分而南北總㑹於洋山若會哨嚴緊遇船即打賊何從入都指揮戴沖霄云議者皆謂玉環等山可興屯田之利以給幕租愚謂此等山古時有民居耕作信國公皆遷之於內地不許其得業豈誠棄地利而不知惜哉亦念荒山起稅為利不多即以萬畝計之不過千石若冦據此以為巢穴則攻逐之費不知幾倍是賫盜糧為小而失大也故舟山止留二所瞭守而亦不許民屯種其為慮至深逺今日備倭之䇿不必逺求查復信國公之制而已矣籌海圖編卷五
