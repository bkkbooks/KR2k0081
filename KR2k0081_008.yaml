body:
  text: 籌海圖編卷九明胡宗憲撰大捷考望海堝之捷永樂巳亥永樂已亥中軍都督府左都督劉公江總兵鎮遼東甫至即相地形勢請于金線島西北之望海堝築城堡立煙墩一日瞭者言東南海中王家島夜有火光計冦將至公亟遣馬步軍赴堝上小堡備之翼日倭賊二千餘人以數十海泊馬雄島魚貫而上直逼堝下一賊貌甚醜惡指揮諸賊如入無人之境公得報但令犒師秣馬略不為意徐以都指揮徐剛伏兵山下百戶薑隆率壯士潛燒賊船截其歸路約曰旗舉伏起炮鳴奮擊不用命者戮既而賊至公披髮舉旗鳴炮伏兵盡起為兩翼而進賊遂大敗奔匿櫻桃園空堡中我師追逼環而攻之且請入堡𠞰殺公不許故開西壁縱之仍分兩翼夾擊生擒數百斬首千餘間有潛脫而逃者復為隆所縛無一人得免者諸將請曰公見敵意氣安間惟飽士馬及臨陳披髮而戰追賊入堡不殺而縱走之何也公曰窮冦遠來必飢且勞以逸待勞以飽待飢法也賊始魚貫成蛇陳故作真武狀以鎮服之雖愚士卒之耳目亦可借以壯其氣賊既入堡有死而已我師臨之彼必死鬭我兵寧無傷乎故縱之生路而後掩擊之即圍師必缺之意耳事聞徵至京師面慰勞之封廣寧伯食祿一千二百户子孫世襲王江涇之捷嘉靖三十四年四月國家地廣治極文禔武嬉海壖姦商乘時盜販因緣忿怒轉為冦賊民不覿兵為日既久望風奔潰莫之誰何賊既連得利內附外連聲應氣合徒黨滋蔓動以數千萬計又善用兵能以少為衆所獲四方材勇懻忮武力之士率殱其手勢若烈火𦦨𦦨狡焉思啓蓋自壬子春更癸丑甲寅恣行轉掠戕殺燔燒叢萃藪窟新故環迭而兩浙三吳之禍變慘矣乙卯春柘林巢賊積增至萬餘人出掠嘉善諸處夏四月劇賊徐海麻葉等探知嘉杭兵調松江搗巢率衆數千人水陸並進聲言先攻嘉興次及杭時巡撫李公留守杭總督軍門在華亭無兵可恃軍民洶洶甚懼御史梅林胡公方巡浙東台溫諸郡得報連日夜馳詣嘉興會賊從嘉善來前驅迤邐薄城外衆益懼甚公曰兵法攻謀為上角力為下矧又無兵乃密屬吏取酒百餘罌鑽其顚投以毒劑塞如故載兩船選兵卒機警而猛者假冠服持赤牘坐船上稱解官解酒餉軍載向賊所從道見賊即褫去冠服走賊信不疑馳報諸酋長諸酋長得酒大歡相率髙會痛飲率多死巳又令村市酒家皆入毒甕中約償以直民所有米漬藥水淅而遺之賊往往爭取飲啜輒又死然賊黨尚衆我兵寡且恇怯適保靖宣慰彭藎臣所領土兵數千人至可使胡公䇿其恃勇犯忌使人傳語之曰賊善伏且知分合我兵常為其誘冝分竒正左右翼擊防其突出藎臣不聽乘鋭直前果遇伏墮賊計挫於城南石塘乃始大悔遂有潰志遠近震駭大失望胡公深憂之曰如是我技窮矣於是親詣軍營宣諭且勞苦之曰勝負兵家常事惡足介介凡爾所以僨者以不知地利中其伏我聞賊酋多死衆絲棼無紀且久不得食息瑕可攻若等無畏顧兵多無衣與器械乃使人悉索諸質肆故衣頒給之加賜錢帛牛酒飲食召諸金木工晝夜繕造器具懸重賞苗兵感激思奮察可用乃指畫石塘地形曲折曰女宜以兵若干為前鋒從塘路進若干為竒兵伏道左水兵船若干環列道右防其逸皆後前鋒數里候賊將至某處前鋒迎敵佯敗走俟其過伏伏盡起三面夾擊蔑不勝矣藎臣如公䇿賊果僨敗北走平望平望故别有苗兵營賊不知會總督張公從松江兼程來視師而永順宣慰彭翼南復從泖湖西出胡公又同督察趙公部署參將盧鏜等厲激之且躬擐甲胄徑馳馬趨出四面合圍軍聲遂大振賊大沮還走王江涇既連疲於奔又餒且病矧無統紀遂大潰不支土兵與我軍乘之斬倭首二十餘級墮溺水死者不可勝校蓋自是嘉興杭人始安枕軍民主客始知賊猶人非真若鬼神雷電虎豹然不可嚮邇浸有鬭志賊亦自是稍稍顧忌逆氣狂謀漸以虧朒始可誘而圖矣嗟乎竒變決而波才破洛澗襲而淮淝捷嘉山合而博陵奔蓋自昔禍亂之興必有忠義材武韜鈐之臣以指揮擘畫敉寧戡定蓋天所以奠安維極綏輯神人鴻德好生常假手乎巨公偉人實為之孰云其果夢夢哉武進左子好論次當世事而謂故所收公私牘牒載王江涇戰功混淆無紀屬余詮次余為詮次而歸之庶後經世者有考焉都御史胡松撰平望之捷嘉靖三十四年五月嘉靖乙卯夏五月官兵敗賊於吳江之平望先是永保之兵既皆失利賊遂肆意猖獗一西北入太湖犯常州一西南犯杭嘉湖其犯杭州者至塘棲二宣慰復失利賊掠北關去欲由蘇州入海道吳江之平望浙直鄉兵會擊之賊腹背受敵大敗走松江至三店我兵邀擊之斬首七百有竒中毒死者千餘人是戰也巡按御史胡公宗憲副使董士𢎞僉事王詢以浙兵至參政任環知府林懋舉以直𨽻兵至而三店則推官劉泉功居多皆不藉客兵之援由是而專任鄉兵之議興矣嗚呼客兵之用豈得巳哉蓋彼之獷狡不馴非素有禮義之習我之恩威未洽難責以忠愛之心恤之過則驕操之急則變勝敵不足以償其掠民之害厚賞不足以稱其邀求之私前方城宗氏論之詳矣雖然冦攘猝起民不知兵慮客兵之禍而徒驅民以戰如投羊於虎是畏溺而避舟者耳故調客兵者一時之權恃客兵而忘練鄉兵者非經遠之䇿調客兵而練鄉兵兵可用矣而後酌勢之緩急敵之多寡以處客兵遣之則我無乏用之嫌留之又有以制其反噬之毒我師梅翁之底定東南也外立戰勳內鮮兵變今日遣客兵數千而賊無玩心明日來客兵數千而民無懼色者用此道也彼謂客兵必不可用而又無練募之法者吾不知其所終矣太學生俞獻可撰陸涇壩之捷嘉靖三十四年五月嘉靖乙卯夏五月松江柘林之冦千餘人流突李塔滙歷張莊小崑山趨泖湖而北保靖宣慰彭藎臣兵追之抵蘇州之陸涇壩壩離城十里而近兵備副使任環督兵擊之擒其梟帥俘斬五六百級水火死者不計尸盈阡陌婁水為赤殘寇僅二百人值暴雨追之不克逸歸柘林嗚呼往嵗倭賊覘我無備揚帆深入視吾蘇不啻几上肉耳是捷也論者皆謂我兵有死之心無生之氣而又益以藎臣善戰之兵其勝宜也愚謂不然戰之日續親見之矣撫巡乘城督兵傳餐冦矢如雨自婁門以東達於陸涇壩我衆連呼戰者三曰今日我任父對敵所不捐生以報者有如此日由是士氣百倍總兵俞大猷并二宣慰兵三路並進奮勇夾擊遂收全功當是時使非任公身先督戰則吾不知民之僇力者何如使戰而弗勝則鼓冦之怒其慘吾又不知何如也抑陸涇蘇之東境也前此浙江巡按御史胡公宗憲有王江涇之捷則蘇之南境後此提督都御史曹公邦輔有橫涇之捷則蘇之西境未幾任公復有三丈浦之捷則蘇之北境一嵗而賊四衄於蘇蓋自是而蘇無倭冦矣崑山舉人李續撰後梅之捷嘉靖三十四年十一月嘉靖乙卯冬十一月倭賊自福建福寧州之連江洪流入浙境越平陽仙居至寧波奉化與錢倉賊合幾七百人深入紹興勢益滋蔓提督都御史胡公宗憲親督兵備副使許東望容美土目田九霄同知曲入繩等兵往戡之遇賊江橋僅隔一河公謂諸將曰賊見我不顧而南其氣未可乘若稍止觀望可圖也吾茲試之乃於馬上自持一幟作指揮狀賊果聚觀公笑曰此易與耳乃令兵渡河九霄邀其前入繩襲其後賊見兩兵迭至大怖而走至後梅匿民家公復大笑曰賊若乘我兵半渡迎擊勝負猶未可量今巳投死地復何能為乃悉衆圍之三匝縱火焚之死者強半值天雨公與將士立田中夜二鼓大霧咫尺莫辨賊乘黑衝典史吳成器軍成器故善戰驅兵四面奮擊之擒斬復若干人然脫走者猶衆公計賊必由山西嶺而遁嶺之巔可伏也命設伏以待夜將半賊果至遂大敗之斬首及焚死者積五百二十有竒餘奔太平蒲岐港官兵復追之賊堅壁不出乃夜逼賊壘投以霹靂火器歡若劫營者賊驚起自相攻擊死者又若干人得脫者無幾竟出洋去丙辰春正月也時公新膺簡命未浹旬輒有竒捷如此烏程縣學教諭張節撰清風嶺之捷嘉靖三十四年十一月嘉靖乙卯冬十一月倭舶三艘艤南麂之西麓提督都御史胡公預設海艦封守甚固二舶不能入揚帆而東其一西走我兵躡之沈其舟追入嶴內相持八晝夜賊窘甚從山後竊划船逸去颶風驅回登劫大嶴至三港守備劉隆千户劉綱百户張澄戰殁於陳賊勢復熾遂越金鄉趨台州以漸北向時公方奏樂清之捷會台州告急公笑曰冦來有三敗我皆得之不足平也初冦登平陽守將不循約束故得深入今台守談綸干城之將且素受方略賊玩蹂其疆一兵法小敵之堅大敵之擒冦方得志三港其氣驕我兵方捷於樂清其氣徑以徑乘驕如拉朽耳二容美兵精悍甲諸部萬里從征朝氣正鋭但初未諳險厄今授以布伏邀擊之法則為全勝之技三遂命分道布截天台以南綸兵當之新昌以北容美兵當之綸兵逼壘而進以典史吳成器統部署為前哨報效吏章延廪為後哨百戶王世仁陳濠督捷卒伏於小江道左知事張東督鄉兵伏於顔坑諸處而又迎賊所向預置藥蜜藥餅餌之由是賊或中伏或中毒擒獲三十餘顆傷死者不計始悔入台州境十二月扺新昌知應台關有備去至嵊縣三界上館嶺會容美兵陳而待田九霄以正兵當其前田九章援兵繼進左翼則留守王倫伏兵當之右翼則經歷畢爵伏兵當之指揮吳江率部兵繞賊後背夾擊且多張旗幟為疑兵以撼賊勢賊四面受敵且戰且走我兵追之入清風嶺烈女祠俘斬一百七十餘是䑸也賊二百餘徒歷溫台紹三郡始克𠞰滅其敢於深入者猶恃紹興之倭欲與合夥逮越台州始知舊倭巳破於是既畏談兵不敢南復畏土兵不敢北卒至於敗如公所料云武進舉人吳嶔撰仙居之捷嘉靖三十五年嘉靖丙辰春三月朝廷以都御史胡公纍建竒勳命以兵部侍郎總督浙直福建軍務會福建桐山之賊流逼浙境同知黃釧指揮梅魁禦之賊潰圍北走公密令副使劉慤預伏兵塔石蕉蒲諸山嶴險厄則潛置火器以待仍列舟師於山側之江濵賊至伏起殺傷甚衆遁由天門埭至平陽青田越小峙沿江而南遂入荆溪荆溪通仙居樂清之孔道也時臨海天台業巳受公計集鄉兵守黃潭箬孔中渡由是賊不得犯寧紹由烏杭西入仙居乘城築未完衝突焚劫慘倍他地乃咨提督都御史阮公鶚馳救之復行副使許東望知府談綸總兵盧鏜兵從東路而進賊聞大兵且至遂走斷橋彭溪巢於民舍我兵合圍攻之俘斬三百餘級焚溺死者無算所存六十餘人取道天台之北復為赤城民兵所殺是時浙東西硤石梁湖之賊各萬餘人俱薄會城魁桀難制江南北新舊屯據者數亦逾萬公以一身寄諸藩之安危以一心當百萬之兵甲隨機督𠞰算無遺䇿直𨽻有寶山之捷兩浙有西庵清水窪之捷而桐山流冦亦旋就殄戮謂公今之子儀非耶嘉善訓導謝顧撰乍浦之捷嘉靖三十五年七月嘉靖丙辰秋七月賊徐海陳東之解桐鄉圍而東也陽為聽撫心實狐疑自吕港新場移屯乍浦城南營厰絡繹改修舊船以圖出海且窺伺我兵強弱為其進止總督侍郎胡公䇿知其計因外示羈縻而密檄副使劉燾圖之會尚書趙公再命督察至公乃與定議以乍浦西南海塘可通杭州咨浙福提督都御史阮公偕郎中郭仁副使徐洛總兵徐珏等壁海鹽以遏犯杭之路東北金山可通松江浦東咨直𨽻提督都御史張公景賢駐松江而參政任環僉事董邦政留守王倫同知熊桴容美土官田九霄等扼青村黃浦及出海之路公親督大兵與參政汪柏參議王詢等駐平湖與賊逼壘而陳總兵俞大猷盧鏜等則以舟師設伏洋山馬迹邀其歸路分布既定候間而發適上海之賊由吳淞而西南出復萬餘人公恐海或中變與之連衡急啖海使東出擊賊可得舟還島海以為然果逆斬賊數百賊遂夜走以故海不及取其舟而返其他酋長脫出海者公巳别遣大猷伏飛艦海上邀擊之溺且盡公又計海書記麻葉不死無以堅其內附之心而陳東者與麻葉聲相倚桐鄉之役與海相睚眥者也於是又計令海縛麻葉縛陳東以獻海遂併有其衆而諸酋長則疑且怨海矣海自度進退無所而趙公簿責海益急公因遣諜私海令其誘衆俘斬之以謝可無罪海不得巳從之遂與定約與前縛麻葉陳東等俱詳見鹿門茅氏所為𠞰徐海本末紀公乃令副使劉燾引遊擊尹秉衡兵夜伏乍浦城中而徐珏等兵分為三哨進壁白馬廟左灝等兵由平湖間道而出主簿曹廷慧參將丁僅等壁乍浦城以為內援至期珏等移營瓦山海果挈妻走海上艘羣倭爭逐之大亂城上舉火我兵四合競進大敗之燒賊巢厰二十餘里時海執稱歸順投梁莊去諸遁出海洋者大猷兵邀擊之前後俘斬七百有竒沒海及焚死者無算乍浦之賊無孑遺矣夫徐海以首惡煽禍而陳東麻葉等為之掎角勾引外夷侵擾中土受其螫毒者五年矣丙辰春擁衆數萬分道入冦北犯瓜揚阻絶運道東掠寧紹牽制我師聲言欲下杭州犯留都比之曩時猖獗尤甚公相度機冝不輕與爭鋒捐千金賞敢死之士用間誘退吕港賊艘以伐其深犯之謀復誘令殺賊立功以剪其羽翼之勢擒麻葉擒陳東度其孤危可以取矣猶謂困獸死鬪乃故棄船海澨開一靣之缺而卒以遊兵邀之無一得脫者後先下著不爽纎微島夷之所以畏服而東南之所以奠安者不以此哉不以此哉餘姚舉人諸大圭撰紀剿徐海本末嘉靖三十五年八月嘉靖丙辰徐海之擁諸倭奴而冦也一枝由海門入掠維揚東控京口一枝由淞江入掠上海一枝由定海關入掠慈溪等縣衆各數千人而海自擁部下萬餘人直逼乍浦而登岸則破諸舟悉焚之令人人各為死戰又導故窟柘林者陳東所部數千人與俱併兵攻乍浦城蓋四月十九日也當是時朝廷方奪故總督而新總督胡公自提督代之甫八日問幕府麾下募卒僅三千人俱孱弱不可用故總督所徴四川湖廣山東河南諸兵俱罷去所為緩急者特容美土兵千人及參將宗禮所藉河朔之兵八百人耳南北諸倭酋不下數萬諜者聲言他酋分掠於江淮吳越諸州郡間以扼援兵而海等當窟乍浦下杭州席卷蘇湖以脅金陵氣恣甚總督胡公方召諸司畫計無何故提學阮公代胡公為提督檄未至夜半聞乍浦圍卷甲趨之胡公亦分遣兵澉浦海鹽之間為聲援而自引兵壁塘栖相犄角居頃之海聞新總督胡公即故御史所嘗提兵督戰於鶯湖王涇之間而覆之者氣稍阻尋罷乍浦圍聞兩公方擁兵壁近郊不復敢窺杭於是徑略峽石越皂林出烏鎮以北烏鎮者即海故所犯蘇湖舊路也當是時胡公既獲諜度蘇湖之間惟鶯湖為四戰之地於是檄河朔兵自嘉興入駐勝墩陳而待因以吳江水兵遮其前湖州水兵尾其後而公自引麾下募卒及容美土兵衡擊之提督阮公自崇德聞賊且出烏鎮也即道挾河朔之兵騎而馳及之於皂林令善射者且躡且射賊稍稍引去賊縱數百人嘗之輒又敗去賊怒甚鼓譟而前提督阮公勢皇急於是走輕舸入保桐鄉而參將宗禮與裨將霍貫道等乃自張左右翼厚集其陳以待戰數合擊殺數十人會日暮賊且引去時賊氣頗窘而宗禮霍貫道等亦巳絶嚮道不得擇善地便水草以自休止明日餓而戰賊遣候者樹而望蓋孤壘以塹無他援者也大喜復縱兵以半擊其前以半繞其背而霍貫道河朔故驍將也大呼衆力戰矢炮如雨下無不人人一當十復擊殺數十百人而貫道亦手自刃十餘人賊益怖海且中炮欲馳去會火藥盡霍貫道靣宗禮仰天呼曰吾兩人再得藥數斗可以了此賊矣未幾貫道與宗禮俱陷衆大敗賊遂乘勝圍桐鄉時總督胡公巳引兵躡崇德聞之澘然流涕曰河朔之兵既敗東南之事無復可支矣賊巳困桐鄉假令復分兵困崇德以劫我我兩人譬之抱石而自沈也國家且奈何於是還省城檄諸路兵為戰守計先是公始為提督時嘗與監督趙公謀曰國家困海上之冦數年於兹矣諸倭奴乘潮出沒將士所不得斥堠而戌者人言王直以威信雄海上無他罪狀茍得誘而使之或可隂携其黨也按部題亦嘗有用間為䇿者於是遣辨士蔣洲陳可願及故嘗與王直友善者數輩入海諭直直果感悅願如約遣其養子毛海峰欵定海關謝過間以諭海海已勾薩摩諸島人入劫故不相及而海峰者云云彼固未之聞也胡公䇿曰直與海雖順逆不同其勢固脣齒也直既悔悟海獨不可以大義説之乎不然彼貪人也誘之以利或可狃其心聞桐鄉城小而堅緩之數十日則永保戌兵至固可破之矣於是疾走人諭海峰因厚遺諜者隂過海所曰直巳遣子欵定海關朝廷固且赦之矣若獨無意乎新總督威名非曩時比且仰體朝廷德意推心置人腹若不乘此時解甲自謝他日必為虜矣海頗然其計於是亦遣酋自謝約罷圍去因以要公稍出中國貨物遺他倭酋而疏釋其罪公佯諾輒以銀牌綺幣厚遺來謝酋而隂令營中盛兵容私諜者故縱酋瞰之酋既德公遺又內怖公之兵威也歸以報海明日復遣他酋來謝公視之如初凡數復海於是始歸心於公願為公死之矣然陳東獨心切疑海私公遺猶鞅鞅未之從也海間遣酋次桐鄉城下私城上兵曰某已聽總督胡公約解去矣城東門故柘林賊陳東黨也鷙悍不吾從若當謹備之是夕海果道崇德而西且乞他兵於公以夾擊東胡公猶心訝未之許而東獨盛為樓櫓撞竿以撞城而桐鄉令金燕者強幹吏也城中一切兵仗火藥諸巳繕備提督阮公復躬厲矢石徇城上人下令散千金募敢死之士督戰益亟所殺傷賊亦數十人方撞竿自樓櫓中躍而撞城城幾壞一男子為緡索圜撞竿所擊故窟處竿至即緡挽以上斬之又募冶者煮鐵汁灌城下酋城下酋不敢逼東既無何聞海等解去道逺勢且孤亦相與稍稍引去圍始解而提督阮公出矣時五月二十三日也方阮公困桐鄉時固日夜望總督胡公援兵之至而胡公亦重念東南之安危身之禍福與阮公相旦暮情固急業巳遣兵備劉公督同留守王倫宣撫田九霄勒兵自嘉興入壁斗門分守汪公督同知縣張冕勒兵自湖州入壁烏鎮參將丁僅勒兵自海鹽入壁王店指揮樂塤督同千户羅天與勒兵自崇德入壁石門又令崇德令崔近思收河朔之散卒入城為聲援兵四靣環賊逺者二三十里近者十餘里而陳然各以狃皂林之敗逡巡惶怖不敢逼而公業遣諜羈説賊亦日夜望永保戌兵之至以決一戰也計無可奈何而胡公與阮公兩人者為同年故深相結者及援兵不合阮公自圍中頗急於是兩相猜而他謗者與為飛語撼兩公者盈道路矣當是時朝廷聞東南之冦即日出尚書趙公督山東河朔諸兵援之於是日夜引兵而南至揚州則阮公業巳出桐鄉圍東渡錢塘徇會稽諸下邑擊他賊胡公亦聞尚書趙公之至且戰且南淮揚毗陵之間無足慮海為巨孽間雖狃而內附中固不可測而上海之賊萬餘人由吳淞江西引方急乃日遣諜者啖海以金帛而説之東出海上擊他賊海亦果收諸倭酋出乍浦道平湖時諜報吳淞江之賊巳鼓行涉嘉善界欲西合海公念海萬一卒他變兩相合奈何因䇿海始巳焚舟為深入今不得舟必急於是遣諜詗海謂海既內附何不如故約勒兵擊吳淞江賊且篡奪其輜掠舟以歸海果然其計即日引諸酋逆之朱涇道上斬首若干級餘賊遂夜走以故海不及篡奪其舟而還及他酋脫而出海也公又别遣總兵俞大猷伏飛艦海上遮擊之溺且盡於是海既德公不敢背又聞吳淞江賊之出為海兵所遮擊益內怖日輸欵於公遂輦故所戴飛魚冠及他堅甲名劍數十種並以輸公而間遣其弟洪入質於公公固佯納之公又諜聞海麾下獨書記麻葉為長酋其為人頗黠而悍近與海爭一女子有微郤非用間急縛之則無以死彼之內附之心於是遣諜就海帳中諷海縛麻葉以出麻葉出而諸酋中故𨽻麻葉部曲者稍稍怨且懼矣怨且懼恐生他釁則又以他罪縛酋幾百餘人公又䇿陳東於諸部曲中與麻葉聲相倚頃以桐鄉之役兩睚眥者也數遣諜持簮珥璣翠遺海兩侍女令兩侍女日夜説海並縛東海間諾而陳東者薩摩王弟故帳下書記酋海固未之能也於是出麻葉囚中令其詐為書於東反兵賊殺海其書故不以遺東隂泄之於海激怒之使並縛東海讀其書涕雙下益德公之不忍為東所賊殺之也日夜謀縛東以報公於是出所故掠中國貨物千餘金賂王弟詐請東代署書記海因夜得東即縛以故約復於胡公麻葉與陳東相繼縛而諸酋長洶洶內亂矣是時諸酋長既疑且怨海無鬬心故其氣日窘海亦自度縱令反故島當亦必為諸酋長所賊殺故為內附日固而督兵者簿責海益急海既急因念欲掠舟出海恐為海上兵所劫欲列壘拒官兵又業巳內附不忍背且陳東黨固日夜襲殺之也公䇿曰彼既亂吾可乘之矣因遣諜私海曰我固欲寬若趙尚書爺以若罪孽大何不聽我艤數十艘海上若且誘之逐海上艘令俘斬千餘級以謝趙公而若因得以自完乎海不得巳且疑且諾因約兵備副使劉公引兵伏乍浦城中而某日時某當引衆出海岸去乍浦城半里而陳佯令衆酋逐海上艘某手麾之城中官兵即舉燧為號從城中出亟擊勿失諸官兵卒如故約乘之諸倭酋逐海上艘如蟻不及還兵鬬於是諸官兵得乘勝蹂而前不傷一卒所俘斬數十百人沒海者無算於是海自以數有功於朝廷願與部下諸酋長入欵且庭謁胡公與尚書趙公提督阮公及巡按趙公並許之諜往復期以八月初二日然海猶恐間設甲士劫之先期一日卒擁酋數百人胄而陳平湖城外自帥酋長百餘人胄而入平湖城中以求四公者計不許恐他變遂許海與諸酋長北嚮靣四公按次稽首呼天星爺死罪死罪海欲再為欵胡公而未之識因顧諜諜目示之海復靣胡公稽首呼天星爺死罪死罪胡公亦下堂手摩海頂謂之曰若苦東南久矣今既內附朝廷且赦若慎勿再為孽海復稽首呼天星爺死罪死罪於是四公厚犒遺之而出是日城中人無不灑然色變者海既出諸公者固已忿恚海之列欵猶胄而入屬強脅無禮又不及如諜故所期月日而先日卒至也其習行桀黠若此於是闔謀不勒兵誅之他日必為患計部下尚千餘人猛鷙難即破永保兵猶迤邐逺道未至也於是佯令海自擇便地居之海果自擇便地得沈家莊即僦沈家莊與居之是為八月八日當是時衆復喧然譁公何不撲滅海不然且縱之出海上令自解去顧豢虎以自禍也不知公固有待於是私自部署兵又日夜遣使趣永保兵來會兵未集恐海驚禍且肘腋間因日遣諜詗海且啖海如曩時公因謀以語諸公曰吾聞善兵者乖其所之海與陳東黨業已深仇今合而兩附者迫故耳聞沈家莊故東西兩處而中綰河為塹何不説海以西沈家莊居陳東黨而自擇東沈家莊以居部下酋乎諜以諭海海果如其言頃之永保兵至會海輸二百金於公市酒米公復以藥毒其中而歸之又令陳東詐為書夜遺其黨曰海巳約官兵夾剿汝輩矣陳東黨果疑而夜伏邏卒東沈家莊道上瞰之適海皇急因令酋竊兩侍女出道上而急則因間道走幕府以自托邏卒瞰知之歸以報於陳東黨陳東黨聞之大驚即勒兵篡兩侍女過海所罵曰吾死若俱死耳遂私相矟而鬭海中矟衆大亂明日官兵四靣合墻立而進保靖兵先當之稍却河朔兵乘之又却俄而胡公擐甲厲聲叱永保兵左右列大呼而入瞰壘下擊會風烈公麾衆束千餘炬人各持炬縱火焚之海窘甚遂沈河死甫食頃人人鷙而攫千餘酋搜斬殆盡矣中所故飲毒首虜黑色者凡三百餘人於是永保兵俘兩侍女而前問海何在兩侍女者王姓一名翠翹一名緑姝故歌伎也兩侍女泣而指海所自沈河處永保兵遂蹈河斬海級以歸副使茅坤撰龕山之捷嘉靖三十五年十一月龕山之賊自溫州登岸蔓延於會稽經歷文某與戰于苦竹嶺副使孫宏軾併軍門所調竒兵與戰于析開嶺于翁家村參將盧鏜與戰于斤嶺于梁同賊乃敗走龔家畈百官渡過曹娥江順流而西狡黠善鬭噬齚孔棘初總督都御史胡公方在浙西剿川沙之賊移檄諸將竟未有能殄之者至是親提大兵至欲斬不用命者以徇於是僉事李如桂王詢指揮楊永昌知事何常明典史吳成器等兵併力追擊於瓜山戰三界戰母婆嶺朱家漊賊遁蕭山之丁村杭湖至陳家灣雖多所殺傷而凶焰愈熾公至擇地形壁龕山之巔分諸將信地皆露宿以待時參將盧鏜戰還公促明日再戰鏜曰士疲矣休養數日乃可公佯許諾而密召親兵謂曰若曹豢養久未立戰功今賊將滅而諸將首鼠不進萬一賊得脫此徑渡錢塘江奈何今日正若曹立功之會能乘其不意而襲之賊可盡也衆皆踴躍請效死巳乃激令成器統之以進不數里遇賊死戰無不一當十賊遂大敗循海而走登匿山坡堡內我兵四靣奮擊不得巳登屋擲瓦礫下瓦盡繼之以槍槍盡投刀刀盡乃下死守我兵攻堡破之悉斬首以獻時日且暝公喜謂諸將曰此賊流突千里轉戰無慮數十無能攖其鋒者今一鼓蕩平真朝廷天威也命取賊心啖之選猙獰首級草餘顆置案上每顆為飲一觥左右皆失色而公談笑自若也達旦諸營方知破賊相率入賀公謂鏜曰再一二日何如鏜大欽服乃完師而歸時乙卯冬仲既望也山隂縣學生員徐渭撰金塘之捷嘉靖三十五年辛五郎者宿冦徐海之偏裨也與陳東葉宗滿麻葉輩同巢柘林攻乍浦圍桐鄉毒螫吳諸州郡其志欲吞全浙窺留都勢甚猛也總督胡公欲滅之忌海與其黨既而海受餌為我用擒其所惡陳東麻葉輩而遣其所歡以歸倭島五郎在焉公密令總兵俞大猷等分布海洋要衝截殺諸冦而五郎則責之盧鏜鏜接密諭時方對諸客食忽命治艦之金塘山客相顧莫知所謂鏜自乘福船令子相督率哨船為前驅次日至金塘瞭見北洋有大舟揚帆而南令哨船四散潛泊少選大船艤金塘之麓賊皆登憩鏜知其為五郎也令哨船叢射之繼以銃炮賊以手且搖且招搖者示勿攻擊招者示有所言也相乃揚言曰欲打話須去爾兵器賊拍掌示無而呼一董一董者一家之義乃倭語也有華人從冦者曰吾乃胡總督爺招安放回者也相問曰有牌驗乎曰有鏜招衆賊至舟傍慰藉之謂五郎曰汝既為軍門所遣豈可慢乎請至縣欵洽而津送之遂延五郎同舟餘𣲖哨船分載每載不過三四人多則不能容也五郎辭鏜厚加禮貌五郎不疑宴至深夜鏜坐福船上層將臺侍者引雙燈上桅俄而哨船蝟聚鏜問之曰如何相對曰是了五郎大驚請下哨船與衆夷同宿鏜曰諾令左右送之穴梯而下至蓬户外望維海而巳五郎悟欲赴水死左右不許曰卧塌在地平下五郎度不能免浩歎就卧相縛之翌日入定海關乃知賊徒俱巳芟盡即前夜起雙燈時也是了者乃復命也羣賊死時皆不知軍門之謀僉訝哨兵敢行誤殺五郎亦自以偶遇盧鏜被執不知其出軍門也嗚呼神哉後獻俘告廟天子賜璽書奬公天下無不稱快云崑山進士王宇撰擒獲王直嘉靖三十六年十一月王直者歙人也少落魄有任俠氣及壯多智略善施與以故人宗信之一時惡少若葉宗滿徐惟學謝和方廷助等皆樂與之遊間嘗相與謀曰中國法度森嚴動輒觸禁孰與海外乎逍遙哉直因問其母汪嫗曰生兒時有異兆否汪嫗曰生汝之夕夢大星入懷傍有峩冠者詫曰此弧矢星也巳而大雪草木皆冰直獨心喜曰天星入懷非凡胎草朩冰者兵象也天將命我以武勝乎于是遂起邪謀嘉靖十九年時海禁尚弛直與葉宗滿等之廣東造巨艦將帶硝黃絲綿等違禁物抵日本暹羅西洋等國往來互市者五六年致富不資夷人大信服之稱為五峯船主則又招聚亡命若徐海陳東葉明等為之將領傾資勾引倭奴門多郎次郎四助四郎等為之部落又有從子王汝賢義子王滶為之腹心會五島夷為亂直有宿憾于夷欲藉手以報及以威懾諸夷乃請于海防將官而剿之無孑遺者而聲言宣力本朝以要重賞將官餽米百石直以為薄大詬投之海中從此怨中國頻入內地侵盜直又嘗以扁舟泊列表參將俞大猷驅舟師數千圍之直以火箭突圍去怨中國益深且眇官軍易與也乃更造巨艦聨舫方一百二十步容二千人木為城為樓櫓四門其上可馳馬往來據居薩摩洲之松浦津僣號曰京自稱曰徽王部署官屬咸有名號控制要害而三十六島之夷皆其指使時時遣夷漢兵十餘道流劫濵海郡縣延袤數千里咸遭荼毒而福清黃巖昌國臨山崇德桐鄉諸城皆為攻墮焚燔廬舍虜掠女子財帛以巨萬計吏民死鋒鏑填溝壑者亦且數十萬計比年如是官軍莫敢攖其鋒但為計狡譎每殘破處必詭云某島夷所為也故東南雖知王直之叛而不知受禍之慘皆由直者獨總督胡公前按浙時見賊進退縱橫皆按兵法知必有坐遣者且賊酋來者皆直部落也而不聞直來其為坐遣無疑先是間使徽州收其母妻及子于金華府獄中至是出之豐衣食潔第宅奉之以為餌而疏請以移諭日本禁戢部夷為名其實注意伺察直也上從之乃遣生員蔣洲陳可願充正副使以行公以密計授洲等曰王直越在海外難與角勝于舟楫之間要須誘而出之使虎失負嵎之勢乃可成擒耳又曰王直南靣稱孤身不履戰陳而時遣偏裨雜種侵軼我邊圉是直常操其逸而以勞疲中國也要須宣布皇靈以携其黨使窮髮皆知向化則賊之勢自不能容然後道之滅賊立功以保親屬此上䇿也洲等領計敬諾而行居無何倭酋董二被擒訊道直事甚悉與公所料不爽毫髮中外始曉然知狀于是上以公灼見禍本降璽書褒勞而閫外之事一以委公公得旨規羅益密御史金浙陶承學交章請立賞格有能主設竒謀生擒王直者封伯豫萬金部議從之詔曰可嘉靖三十四年十一月洲等至五島遇王滶道以移諭事滶曰無為見國王也此間有徽王者島夷所宗令渠傳諭足矣見國王無益也明日直出客館見洲等椎髻左衽旌旗服色擬王者左右簇擁洲等心動坐論鄉曲設酒食相對情欵方洽洲等曰總督公遣洲等敬勞足下風波無恙直避席曰直海介逋臣總督公不曳尺纒牽而鞫之而逺勞訊使死罪死罪洲等曰總督公言足下稱雄海曲志亦偉矣而公為盜賊之行何也直曰總督公之聽誤矣直為國家驅盜非為盜者也洲等曰是何言與足下招聚亡命糾合倭夷殺人剽貨坐分虜獲而為之辭曰我非為盜者是何異于昏夜操罟以臨人之池執之則曰我非盜魚者為君護魚者也雖三尺童子知其必不然矣直語塞洲等曰總督公統領官軍十萬益以鎮溪麻寮大剌土兵數萬艨艟雲屯戈矛雨注水陸戒嚴號令齊一而欲以區區小島與之抗衡是何異于騁螳臂以當車轍也又曰總督公推心置腹任人不疑拔足下壽母令妻于獄中館穀甚厚則公之心事可知矣何不乘機立功以自贖保全妻孥此轉禍為福之上䇿也直默然而罷乃挾州等巡數小島而還而從此風聞外夷隨其頥指者頗少變而叛賈倚直為淵藪者多有離心直始不安于彼矣初直聞母妻為戮心甚忿欲犯金華及聞洲等言無恙又竊喜于是始有渡海之謀日夜集所親信者計之謝和等曰今日之舉未可冒昧以往也當遣我至親為彼所素信者先往宣力以堅其心待彼不疑然後全師繼進始可以逞直笑曰妙算也遂托宣諭别國為名留蔣洲在島令葉宗滿王汝賢王滶同陳可願回至寧波詰之皆云宣諭未至時徐海陳東巳擁薩摩洲夷過洋入冦矣今王直歸順先遣葉宗滿等投赴效力成功之後他無所望惟願進貢開市而巳公得報巳揣知其計姑從所請疏上許之公喜曰虜在掌中矣先是海中倭冦敗沒有零冦百餘據舟山為亂公遣葉宗滿等協助官軍剿之盡殱焉公疏上功次犒賞有差王滶笑曰此何足賞若吾父至當取金印如斗大嘉靖三十五年三月徐海等果擁衆十餘萬冦松江嘉興諸郡甚急聲言欲下杭城取金陵勢張甚公乃謀之王滶等以觀其意滶等初欲小試殷勤故甘心于舟山之冦至于徐海等正其所倚以圖大事者且欲速直來共濟乃辭曰是非吾所能辦須吾父來乃可耳遂留夏正童華邵嶽輔王汝賢在軍門自以招直為名與葉宗滿開洋去是年徐海等以次就擒事見徐海傳公恐形迹彰露委心留用王汝賢等撫摩若親子然葉宗滿兄弟並加禮遇時時對將吏士民曰直非反賊顧倔強不一見我見我當有處也直聞公意指謂公誠朴可欺欲乘機以全親屬且未知徐海等敗沒以為縱不如所料亦可與之應援得志而去遂決䇿渡海先遣蔣洲次遣王滶葉宗滿等率鋭卒千餘執無印表文詐稱豐洲王入貢先泊岑港據形勝分布巳定直乃與謝和等慷慨登舟釃酒誓衆曰俞大猷吾嘗破之列表泊岸時須謹備之公當直未至時已度其有隙豫調俞大猷于金山而以總兵盧鏜代之盧鏜者舊與王滶等從事舟山同飲食撫循倭夷備至直坦然不疑惟日聚羣倭礪兵刃代竹木為開市計且索母妻子弟求官封時公計巳定仍姑列狀上請以安其心上巳知直為釜魚智力俱非胡公敵乃顯詔王直既稱投順却挾倭同來以市買為詞胡宗憲可相機設謀擒𠞰不許踈虞致墮賊計公奉詔祕而不宣夜馳至寧波城圖方略密調參將戚繼光張四維等督諸健將埋伏數匝水陸要害星羅棊列魚鳥莫度乃以夏正等為死間諭直曰汝欲保全家屬開市求官可以不降而得之乎帶甲陳兵而稱降又誰信汝汝有大兵于此即往見軍門敢留汝邪况死生有命當死戰亦死降亦死等死耳死戰不若死降降且萬有一生焉直怫然不悅而公與其所親信王滶葉宗滿先遣來見者連床臥因佯露諸將請戰書十餘篇于几案王滶等竊視驚怖夜半公作醉夢中語云吾欲活汝故禁不進兵汝不來休怨我也含糊其辭吐滿床王滶等漏之于直直始疑之又使其子澄嚙指血寓直書云軍門數年恩養我輩惟願汝一見使軍門有辭于朝廷即許眷屬相聚汝來軍門決不留汝藉令不來能保必勝乎空害一家人耳又使生員方大忠往來遊説直猶豫未決公以直執戀岑港巳踰五旬察其心神終屬觀望乃開關揚帆示欲進兵直探知四靣兵威甚盛終無脫計且知徐海等敗沒孤立無援因嘆曰昔漢高祖見項羽鴻門當王者不死縱胡公誘我其奈我何乃曰部兵無統欲得王滶攝之公知海上諸賊惟直多智習兵久雄異域得人心為難制其餘皆鼠子輩毋足慮諸將亦云以犬易虎不可失也遂遣滶往直乃桀然詣軍門時嘉靖三十六年十一月也公執之付按察司獄乃集三司諸大夫參議曰王直始以射利之心違明禁而下海繼忘中華之義入畨國以為姦勾引倭夷比年攻劫海宇震動東南繹騷雖稱悔禍以來歸仍欲挾倭而求市上有干乎國禁下貽毒于生靈惡貫滔天神人共怒問擬斬罪猶有餘辜公具疏上請得旨斬直于市梟示海濵妻子給功臣之家為奴王汝賢葉宗滿俱從末減邊逺充軍王滶出洋為颶風所覆其餘從賊魚散鳥驚奔聚山谷公親督官兵掃除黨與皆絶嘉靖三十九年二月兵部始以封賞之議上請詔曰大憝既除海氛巳靖部議報謝徐徐何也胡宗憲可太子太保都察院左都御史兼兵部左侍郎蔭一子錦衣衛副千户其餘有功者升賞有差舟山之捷嘉靖三十七年二月嘉靖戊午春二月總督侍郎胡公既擒獲元凶王直其餘黨泊舟山之岑港倚險列柵勢甚猖獗公命把總任錦指揮甘述宗等進泊江口之南都指揮李涇指揮張天杰等泊港口之北總兵俞大猷等以福船并叭喇烏八槳串綱船往來䇿應指揮周官土官彭志顯領大剌土兵由中路小河嶺入指揮楊伯喬唐鎣土官張闕領鎮溪麻寮兵由右路碇入參將戚繼光率部兵由左路小嶺入而指揮楊永昌盧錡鮑尚瑾方升通判吳成器等分道䇿應參政王詢劉燾副使陳元珂則監督之約期水陸並進直抵賊巢時都指揮戴沖霄先用火攻殺傷頗多公許全捷俱準首功禁取級以妨前進我兵蹂尸而戰賊大敗奔舟忽港側炮聲大震復擁衆登陸抄後死戰我兵後哨稍却前鋒四擊橫衝賊乃斂營固守公以夷僧德陽稱貢而來賊脅為聲援可計而離也乃潛縱之令成器遣諜持信票數百入巢散其脅從由是賊勢日孤為守益堅公又檄諸將曰賊所以負固死鬭者蓋春汛巳及計有新倭可為應援若哨擊稍疏必流突與合矣此非小利害也其督舟師預為哨探之計無何果有倭船泊普陀小道頭參將張四維推官查光述等督兵且戰且逐至烏沙門外洋賊遂潰敗俘斬四十餘級賊走登烏沙懸山即朱家尖山也公䇿此賊與岑港之冦相距不逺陸路必由碇水路必由嚮礁門乃檄諸將設伏以待已而賊果由二處奔沈家門與岑港合蹤公不得巳親蒞定海分遣將領各與信地福船由岑港南口廣船由北口宣撫田世爵都指揮何本源等兵由馬嶴至張一由闕寺嶺至三官堂一由小嶺至聚水塘進而以元珂四維往來監督又遣竒兵由天童徑搗賊船仍近巢半里許列一老營以燾居中調度參政胡堯臣防守所城督發糧餉尅期大舉時賊依山阻水列柵自衛火器頗多我兵陷陳先登者間多被害公復檄諸將從中逼壘而陳且示以哨伏應援之規更畨迭戰以耗其火藥折其鋭氣又令夷僧輩招之私語賊遂互相猜疑至持刀自擊我兵乘隙進攻賊衆大亂夜分縱火焚其舟死者無算餘各奔巢我兵躡之斬柵而入斬馘百餘級復奔柯梅嶺我兵迫之火其巢厰賊勢窘甚遁出浦口四維與指揮朱尚禮等舟師追至俞山外洋見賊連艘而行遂以兵船潛伏山下而以小艇嘗之賊果逐利來追伏兵大起夾擊之犁沈四舟擒其渠魁汪印山陳禮等斬首九十餘級溺死者不計王直之黨至是盡矣是捷也五哨之布公有成算而大猷等參錯不進沈家門合蹤公料敵如神而諸將不先事追擊至厪定海之設非公淵度圓機小挫不折能因敗為勝且奈何哉嗚呼於是見公之心獨苦矣俞獻可撰淮揚之捷嘉靖三十八年江北之有倭患自嘉靖乙卯始淮揚故多大賈富戶賊至屬厭以去自是嵗以為常丁巳夏賊千餘深入天長泗州祖宗陵寢幾至震驚廷議特設提督都御史而以豐城李公遂至即立什伍之法定援應之規練鄉兵嚴保甲設將官築城垣造戰艦為水陸戰守之計賊知有備船泊掘港者不敢登岸而去江北賴以無事巳未賊萬衆連艘分道並入中外震恐時四月一日也公閲兵通州計賊若從海門西亭趨如臯則通州在賊外乃兼程趨通泰州而以副使劉景韶遊擊丘升駐兵如臯以扼要害檄各路兵進黃橋海安等處援應巳而賊至益多我兵迎戰挫其前鋒賊果出西亭知如臯有備遂由通州東趨白蒲鎮公計賊深入利在速戰戒海防等兵據丁堰東北堅持不出時東南風急我兵不便迎擊公籲天以祭風即回連三日乃擐甲誓師斬不用命者人皆踊躍以進又計賊過如臯必由黃橋泰興犯瓜儀則糧運阻梗留都搖動若驅之富安以北沿海東出無能為矣乃身當泰州之衝而以黃橋西路責景韶等賊求戰不得進據丁堰丘升從河北縱火焚之邊兵衝入賊營毛葫蘆兵復從南出首尾夾擊賊退屯二十里連日接戰斬其金盔賊首一人旦且晡我兵少郤賊進至如臯公計其必奔揚儀趣與海防遊擊兵從間道越過賊前徑趨泰州若以為西路之防其實於泰州待敵也執賊黨潛入城為內應者賊未至三十里輒從富安沿海東出我兵追躡賊後公戒毋輕戰晝則逼令不得久駐夜則退屯以防衝突公親提大衆馳淮安馬邏之間約與諸將夾擊於廟灣賊覘知之分其衆一由西亭一由白蒲丁堰以牽制我師公令景韶升專擊二賊而身赴淮安以當大敵丁堰流賊至曹家堡與我兵遇逐北至潘莊全夥覆沒公至淮安而總督侍郎胡公與視軍通政唐公順之亦提青沂兵至相與合勢公乃部分中軍馬兵為前驅曹克新兵為中哨青州邢鎮兵為左哨沂州何本源兵為右哨中軍倪祿梅三錫合曹沂徐邳等兵為後繼列陳於姚家蕩以待初賊計我兵綴於丁堰之賊急走淮安欲掩其無備比至見兵勢甚盛相顧驚愕盡鋭衝我左哨公揮兵四靣圍擊俘斬八百有竒焚溺死者不計賊不得巳奔守廟灣于時西亭之賊夜走海安諸將不能禦公以廟灣賊垂盡恐楊儀有失乃親往揚州而視師唐公援兵亦至時賊已奔張莊因益兵赴援海安而與唐公俱還廟灣督諸將搗巢令軍中多具畚􅓩先填溝港毁民舍之傍賊巢者我兵分畨進攻斬級一百五十有竒賊乘風雨夜遁而西亭亦以全捷來告無何閩中之賊止近百然沿海轉掠來去無定蹤不可力取為颶風飄至者公令守備楊縉擊滅之斬其酋長八大王孟得山崇明三沙之冦潰圍而來時海門狼山如臯泰州揚州俱潛有備賊由七星港焚舟登岸深入拼茶場楊縉陳忠等兵尾擊之自是連戰皆捷斬級三百有竒賊乃竟走海塗而公已宿戒沿海無得泊舟以是賊不得去復敗之劉莊會唐公遣副總兵劉顯適至公益以親兵使與賊戰賊連敗走竹堰仍沿海北遁我兵追及之於七竈斬級九十有四又及之茅花墩斬級一百七十賊奔唐家堞僻逺無兵復登岸掠食而公故所練鄉兵追兵競逐之斬級一百四十有竒賊遂盡絶矣是役也自夏及秋僅四閲月前後斬戮焚獲不可勝紀其成功之偉何如耶豫嘗宦遼陽聞永樂間都督劉公江鎮遼時有倭患望海堝之戰斬級千餘生擒四百封廣寧伯至今海上之烈人猶頌之公以文臣特起其所建立卓卓如此真足以宣揚朝廷之威發舒華夏之氣匪直淮揚之利而已夫賊之始至也非公決戰通泰則瓜儀維揚必受荼毒而運餉不免焚掠賊之東奔也非公出賊不意收功姚蕩則淮城多不可守而鳳泗不免震驚三沙之賊北渡也非公預有成算厲兵急戰則以彼勝勢乘我困疲又適我地災飢幸亂樂禍之人內應必衆事變未可測也記曰以勞定國則祀之能禦大災則祀之能捍大患則祀之公於三者實兼有焉豫不文聊述其所見之略兵部侍郎蔣應奎撰文節略寧台溫之捷自倭奴入冦東南惟浙為最甚浙受禍惟寧台溫為最甚而我總督軍門少保兵部尚書胡公為御史時自王江涇捷後我兵始有生氣至今官凡五轉而大捷者十有三徐海王直擒而禍本去矣戊午冬舟山既捷而我兵告罷戰者二年我總督公安不忘危旦暮東鄉望思斫扶桑而湮之海嘗曰余不恃倭之不來恃吾所以待倭之來耳益繕甲治艦峙糗選將練士惟謹水陸分地刻期防汛惟謹示戰守機宜約束惟謹䇿畫萬全兵氣振厲人人無不樂為死者辛酉夏四月忽並海郡報賊艘從外洋來者日數至而合象山奉化寧海瑞安樂清諸縣中山大嵩霩􅛾桃渚新河楚門健跳隘頑諸所所報船不下數百艘賊不下一二萬人而所登犯地散至數十處人情洶洶檄書人馬交錯于道公顧從容燕笑自若徐罵曰桀黠奴投死耳撲滅之在旦夕也乃籌筆授方略密封付使者馳去各海道兵備分守巡總兵參將諸官而遣遊擊將軍王應岐何本源即日督發大兵一營六千人并調參將吕圻部兵先往同所在官軍擊之公乃卜日社禡載纛臨止厥地至則親履戎行不逾二旬而捷凡九至所向靡不摧破震赫風霆電掃影滅而白水洋戰為最竒云先是四月十九日倭船一艘望小展至馬嶴沙公所督部兵及守備盧相等兵擊殺舟師賊遂奔岸時帶管海道副使王春澤調守舟山把總章延廪率陸兵至即伏為應水兵從下急追伏者起夾擊之賊大敗溺死者無算斬首三十五我兵死者三人越二日洌港中大草撇船一艘來公所督部把總周栗統林仕貴及盧相等船與賊三十餘戰用發熕佛郎機諸火具斃之溺死者無算斬首五十而兩頭洞賊一艘把總童華斃之斬首若干而犯象山者乃王海道奉軍門方略會同總兵盧鏜調度分守參議唐愛協計與前所督發二遊擊大兵吕折部兵進𠞰之其犯大嵩者我兵逐出橫山各水哨又伏候外海故逡巡海口不出五月一日夜燒船奔鮚崎乃王海道會同盧總兵何遊擊兵分南路由奉化入象山而海道兵由大嵩入裘村亦趨象山前賊適入我兵中路二日賊出嶽林莊盧總兵何遊擊鼓行前趨相去二十里各遣鋭兵趨合吕參將王遊擊兵前後繼發三日賊至裘村分三陳迎敵海道把總胡良瑤李超等兵先至遂陷陳先登各鋭兵殊死戰數合賊大潰斬首百五十七陳亡者三人八日梅山港賊三艘計二百人突入天童小白東吳吕圻追至東湖哨兵湯時茂等斬酋一人遂夜遁石橋湖頭橫溪奔入山徑走海道即遣中軍指揮艾升由小路徑出賊前吕圻追尾賊後至白杜兵合賊屯余家各兵用火攻之燒死者不計潰出朱家店者各兵夾擊之章延廪兵生擒二人斬首五十六吕圻兵斬首二十一陳亡者各營共三人至暮收兵一賊負傷竄山中千總汪廉斬之菩提嶺下寧遂平先是海道諸兵前副使談綸實訓練之極精鋭而談以憂去居無何會王副使來實能守談成法較若畫一而成功若此前四月十九日又鳥嘴船十六艘由象山從奉化西鳳登岸夜突至寧海一都團前是時松門海門俱無警乃台金嚴兵備僉事唐堯臣參將戚繼光將原發松海二關扼守陸兵三枝撤回繼光親督二枝趨寧海留一枝劄海門中地備警分發中軍遊擊兵協守新河會行把總任錦兵船速出寧海外洋伏擊又行寧波海道總兵各發官兵水陸會𠞰二十二日賊知戚參將至寧海遂乘虛以大船五艘竄入桃渚大域港裡浦登岸計五百人有竒是日又三艘入新河周洋港登岸次日又五艘亦從周洋港登岸與前賊合共計五六百人二十五日又七艘入健跳折頭登岸計二千人有竒戚參將曰犯桃渚健跳者勢尚緩周洋逼近新河所城賊又前後繼至冝急擊之而會軍門批唐僉事申列賊狀有云賊雖分侵不可墮其計中輒便分兵應䇿當併力合勢先討其重大者然後以次𠞰除乃僉事與戚繼光奉令惟謹即部署諸兵疾趨新河擊之又令黃太二縣號召程梁等姓鄉兵助戰賊懼夜駕五船遁去餘屯城外鮑主簿家二十六日擁衆薄城下攻城唐僉事與戚繼光原授軍令相與協謀調度曲慮廣畫以樓楠劉意張元勳胡守仁等分立陳列密授方略使竒正相參各以縣尉武生等監督之而給餉秣運器械斷要害固封守審堅瑕援桴䇿應者各有屬既定乃申明用命不用命誅賞令甚肅驅死士衝鋒而先用鳥嘴與賊對擊千百總哨隊長蔣瑞葵實等奮勇先登力戰良久賊遂潰亂傷甚奔原巢死鳥銃者六十餘人各哨共得首級三十顆是夜二更賊冒雨由太平走旦日劉意樓楠兵追至溫嶺大麥坑太平知縣徐鉞亦督鄉兵會𠞰共斬首二十二餘賊奔田舍中者燒死之突出火者遁溫州前犯桃渚裡浦賊是日亦流至台州府城外花街戚參將即自桐岩嶺馳抵城下時各兵尚未炊以大義諭之各兵勇氣百倍無不爭先躍起乃鼓行而前以丁邦彥為前鋒陳大成為右哨陳濠胡大受為中哨趙記孫廷賢為左右翼各置監督竒正衝伏各有指犄角聲援各有屬乃齊陳而前至花街約二里賊以一字陳迎敵丁邦彥部下列銃分畨銃殪數賊各兵乘勢擁殺賊乃分右哨敵我左哨丁邦彥反擊其右賊又分左哨敵我右哨陳大成反擊其左於是旗鼓盡變竒伏俱出賊乃敗北奔陳大成兵追至瓜陵江下賊奔水死者二百有竒而前陳中斬首三十九丁邦彥兵追至新橋五戰五勝共斬首六十一生擒倭酋一人二十九日胡震于邳山下犁沈大倭船一艘死者計百餘人生擒倭酋一人斬首八顆三十日前登折頭大顆賊二千有竒自燒船南突府城戚繼光部兵已分留守新河隘頑可戰者千五百人賊衆我寡繼光憂之又恐流犯內地勢當速滅乃與唐僉事厚犒之懸千金為衝鋒者賞光又盡出笥中銀酒具散之又監軍知縣趙大河登壇誓衆申諭大義語棘棘動耳目氣烈烈振山嶽兵乃踴躍受令靡不一當百五月一日繼光即率部至大田設伏待賊賊至亦設伏待我會天雨不戰二日賊徑出大石往仙居戚繼光曰賊出中渡由裏路至白水洋七十里我兵由官路至白水洋五十里兵法云先處戰地而待敵者佚且以寡禦衆非謀不克而臨敵交鋒我少彼多必兵心激發乃勝遂䇿馬鼓行四十里至上風嶺屯止多令探者出賊前後視其向往知狀即率兵上嶺伏五日前鋒兵出頗早光乃下令令人各砍松枝一樹執而坐賊望之為林不介意行列二十里衣甲旗幟甚盛我兵對山瞭之俟其行過半乃仆松呐喊齊出賊驚以三四百人作一字陳衝來我兵分為一頭兩翼一尾陳以太學生葵汝闌左蒸監督而陳惟成陳法陳蚤楊文通等俱趙大河監督以鴛鴦陳衝鋒擁殺夙受令不許取首級疾若風雨有前無退賊遂敗遁上一小山然猶格鬭不巳丁邦彥兵出裏路徑搗山下四面仰攻之而戚參將乃樹白高招一竿于北山下令兵大呼脅從者從招下走走者數百人賊復上大山我兵又仰攻之賊又大敗奔上界嶺山巔山巔陡峻如柱上平廣賊立營其上若蓬麻然只一徑可攀陟丁邦彥等首先攀援魚貫上吳惟忠等繼之數賊疾前來從上斫下我兵用長鎗鎗賊墮岩下遂得登頃之我兵盡登賊六七百人齊來交鋒我兵戮力大戰賊敗走四散投落坑塹林谷間死者不計走者奔白水洋朱家我兵乘勢急下追圍火四面起賊屢突出不可得趙大河親弟趙豳甫率兵舉鳥銃擊之死者不計又四面拆牆石投之賊急登屋亦用石與銃投我牆盡各兵逼圍屋下亂投石銃諸物如雨賊不支巢內高屋火炎炎起賊益急亦亂投刀鎗諸物出中我我兵鎗筅林立隨格之不一中賊燒死者不計而餘孽膽怖魂褫捧銀物擲首頓額哀號乞生我兵用狼筅挑其銀物并所擲首疾殺不一顧諸物居有頃賊盡死積尸高丈六日戚參將自戰所班師入府城老稚士女歡呼以為自罹倭毒來無如此捷大快也乃壺漿迎道左而唐僉事率府司輩實玄黃以迎焚死者不在算而共計斬首三百四十四顆生擒者若干而我兵亡于陳者止三人陳四陳七十即前入巢放火者王華升即前山下衝鋒者是時兵實千五百人而一鼓殄二千賊于呼吸間全師奏凱可不謂竒耶時戚參將方入城犒衆未罷楚門又報賊十餘艘繫泊于港者登梅嶴乃急發胡震兵伏截外洋而遣樓楠兵陸走至洋坑冒雨大戰楠親斬賊酋一人而朱文林等共斬賊十二人生擒一人餘船盡開至長吊洋會前所發胡震兵迎敵犁沈五艘燒殘五艘至夜賊拖殘船出海繼光部下兵船又擊沈五艘追犁一艘昏黑不取級而日所斬級二十人生擒賊酋二人次日胡震又於沙鑊洋追賊十餘艘至仰月沙賊乃遁懸山我兵用三板船載鳥銃弩手伏嶴口候擊之至三更賊果乘雨霧走我兵犁沈一艘斬首四人餘遂奔回懸山我兵圍之至旦日五更賊約百餘人復渡水走至林頭繼光乃督樓楠兵由隘頑所迎其前劉意兵由聶王橋徑進紹興府通判吳成器兵繼進而知縣徐鉞督鄉兵伏截藤嶺至小藤嶺三路官兵夾擊之賊急徑奔吳成器陳成器督戰益力賊鎗及成器馬腹成器一矢射中賊面死各官兵四面力戰盡殱之共斬首五十級而餘盡溺死五月十七日又前犯寧海團前遁賊十餘艘至長沙登劫約二千人有竒猖獗益甚砍採竹朩欲巢長沙將南攻隘頑北攻太平盡髠鉗所掠男子耕作是日繼光在新河聞即與吳成器趙大河撫諭兵士示以對大敵之䇿盡出所蓄資懸給賞格如前下令不許取首級輜貨如前乃兵氣益揚而繼光又曰賊巢逼近隘頑所城城又孤危賊所泊長沙地又北扼太平之路于小藤嶺東扼松門之路于漫遊嶺楚門隘頑二所又勢孤路絶止水路浮海可援而又為賊船所出沒處奈何乃先令把總李成立單騎馳往松門衛將所練親兵與羅繼祖分船夜浮海入隘頑城守之隘頑固乃用樓楠丁邦彥陳大成等各立軍令誓狀云事異則分心同則堅遇有征調各營輪日衝鋒以一營當前以一營尾後以一營分翼左右同心并力不計斬獲多寡功同賞罪同罰等議隨用印鈐示衆使各遵守如令繼光亦誓天明神以發十八日至鐵場大雨十九日夜半至大藤嶺分三路進至小嶺偃旗息鼓直趨船所賊始覺分兵迎敵我兵齊擁攻殺遂大披靡四走各兵追殺無一遺者共斬首級數百生擒倭酋五郎如郎健如郎前後數十輩是為長沙之捷每臨陳戚參將率各將士諭以軍門好生之仁寧無功級不許妄殺脅從一人以故前後被虜者俱得生還前四月二十日溫之瑞安縣周嶴賊由梅頭奔突者五百餘人參將牛天賜通判楊嶽把總梅魁等殱之傷而死者不計生得一人斬首十三人餘潰走二十四日牛參將同兵備副使凌雲翼把總盧騎武生黃允中指揮李光佐千戶張榜等兵分三路進𠞰殺死三百餘人衣紅衣渠魁二人軍中令不許爭首級故斬獲止五十有竒而是日楊嶽梅魁陳應等兵由瑞安後路䇿應生擒斬首共十餘人賊潰出海三十日又賊二百有竒自台州流突樂清縣界凌雲翼預調王欽兵牛天賜督之至窖嶴嶺伏截賊遂走雙陡門天賜兵追擊之斬首四十五人餘奔江水死而竄林薄中去者三十餘人至五月一日追斬于閩浙界上生擒一人溫州平而是月四日盧鏜水兵船與海道把總黃應選等船分布青龍港遇奉化遁賊七艘向錢倉行外洋去者犁沈三艘值大雷颶昏黑溺死漂失者不計撈斬首二十顆是役也計前後擒斬共千二十四名級而焚溺死者莫之殫計蓋無一人生還者而旬日間三郡寧謐疆徼清平脫遺黎于鋒鏑而帖之席歡聲動天地歌舞太平以共戴天子休德誰之賜歟誰之賜歟我總督公開誠布公能任人善將將賞罰明肅碩畫竒計不動聲色而出自淵𠂻賊狀夷情坐照千里又親臨督調先聲奪人所謂心戰為上力戰為下者非耶以故將領人人得以自效而白水之役以寡克衆而仰攻勍敵兵法所忌然卒取竒勝此其故何歟實公用戚參將趙大河同心選練義烏赤城等兵使之有勇知方見利不動故一可當百足赴水火雖古名將不能出公右矣而忠誠一念食息不忘捐身許國誓不以賊遺君父憂此又其大者臣無似以書生佩刀筆待罪幕下竊所聞于諸將校者退而論撰如左挂一漏萬豈足云紀盛事哉聊用稗官所職以備野史氏采擇鄞諸生沈明臣撰平倭録世廟時南北並急其時竭天下之力以禦河套南方急時所輸于北者不絲毫減中間悉力拮據終得蕩平者胡襄懋力也事平之後襄懋中讒死同志如茅先生鹿門幾至破家有功秀才蔣洲陳可願至謫戍生平受襄懋卵翼煦沫者皆噤而避匿且諱之不敢出聲一切戰功惟有鹿門徐海一篇而最難致者王直却又不及間以詰其子孝若曰尊公與襄懋情誼如何乃不詳録者何孝若蹙額曰并此篇幾削去賴長兄言之得止嗟乎世有縛一草賊捕一叛民因人成事者尚連篇纍牘以求必傳于世而公半壁之功十餘年出生入死辛苦泯泯至此安用一時文士為余老矣每每訪求不可得間有談者年逺未可信近見唐凝菴先生胡少保傳極為詳贍喜甚訂録數欵初為益都知縣有賊曰草上飛虎悍甚衆至數千據礦為患久莫能制公召其父母宗族諭以利害示之恩信羣盜解散擇其可用者千人編為義勇會有詔令巡撫曽銑募青齊兵入衛遂以應焉一不以擾其民也三十三年甲寅江南倭大至官兵屢敗南兵書張經帶部務總督軍務公為巡按方至嘉禾賊至武唐將逼城公出酒百餘甕米五十包毒之封包如故載以二小舟授數健兒賫冠服文牒若犒兵者賊見逐之健兒浮水遁賊入舟見冠服文牒信為犒兵也呼類歡飲且醉復作飯食之一時流血暴死者七八百餘賊知中計遂相戒勿食民間遺物會雨驟至又無所得食淋漓飢困斃者益衆遂解去三十四年乙卯二月工部侍郎趙文華祭告海神兼視軍情四月至松江祭海是時倭據川沙窪柘林為巢涉冬春新倭復日有至者地方甚恐及狼兵至者五千人衆稍安總兵俞大猷遣遊擊白泫等稍有斬獲文華因謂狼兵果可用厚犒之激使進𠞰至曹涇遇倭數百人與戰不勝頭目鍾冨黃維等十四人俱死失亡甚衆于是賊知狼兵不足畏復肆掠如故五月張經蹙倭于王江涇大破之經素貴倨以文華部民也藐之觸怒會倭冦蘇州大掠即奏經畏懦失機玩冦殃民上怒逮經及巡撫李天寵問斬以應天巡撫周珫代經尋以珫衰老黜之以南侍郎楊冝代超公僉都御史代天寵而先四月公上疏請宣諭日本覆允比得旨新受事檄寧波選委知海情者得弟子員蔣洲陳可願二人因令充正副使而先犯海禁繫獄朱尚禮胡節中并釋令各募二十人輔洲等賫文以往公密授計洲以十月壬午行十一月丙午至日本從山口豐後二道宣諭王直故為舶主原徽州人因令養子毛冽率衆邀洲等至五島詢以故洲等奉計誘之直佯言曰我本非為亂因俞總兵圖我拘收家屬遂絶歸路今軍門如是寬仁我將歸然毋用人衆也今聞薩摩島徐海等大糾倭衆來春必犯浙直吾令毛冽葉宗滿伴送陳副使朱尚禮先覆軍門吾與蔣先生宣諭畢日亦同歸順但倭國缺絲綿必須開市海患乃平可願偕毛冽以仲冬閏月泊列港至定海關已而直𠞰殺海洋流賊數十級效功以窺我意公詢得其情奏聞且厚犒之文華遂請還京三十五年丙辰正月冽率倭兵百八十人助盧參將搗舟山賊斬首三十餘賊奔邵嶴山屯于山巔公奉旨賚冽等金幣且令回諭直早歸順冽感激因送商伴夏正童華邵嶽報徐海入犯消息遂留為通事隂厚遇之意未嘗一日不在直也是月辛酉賊數百自閩連江洪突犯平陽仙居等縣趣四明奉化合錢倉新至賊深入上虞轉戰千里官軍望風奔潰海道孫𢎞軾馳檄告急甲子自率標兵渡錢江而東合諸道兵及容美土兵皆會丁卯賊由上浦潛渡曹娥江見官兵由對山出海塘轉山隂壬申公至江橋遇賊夾河而行從馬上操小旗語諸將曰使此賊見我旗指不顧而西勝負未可知若觀望遲疑即可撲滅也賊見旗東西交指果聚立公笑曰賊氣奪矣麾兵渡河賊驚問諜者知軍門自至遂不敢戰南走後梅村急麾諸軍圍之一晝夜用火器力攻賊負傷深匿戰益急我兵登屋舉火煙焰大起賊多焚死巳而雷雨大至公與諸將冒雨立水田中或勸之少避不聽明日五鼓賊乘霧突鄉兵我軍四合奮擊俘斬二百五十九餘賊逸走鍾村平明追及西嶺殺百賊賊又遁輕兵追之少衄復遣土兵及于蒲岐亭斬六十級餘賊夜遁入海先是居民聞賊至咸奔避入城公所至炊宿無所薄暮入山巔小菴飢甚道人具酒餅以獻方數酌哨者至備詢其故巳而問哨者食否答曰枵腹兩日矣公淚下盡撤酒餅與之道人進曰菴中僅有此願少留公曰此探卒吾三軍耳目也不得食必斃寧忍飢以食有功左右皆感泣時陳東屯于陶宅知公悉軍而東復襲敗官軍楊冝𠞰新倭又敗罷之以南侍郎王誥代而先文華還京言倭大勢巳定餘零散者諸將𠞰之可立盡既敗報踵至上甚疑以問嚴嵩嵩支吾以對文華大懼而素與吏部尚書李默有違言因訐默出題謗訕欲敗國事初罷楊冝即當以宗憲代而専愎自用推舉周珫珫老悖致殘倭復熾上大怒收默下獄止誥無行升公兵部侍郎兼僉都總督軍務升阮鶚代巡撫浙江四月鶚敗于崇德陷驍將宗禮等走桐鄉被圍公諭解之文華兼副都復出督視七月收徐海陳東詳鹿門集公授計把總張四維雪夜渡舟山出賊不意大破殱之三十六年丁巳倭入閩廣改鶚撫福建公兼兩浙巡撫不更設王直忽駕艦擁驍倭突進舟山涔港住泊以送蔣洲為名公遂遣夏正等往覘而自提兵駐紹興且令畫工圖涔港形勢正還報直語甚肆謂必待奏奉明旨許其寬宥與以都督職使得稽壓海上開市以息兵方圖歸順必不效徐海墮牢籠作俘囚也而畫工所圖形勢甚險惡四山峭立海環其外入口僅容一舟别無他道公覽之謬曰此絶地也乃令直長子澄述祖母意為書道制府恩厚促直早歸順以全母子之情遣直中表方大忠偕夏正等持往直啓書笑罵曰兒騃何至此汝父在故厚汝父歸闔門駢首僇矣大忠與正等曉譬百端直意稍動遣王滶葉宗滿隨方大忠蔣洲至軍門輸欵公因送監軍御史王本固本固疏其狀于朝公念滶乃直之養子用事不還直且疑而生變因言於本固送還將行公故引之臥內留其宿而預為題稿力乞貸直并諸將請戰書十餘篇置之案間乃出飲大醉還因呼滶入宿而公甫入室大吐牀席俱沾汚侍者皆就寢滶聞鼾聲滿室竊起翻案間見疏稿回顧公睡益熟因録其疏復就榻久之公乃作伸欠狀呼茶且易枕席而猶嚈嚈語我為兒子輩苦心開生路乃猶遲疑取死耶晨起滶即于榻前告行復好言慰之隂檄文武諸將吏聨絡棊布以防奔逸又密遣諜餌德陽諸酋長購直首使之自疑直方猶豫不知所出滶等至出疏稿示之直猶未決滶等力勸之乃留夏正為質自挈妻孥稽顙制府公大喜摩頂曰兒來何晚時長至前三日也乃使朱尚禮童華館伴至杭參謁監軍次日即回軍還杭具述始末聞于朝又為書達當事言兵機忌泄如上意罪止于直則巳必欲盡其餘黨乞密啓上萬勿宣之明旨時倭賊諸姦多在直舟公將以直為媒漸致之不煩甲兵談笑以靖禍本監軍疏先至輒奉旨悉𠞰餘黨矣然公巳逆慮其然先遣朱尚禮往説諸小酋釋夏正及諭王滶葉宗滿來杭滶等以候旨為辭而密遣其驍鋭吳九項松王四等四散探旨童華以告公分遣將吏密擒之明年二月本兵檄至直遂下獄德陽走涔港諸酋復叛朱尚禮先聞脫身走夏正遂為所錮公即移師寧波謂集諸將水陸攻𠞰賊堅壁不出我師亦不得入公曰曩謂兵機不可泄正慮今日惟坐困不憂不全勝也時及汛期新倭續至或抵普陀逼沙門或自洞嶕奔東北洋或自洋中超舟山則水兵擒斬之或犯樂清金鄉梅頭臨梅松門或攻太平台州溫州永嘉磐石象山仙居平陽四散流突則陸兵擒斬之其追至鐵場山者諸軍冒險奪嶺三靣奮擊賊從山後奔陷海塗中長跪受刃俘斬無遺大都賊之驍悍非徐海陳東比而我將士久戰膽力益壯習知賊技不足畏避雖不無一二失律而所至成功卒無有得與直黨合者其黨困甚聞有賊在朱家尖遣六百餘人自涔港奔沈家門援之又從響礁門出碇奔沈家門皆為我師所邀俱敗入巢公乃命朱尚禮以先所收撫倭人夷來廷夷來住等駕艇伏炮其中冒為倭船招之賊不疑登舟來廷等佯稱還報易八剌虎先行炮從舵後發舟為煨燼水兵乘之俘獲二十二名斬級二百五十沈溺者無算賊氣日挫因嚴督諸軍分番攻巢殺傷甚衆諸賊積恨為夏正所誘支解之公聞躬至海邊望祭慟哭諸軍皆為墮淚賊自知勢孤援絶焚其餘舟將并力出海官兵乘勢焚柵厰火光燭天各賊夜奔柯梅候潮官軍擊之賊乘東仔小舟遁出浦水兵擊沈其半斬首九十有七諸將復統蒼船追之俞山外洋沈其四舟生擒賊首汪印山陳禮計得脫者不及什一矣是時賊至江南者千餘水兵禦之不得登陸遂扼之于崇明之三沙江北之賊幾七千北枝據淮安之廟灣南枝據揚州之如臯公皆分兵助戰前後斬馘俱盡三沙賊為官兵所困不得騁乃卸屋材為小舟以遁飄至江北亦殱焉三十八年十一月本兵再駁王直等罪狀下撫按三司詳議梟斬于市妻子沒官葉宗滿免死戍邊加公太子太保左都御史廕一子錦衣副千户文武將吏各加升賞夏正死事贈都指揮使廕一子與朱尚禮童華邵嶽俱正千户先是處賊萬餘盜義烏礦會令缺丞尉率鄉民逐之賊易丞尉列陳而出戕鄉民民怒奮力死鬭賊披靡入山民追破其巢賊悉戰死公聞之喜曰處賊稱悍烏民一戰殱之勇可知巳吾方求其人而不得儻新尹任事浙可不征調而強矣會江隂趙大河宰義烏謁制府即語以故大河欣然任之遂令戚繼光與之偕給餉甚厚繼光行復語曰江南所以不能戰者以未諳節制耳吾每思倣六花陳法訓練爾喻之乎繼光因獻鴛鴦陳公曰得之矣自後義烏兵遂以徑名天下今所稱南兵是也有事調用遂以為常嘉靖三十九年五月公請定節制禮儀視三邊事例上嘉其任事加兵部尚書兼右都悉從所請閩冦告急撤其兵往援行至桐山邵副使尹參將舟師來會賊巳滿載且聞浙兵至急遁出海水兵邀擊洋中犂沈賊舟四十有七溺死者無數獲賊首嚴山老等百餘名洪澤珍亦焚巢遁入閩解嚴提督遂以餉乏令舒兵備撤兵還賊聞之復糾衆入冦犯福寧桐山閩兵再敗公復發兵攻之戰于桐山夀寧追至楓亭血戰于仙遊前後俘斬幾二千餘賊遁入海四十年九月討倭屢捷加少保四十一年十一月被逮停其官不補升趙炳然兵部侍郎兼僉都撫浙江四十四年再逮疏辨尋卒上憐其功免勘朱平涵老先生撰又外録梅林手疏二則胡梅林為總督先後上疏皆手書如一後被劾為上所憐蓋不獨有禦倭之功其一段敬謹心亦自難及孰謂公僅粗豪人物哉凡古人上疏必手書宋時猶然逮至前元始停耳梅林被逮殁歙太守何東序窺時局欲羅織沒其家發兵圍守嘉禾郁陽川蘭為績溪令知胡公家貧且捍海功不可泯力覆護之願上印綬去乃得免籌海圖編卷九
