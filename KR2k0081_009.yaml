body:
  text: 籌海圖編卷十明胡宗憲撰遇難徇節考此卷所載名教所關故不嫌特書然事之詳略悉有憑據或限於耳目之未接或涉於傳聞之疑似者姑闕之以俟同志者增入焉永樂二年倭犯穿山百户馬興與戰死之六年倭入山東于家莊寨百户王輔死之犯桃花閘寨百户周盤死之七年冬十二月倭陷廉州教授王翰死之翰河東人任本府教授嚴立規程教誨不倦倭冦陷城民皆逃避翰正衣冠端坐明倫堂賊至欲執之罵詈不屈遂為所害九年三月倭陷昌化所千戶王偉死之二十年倭冦象山縣縣丞宋真教諭蔡海死之真持竿擊賊海罵賊不屈皆死之嘉靖二年日本使者宋素鄉等作亂遁入海洋備倭都指揮劉錦追之戰死時有欲追之者問于新建伯王公守仁公曰歸師莫遏窮冦勿追但當把截要害縱其退拒其進賊進無所獲退無所資將自困絶於是取之兵不血刃矣由是兵皆不追錦獨往果為所殺二十九年冦犯昌國烈婦嚴氏死之嚴氏葉小九妻也為賊所執驅之而前氏知不免遂投河而死三十一年四月冦入奉化義士汪較死之較奉化人力挽强弩尤精矢藥殳刃精習有司上於軍門賜以義士關防賊入應家欄較率民兵射斃十餘虜創艾遁去較亦被傷而死賊攻遊仙寨百戶秦彪死之彪爵溪所人賊登赤坎攻遊仙寨甚急彪曰遊仙與爵溪脣齒無遊仙是無爵溪也先人遺我汗馬勳不死戰而死法何以見於地下乎乃與弟漢疾馳赴鬭力不能支遂俱死焉五月瑞安所百戶李潮高良與賊戰於坡南滙瞭高山死之賊入黃巖縣孝子王錉烈婦徐氏死之錉生員王顯之子顯被執欲殺之錉泣求代父而遂死徐氏名元奴有異色值母衰病歸寧賊至元奴抱母慟哭賊欲汚之元奴紿賊轉室持粧奩同往乘間赴井而死六月賊陷霩􅛾所指揮樊懋力戰死之三十二年閏三月官兵與賊戰於烈港軍人葉七死之七定海衛軍賊王直負金城烈港穴為冦大將俞大猷提舟師直入其港討擊火炮大發勝負未決而我舟忽挂賊纜櫓楫不能施賊衆方逞七徑取斧投水砍其纜未及斷賊以鎗中其項七呼曰死矣吾必斷其纜竟連揮數斧纜斷而死俞舟遂免后四日俞大破賊空其穴俞之舟入也有二卒后期當刑因請間燒賊碾以贖死俞許之二卒從外海緣山越險幾百里晝伏夜行潜抵賊寨時夜近四鼓而賊方碾藥少頃困劇而臥二卒即其處爇火火藥橫發羣寨俱熖灼賊方酣睡駭而突走墮水死者踵繼俞乘熖進舟師崩之遂成奪巢之功四月賊犯海鹽孟家堰千戶宋應瀾死之應瀾字汝觀寧波衛百户登庚戌武榜授正千户掌印事執法不撓因而每得下考軍門王公忬獨竒之命取兵舶於閩應期而至忬益委以兵客兵獷悍難馭應瀾每約巳裕犒而厲以軍法無不聽命癸丑𨽻參將盧鏜為先鋒戰上海史家濱追賊至三十里亭復從戰平湖戰白沙灣戰金山皆有功其在史家濱兵北賊追幾及應瀾急反弓二矢而中項洞額親兵飛鎗復殺四人因復回兵破賊應瀾用是臨陳必以身先士卒竟以疲兵猝當海鹽孟家堰賊不支而死死時猶飛刀殺一賊乃絶事聞廕其子襲千戶仍建祠城北隅祀之賊犯杭州指揮吳懋宣禦之於赭山死之懋宣率僧兵禦之力戰而死賊破乍浦所百户陳綬死之把總馬呈圖指揮采煉百戶王相姜楫吕鳯姚岑與賊戰於海寧教場死之賊犯平湖百戶劉闕黃闕與戰死之犯白馬廟指揮蔡闕死之犯南湖把總陳闕指揮胡闕死之犯三江港口百戶陳闕黃闕死之官兵追賊於海鹽海口巡司千户王繼隆百戶楊臣康綬死之賊陷昌國衛百户陳表死之倭賊入城表曰吾力無如之何有死而巳但所攝印多吾死置印何地遂送母出城納印於千戶金鰲出門追賊奮鬭而死孝子劉晉死之晉昌國人倭冦入城其祖老疾不能行家人各挈妻子走惟晉負其祖而逃賊將及祖曰我老甘死汝宜速去晉不忍俱被殺參將湯克寬與賊戰於乍浦長沙灣指揮陳善道冠帶總旗張儒死之十月知事何常明與賊戰於杭島山死之常明乘勝追賊中伏而死十二月賊登西滙嘴千戶張應奎百户王守正張永死之三十三年四月參將俞大猷與賊戰於普陀山武舉應襲火斌黎俊民魏本康阜死之斌觀海衛人幼通儒術以母病嘗糞轉甜晨夕告天願以身代及壯應武舉鄉試中式者二憤海冦荼毒生靈詣軍門乞隨軍報效纍立竒功至是與武舉生黎俊民應襲魏本康阜督水兵追賊於普陀山陷陳先登同時遇害蓋忠孝得於天性者也後其兄指揮同知火雷請於當道為之立祠與俊民並肖像於其中俊民廣東人賊入上海縣指揮武尚文死之尚文鎮海衛人從參將湯克寬駐軍上海賊逼縣治尚文率家兵禦之出東門遇賊逰兵輒敗之乘勝進攻賊伏水傍俟尚文過以利刃斷馬足馬蹶尚文死焉賊屯李家嶴義士朱汀與戰死之汀象山人多勇力素好劍槊賊登赤坎屯李家嶴大肆虜掠汀與其黨王永希及子友章等數十人直搗其穴賊棄營走追至開口岩日巳晡賊計窮蹙遂返逆戰良久汀為流矢所中猶手刃數賊力不支顧謂其子曰吾已無濟汝等宜速去子不忍舍與王永希奮力直前格戰俱死焉賊攻松江府副千戶童元巡檢李叢祿死之九月賊攻嘉興府官兵追之戰於孟家堰指揮李元律千戶薛綱賊犯百家山百户趙軒梁踰死之賊冦沈家河都指揮周應禎死之十月百户張曜與賊戰於湖頭死之賊至東陽南午嶺巡檢朱純死之賊犯芙蓉海口指揮戴杞江九山千戶崔海鎮撫劉彧百戶易坎死之十二月賊入嘉善縣百戶賴榮華死之詳見浙江倭變紀三十四年正月賊犯湖州官兵敗績副理問陶一貫守備周奎指揮孫勇百戶陸陵周應辰把總官梁鄂武生郭周張景安朱平姚清死之詳見浙江倭變紀賊陷崇明縣知縣唐一岑死之詳見直𨽻倭變紀四月賊犯瑞安縣守備劉隆千戶尹闕死之隆字大昌定海衛指揮使以强幹屢協總諸衛備倭時海上冦起許二陳思盻最盛隆謀攻之適思盻入頭隆提舟師薄之而我舟忽膠隆股中一流矢見血益奮怒揮諸舟競進卒破賊俘四十餘人斬百餘級壬子遷把總嘉興統舟師備乍浦當松江七圑賊歸隆扼之焚沈賊舟俘斬幾三百級㑹破史家濱賊又扼之沈賊舟澉浦外洋一日追賊向暮黃霧四塞隆以孤舟在賊圍中逮曉從兵皆懼隆大喊作氣發一地雷衝沈十餘舟俘斬二百餘升署都指揮僉事守備溫處至是冦數百將薄瑞安城隆整兵遽出欲折其鋒偏將尹千戶者請旋師避之隆不聽徑往遏之殺賊十餘人賊遁去回軍至田間有數賊伏莾中遽起擊隆不及應遂死尹千戶等俱死焉事聞贈都指揮僉事仍世襲焉賊犯慈溪義士魏鏡死之鏡生有絶力善格鬭聞冦至海濵輒自奮曰誰無死者死而能衛桑梓庶幾為義鬼矣賊由餘姚至鳴鶴從知縣曺本率衆禦之兵潰鏡負令而走賊追之踰杜湖嶺而南乃操刃衝敵殺數賊賊傷其顙猶力鬭不置而死百户劉夢祥與賊戰於崇丘死之夢祥定海衛人領兵船出海遇賊登犯崇丘夢祥即部兵登陸與賊大戰獲賊首數級力乏寡援遂死賊刃當道憫之為立祠祀焉賊犯鳴鶴鎮孝子沈良十死之良十時年七十餘尚有九十餘母賊至良十負母至五里外力竭不能行息山谷舍中賊追至乃跪拜請死願貸其母賊見母子俱皤髮頽老舍之而去良十憐母飢渴方圖飲食賊又至或舉刃欲斫其母良十以身覆母號哭遂被殺而母竟得全常熟縣知縣王鈇致仕參政錢泮死之詳見直𨽻倭變紀賊攻無錫縣孝子監生蔡元鋭烈婦蔡氏死之元鋭無錫人軫之子冦至家人奔散元鋭以父年老獨留扶父登屋以免元鋭被執賊欲降之不屈遂遇害其女蔡氏適同邑陸子才歸寧遇變與其婢阿滿招女二英義男婦徐氏同登一舟將以避難賊悅其色欲汚蔡氏盡出簮釧求免不聽乃詒賊曰過汝舟當從爾賊喜獨一人與携手而往蔡氏齧傷賊手投溺水中其婢皆隨溺焉無何其弟元鐸以兄陷賊中持銀往贖知兄巳亡乃罵賊而死五月千户韓綱百戶葉紳與賊戰於七里店及樟村死之綱紳皆寧波衛官紳少不羈習手摶善雙刀賊入橫石橋紳偕千戶劉英領兵䇿應至七里店紳奮雙刀奪橋獨進應者不繼遂為所殺後二日賊西流至樟村綱復領兵防遏猝與賊交兵潰挺身獨戰亦死之遊擊將軍周藩與賊戰於朱涇死之賊犯鳴鶴省祭官杜槐死之槐慈溪人家濵巨海倜儻遊俠輕財好施為書掾從延綏撫院巡歷邊徼險要有抵掌伊吾之志省祭歸值倭冦屢犯內地從估客得島上狡慝狀曰患將滋蔓遂散家資結驍勇傾身下之得士死力值縣僉其父文明為部長令團結保障槐傷父老以身任之癸丑冦薄觀海衛城槐曰衛破則無縣矣一呼而羣勇俱集直前斫賊賊走衛遂得全至是賊犯鳴鶴槐率衆迎擊賊走餘姚東山槐越境追之諜言賊犯空舍提刀赴之賊伏牆隅槐揮刃中石刃缺賊競出槐與五六健卒當之自午至酉鏖戰不巳戮其衣緋渠帥竟以力竭舁歸而死後賊見黑旗即驚曰杜兵至矣父文明痛其子死而麾下壯士皆願從文明殺賊以復仇後賊燬鳴鶴文明冒死出縣令於重圍中是年冬冦自黃岩犯寧海海道檄文明偕主簿畢清邀擊之遇於奉化楓嶺之麓據高臨下布陳方定而土兵遽走杜兵力不能支文明遂與畢清俱死焉事聞詔贈槐光祿寺丞文明府經歷即死所立祠祀之仍廕子入監肄業云八月指揮張大綱生員陳淮與賊戰於蘇州橫涇死之大綱處州人驍勇異常率坑兵擊賊手刃數人力戰而死淮崑山人知縣周之子善弩與友人潘蔚卿等相期滅賊時賊精悍異常兵士遇之輒潰淮獨與家兵二人力戰而死九月官兵進搗陶宅賊巢指揮邵升姚泓生員于嶽死之升等陷陳殺賊賊巳大敗乘勝進攻賊死守港岸升等身先士卒賊乘高刺下故皆死之十月主簿畢清與賊戰於楓嶺死之清善射纍立戰功至是陳亡人皆惜之監生謝志望與賊戰於餘姚斤嶺死之志望統兵設伏誘賊大敗之乘勝逐北賊死鬬志望手射死三賊矢盡力竭遂被害十一月賊攻鎮東衛千戶戴洪等死之洪與高懷德張鑾皆本衛千戶出城禦敵而陳亡者也楊一茂白仁丘球皆平海衛千戶追賊於東嶽山而陳亡者也百户劉愍與賊戰於麻園死之生員胡夢雷與賊戰於東關死之夢雷餘姚人與堂兄應龍操六等率鄉兵報效手刃數賊力竭而死儒士金應暘與賊戰於母婆嶺死之應暘山隂人閏十一月千户劉綱百户張澄與賊戰於瑞安三港死之詳見浙江倭變紀賊犯平陽壆指揮祁嵩死之指揮閔鎔義士吳德四吳德六與賊戰於舟山死之德四德六兄弟本慈溪濵海農夫少有膂力先是冦上平石經其廬驅其豢豕德四持鋤自田歸遇冦於門揮鋤中賊腦仆地德六取賊刃追殺一渠魁遂以壯勇有聲𨽻杜槐部每遇敵即衝鋒奪旗以為常至是海道聞其名檄往攻舟山險寨德四直前砍賊渠于轅門寨內驚擾噪而出怯卒皆返斾走而賊砍德四蹶德六呼曰兄死矣獨前殺其殺兄者後兵不繼亦死焉三十五年正月參將尚允紹與賊戰於松江四橋死之三月福建總督備倭劉炌千戶王月與賊戰於石壁嶺死之炌字大光世為寧波衛指揮使年二十襲父爵用御史林應箕薦升戅州軍門把總未幾又用薦升福建總督備倭至是福清縣倭賊登岸據海口鎮官兵屢挫炌領兵夜襲其巢遂奔潰由古田寧德望海而遁炌即提兵由捷徑宵行趨寧海縣石壁嶺要賊歸路比至嶺隘倉卒布列未備而賊巳至部伍散亂止家兵數人及千戶王月在側炌顧謂持印者曰亟為我歸印朝廷吾世受國恩死矣炌即挺身執鐵耙格殺三人力盡無援賊衆擁至斃於賊刃所揮鐵耙尚堅執不墮其勇烈如此御史吉澄上於朝立廟祀之賊犯海鹽轉塘灣指揮徐行健死之四月賊犯青田縣百户方存仁死之溫州府同知黃釧禦賊於分水嶺死之時賊自福建入浙境釧以孤軍禦之於境外分水嶺賊過桐山釧率官兵勇敢當先連戰數合賊大敗走既而賊分支繞出我兵之後釧遂力戰死之蓋自有倭患以來文臣死事未有如此者也賊犯寧波孝子聞宗時死之宗時鄞人教授聞理子性至孝幼喪母奉繼母陳承順篤至賊至舉家竄避宗時扶父出而遇賊脅取金銀不得欲殺其父宗時以身翼蔽泣求自代遂被刃而死尸諸田間父遂得生時家奴李三抱宗時幼子不忍舍去亦被賊刃截左耳併刲其面屢死屢蘇人共傷之賊犯崇德遊擊將軍宗禮鎮撫侯槐何衡忠義官霍貫道死之禮故燕驍將也侯槐何衡霍貫道皆其偏裨所統箭手九百皆精悍絶倫所向無敵劇賊徐海部領萬人自烏鎮而來勢將犯杭浙江官兵無足恃者禮獨與麾下據三里橋而陳張左右翼以待戰數合擊殺數十人㑹日暮賊且引去時賊氣頗窘而禮與貫道等亦巳絶鄉導不得擇善地便水草時飲食以自休止明日餒而戰賊遣候者樹而望蓋孤壘以塹無他援者也大喜復縱兵前後夾擊禮與貫道大呼力戰矢石如雨無不人人一當十復中擊殺數十百人貫道赤手刃十餘人賊益怖海且炮欲馳去㑹火藥盡貫道面禮二人皆仰天呼曰吾兩人再得藥數斗可以了此賊矣既而賊分畨死鬭禮與貫道衡力竭矢盡俱死焉賊犯嘉興指揮程祿死之詳見浙江倭變紀千户沈宗玉王世臣與賊戰於金山江中死之宗玉鎮江衛後所正千戶世臣左所副千戶同領兵船追賊殁於江中賊攻江隂知縣錢錞死之詳見直𨽻倭變紀賊犯揚州都指揮張恆千户羅大爵百户曽沂死之戰於八里鋪灣頭等處大爵沂陳亡俱傷重而死賊犯揚州小鐵口同知朱裒高郵衛經歷晏鋭應襲賈思死之賊陷慈溪生員戎良翰死之良翰定海縣增廣生員性峻介義不茍合素以忠孝自許賊陷慈溪良翰家靈緒慈壤甚邇乃倡義集兵僅得百餘人與賊格殺斬首二級賊披靡而去巳又遇賊於丘洋良翰奮勇力戰賊方蟻聚竟不能支遂為流矢所中立死監司為之禮葬及表其門孝子生員馮履祥向叙王應麒死之馮履祥字君德慈溪人生七八嵗即警悟好讀書嘉靖壬子補邑庠弟子員至是賊猝犯縣履祥隨父出奔賊逼斷父左手且裂其背履祥以身蔽之泣訴曰此吾父也願無加害寧殺我賊竟殺之其妻袁氏遁於靈山時孕巳彌月夜夢一紅面神告曰爾夫為父死不可使無後吾當與爾一子産時無患次日婦果生一子又值倭冦將入賊馬皆止䇿之亦不前賊不越境而回一方稍輯人謂靈山神驃騎大將軍神威之庇與得兒夢符蓋履祥孝感所致云向叙字叔禮慈溪人獻令七世孫幼慧而有高志舉動擬步古人年十六入府庠文藻驟發而操履端謹人益器之至是賊入縣叙掖母而逃遇倭東溪踣叙仆地直前破其母叙急起抱母頸連呼曰寧殺我賊乃殺叙舍其母而去巡按御史上其事詔旌其門冦王應麒慈溪人年十七耽學習文天性至孝倭卒至應麒扶母姜氏嬸余氏奔匿鄰圃賊窺見二婦輒拔刀追之二婦亟赴池水余氏溺死應麟見母遇害以身翼蔽賊亂刃之子母傷甚賊退應麒隨卒姜氏亦死烈婦桂氏張氏章氏周氏馮氏柴氏孟氏孫氏烈女茅氏死之桂氏阿寶女姜阿龍妻慈溪人方少艾賊至桂與衆婦走匿馮氏僻室室後有池賊搜室衆婦競赴池賊以手挽之桂絶袂而死於張氏慈溪馮警妻唐孝子無擇之後年二十歸警才六年遇倭冦之變邑治焚燹張氏偕姑竄匿其夫相失為冦所殺張哀號亟收夫尸殮葬未數日冦復至張偕姑及妯娌買舟逃至管山江為冦所及張知不免曰不死且汚賊手然馮之嗣不可絶也即以幼子付其姑偕伯之妾徐氏即沈於江賊大驚異遂舍舟中諸婦以去三日尸浮於江家人收之合葬於警氏章氏沈祚妻周氏沈希曽妻馮氏沈信魁妻柴沈惟瑞妻孟氏沈𢎞量妻孫氏沈琳妻沈氏慈溪里橋巨族家界於觀海鳴鶴之間家衆二千人多驍黠善鬭自嘉靖以來海上多事冦上山燬鳴鶴縱橫蹂躝沈氏不惟自衛且能殱其渠魁奪其所掠賊甚讐之至是賊大至沈氏豪誓於衆曰無出婦女無輦貨財誓以死守不能者先戮之章氏誓於內曰男子死鬭婦人死義辱與死等耳衆婦皆竦聽既而賊圍沈氏羣婦聚於一樓賊散入户章氏遽出投於河周氏馮氏繼之共死一所柴氏方為夫礪刃賊巳斫戶入矣柴即以刃斫賊旋自刃孟氏孫氏姒娣為賊所得相持不放詈賊不屈奪賊刀自刺皆殱焉思橋之難沈宗婦死難者三十餘人其六人尤烈者也茅氏慈溪人年十四父母亡獨與兄嫂居其兄痿臥賊入縣嫂出奔呼之行女曰吾室女也去將安之俱去孰為扶兄賊至遽縱火女力扶其兄避於空室俱被燔灼而死二尸相攣綰焉五月巡檢劉岱宏與賊戰於仙居縣東嶺死之無為州同知齊恩與賊戰於圌山江中死之恩陜西隆德縣人祖敏知四川蒲江縣殺賊有功與二子俱死於賊詔為立祠恩廕入國子監授序班遷河曲知縣禦冦修邊有功撫按保留久任九年考績遷無為州同知閔東南久罹倭患竭忠圖報練兵衣械一毫不取於民長江賴以保障賊犯上流奉檄即率子孫叔侄兄弟凡十二人領兵赴敵一至圌山即身先士卒鼓衆而前殺賊數多賊遂畏懼奔潰乘勝逐北誤申賊伏誓戒子姪曰一死莫惜圖成功以靖國難由是舉家赴敵至於力竭勢窮又曰兒輩勉存宗祀吾與此賊誓不俱生由是次子齊嵩等四人得脫恩與長男尚文孫童叔仲實弟寶榮侄友良大卿力戰不屈俱死於賊一門忠義自有倭患所未有也人以為克繩祖武云賊犯定海烈女傅氏死之傅氏定海昌國傅梓女也年甫十七美姿色未嫁冦猝至女家故瀕海遂為賊所得女即以石自破其面流血塗地賊怒磔之六月百户帥印與賊戰於青村得勝港死之印新安衛百户率廣兵追賊至得勝港兵潰印力戰而死八月官兵進搗沈莊賊巢義勇劉進死之時賊巢甚堅官兵難於進攻進首抱火器渡河焚賊巢廬舍火既熾賊亂官兵乘之遂大捷進傷重升屋以死蓋忠勇異常者也惜無父母妻子故其功莫酬焉九月百户郎官與賊戰於臨海縣兩頭門死之官兵與賊戰於鴈門嶺生員倪泰員死之泰員餘姚人少倜儻有膽氣憤倭荼毒生靈募家兵四百從湖廣守備楊縉擊賊於定海之龍山三戰三捷乘勝追賊泰員率兵獨抵賊巢殺賊頗衆值天暮賊出死鬭兵疲勢孤泰員與家兵四十二名俱死於賊官兵搗乍浦賊巢土官汪相向鑾死之十二月官兵與賊戰於舟山冠帶把總莫翁送死之翁送桑麻土兵頭目也嘉靖三十六年四月賊攻海門衛應襲俞憲章死之憲章百戶闕之子五月都指揮沃田冠帶把總嶽君寵與賊戰於天長死之先是田統鎗手三千名守瓜儀賊犯天長操江都御史高公闕委領兵一千與都指揮焦鯤應援賊衝入其營鯤等潰走田與君寵及家丁封漢等力戰而死三十七年正月賊陷蓬州所百户李日芳等死之三月百戶秦杭與賊戰於梁灣港死之杭蒲岐所百戶先以軍門委領白岩塘兵船守青嶴門至是與賊遇於梁灣港力戰死之四月致仕僉事王德與賊戰於龍灣死之德永嘉人原任廣東僉事憤倭流劫募集義兵二千水兵二百剿之與賊遇於龍灣殺賊數十既而伏賊四起德被圍死戰遂遇害賊犯太平縣典史葉宗死之宗太平人原任典史因事去職良醫王沛與賊戰于梅頭嶺死之沛字崇大以例授良醫七品散官嵗壬子倭冦海濵崇大首倡大義招集義兵七百餘人團操保禦屢建竒功後因從子廣東僉事德致政而歸加募勇壯至一千五百有竒嗣後與賊戰龍灣戰長沙皆有戰績至是與賊戰於梅頭嶺賊衆大至沛衆寡不敵遂死之指揮劉茂朱廷鑰千戶周賔百戶季爵劉源等與賊戰於白巖塘死之茂盤石衛指揮使廷鑰溫州衛指揮僉事賔蒲岐所正千戶爵蒲岐所百戶源盤石右所百戶五月賊犯惠安縣知縣林咸與戰死之詳見福建倭變紀六月觀海衛百戶闕與賊戰於柯梅死之賊犯昌國烈女李氏死之李氏昌國人冦至執李欲汚之李罵賊不屈竟死之十月賊掠磚頭北塔守備楊簠與戰死之時官兵每有斬獲賊輒奪其尸蓋簠因貪功力戰而前故死之嘉靖三十八年三月賊犯樂清三窑嶼千戶胡鳳朱璠胡珊百戶姚憲死之鳳等從參將張鈇禦賊於窑嶼賊伏麥田中俟官兵將半忽起敵殺官兵大潰鳳等遂遇害官兵與賊戰於奉化之江口橋武生蔡啓元死之啓元廣德人從叔監生蔡汝蘭勤王擊倭奴纍戰功授千夫長至是我兵當賊於江口橋行列巳定鼓而向賊同行者俱錯愕不前啓元獨憤怒裂眦耻詈不休徑匹馬橫而前與賊逼賊駭或走或伏啓元手格殺數人㑹天雨馬行淖潦中不得出力竭矢空顧左右皆散去僅弟昆元與二三家僮不去啓元怒益甚瞋目揮劒罵賊曰吾不啖汝肉非丈夫也獨死戰良久賊乘間涉河繞其背鎗之死踰時猶怒立馬上不墮人共壯之四月官兵與賊戰於灣頭千戶蕭闕百戶蘇闕死之千戶趙世勳鎮撫韓𦙍與賊戰於如臯死之官兵搗廟灣賊巢千總沈儒死之儒故驍將至是從南路入水手燬賊船為賊炮所中而死賊犯象山烈婦丘氏死之丘氏象山人王憲維妻賊劫西山至憲維室時夜分賊奸其色欲汚之丘氏不從執木棍擊之中賊首賊以刃刺其腹而死八月參將丘升與賊戰於七竈洪死之升北方驍將也嵗丁巳倭犯淮揚升提兵應援屢立戰功冦平督府因留之每戰輒身先士卒凱旋則殿後行賊見輒為引避至是單騎搦戰故遇害十一月指揮夏正為王直黨所殺正故通事屢立竒功奉例納級報效軍門王直之來也擁兵觀望禍且叵測正密領胡公方略入直所為死間直既就擒毛烈收其衆議為復仇正又說攜其黨烈怒欲殺之正不為屈遂為烈黨支解而死事聞贈都指揮使廕一子為正千戶云三十九年三月冠帶義士沈講與賊戰於走馬溪死之四十年五月百戶徐昭與賊戰於海山外洋死之百户焦涇追賊出海死之涇隘頑所百户拾遺嘉靖三十三年三月鎮撫彭應時與賊戰于乍浦死之應時山隂人以儒生中武科授本衛鎮撫都御史王公忬知其材檄使練士㑹賊首蕭顯為參將盧鏜所攻自松江走入浙境王公令應時截之于海塘至乍浦賊掩至乃奮鬬身被數創猶督戰不已遂死於陳應時性聰敏能詩文材力兵技冠絶一時而尤精于騎射其練兵也善撫士卒人樂為之用及其死也人皆惜之三十四年正月賊犯歸安縣雙林鄉烈女嚴氏死之嚴氏諱四英桂林知府鳳之從女也冦入鄉傷其父虜四英以行至跳街橋四英投溺焉山隂徐渭為之立傳二月賊犯湖州烏鎮殺略數千人生員錢欽婦茅氏死之賊人突入欽婦茅氏與姑引舟卒遇之賊業已虜姑并欲及婦婦時懷妊巳九月又攜一幼男隨舟中呼曰吾母子三人俱死矣即手抱男沈河而死賊憤之復抽刃剖其腹路人聞之無不流涕者時御史疏其事於朝敕有司為之立祠籌海圖編卷十
