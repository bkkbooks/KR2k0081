body:
  text: 籌海圖編卷十一明胡宗憲撰經略一敘冦原主事唐樞云天下學未大明人心不正以致有是諸同志欲為得為能為宜再訂印功夫先從天下人心上倭冦滅盡然後天人合發以定萬化之機此言人心乃治亂之原凡論禦冦者皆詳於治法而略於治人惟此推究本源度越羣見似迂而實切故首列之禦海䇿要云為民禦亂莫若絶斯民從亂之心今之海冦動計數萬皆托言倭奴而其實出於日本者不下數千其餘則皆中國之赤子無賴者入而附之耳大略福之漳郡居其大半而寧紹往往亦間有之夫豈盡為倭也倭有時可使之無遺種而其雜以土人也則吾之攻殺者有限而民之附益者無窮幾何而有寧日哉故愚以為今之當事者當一面督兵截殺以治其流一面重撫百姓以治其本錢糧非上供至緊者悉與奏免而一切軍門用度皆奏請無礙官物以充之無令盡責諸民而其不容或已者則嚴為會計使吏胥糧里人等無有指一科十之弊則斯民不惟身得安生而其心且有父母孔邇之懷固將可殺而不可使之為亂矣今日郊野之間皆囂然喪其樂生之志夫民不樂生其又將何所不至哉此今日不可不為之計者也兵部尚書胡世寧云自古盜賊起於民窮民窮由於賦役之繁重官吏之貪酷而官吏貪酷又其致盜之大本也蓋使官吏循良則部檄雖有征斂而亦為之周旋善處民之被害亦輕官吏貪酷則朝廷雖有寬恩善政而亦被其停廢尅削民之受禍不減故盜賊之興多由貪吏而亦最恨貪吏觀方臘之亂所殺官吏備極慘毒此其驗也故自古明君良臣平日既以選用良吏為弭盜之本臨難亦以委用良吏收平盜之功唐太宗嘗言去奢省費輕徭薄賦選用廉吏使民衣食有餘則自不為盜而龔遂之治渤海賈琮之平交趾皆是道也近時盜賊所在充斥實由昔日權姦弊政及守令乘機侵尅之所致今朝廷纍下恩詔悉更舊弊而盜賊猶未革心者惟以平日貪庸之吏揚揚猶在民上而其一二離職者則又歸作富翁而坐享吾民之膏血或反升要職而更為貪吏之營窟故無以服盜賊之心而散其脅從之黨為今計者宜簡命風力憲臣出詢民瘼而凡舊日貪官暴吏不拘見任去官悉皆重按其罪以快吾民之憤窮追其贓以代吾民之賦而又選用循良之吏委以便宜寬其文法倣龔遂賈琮故事使得推誠布德散其徒黨而一二渠魁及姦民乘間生亂稔惡難宥者輕則就委守令設法擒捕重則選委將帥調兵剿除則盜賊平而患永絶矣計不出此而欲因循荏苒襲用舊人行舊政吾恐盜賊難保其不至於滋蔓也主事唐樞云備倭之法防海之禁斤斤明于國初然冦未嘗絶何也夷夏有無之互以通也承平日久市舶之官勢勝流職於是為私通之計自天順末以來安之而海上亦無盜警凡商於海者武具而力齊雖有小冦無所容於其間嘉靖初市舶罷流臣嚴其私請商市漸阻浙江海道副使傅鑰申禁於六年張一厚申禁於十七年六年之有禁而胡都御史璉出十七年之禁流延而有浙江巡按楊九澤之疏乃有朱都御史紈之出視撫設而盜愈不已何也冦與商同是人也市通則冦轉而為商市禁則商轉而為冦始之禁禁商後之禁禁冦冦勢盛於嘉靖二十年後是時居有定處隱泊宫前澳南紀澳雙嶼澳而已又人有定夥名酋不上六七許棟李光頭就擒張月湖蔡未山死陳思眄為王直所殺王萬山陳太公曹老又皆不聞矣又况入有定時登岸虜人致其巢責令以資贖後乃盤據內地隨在成居而惡少繼發徐明山者三十二年前之樿詮約步遨於浙之西東而莫之識也當夫壬子前盜形已具沿海有司為禁益嚴內外商物不得潛為出入內地人素與交識者因負其資而不償夫然後壬子之變作矣此言海冦之患其始由於流官嚴禁海商其後成于內地姦民負商資本都御史章煥云倭夷安從至哉有首亂有脅從有導引明乎此而後賊可理也故外賊易見內賊難知今以海外蠻夷而深入內境道路之紆曲民間之虛實官府之動靜纎息必知者誰為之也又其始至千人四布無一知者及鳴號而須臾畢集賊固善匿匿之誰也此東南之大變也夫吾民重困欲為盜久矣然時有見執之患自賊間入而為之用進有望外之獲退無盜賊之形海濵無關隘阻詰柔櫓輕舟往來甚捷此賊之由通也與賊連衡與良民雜居賊未至皆良民也賊至則良民去姦民留賊去又皆良民也此禍之所以難測也兵入其地以為居民詢賊情問道路悉為所誤當此時以為姦民戮之然有良民也以為良民舍之然有姦民也故兵多惑亂而妄行故倭夷有由入也亂賊有由熾也兵行有由誤也良民有由擾也城郭有由驚也姦萌有由自也故姦黨不消則賊患不止故安攘之計莫要於安反側夫反側之初良民也橫征暴斂追之耳故姦民不可以形治也治倭冦以兵治反側以誠故內賊為急外賊次之政事為急甲兵次之誠得良吏而分治之行寬大布恩信問疾苦時拊循明示不校反側者回心矣此龔遂所以治渤海之盜也且今良民安居而樂業彼將反本而呼天捐親戚背鄉井冒危險豈其情哉是散賊黨而伐賊謀也倭夷安從入哉故良吏優於良將善政優於善戰不然興師百萬能驅倭夷不能驅姦民姦民在賊可以復入師不可久留是行姦民之計也且天下寧獨倭夷可為亂哉故反側為要夫反側者反間之因也敵情所由得也善致之則為我用不善致之則為賊用此尤兵家之要微乎微乎不可以盡言者也太守嚴中云海商原不為盜然海盜從海商起何也許二王直輩通畨渡海常防劫奪募島夷之驍悍而善戰者蓄於舟中泊於雙嶼列表濵海之民以小舟裝載貨物接濟交易夷人欺其單弱殺而奪之接濟者不敢自往聚數舟以為衛其歸也許二輩遣倭一二十人持刃送之倭人還舟遇船即劫遇人即殺至其本國道中國劫奪之易遂起各島歆慕之心而入冦之禍不可遏矣此言海商初無糾倭入冦之念因防他盜漸至乎此其後遂即真大受倭患矣都督萬表云向來海上漁船出近洋打魚樵柴無敢過海通番近因海禁漸弛勾引畨船紛然往來海上各認所主承攬貨物裝載或五十艘或百餘艘或羣各黨分泊各港又各用三板草撇腳船不可勝計在於沿海兼行劫掠亂斯生矣自後日本暹羅諸國無處不到又誘帶日本島倭奴借其強悍以為護翼許二住雙嶼港此海上宿冦最稱強者後被朱都御史遣將官領福兵破其巢穴焚其舟艦擒殺殆半就雙嶼港築截許二逸去王直原在許二部下管匱素有沉機勇略人多服之乃領其餘黨改住烈港漸次併殺同賊陳思盻柴德美等船伍遂至富強以所部船多乃令毛海峯徐碧溪徐元亮分領之因而海上畨船出入關無盤阻而興販之徒紛錯於蘇杭近地人民自有餽時鮮餽酒米獻子女者自陷黃巖屠霩􅛾而其志益驕其後四散劫掠不於餘姚則於觀海不於樂清則於瑞安凡通畨之家則不相犯人競趨之杭城歇客之家貪其厚利任其堆貨且為之打點護送如銅錢用以鑄銃鉛以為彈硝以為火藥鐵以製刀鎗皮以製甲及布帛絲綿油麻酒米等物此言海冦起於中國邉海姦民違禁取利初通西畨後及日本為冦心腹毛海峯徐碧溪徐元亮者乃其魁首而許二王直又魁中之尤也殱厥渠魁非䇿之至要而功之無上者歟海道副使談綸云片板不許下海禁革雙桅大船乃屢朝明例以銷禍未萌意至深逺奈何沿海竈丁假以採辦私造大船違禁下海始則取魚繼則接濟甚則通畨十數年來富商大賈侔利交通畨船滿海間有朱秋崖任事之臣力行禁捕而大家竈戶浮議橫生不曰小民無以聊生則曰國課必致虧損加之監鹺憲臣偏護竈戶過抑邊官摘拾小愆節次論劾海道備倭勘斥相繼遂至避禍遷就海禁愈隳養成大禍莫有敢言者往年倭冦劫虜漁船逼為黨羽既得其船以張聲勢又驅其人以為嚮導蘇松之冦半皆脅從捕獲有贓尤多竈戶必須申明嚴禁仍乞特敕巡鹽御史鈐束竈戶止於額設海邊場蕩採辦煎鹽遵照節題事例小船編號朝出暮入循塗載滷不許造大船入洋採捕招惹倭夷仍立連坐之法以稽私出之弊如有縱容下海為盜者運司場官併得坐罪此言漁戶竈丁但當用小船不當容其打造大船通畨引冦除內逆兵部尚書楊博題云倭賊入冦多因我民為之勾引蓋逋逃不歸則禍本未拔東南無息肩之期合行督撫諸臣多方招徠務使不軌之徒以次歸正又題云蠢爾倭奴敢肆流劫者皆緣我之內逆為之鄉導也倭奴非內逆無以逞狼貪之志內逆非倭奴無以遂鼠竊之謀必須禁捕內逆方可消除外冦合行督撫諸臣責令軍衛有司將沿海居民逐一清查造册在官稽其生理時加約束敢有仍前不悛從倭為逆許令同里之人赴官告首即於犯人名下追銀三十兩充賞本犯從重處治拔本塞源此為要務也定廟謨都御史唐順之題云自海賊入冦以來十餘年東南雖苦其毒而賊之被殺者亦積至幾萬今年冦江北冦浙東者且萬餘而冦福建者傳聞不下二三萬則是殺者不可勝紀而冦者不為少止夫南倭與北敵異口外砂礫之地從古以來原有邉患腹裏膏膄之地二十年前原無倭子今口外尚有一兩年無擾而倭子却無一歲不來如此不已非止外患將為內虞古云兵久則變生近者吳淞定海之間水卒呼糧挾官縛吏則兵變之漸矣蘇人素怯弱而遊冶子弟懷毒蓄機日伺倭來裏外合應幸早發之猶燒官寺劫獄囚鬨然一逞則民變之漸矣此其萌芽也誠不可不深圖而熟慮之若謂倭冦之來一歲支却一嵗一番殺却一番便自了事則臣不敢知其所終也伏惟聖明敕下禮兵二部備講祖宗以來招懷撫諭之略防海固圉之機及敕督撫諸臣遍訪倭情集議長䇿二十年前何以絶無倭患十年之間何以倭患若此年年禦倭何時是了如何可以永斷倭冦之路以復東南之舊苟可以利國不必為身家顧慮茍可以便今不必以成説拘牽外內臣工方略畢上然後聖明與廟堂大臣從中主斷而力行之期於三年四年斷却此賊臣猶以為速也不然一嵗一來一來一勝臣猶以為浪戰擇將才兵部尚書胡世寧云自古將材難得而起自行伍慣歷戰陳者尤為難得今彼處邊軍衝鋒破敵者既拘例不得報功而斬獲首級者又被勢豪奪去不得報升官級至於指揮千百戶間有謀勇可用者又或家貧不得營幹管軍事以顯其材以是將官起自行伍真能殺賊者不可再得今宜嚴敕彼處鎮巡官公心體訪指揮千百戶中間果有謀勇出衆家貧不得差遣者務要公心選任管隊把總掌印備禦等職至於勢豪奪功買功之弊尤宜痛革而行伍士卒果能衝鋒破敵或斬獲首級者務要實報功次使其得升官職與選任指揮千百戶俱令積功漸升品級以備將官之選則在邊將領可得真才而緩急有備矣又云武職中固皆可將者矣然而天生智勇當不専在此輩之中故自古國家用兵常乏將材民間盜起多是豪傑臣愚以為莫若即此輩而收之則既獲將材又弭盜賊䇿之上也如蒙乞敕兵部計議通行天下軍衛有司精加訪察凡軍民中有膂力過人武藝精熟者悉選在官其良民不願者不必強逼選在官者軍則任以把總管隊民則授以總甲教師等項名目略加優給使之隨軍操練遇賊擒拿積勞多者量授職事以旌賞犯罪重者即發邊方以立功至於兵部亦乞比照工部添設主事等官幾員精選廷臣進士中才略明敏者為之平時則令草剃以習運籌有事則令出差以諳邊務才弱弗稱者改選别部才能稱職者専升兵備及邊郡知府等官惟此二塗之中收養既多其間必有真才出用而能為國家弭大患立大功者矣又云選將責在兵部者蓋惟守邊常職耳今軍政不立久矣若遇中原盜起而専命武將之出貪功好殺盜猝難定而民命已殘惟得文臣能帥者監而統之則相機度勢撫捕兼施然後脅從可散而首惡就擒賊可早滅地方不致大殘矣兵部尚書張時徹云三軍之司命則在將帥今之世祿紈袴固有宣力翼戴長於馭衆者矣寧無脧削以自肥用賄以干進者乎升之兵柄求無敗事不可得已昔者晉悼公使欒紏為戎御以訓諸御知義使荀賓為戎右以訓勇力之士可以時使山林草澤行伍之間未嘗無干城腹心之士也歐陽修所謂求賢勞之士不必限以下位智略之人不必試以弓馬山林之士不可薄以貧賤以非常之禮待人人亦以非常之效報國又謂取禁軍廂軍年少有力者不拘等級因其技同每百人團為一隊而教之校其技精而最勇者百人之中必有一人得之以為禆將合十禆將而教之又於其中擇有見識知通變者十人之中必有一人得之以為大將此一人之智勇乃萬人之選也推行是説拊髀之思庶幾可息乎此言將才當即於練兵之中選擇御史徐敦題稱先該巡按御史周如斗疏請於沙兵耆民之中照例論功升賞不願升授者許其子弟讀書者入學不讀者充吏承其舉人監生人等敘功加級選用此亦因時處置鼓舞人心之術而未經詳議舉行者何也議者不過以名器至重豈宜私濫然既與之冠帶矣許之援例入監補官矣則何惜乎此而不以勸效死之人心作東南之士氣哉且此輩類多粗悍而養之學校榮之祿秩又所以為化誨懷來之方也合無推廣前例激勵後圖仍嚴行監軍御史敘論功次分别等第不致冒濫或許實授或許入學或許敘用而將領之久效勞於海防者仍念人才為今日之急勝負為兵家之常通論功過勿以一失而遽棄之此言激勸沙兵耆民之法愚謂欲用沙兵耆民須督以文官如督官兵之法方可不然則將放肆如苗土兵矣參議唐愛云今之論任將者不曰使貪使詐隨才器使則曰精選賢才不宜輕用愚以為二説皆是而皆未也何也使貪使詐云者非謂貪與詐為當用但云駕馭之有法耳若將而貪汚則虛報兵額侵匿糧銀尅剝下人縱容剽掠無所不至矣曽有如此之將其部伍不完號令不行而能立功者乎若必求亷吏而用之拘拘於軌範之內一毫不取一毫不與何以激勸功能結納人心也昔漢高以千金與陳平縱其出入李牧備邊凡幕租聽其饗士莫與稽考故皆能成功今之將官自俸祿外更無舒展何以感動軍士而致其死命乎如愚見似冝體恤其情奉為定例總兵歲與者聽其作犒賞之用不問其費之由由是而查其部伍禁其尅剝責之以成功則在上者心無不安而在彼亦得以足兵足餉選練攻守沛乎有餘力也或者曰使其妄用與入已如之何曰通計總參能幾何人試以浙江一省計之不過費銀六千兩而止耳使其能衛生民不受屠戮之慘則敡歷風濤衝冒矢石勞苦萬狀即以此而優厚之亦豈為過乎不然亷者難望其立功貪者難責其守巳蠧國殃民多靡邊費比之明與六千之數損益不大相逺哉此言體恤將官乃任將第一要訣也自來將官多不成功者正以貪者無德以服衆亷者無力以設施若能恤其私則貪者可以無貪而亷者可以成功矣此義人皆知之亦私議之但避嫌而莫敢上達愚故述而載之舉人王文祿云今當選衆之中或將萬兵者名之曰萬總即借指揮之祿與之有功另行外有將千兵者名之曰千總即借千戶之祿與之有功另行外有將百兵者名之曰百總即借百户之祿與之有功另行外其不能將兵之官止食軍之月糧是亦有祿矣其指揮千百戶有能領兵者聽若然則兵皆將也此言選將定祿之法御史張椿云為將須有膽有略有量有德殺人如刈草從善如轉環用財如揮沙保民如恤子故拘泥故常不敢分毫出格者不足與有為也閩縣知縣仇俊卿云地利既得必貴擇將法曰有良將無弱兵今將帥取諸世胄紈綺習深英雄氣少雖馳馬彎弓有未能者况望其諳韜略乎武舉科亦未能盡得其人欲將外衛官員照京衛保舉會舉之例拔擢聽用其不稱任使者照文職扣俸住俸事例或遞減其俸留為軍門礪鈍之具文職之中有能知兵善陳者參酌要用不必拘以常格則豪傑之狀未必無人或致仕官僚或舉監生員或山林韋布諸凡術數小道有能占天文曉兵法間武藝善遊説一切可為海防之禆者皆招致之察其聲實之如何隨其材品之高下使之各盡所長以神鼓舞則人莫不激發而賈勇效能矣此王陽明于居家握兵之日每能延攬以寓此意豫按諸公論選將之法詳矣然猶似欠明也何也將有不同有大將有偏將偏將亦不同有先鋒有哨援有守營有竒伏必先正將之名色而後論夫選之之法庶言有歸著而法不混施焉耳何謂大將運籌幃幄之中決勝千里之外虛懷而取善不遺用材而器使各當古人所謂善將將者是也何謂偏將恤下而不苛遇敵而不懼奉令而不違沈幾而不露應變而不窮古人所謂善將兵者是也要之上通天文下達地利中諳人事必兼此三者而後可以言將否則不得乎太乙六壬禽遁之傳不知乎駕風鞭霆之術孰為勝地而宜據宜爭孰為要路而宜守宜伏敵情有緩急難易如何而攻陳勢有竒正分合如何而用孟浪而戰是以卒與敵也夫大將以出令為職者也若識不足以範圍才不足以駕馭諸將其肯奉行乎偏將以受成算而不自用為職者也若提兵既逺不能隨時出竒而欲一一關白主帥其能以成功乎昔王晉溪在本兵宸濠之亂談笑自如人或訝之晉溪曰兹事吾已料理之矣王伯安有大將才吾置之於贑州是也未幾而全捷疏至人咸稱服愚謂選大將者當以晉溪為法仇咸寧之大父為百戶時北騎數萬突至都御史李忠宣知其能使率兵禦之仇毅然曰兵不必多憑吾自選五十人足矣忠宣從之仇度敵所必駐之處掘地坑令二十人埋伏覆以蘆席飾以浮土三十人登山瞭望以銃為號敵至此果札營夜半銃發坑卒地雷亦起敵疑大軍襲之自相蹂殺過半而走質明五十人歸報中軍遣人馳割首級遂成竒勳可見勝敵不在多人命將亦不必循資格惟存乎知人善任耳矣愚謂選偏將者當以李忠宣為法御將兵部尚書胡世寧云陸贄有言將貴専謀兵以竒勝軍機遙制則失變戎師稟命則不威而欲敦以付授之義固以親信之恩假以便宜之權待以殊常之賞其餘細故悉勿開言所賜詔書務從簡要蘇轍所言宋祖用將之善而欲修其成法擇任將帥而厚之以財使多養間諜之士以為耳目此御將之術也又云自古御將莫如宋祖昔人謂其隆之以恩厚之以誠富之以財小其名而崇其勢略其細而求其大久其官而責其成功萬世御將者所當法也實軍伍兵部尚書張時徹云衛所轄於都司都司轄於五府其卒伍之設每百戶所旗軍一百一十有二千戶所一千一百二十衛列五所及衛鎮撫凡五千五百有竒此言設兵舊制又云清勾之法既壞里書脫漏戶籍勾補者百無一至即有至者本管過為誅求收伍未幾旋即竄匿至於犯法充新軍所在種種而法網不嚴曽未有𨽻尺籍荷戈殳者兼之汰黜之令過嚴異姓充役及無妻者輒俱罷革雖贅壻義子一切不録軍安得復舊額乎此言兵不足之故有三又云其犯罪充軍者嚴為發解明𨽻尺籍如近年兵部題準事例不得有所隱脫又不足則召募土著之人膂力精壯者程能試補仍復其身而給之食立以程限以二十嵗為始五十而罷復為民有疾病願復民者聽不苦之以終身不陷之以永逺則人皆鼓舞爭為兵矣仍籍應募他郡者責令來歸其册籍則歲注之給以懸牌嚴其虛冒私替之弊當其精壯善鬬之時得以盡力武事而不出二十年後復為平民皆知自愛而重犯法不至呌呼無賴為凶人如此則軍無缺額而必無不任戰之民死于無罪者矣此言足兵之法有三又云國初沿海建設衛所聨絡險要今軍伍空缺有一衛不滿千餘一所不滿百餘者宜備查缺額之數而補足之其運糧班操等項原因海上無事撥借别用者可悉還之原衛所使自為守衛所之兵常足則備禦無患矣此言足兵須先查復撥借别用之卒都御史唐順之云逃軍許其自首隨處收補一節論明決直截僕亦同此意蓋與逃而無用不若就近而補之猶得一軍之用也既而思之深有未便者苦寒磽確之地人甚不樂居嚴法羈管嚴法清勾然猶住者多逃而逃者不獲若逃軍即許改編則雖素不逃之軍亦孰不逃焉是今日逃軍之補見役所以釀成異日見役者之作逃軍也利少而害多矣是以不敢遽有題請此言處逃軍之法不當聽其隨處收補海道副使談綸云衛所官軍既不能以殺賊又不足以自守往往歸罪於行伍空虛徒存尺籍似矣然浙中如寧紹溫台諸沿海衛所環城之內並無一民相雜廬舍鱗集豈非衛所之人乎顧家道殷實者往往納充吏承其次賂官出外為商其次業藝其次投兵其次役占其次搬演雜劇其次識字通同該伍放回附近原籍歲收常例其次舍人皆不操守即此八項居十之半且皆精鋭至於補伍食糧則反為疲癃殘疾老弱不堪之輩軍伍不振戰守無資弊皆坐此至于逃亡故絶此特其一節耳為今之計合無委賢能有司官員公同該把總官前去各該衛所督同掌印等官不必論其伍分先將城中街巷盡行查出計有若干每街每巷共有門面若干戶分格眼紙一張諭令自開房屋幾間男婦幾口某係精壯某係老弱至於釜竈床鋪若干亦要從實開載貼於大門之上乃各委官親自持簿帶領各伍官旗沿街履戶逐一挨查面詰該管官旗有無隱漏并執結明白然後比對戶口文册庶幾可得十之七八於是取其見在人數通行挑選精壯者存留食糧老弱不堪者通行革退即以戶丁精壯餘丁選補如果在營故絶無丁者除本省地方照舊行勾外其他省人民屢勾無解者不必駕言單勾即查照近例嚴選别戶精壯餘丁補伍至於充納吏承違例役占者自今伊始通行禁止其賣放逃出外行商業藝投兵搬戲及隱容在籍收取常例等項俱責令該管官旗及家屬人等免其前罪通行勒限招回一體選補務使食糧者皆精鋭之士無復以老弱充數不食糧者照依保甲之法編守城之人如百姓守城之例不得以無糧藉口該管守旗招徠補充至五分以上即量行奬賞其始終不改縱容賣放如故者掌印及諸伍官旗聽各道從實查參輕則問罪降級重則綁解軍門治以軍法如此庶軍政可肅戰守有人不至臨時紛紛請兵矣此言兵不足之故有十能查處此十者則兵足矣御史曹光等題稱各該衛所正軍戶內餘丁有精壯者盡數挑選補伍然補伍又須明言止終其身另行簽補與正軍永逺者不同其補過各軍月糧務從長議處以充其養贍之資如有附近人民驍勇願役充者亦聽收伍月糧照例支給特敕巡按御史嚴督守巡道等官親詣地方著實舉行每遇復命之期將各衛所正軍并補過餘丁各若干有無充足堪用處給過月糧若干有無缺乏從實具奏以憑查考此言足兵之法有二與張尚書談副使暗合御史周如斗云沿海衛所軍伍缺乏之甚尤當亟為之充補乞照昔年改編附近事例如在嘉靖三十年十二月以前凡南北衛所逃故清勾者及遺失清勾查無名伍發回聽候者皆準改編附近沿海衛所至于直𨽻江北江南等處其新充附近終身軍犯尚未發遣者合無改發各該沿海衛所其有定發衛分永逺充軍追贓未完及未發遣者蓋以其畏邊方之逺且因例有監故免補之條率多延捱前贓以圖茍免軍伍法固難逭情有可原者合無亦自嘉靖三十三年十二月以前在監追贓者量行改發邊海衛分彼將樂於地方之近而無靳于追贓之難不惟有以充實軍伍抑亦可以追完宿逋由前則土兵之衆緩急獲濟由後則軍伍之完永逺有賴矣此言處逃軍與問軍不肯著衛者之法其心甚仁其見與荆川甚相反録之以俟有識者採擇或云今之論兵者有五曰足軍額曰選弓兵民壯曰練鄉民曰募義勇曰調客兵此五者救時之切務也愚謂皆非探本之論也何也衛所軍與弓兵民壯乃官兵也官兵足何事他求乎惟軍則缺伍弓兵民壯則不堪用故思練鄉民鄉民不能遽練也故思召募召募不得人也故思徴調不知向來兵政之敝其原不在於此乃將官畏死不敢擅動官軍殺賊之故也我朝大明律一欵云云云夫兵凶戰危勝敗者兵家之常也自古名將如太公孫武武侯其人上下數千年落落可計外此雖善戰者不能為必勝矣設有所損其數豈可量哉蓋我太祖撥亂反正躬親戰伐深知馭將之當嚴而行師之當慎故以是垂訓使為將者常以失機為憂全勝為念則練兵不敢不預臨陳不敢不勇耳此其立法之至意所以重人之大命也若其用法則又有權衡於其間而未嘗執一如云云蓋人情易怠而難久常恐懼之猶慮其忽若立法不嚴則喪師失律何所不至也自定律後莫敢不遵凡遇用兵言官引之以紏劾法司據之以問擬將官惴惴焉寧殺其身而不敢損軍士非閃姦以規避則顧家兵募義勇以衝鋒若有敗衄軍額不虧則失機之罪免矣古者寓兵於農有事則戰無事則耕後世軍自軍民自民軍常設以衛民民常耕以養兵此國用之所以常乏而民力所以難堪者端以養兵之費大也既不用軍以戰則軍為徒設不過聽差點名虛文而已矣練之似為徒勞不練亦無為害在班似為徒養逃亡亦為不覺衛官初以兵缺為利而侵月糧法司後查其糧而作羡餘兵日漸寡糧日漸縮若遇冦亂撫操兵備見軍無適於用欲究之則弊久欲用之則徒使將官受失機之誅耳不得巳權用民壯義勇更廣募調以支之冦平官各以功擢去誰復理前任之事也故雖大亂如倭朝廷新設總督提督重臣添設兵備副使海防僉事一時亦不能正其弊不容不用夫義勇民壯弓兵見不堪用不容不更召募召募無良不容不更徴調徴調不可常則又議練鄉兵要之鄉兵僅可自守而不可為鄰援不如復祖宗舊設軍額欲復軍額須復舊設糧額此相須之事也糧額如舊則足軍無難軍額如舊則沿海衛所隨在有備不必募調而常如募調且實省募調之費矣然有軍不練與無軍同練而不戰與不練同如愚見是在科道官以蒸民之生命為重以一身之利害為輕協議會奏逺稽太祖云云之言近述聖上屢批戴罪殺賊之例嚴敕兵備海道官専督衛所官練軍限以一年半年務有實用仍敕總督提督今後賞罰務查將官功次若獲級多而損軍少者準其贖罪損獲相半者從輕姑令戴罪俟後有功準贖若損軍至幾人而獲級不多則姑容緩死或去其官或行降調俾之戴罪殺賊視後功次大小而量處之若隊伍敗衄全無斬獲者照大明律失機處斬如是則將官莫敢不用軍以戰而凡戰軍莫敢不用素練者矣豈非善體太祖立法之意通其變與民宜之乎不然軍固命也民壯義勇與募調之兵亦莫非命也軍損三人則以犯律而論失機民壯義勇募調之兵而損三十人三百人亦以律所不載而不論可乎科道官以言為貴且礙律而不敢言總督提督奉律以賞罰人者也顧敢自擅乎夫國家設軍衛民戰死乃其分也今受民之養而不與民捍患民反代之戰焉天下之寃孰甚於此愚謂此弊若無人敢言則將官終不用軍以戰不用軍以戰則軍伍之缺不必查補而沿海設備非廣募調何人以布列之耶天下之費吾不知其所窮而倭冦之患吾不知其所終也雖然猶未也兵必土著馬牧於官古之良法也欲補軍伍須改逺為近則服水土便勾攝如是而逃者乞題照職官謫戍但逃殺了之例著為定法此非變祖宗之制也法久弊生不容不救而通之也此言將官畏法之嚴不敢擅動官軍愚謂豈獨將官哉凡文職衙門稍有干係者俱不敢動也昔契丹與金人戰曽有明驗矣始以法之嚴不敢動官軍百戰百敗及後不得巳用官軍又稍輕其法人皆曰臨陳者死脫逃者生向前者死向後者生亦百戰百敗可見法不足恃茍得其人官軍亦可召募亦可法重亦可法輕亦可在上者可不汲汲焉以求人為先務哉或云清查似矣但近來風俗或以賄賂或以囑託一至地方則計其所獲倍其所費以致富者雖強壯而漏籍貧者雖老弱而加名即有清正人貟若不順人情一切用法多致激變又因循撫葺是清查之法非惟無益而有害矣余每云古今有治人無治法種種皆驗豫按向來不敢用軍出戰端為律法太嚴而兵難遙度恐少有挫衄則犯失機之罪故但用民兵易於掩覆此誠將官之積弊也然兵部題準已有新例矣大略云但當録其血戰之功而不計其失伍之罪軍伍缺者亦有例許民充補所在巡撫兵備衙門正宜舉行以實軍伍以之操練以之征勦可也論者未知新例故尚泥舊制非矣選士卒參將戚繼光云兵之貴選尚矣而時有不同選難拘一若草昧之初招徠之勢如春秋戰國用武日久則自是一樣選法方今天下承平編民忘戰卒然之變自是一樣選法大端創立之選勢在廣攬分揀等率均有所用天下一家邊腹之變將有章程兵有額數餉有限給其法惟在精第一不可用城市遊滑之人但看面目光白形動伶便者是也姦巧之人神色不定見官府藐然無忌者是也第一可用鄉野老實之人所謂鄉野老實者黑大粗壯手面皮肉堅厚有土作之色此為第一然司選人之柄者或専取於豐偉或専取於武藝或専取於力大或専取于伶俐此不可以為凖何則豐大而膽不充則緩急之際脂重不能疾趨反為肉纍此豐偉不可恃也藝精而膽不充則臨事怕死手足倉卒至有倒執矢戈先衆而走此藝精不可恃也伶俐而膽不充則未陳之先預思自全之路臨事之際既欲先奔復以利害恐人為已避罪之地此伶俐不可恃也力大而膽不充則臨時足軟眼花呼之不聞推之不動是力大不可恃也興言及此選士之術荒矣然廢四者而别圖之不可也諺曰藝高人膽大是言高藝止可添於有膽之人非謂懦弱膽小之人茍熟一技而即能膽大也素負膽氣豐偉伶俐而復習以武藝此為錦上添花也然此輩不易得思其次則武藝尚可教習必精神力貌兼收又不若憑各親識鄉里哨隊長舉首此數者皆選兵之一䇿而必膽為主膽在人腹中不可見何以選為殊不知人之精神露于外選人以精神為主而當兼用相法忌凶死之形重福氣之相此盡選人之妙矣使伶俐油滑寧用鄉野愚鈍鄉野愚鈍之人畏官府畏法度不測我顛倒之術誠信易於感孚愾氣易於振作先以異常之威壓之使就我彀中而即繼之以重恩收其心結之以至誠作其氣則為我用命無疑此萬試萬效之方也若愛先于前而後繼之以威則怨叢而恩不感矣是故遵令奉法臨事用命所以成天下之功也但威嚴不能自行所以使威嚴之永行無阻壞者恩與信也彼天下之至親至情莫慈父之於孝子若也設使父必于殺子雖孝子且不能無私言况烏合之衆行伍之兵耶是故必恩以佐威庶恩威為有濟此豫數年之獨祕雖後日名將之出必不易豫言也恤軍屬兵部尚書楊博題云優恤軍士著在令甲即如近日山西等處之變固是諸軍自干天憲至於處置乖方當事者亦不得不任其責合無備行督撫總兵等官令所屬大小將領將部下士卒察其飢寒同其甘苦務使人樂為用闡明信義整肅威嚴務使人不敢欺則感恩畏義無不願死以報上矣精教練兵部尚書張時徹云議者欲以鄉兵代官兵奏疏文檄積滿案牘而迄未有能行者何也以調遣之失業也紏聚之妨農也差官審編又不以賢能正官而率以佐二首領所至之地冨者行賄求脫強者挾詐求脫故册籍未定而委官之囊槖已滿其充數者非貧難下戶則蠢愚無知而鄉長甲長則無賴猾氓也謂宜明示號令不調遣逺出不紏聚妨農委賢能正官親詣關廂村落備查編戶隨其住居相近團聚大率以若干家為一甲就中選有力量者二名立為甲正甲副置牌一面上書甲正某人甲副某人居民某人某人仍於五甲之內選其才能服衆者立為鄉長使之統領總置一牌上書鄉長某人管領甲長幾人某人某人甲副幾人某人某人各該居民若干某人某人列於各甲正甲副之後仍令每家書寫排門粉壁互相譏察各備鋒利器械幾件每鄉長管下置大旗一首及合用銃炮等項聽從鄉長統領前至空間處所演習武藝一遇有警即便升旗舉炮各率牌內之人同赴要害地方設法把守併力截殺仍於通行街巷路口樹立壯固木柵堆積石塊以便拒守其居民或多或少隨宜團練不拘定數仍照兵部題奉欽依事理保甲領袖先行給與冠帶以為激勸有功之日一體升賞庶幾家自為守人自為戰不待調發之勞而收保障之績矣兵部尚書胡世寧云從地方總甲里老人等將各家五十以下二十以上壯丁不分家主義男家人盡數報出而於各家排門粉壁上各書本家壯丁姓名年貌其六十以下十五以上名中下亦書以備運磚送飯等用仍責一壯丁各置堅利器械二件不分晝夜各請教師演習武藝所製鎗杷務要長短大小一齊弓弩各隨氣力強弱其間尤分長者學弓學鎗短者學杷學牌仍仰學鎗學銃者各兼學使棍學弓學弩學牌者各兼學使刀前項人丁內除官吏監生生員并見操民壯征進軍丁一應在官役占之人外其每三丁內抽出一丁不及三丁者將别戶朋湊亦要三丁內義讓一丁僉為鄉夫街夫二項名色仍要每甲內選立武勇一人為小甲置小招旗一面每鄉每里內各選立有行止才望能服一鄉者二人為正副總甲置大旗一面各置號頭鑼鼓部領齊集每五日一次在城者就軍伍教場在鄉者就本鄉教場各操練武藝鄉市軍民之中若有平素膽力過人武藝精熟者須聽赴府報名另為義勇名色本府重加優待臨用之時與軍同給糧賞其各鄉原立備賊寨堡亦要趂時修築完備以防不測此言團集鄉兵之法又云精選各戶壯丁年二十以下十八以上氣力強壯身才矯捷之册籍紀年貌選委教師演習武藝仍編每十名一甲外立小甲一名另添雜役備缺一名以應古炊家子之制每甲共十二名每五甲六十名為一總外立正副總甲各一名以應古正副隊頭之制分為八總每二總共選立百長一名統率共該民壯五百名其餘二十六名作吹鼓手每總內前一甲十名內五名學牌五名學鎗第二甲十名五名學杷五名學乂第三甲十名俱學弓箭第四甲十名五名學銃五名學弩第五甲十名五名學棍五名學長刀其總小甲俱執旗鎗仍帶弓箭或腰刀副總甲執刀并帶弩箭在後押隊仍選身材長者學弓箭銃弩短者學鎗牌杷棍此言練兵派人之法又云教閲之法在斟酌古今之制而施行之其一當簡汰其疲老病弱升擇壯健驍勇如胡明仲之言二當先教擊技多習弓矢及令厚甲重器演習慣便而後習走陳之法如宋仁宗時議者所謂諸軍止教坐作進退雖整肅可觀然臨敵難用之意又云宋學士蘇軾有言天下不免於戰無事之時士大夫當尚武勇習兵教庶人之在官者以行陳之節役民之司盜者以擊刺之術歲終試之較以勝負以行賞罰一旦有事免以不教之民而驅之戰乃今日為世道計者之所當知也巡撫都御史唐順之云八九年間為督撫者亦幾何人中間以練兵為説謂不在增兵而在練兵者僅見總督楊博一疏而已然則兵之積弱已非一日之故而兵之不練弊亦久矣所謂専倚邊兵不練土兵者誠如明旨不敢虛飾竊以為目今權時之宜但可責鎮兵以為守量調客兵幾枝以為戰待鎮兵練得一枝精鋭然後將客兵再減一枝至於舉軍盡練得精鋭士爭抵掌人賈餘勇一旦遇虜必不退懾屹然足為北門倚重然後更議免調之期則望實不失而經權兩得也此言目前且用客兵救急待練土兵成然後免調其説詳見定軍制條當與此參看甚善甚善但惜荆川疏中欠説練之之法如何似為未備或者云今之議者不思練兵而數欲調兵昔山東兵嘗調矣而無救於敗狼廣兵再調矣而無救於敗蕃土兵又調矣無救於敗而害益滋其所至如乳虎而其臨陳如鳥散居則為民蠧出則長賊威故民苦調兵與被賊等以其遣之不精而馭之無統也夫兵法平原曠野此用衆之地也如羣鹿抗獐以多者勝道狹險要則如兩鼠鬬穴以勇者勝雖衆無所用也兵部尚書楊博題云逺調客兵不如團練鄉兵此誠不易之論况所調狼土等兵凶狼狂悖十倍倭奴總督既不能節制其將領又不能約束即如近日川貴總督侍郎石某所奏可鑒已但議者動謂鄉兵怯懦緩急難恃不知近日浙江揚州之變多係土人何其勇於私鬬而怯於公戰哉是在處置得宜耳合行督撫等官嚴督各該海防兵備守巡將各處鄉兵係𨽻行伍者責成軍衛募自民間者責成有司如法團練務求實用至於客兵仍遵明旨不許輕調騷擾地方主事唐樞云古之練兵少而習壯而安不見異物而遷其技能上下相便休戚安危貴賤一體故能如身使臂如臂使指今以烏合之衆馭之者如傳舍其事可效而行否此言兵須平時教練主事唐樞云練兵為長久之計海賊實不敢敵近日都是無能之將以統無制之兵賊反素教預習所以肆膽橫行深入必須擇知兵者隨處教演又選差賢能官分投查驗必賞罰以為經久可用此言兵不可以不練練兵須擇人著實舉行副使茅坤云浙人不習射當如兩河以北懸射銀錢之利以誘之使習令弓師而能教百人善弓則善弓者得以一人兼二人之食而弓師且賞之以百金而署之為百人之將矣令弩師而教百人善弩則善弩者亦得以一人兼二人之食而弩師且賞之以百金而署之為百人之將矣如此則不數月而全軍皆善射矣其他短兵鎗棒亦率類此此言練兵全在善誘又云吳越江海之間幾二三千里必非朝廷之兵所能遍為戍守者漢患胸奴朝錯嘗請徙冨民實塞下蓋使之家自為守人自為戰若今日吳越之間則不必他徙富民而中自有饒田宅千金萬金以上者廬相接也以愚計之當倣兩廣之制其勢力可以蓋一里而部署百人上下者則命之為百長長有牌分為若干隊各籍其所部署百人者之名氏年貌與分執兵仗於其上以待約束其勢力可以蓋一鄉而部署千人上下者則命之為千長長有牌分為若干哨各籍其百長及所分哨之名氏年貌與互相聲援之略於其上以待約束其在官府特罰其不如令者而已不得數令追呼而擾之方其平居無事則千長得以擊牛酒歃血為盟約劑於一鄉之中以稍申其聲援之約及其賊既逼境則千長得以舉火炮為號合各百長之兵以赴援於賊所間入之路以迎其至而擊其歸有不如約者即聽千長百長各得以按軍法綁縛而告之官府按軍法而治之如各鄉之巨姓大族有能自募膂力伎擊之士以為諸鄉兵之先者則各書其名於官責其摧鋒奮擊以為里兵之倡而賞犒之此言練鄉兵須倚重各鄉有勢力者為之又云吳越之間其巨家勢族往往有為子弟不惜千金而鬻一官者倘疏之于朝凡民間所籍鄉兵或巨家勢族所各自募之兵有能奮勇𠞰賊凡斬首級者倍官兵之賞每級一百兩凡手斬三級以上者署爵一級如兩廣試巡檢之類而賞仍半之纍功至五級以上得世百戶纍功至七級以上得世千戶凡所部之兵斬三級以上量為優之冠帶有子弟願補生員及都布按承差知印吏者聽五級以上準署爵一級如前或準送子弟一人國子監讀書或原係監生準選光録監事署丞及五城兵馬等官七級以上亦得世百戶或願改錦衣世總旗者聽十一二級以上得世指揮使或願改錦衣千戶者聽或係監生願補內閣文華武英等殿及兩房中書舍人之職亦得劑量如例如此則吳越之間非惟各思保其妻子室廬之有抑且兢得夫爵賞寵祿之及爭相家自為守人自為戰而其氣百倍矣較之官府歲調客兵其所當利害緩急尤有間者此言欲練鄉兵須以爵賞激勸勢力之家人方樂為舉人王文録云衆聚而不申以號令嚴以約束亂無紀律所謂兵不戢將自焚狼兵則摟婦女貪貨財而肆其抄掠邳兵則酗酒逞凶彈絲唱曲而徹夜淫遊民壯義勇皆戀家無拘而不習戰技徒費養兵之財不熟練之過也必責成統領分布要害日加團練編以隊伍五十為隊倣吳起一人學戰教成十人之法與以堅甲利兵之器齊以坐作進退之度重以信賞必罰之權一人有功一伍賞之一伍有功一隊賞之罰亦如是則互相救援而奮發也必以所練之兵拔取衝鋒一萬取一千一千取一百時加部犒戰勝不論首級而賞亦倍之蓋衝鋒不暇斬首斬首皆藉衝鋒之人殺而斬之也此言練兵須明賞罰南京戶科給事中高鶴等題稱各兵之調非經久之計欲選擇客兵之精鋭者分别武藝教練鄉兵以一訓十以十訓百以百訓千以千訓萬不半年而民兵即客兵矣此言練土兵當用客兵之高藝者為師主事唐樞又云練兵如近日教場下操之類俱虛應故事務令精専齊一而後膂力之強弱技能之長短可以等而上之必求其至古人謂三官不謬五教不亂總是用志不分隨著應手此必平居嵗月習成穰苴以他人未教之兵為已率然之用不得已殺其愛姬助長以求速效然亦可濟臨時之用故練兵之法或暫或久可勉可安兩法俱在慎而行之存乎其人此言練兵之法有二參議唐愛云練兵之事當責之將官而不當任之兵憲何也兵憲不自分領分領者將官也若兵憲練之將官領之則將不識兵兵不識將何以制馭而取勝乎必用此將官管領即用此將官教閲熟演於平日則如身之使臂臂之使指臨陳無不順意矣兵憲不過日省月試孰為當賞孰為當罰孰為可進孰為可斥執監督之權而已矣總督則但總夫握兵調將之權其職掌愈尊則體統愈大也此練陸兵之説也若在海船則以風潮為主有難於操演者其緊要惟在舵工轉運趨向皆出其手遴選賞罰非總副參遊之所當注意者乎此言練陸兵之法須委重領戰將官練水兵却無法惟精擇舵工而已又云使船必用造船之人則不吝工料而且知愛惜領兵必用練兵之將則用心訓練而亦相識認故平日憲職練兵而禦敵付之武將非計也必令將官自練而兵憲不侵其權不奪其功然後可責其成效耳此篇與前同義海道副使談綸云今之戰卒望敵而走往往棄主將不顧蓋由將不知兵與兵不素練耳夫將猶心也士卒猶手足也手足無恙則欲持而持欲行而行無不如意使手足而痿痺也則心雖欲為其能以相應乎故選將練兵缺一而不可又云凡言練兵者非但練其藝與坐作進退之法耳其要莫先於練心其法莫善於節制節者如竹節之節節節而制之即人心齊一進非幸成退無速奔而常立於不敗之地矣今姑言其概如以三千人分六總計之十人為一隊設一隊長百人為一哨設一哨長五百人為一總設一把總合五把總為一營設一參將士卒未練戰守無功在一營則責之參將在一總則責之把總在一哨則責之哨長在一隊則責之隊長如是則為之主將與長莫敢有退縮不奮勇者矣如使為之將與長奮勇直前以至有失失一參將則斬五把總失一把總則斬十哨長失一哨長則斬十隊長失一隊長則斬九卒如是則轉弱為強因練變化無不如意古人紛紛紜紜鬬亂而不可亂正是此法但分數要明頭目要衆使我所殺者嘗不過十人則心與法不相害而法可必行茍徒具是法而行之不果亦與無法等耳此言練兵之法當使兵將相習松江府同知羅拱辰云陸戰之法大率以十人為一隊每隊以一人為隊長就將原執竿子鎗上縳一號旗以便陳用內牌手三人執牌在前謹蔽敵鋒用手牌者執鏢一二枝以備飛擊鏢既發矣隨用腰刀其用挨牌者手持長鎗一以護衆一以旋刺而腰刀又隨身可用則用也次鎗手四人傍牌而行避身牌後亦各兼帶鏢鎗一枝次又或弓或弩或銃者共三人藏身於鎗手之後居中立者其面向前左右立者以背相向臨敵則先發弓弩銃賊近則牌手竿子手所執飛鏢齊發鏢發則牌手與弓弩鎗銃等兵乘勢並進長短相間彼此相護斯能有勝參將戚繼光云今之軍士設使平日所習所學的號令營藝都是照臨陳的一般及至臨陳就以平日所習者用之則是操一日必有一日之效一件熟便得一件之利奈今所學所習通是一箇虛套其臨陳的真法真令真營真藝原無一字相合及其臨陳又出一畨新法令却與平日耳目聞見無一相同如此就操一千年便有何用且如各色器技營陳殺人的勾當豈是好看的今之閲者看武藝但要周旋左右滿片花草看營陳但視戲局套數誰曽考問操法也是此花法勝而對手工夫漸迷武藝之病也虛文張而真營却廢制陳之病也司閲者可不端明雙目以任習服之人為較量之衡耶又云操兵之道不獨執旗走陳于場肆雖間居坐睡嬉戲亦操也善操兵者必使其氣性活潑或逸而沉之或勞而息之或相其意態察其動靜而樽節之故操手足號令易而操心性氣難使其氣性活潑又須收其心秉畏兢業又有操之似者最為操之害何則歡譁散野似活潑懈苦不振似兢業為將者知此可以語韜鈐之祕矣夫好生惡死恆人之情也欲使人樂死而惡生是拂人之情矣蓋必有生道存乎其間故所謂恩賞者不獨金帛之謂雖一言一動亦可以為恩所謂威罰者不獨刑杖之謂雖一語一默亦可以為威操之於場肆者筌蹄也而兵雖靜處閭閻亦謂之操乃真操也此聖賢之精微儒者之能事鎮撫蔡汝蘭云兵猶食也欲談兵請先論食夫嵗大飢宜告糴少服宜藝畝一年積則糴可弗告何也足於已無待於人也客兵猶告糴土著猶藝畝其説甚易明曉也夫燕雲之兵以騎射驍雄奪敵氣臨淄之兵古稱進如鋒火戰如雷霆尤善長鎗而勇於公戰故募兵者必以為首談下此則狼苗諸部以楯弩防突冦而於衝堅長驅之雄或歉焉蓋以東南諸郡久安忘兵血刃之慘聞見未及若或海警少揚民將移避不遑有司莫之奈何而募兵之説行焉故不得不贍其犒賞以招來之不得不寬其約束以羈縻之不得不厚其賞賚以激勸之若或警息而遣之懼其春汛之復至也如之何則可夫所重于客兵者為其各有長技也豈夫人之所難能哉是惟弗之習耳茍習焉則東南之衆是亦雲淄狼苗矣愚敢曰募兵戰不若募兵教今宜於客兵之中精選其技藝之尤者各數人厚其糧餉用以訓練騎射長鎗甲楯弓弩分部習學一教十十教百百教千千教萬日省月試務肖其真而已由是則藝精氣壯而東南之衆要皆雲淄狼苗矣如是則五月之內萬金之費可壯東南之干城絶倭奴之窺伺滋萬姓之脂膏而百世無疆之福由此其造基何也以土産之食養土著之兵以土著之兵禦土地之患兵不加多而民皆樂業矣此土著之愈於客兵而募戰之不若募教幸較量而取舍之太倉生員毛希秉云鹽徒海盜水冦也而我軍操練於陸不習海勢素怯沙民以其所短攻其所長蔑不敗矣朝廷知其然特勑兵備道専重水戰議者謂宜造多櫓機發巨艦巡捕巡鹽官督令于海洋沙場險要去處上下巡視専習水戰之法此練軍之法也又云軍之克敵者在器兵不完利與空手同射不中的與無矢同海賊之器械惟任短兵我軍足以制之者火器弓弩也然善射者寡乞倣种世衡教射之法懸銀錢于百步之外不中者宜罰闕而受責三勝者得銀錢又當令其三六九日衍習如鎮江會手然每下操之日為數十偶使各官分臨之庶不費時日而官軍可善射其他應用器械鎗棍弩銃皆以是法校之數月而軍成矣此精技之法也御史徐栻云聞兵形象水水因地而制流兵因敵而制勝古兵法也今賊常態每以三五星散誘致我軍發伏取勝此慣用竒兵也手揮雙刀中者立斃此慣用短兵也勝竒兵者必以正兵勝短兵者必以長兵明部分正約束逺斥堠行如戰戰如守是為正兵強弓徑弩射疏及逺是為長兵以史思明善野戰逰兵及于石橋而李光弼治軍嚴整當橋而進賊不敢犯近聞官軍過安亭鳥驚魚散無復隊伍將士相離逺者數里賊若掩襲邀擊將可擒也兹豈所謂行如戰耶趙充國渡湟使壯士銜枚先渡立營已定引軍潛濟慎密如此是以羌零之輕狡不減倭夷而終以萬全去年官軍出劉家河者輕率赴敵被賊伏兵自蘆葦小港中突出衝斷首尾我兵大敗而將僅以身免兹豈所謂戰如守耶自此一敗賊益輕我為害愈熾蓋既不能用竒而又自棄其正是以百戰百敗所向喪氣甚非長算也今欲習用正兵先須定十五之法自伍人為伍以上遞相連屬以至于將皆如身臂相使首尾相應雖極倉皇不輕相捨而又營寨嚴整號令明肅動止不亂則賊雖變詐安能撓我縱未即勝敵而我先為不可勝矣此正兵之法也多置毒藥弓弩聚集善射勿與短兵相接而常殪諸百步之外此長兵之用也前時我軍不能自立無暇乘賊之間今我軍堅無隙可乘而賊跳梁既久勢必衰沮若覘得其實鼓衆突入乘機掩擊立可擒滅此又正能生竒之妙用也故兵法曰竒正皆得則國之輔夫擊虜以殄滅為期豈可犯危險而取必旦夕凡此皆所謂致人而不致於人或亦坐得必勝之道歟至於因勢利導隨時變化則存乎良將之善用而兵未可以遙度也閩縣知縣仇俊卿云冗兵之費徒糜膏脂自古兵法貴精不貴多所以冗兵當汰法曰兵無選鋒曰此在將兵者當練習于平時擇用于臨事可也雖然羸稚為餌兵亦可誘敵制勝猶上駟中駟下駟例也其最不可用者召募之客兵借調之土兵人謂冦盜之害如風雨不留土兵之害嵗月侵擾不若各鄉照戶查起壯勇練為鄉兵各有身家地方之念逃亡有里戶可以拘追橫肆猶法制可以制禦昔于肅愍團練疏有云兵無不精則國威自振而冦盜自平此尤今時之急務練鄉兵附近日虛談兵事者動以陽明先生保甲之法為言殊不知此法止為安新附之民禦鼠竊之盜耳自古及今未聞以此制禦夷狄也若謂可制禦夷狄則古聖帝明王賢臣良將當先為之矣豈待今日二三言事者倡為此説而後知哉我太祖以神武定天下斟酌百王典禮於軍制尤留心焉若保甲可以資防禦則不當設立若干衛所派處若干兵糧以纍百姓矣諺云省錢易飽喫了還飢自古未有不暫費而能久安者况夫豪傑之士決不隨人腳後跟假使保甲之法果為陽明先生禦冦之䇿今日亦當更之不知此老當時擒宸濠平桶岡搗八寨只用保甲之人乎抑曽借用狼土等兵也世儒不考顛末妄言兵法真所謂恣虛談而貽實禍也豈不悲哉海道副使談綸云鄉兵之議蓋起於先年調到客兵統馭非人所在搔擾百姓厭苦言官建議詔下有司訓練土著之兵以省徴調之害此誠廟謨之至計東南地方之厚幸也然數年以來督責雖嚴明驗未覩其故何居豈皆有司奉行之未至與蓋緣前後議者止論練鄉兵之概而未及養兵之詳而境內士民又稍病加賦往往互會失指以為練鄉兵則不費官帑不用民財不煩素養之勞坐收制勝之䇿且援引某縣某鄉曽掩殺一二殘敗之冦以為證據遂使良法美意窒礙難行有司百執事奉行無術反以虛文漸貽實患殊不知鄉兵之名則一而其義有二有召募之鄉兵有團保之鄉兵召募之鄉兵謂選其土著之驍健者為之繫其名籍於官而又以將臣領之優其餼食明其步伍時其教訓嚴其賞罰之條無事則作其投石超距之氣有事則責以摶前擊後之功是為素練之鄉兵自其對官兵而言又謂之主兵兵之有實用者也至於團保之鄉兵不過因其地方之逺近人民之衆寡使之自相團結諭以共保室家小警則虛張聲勢以幸其賊之不來大警則預行收斂免致受禍之太慘如是而巳矣近年言官亦嘗有見於此每每欲移徴調之費以養本省之兵今給事中何亦止因三省交論客兵之害而遂疏以申明之蓋未嘗議去本省召募之兵而别練鄉兵責之褁糧效義為節省財用計也比者浙江議以全省之糧養本省之兵賦有常經兵有定制未嘗與所疏相背且甫及三載屢奏竒效此即練鄉兵之明徴也顧當時減省太過議額太狹故當羣倭大舉入冦之時不免量調客兵以濟一時之急若即以調兵之擾併罷召募之法不求建議者之本意而牽制於含糊不決之虛文以彼力穡之民盡為荷戈之衆誠恐操練無素則為不教之民揀閲以時又有妨農之怨聽其自食則人弗樂從給之官帑則所費滋大勢既難行事多虛應失安攘之長䇿為東南之隱憂誠不知其可也且團保之法所以禁民為盜以備地方出沒無常之咎耳至於制禦夷狄古如秦漢唐宋今則九邊兩廣皆藉素養之兵而獨於今日東南之事乃責之散處難合之民得乎為今之計不若以調客兵之糧增廣主兵之額為之慎其委寄核其名實寬其文法而總論其成功將見不出全浙之間自多羆虎之士誠亦計之得者而又責成有司撫字凋殘團集保伍平居則齊其心志臨事則遙為聲援庶幾兩利而俱存之可以有備而無患矣足兵餉兵部尚書胡世寧云六部之中戶部尤重蓋自祖宗開創以來百五十餘年天下疆土田賦止是而內外用度比舊加數十倍雖歲常豐收猶且不足而况嵗荒無徴其何能贍故必得通變有才之人理國如家者而後可濟也今得吏部善用人戶部善理財則民生自安盜賊不憂其起邊境自足敵騎不患其侵兵部得無大事矣不幸二部有欠而盜賊蜂起邉圉交侵不得已而用兵猶賴吏部所用之人以領兵戶部所蓄之財以贍軍此言兵部全仰給于吏戶二部必户部得人而後邊餉不憂其乏此探本之論也故首列之又云今邊儲最苦不足而足之道有三一曰廣屯種夫屯種孰不欲廣然每差官督勸不能增者急于起科得利也夫嵗收不常而租有定額則開墾者利未得而害已隨故人不敢開種今若查比北直𨽻地方欽奉太宗皇帝聖旨事理聽令各屯原額拋荒及空間地土不拘土客官民軍舍儘力開墾永不起科則有利無害而人樂于興種矣蓋所貴乎廣種多收民間米穀價賤發銀可糴則邊儲易足矣至于南方謫彼充軍為民人犯宜責拘解當房真正家小到彼盡撥各武職員下作為伴當責之收管使為墾田而照名代出本處軍伴操守則彼勢難逃而人可漸多種可漸廣矣今聞戶部始議覆奏又查出永樂二年令各衛所屯田官員軍餘家人自願耕種不拘頃畝任其開墾子粒自收不許比較及正統四年令大同宣府遼東陜西沿邊空間之處許官軍戶下人丁儘力耕種免納子粒則臣前奏聽其開墾亦不起科明是舊例可行有益邊儲而該部又欲兩請或聽開墾永不起科或候三年成熟徴糧則臣前所謂歲收不常而租有定額人不敢開種矣伏乞聖明俯念夫邊方田荒歲久儲蓄日無特如臣奏施行地方幸甚二曰興鹽利今天下生齒煩于國初數十餘倍食鹽者衆矣故今私鹽盛行而官鹽未嘗不售其所謂私鹽不禁能阻官鹽者蓋襲舊時之説也故今宜于額外多開商中不限引數聽其買補若勢要占窩専利則每嵗開中止將引目發邊付巡撫都御史并管糧郎中聽其就彼募商責限完糧而後填給違限不完者則轉給他人其若都御史郎中召報容私致緩糧餉者聽巡按參究則自無此弊矣至于竈煎私鹽宜于出場總路設立關市守把止許賣與商人有引之人而本處軍民願買者亦須納官得引始聽如此則公私鹽利皆歸國用矣然又須低昂其權使輸粟于邊者量地逺近米價貴賤倍減其數而又得先掣納銀本處者隨時旱潦鹽價貴賤倍增其數而又與遲掣則商人益勸于輸邊竈丁益利于煎鬻軍民得易于食鹽而巡邏之卒可減鹽徒意外之禍可弭其為上下之利蓋不一而足也三曰預收糴每常邊糧不肯趂賤預買及臨用兵發銀貴糴且逼人強賣公私勞費不資今宜妙選各邊管糧部官責其月報米價貴賤歲報田收厚薄如年豐米賤之時那借官銀數十萬兩到彼多糴米穀貯倉或計今年所糴可彀後二三年之用宜即扣後二三年該給糧銀于他邊米賤處所糴之或查應解邊糧地方時價米貴則量令折銀解邊備糴如此通融計處務使逺近官民皆便而邊糧易于措積蓋亦濟變通融之法也但其糴糧全在官司立法簡便革弊嚴明不許減價掯勒難收以致靠損屯農方可常糴臣聞今歲遼東米價甚賤但發一歲之銀可糴二歲之用而二年免發其次宣大米尚可糴亦宜差官發銀到彼預糴米穀以備客兵添兵之用惟若延緩寧夏每銀一兩止可糴米五七斗甘肅每銀一兩止可糴米二三斗然聞其地缺乏尤甚軍士不可枵腹而戰亦宜戶部差官賫銀到彼多方設法於有米地方貴糴雇運轉搬至彼以救其危急可矣又云昔我成祖皇帝之供邊悉以鹽利其制鹽一引輸邊粟二斗五升是故富商大賈悉於三邊自出財力自招逰民自墾邊地自藝菽粟自築墩臺自立堡伍歲時屢豐菽粟屢盈至天順成化年間遂變其法凡商人引鹽悉輸銀於戶部商賈耕稼積粟無用遂撒業而歸墩臺遂日頺壞堡伍遂日崩拆遊民遂日離散邊地遂日荒蕪戎虜入冦一遭兵創生齒日遂凋落地方日遂困敝然則安邊足用之長䇿莫善於太宗皇帝之鹽法矣此言中鹽大利於邊儲乃為北邊而發若在海防則于遼陽為切在京各衙門會議云各處名山香錢缺官俸銀川廣鹽銀廣東稅銀大造黃册過割地畝銀俱可取用至於稅契銀率多侵隱亦可查取徭編銀再可借解天下各司府州縣贓罰紙價自嘉靖三十五年為始一毫不許别用暫解軍門聽用其出入務赴巡按衙門挂號查考又各屯田暫納折銀數年且不為例其該納銀六錢七八錢者即使徴收五錢南京應支月糧大約每石俱三錢豈不五分中尚得餘利之二以充軍餉也及湖廣荆州府則雲南川貴百貨所由之路夔州府亦當入蜀咽喉江西湖廣二省茶貨經此達於西畨欲要於荆州照依九江北新關事例添設鈔關一所量稅舟船并𣙜其住賣之貨夔州責令撫按會同委亷官從公摧解又各省府州縣預備倉穀酌量時價量糴其半解赴軍門又江西福建等處均徭已提編一年但皆十年一役尚可再提一次其餘他處五年一役或三四年量為遞減又將巡監御史黃國用奏準工本鹽銀二十餘萬量留借發總督處斟酌支用事寧照舊議解戶部以濟西北又御史徐敦題稱東南之民方困而派常賦之外海防未巳而繼之以提編均徭提編未已而又加以民兵工食臣愚以為軍需必不可缺而民困尤所當蘇非仰藉官帑量為給發鄰近諸省通融協濟恐終無以自贍其東南近日之科派速為議革止令雇募民兵則民不重困於誅求之苦官不牽制於出納之難蒙賞者益思報效而窮蹙者少延殘喘臣等會議得用兵以錢糧為本錢穀衣甲器械船隻不備賞犒不充威權不著士不用命雖韓白不能成功但東南自嘉靖三十二年興師以來勞費不備致厪宵旰之憂者凡以為生民也今本處燒劫僅存之民常賦之外海防銀兩未已而復繼之以提編均徭提編未巳而復繼之以民兵工食百姓嗷嗷誠有如御史徐敦所陳而提編一節通行數省編及小民不得安生者半天之下至於各省預備倉穀亦當積貯以備不測飢荒榷商稅銀恐亦無幾俱難輕議查得應天巡撫奏留嘉靖三十五年起運銀四十四萬餘兩奉旨錢糧著戶部議處來説候覆間今徐敦復請於兩浙嵗運之數量留二三十萬彼豈不念國家京邊重務所需哉蓋濟東南目前之急正所以為國家悠久之計也合無從戶部酌量定數存留若干以給軍門再於兩淮運司議處工本鹽銀二十萬內借用一半至於各山香銀各關鈔銀缺官俸銀川廣鹽銀通聽總督移文各該撫按查取不許留難此外又有開納一節尤為可行合無查照工部開納事例兵部應給空頭劄付一千張咨送總督收置軍門許令軍民照例上納有願報效者一體收用其餘挂號稽察事宜悉如都給事中丘預達等所議施行及據各官所陳専官管理一節巳經本部題奉欽依咨行總督選委布政司官一員専司出納無容别議合用錢糧各有頭項大率民兵工食除今年在於已徴提編銀內取給以後年分各府州縣比照原額工食量加一倍通計實數各照丁田多寡量為輕重派徴申呈撫按刋印書册頒布曉諭不許數外多派重困小民士夫之家隨例應優免之外一體均派收貯官庫按季給發沙兵工食聽督撫官酌量於浙直二省不經倭患府分坐派徴解聽按察司官以時給發其一應見在地方主客兵行糧及賞犒修造船隻置造器械等項俱許於軍門弔取并奏留銀兩數內支用通要造册開注出納明白以憑巡按御史稽查都御史唐順之云東南水陸兵糧往往有缺至三四月不給者軍士萬里捐生日望升數之米而已而又不時給之生心讟語亦何足怪此有故矣浙江軍餉銀四十七萬兩江南五十餘萬兩江北一十六萬兩其初皆算兵而賦民原無贏餘若民間拖十數兩則缺却一軍之食萬軍不能一軍空腹而萬兩不能株兩無欠加之民賦有災傷減免而軍餉無贏餘處補宜其不能準給而生怨讟也古者軍興之費不盡仰於民務取之山澤鼓鑄管𣙜商賈之利故前史稱不加賦而用足今民間摉括已盡無可處補而軍門亦無所謂山澤管榷之利稍可處者惟有鹽法而已試舉一端如前時浙江巡鹽鄢懋卿小票事例嵗亦可得銀數萬此皆不取之國與商而坐收贏利者也合無敕下戶部轉行督撫等官會同淮浙巡鹽御史委曲計議多方區處但使江北江南浙江每處得七八萬兩民賦若足則别儲之一有蠲免即以處補此亦國民兩便之䇿也聖明軫念東南兵荒萬狀艱苦敕下工部查得大工銀兩漸彀乞漸將嘉靖三十九年浙直兩處贓罰照數解與軍門聽其處補兵餉以後年分自行解京如故此外山澤管榷之利有可興者聽軍門從宜區處再照供給軍餉係有司職掌有司往往視為不干已事始則催徴不力繼則給發不時墮悮軍機多由于此此後若有仍前怠玩者自布政總司管糧道及知府以下聽督撫諸臣從重參劾治罪庶幾有司各知干已不敢誤事此言處兵餉之法莫如鹽利其次則山澤管榷與贓罰銀而加賦為不可行又云沿海衛所舊皆屯田今埋沒過半而圖册故存宜按圖照册儘數查出辦納屯糧及金塘玉環諸山膏膄幾萬頃皆古來民居之處今可墾為屯田設所戍守一以據險一以固糧此一事與臣所謂足軍食者相關舊制當復者三也此言清理屯糧開墾海中附近山田可足兵餉御史曹光等題欲將巡鹽御史黃國用奏準工本鹽銀二十餘萬量留借用一半發兩浙巡撫一半發蘇松巡撫或俱發總督處斟酌支用以濟海防事寧照舊解戶部以濟西北此言鹽銀可借以充兵餉與唐荆川之見同䇿略云嘗思今日坐困之術莫有過於兵多者方其兵之初調縣縣傳送道里之費不可勝言也所過虜掠其擾害之患不可勝言也至則家給而戶養之供餉甚煩而虜掠不息其費又不可勝言也今議者不思兵多之費而憂財之乏此所謂舛也因其乏而議加賦益財此又舛之舛者也昔先零之役當其兵集耿中丞糴四十萬穀而不足及充國罷騎兵般師不費斗穀而羌平人皆知充國屯田之興利而不知般師之省費也故調兵一而為練兵之費百調兵一而當土著之兵其費十調益簡則費益省以其所費者而練兵何弗強也以其所省者而充費何弗贍也此其不加益而足財之道也此言加賦以調兵不如減兵以省費海道副使談綸云足食如行錢法抽寺田廣開墾查民壯弓兵募銀復衛所額糧甚有所濟且行之可久又云錢法行則公私皆利或謂費銀鑄錢而利苦不多何便于官曰即使費銀一兩鑄錢亦止值一兩可也今天下苦于困乏只因銀少錢法行銅皆銀矣矧銅礦所出併收民間銅而鑄之必本省而利溥矣謂之無利吾不信也此言錢法行則財用足誠可為兵餉之一助自來無人及此而今日所當急行者也又云調兵之法萬非得已募兵之法亦難久行惟是復祖宗之舊酌時措之宜使軍伍不虛糧有定額民壯弓兵名名得其實用不以許多錢糧置諸無用之地庶幾足食足兵之長䇿也知府嚴中云國初每郡扣除養軍若干官吏師生俸祿若干然後定起運之額故軍伍缺下口糧謂之羡餘積於布政司或謂此項已屬於戶部作邊儲之用愚謂不然嘉靖某年戶部偶缺用奏取各省羡餘浙江遂以軍餘銀若干缺官俸餘銀若干并别項空間銀兩共幾十幾萬解去不聞以此為據以增納運而常年照數解京也設使一年做例嵗以為常而不存積於布政司昔傅應嘉巡按浙江募民補衛所軍額其月糧何所支乎自戶部取用以後衛所軍額歲減一嵗布政司果嘗嵗歲奏解乎愚恐羡餘之銀有解部别用者有未嘗解部而仍存本省者須細查之以為補軍額之用可也舉人王文祿云東南之財甲天下之財財之藪也冦亂三年將告匱矣當以天下之財濟之可也革侵漁之弊各名山之香錢可取也革借關之弊各驛傳之供給可取也國初軍制之數即食糧之數國初軍多而糧無不足今軍少而糧不見餘須責督儲之司查而取之可也各省缺官之俸折鈔之銀取之可也冗食之官奢靡之費汰之可也倣周禮束矢鈞金之法凡豪右貪殘之訟罰而取之可也此言足兵餉之法有六蘇州生員沈拭云當今錢貨民皆私鑄致壞錢法物價不平利歸於下宜奏聞朝廷南直𨽻及浙福湖廣等處官自為鑄所鑄錢文一以嘉靖通寶每錢七百準銀一兩非此不行則利歸於官錢法不亂而軍需有助矣兵部尚書胡世寧云秋成地方素無積蓄者宜出告示曉諭軍民不許將米穀浪費及因而糶出外境其若本處軍民得過之家收積米穀在家待價糶賣以圖利息者聽從其便在城人家有能收積稻穀一千石米五百石以上者即係聽教良民本府凡事量加優恤鄉民屯軍人等今後務要掘塘積水趂時勤耕以務多收米穀秋成之後如果穀賤傷農凡民間應納差銀糧價及贖罪等項俱許依時增價折納稻穀本府另借糴穀銀兩申稟上司代其納官又云今雖秋成貧民缺用必將米穀賤糶出境以後再難收回公私積蓄皆空倘遇荒盜鄉市軍民束手待斃豫欲將府庫原收義民僧行及積米紙價等銀盡數糴在倉中遇荒賑糶遇兵給餉庶不有悮及照常時散銀糴米多被姦豪誆領或庫吏稱散乘機尅落似此領銀無實糴穀難完今照所屬州縣人民該徴均徭等銀將穀賤糶煎銷上納未免耗折今欲就將糴穀銀兩扣收在官抵作民間該納官銀或秋糧折色米價銀兩陸續支解却令該納前銀人戶每兩照依時價納穀若干在倉庶免彼此出納侵分耗折之弊此二條皆胡公世寧江右作郡時所行沿海守令宜式之以為備倭之計都御史章煥云師行糧從有餱糧有糗糒刁斗自隨樵蘇自給強者主戰弱者主㸑此軍中之制也今或臨陳而未食或食至而不均或師行境外而食具城中設欲晨炊蓐食捲甲疾趨何以應之事機盡泄士忿不平此養兵之制未定者一也此言行兵乏食之弊主事唐樞云凡軍行若隨路關支口糧候到唱名給散晝則擔閣行期夜及二三更才得睡息若先給與盤纒靜路行時不便買辦不無受飢之病北方行軍每每有此必須先立從長良法庶克有濟此言給行糧不得其法之苦兵部尚書王守仁云沿途該用廩給口糧等項合計算總支應庶免阻滯及省偏州下邑之擾為此牌行布政司官將官舍頭目人等合用廩給口糧等項查取見在確數計算經過州縣若干每驛該銀若干就於軍餉銀內支給其各州縣止是應付人夫再不許别項科派於民此言總支廩給口糧乃關行糧之法也録此以為式兵部尚書王守仁云近因思田二府攘亂該前總鎮等官奏調三省漢土官軍兵快人等前來南寧府屯住防守軍民大小男不得耕女不得織而湖兵安歇之家騷擾尤甚今雖地方平靖湖兵已回然瘡痍未起困苦未蘇况自三月以來天道亢旱種未入土民多缺食誠可憫念已經遍查停歇湖兵之家開報相應量行賑給為此牌仰同知史立誠即將十名以上七十一家各給米二石鹽魚二十斤五名以上三百五十六家各給米一石三斗鹹魚十三斤五名以下四百五十四家各給米一石鹹魚十斤就於該府軍餉米肉內支給開報其餘大小軍民之家諭以本院心雖無窮而錢糧有限各宜安心生理勤儉立家毋縱驕奢毋習遊惰比之豐亨豫大之日雖不足而方之兵戈擾攘之時則有餘矣此言歇兵之家所宜優恤陽明王公已行之仁政也録之以為式御史徐栻云聞兵行糧從食者民之命尤兵之至要也古將如趙充國諸葛亮之用師皆先為足食計然後言用兵耳若驅枵腹之衆以荷戈禦敵其不能格可必也近者海上南沙失事祇因犒餉觖望沙民邳兵未協故鋒未交而識者已知其必挫矣且聞總兵等官跟隨親兵每名止日給米一二升尚未得一飽而求其冒波濤嬰鋒鏑樂為用命不亦難乎然東南民力之竭已非一日而庫藏積貯又多已解給邊儲公私匱乏俱難措處然則軍前之需其可不預為之備哉設更拘以常格動輒齟齬亦未見其能濟緩急也伏乞敕下該部議行海防巡撫都御史各將府州縣在官錢糧不拘寄庫正庫無礙等項官銀通行查出酌量聽解以備行軍賞給或遇緊急之際動支未敷仍許巡撫權宜行事將起解錢糧暫借軍前應用一面題請事寧處補務要嚴督監守官毋得放支冒濫以滋冗費有司官毋得分毫科派以病疲民管領官毋得出入尅剝而無實惠訪有此等悉從撫按官拿問參究如此庶軍儲有備無患而將士可坐而䇿矣伏惟聖裁又云積貯者天下之大命也蓋民命以食為天積貯之法在平時且不可廢况夫兵荒之後其可不汲汲焉講圖之哉臣嘗見國計取給東南者甚厚故天下惟東南民力最竭而東南之民又惟農最苦也未遭冦亂之先每以賦役繁重視田産如贅疣思欲脫去而為逃亡者大半矧今白刃在前竄伏不暇田地拋荒居十九矣所種者又苦久旱難望有秋將來穀必愈少而農民益困明年田地必盡荒蕪不惟邊餉可憂雖欲支持本地恐未克濟且冬既無處可糶夏又無處可糴民之弱者必餒死強者必羣聚為盜如之何而不預為之所也臣熟思之竊有一事其行甚易其效頗多即倣古常平倉之意為之欲俟秋收之後茍有所入或於他處成熟地方即行府州縣動支官銀糴米比市價二十分內稍增一分招民自運入城貯之空倉不足則寄貯之空寺院待明年夏米乏時則比市價十分之內稍減一分糶之不拘城內外皆得糴食専委廉官一員司其出入只此一事其利有七米價不壅農人不傷其利一也城中充實膽壯百倍其利二也粟多入城默寓清野之意冦從焚掠所失亦少其利三也米價常平飢民得食不驅為盜其利四也耕種無資稍給與之秋收可望新陳相接謀食之源不絶其利五也十分災傷則開倉賑散民命可全其利六也冬米必賤夏米必貴增價猶賤減價猶貴羡入亦多其利七也此事倘有可行乞敕撫按轉行各該府州縣用心議行今惟蘇松杭嘉淮揚被害等處尚可求三年之艾其未被倭地方若早為之均屬有益夫既有戰士捍衛於外使田者得於耕又積穀預備使民有所恃賴將來田闢穀豐所以足國裕民者在是矣以之安內攘外復何求而不獲哉丹陽邵芳云善耕者無窮民善治者無窮國又曰善戰者無窮如天地不竭如江河錢穀甲兵皆一意也故善耕者必數歲易種水旱易耨天時有窮而人事無窮善戰者竒正疊出強弱疊形客情有盡而主謀無盡善治者亦然彼錢鈔皮幣金刀之類無不可行者顧上之人何如耳若必於所窮之中而求所以濟其窮如絶袖補領割襟補裾惟見其愈窮矣都御史唐順之云東南事體絶與西北諸邊不同西北諸邊雖是兵財殫弱而成法具在儲糧畜兵歲有畫一只是廢墜不舉耳若東南事體一則以海冦猝起事屬于草創一則以連年被冦力盡于支吾取辦一切未慮經久其大者臂指相使之體統未明唇齒應援之機宜莫辦至如浙直所募之兵則朝南而暮北有今日在浙江應募明日在淮揚應募者如暫時顧倩之人主人不得而有之又安得而用之軍需則移東以補西一年之財只彀半年支用無名之費百出於民而軍人告缺四月五月缺糧者往往而是大率昔人所謂不終嵗之計祖宗時備倭規制沿海屯田水寨諸法漫然無迹可考矣故西北諸邊莫急于振舊廢東南海備莫急于定新規此其大較也清屯種兵部尚書胡世寧云自古屯田為足食足兵之上䇿國初各衛皆有屯田軍以十分為率七分守城三分屯種是即唐初府兵營田之制蓋萬世之良法也何慮兵食之不足也今腹裏各衛三分之田多有軍先拋荒年逺迷失而民墾納糧者矣若欲一一清奪還軍非惟失利而且失民不為有益獨念今天下軍戶消亡殆半間有存者每年清勾戶丁隨解隨逃勞費百端不得軍用無計可處議者謂宜上體祖宗置衛立屯之意逺推古人寓兵於農之法通制各衛軍士各令有田一分其數江北一頃江南半頃如江北一衛額軍五千名必須制田五千頃江南半之先儘原額屯田次清寺觀間田及抄沒罪人之田其有不足則設法開墾荒田再不足則措銀收買民田如宋時役田之制務彀額數分與各軍聽其有力者自種無力或不便者召佃收租然必量其所入如古上農夫可食九人之數平時操守止令自食必有征差方給行糧其衛所缺軍之處則分舍餘軍餘或募民或罰有罪以補之蓋彼既有田必皆樂從而逃者少矣此於邊衛京衛或不能盡行而腹裏衛分必皆可行所省養軍之糧歲數百萬矣由是論之邊方之地必先有人而後田可屯是不患無田而患無人也腹裏之地必先有田而後軍可募是不患無軍而患無田也其輕重所主各有在矣巡撫都御史彭操江都御史史巡按御史孫巡江御史汪會議處屯軍一名撥田二十畝輸糧六石五斗餘聽本軍食用兵農合一國家無養兵之費耕守相兼沿海有屯戍之實奈何軍士逃亡甚多海防空虛殆甚屯田在邊而屯軍却居城郭軍人領種而佃種又屬民人凡把港守寨之差皆老羸貧弱之卒遂致倭冦侵擾屯田荒蕪兵備道親詣各屯踏勘查理務使軍不離屯屯不離海則屯種者皆係軍實把隘者盡屬屯丁於且耕且守之中寓足食足兵之法工部尚書馬坤等題欲通行南北直𨽻并各省清查屯田許其暫納折銀數年且不為例云云見足兵餉條以充軍餉也都御史唐順之云沿海衛所舊皆屯田今埋沒過半云云見足兵餉條舊制之當復者三也此言清理屯糧開墾海中附近山田可足兵餉也海道副使談綸云國初屯田之制軍在海濱而田在內地召民佃種本未盡善向來多為大家所占亦有軍貧而轉典者若清查復舊大為兵餉之助知府嚴中云國朝屯田之制北方與南方不同南方與中州亦不同北邊之屯田重在鹽法兼重馬政而行之也中州之屯田専重馬政而行之也浙直之屯田則以屯軍籽粒供造運船之用有餘者充補月糧福建則又不然其省屯田至多不若浙直之少故専設一屯田僉事斂之與浙江水利道帶管不同大抵屯種之軍不守城不上操清查其弊於軍餉大為有助太倉生員毛希秉云崇明田若干糧若干􅔐海若干實徴若干升合不起運而官吏師生守禦官軍俸糧猶未能給每數年大盜一興動費錢糧數萬沿海州縣居民劫燒之害又不可以數計然則國家何利哉太鎮二衛之設本為崇明盜賊何故緩急未得其用乞于南沙平洋沙增設守禦所修古土著屯田法庶有實效若仍舊春秋二班交代惟虛應故事其勢安能久乎蓋舊制崇明守禦所之外又有太倉中所八百戶鎮海前後所三百戶在于崇明潭子港備倭後因􅔐海改撥劉家河把港既而太倉沙指揮具呈空間人數取補上班今申明舊制改設南沙守禦孰曰不宜或曰邊方衛所該守禦腹裏衛所該運糧今太鎮二衛切近海洋每有鹽盜倭冦生發乃坐運船三百艘運軍三千名有一緩急兵不足用合無議將太鎮金山運船該派腹裡衛分即以無額運軍定擬南沙等處守禦又曰屯田之設本備軍儲今屯軍在太倉而屯田乃在常熟嘉定崑山等縣且屯田零坐各區各墟其勢安能耕種未免轉佃居民而屯軍坐食不差有名無實莫若通變宜民擇沙上常稔不􅔐田與守禦軍屯種以舊屯軍田易銀與沙民别置田産實為兩便此䇿果行則凡旱寨水寨把港官此實百世之計也此言屯田與衛所隔别之弊即太倉一處觀之其餘可以例推矣閩縣知縣仇俊卿云征調戰攻之日官軍行糧口糧照日給發不暇計費若夫敵退盜去之後兵火少息之時各處要衝添設把守員役使其聚之而食則倉廩積蓄莫非小民脂膏何可繼也合無倣渭上湟中故事將沿海空間地土督令開耕不起科徴且屯且守一年之後人將自食其力不惟省養兵之費抑且行寓兵之法時至則務農事去則習武貧而壯者得田可耕未有不願為兵而又可減召募之虛糜者數千萬緡矣昔戶科給事中林士元等奏將拋荒屯田不拘軍民僧道之家聽其各擇所便開耕不許屯官分外科擾夫僧道尚許承佃屯田今于長守之戍顧不可聽其開耕空間土田者耶汰冗食兵部尚書楊博題云國家養育邊軍極其優厚故居則有月糧出則有行糧寒則有冬衣布花至於獲功則又有重大升賞無非欲得其精健以為敵愾之地耳乃今老弱參雜所養非其所用逃亡揑冒有名而無其實近戶部題稱督撫諸臣之奏求應援則曰軍馬寡弱逃亡過半請糧餉則曰兵馬衆多供億不支觀此則坐食民力者豈皆投石超距荷戈彀弦之夫未必無老弱疲癃之士與夫缺伍寄名之人也自今合行督撫諸臣各選風力守巡兵備官員親歷各該城堡將見在兵馬逐一查驗精壯者照舊存留老弱不堪者盡行沙汰戶內果有壯丁準與收補其軍士逃亡即行開除如敢仍前作弊以蠧邊儲聽各該巡按御史查參究治此言兵餉原有定額冒濫冗食者衆則虛耗正數矣向來論足餉者多方設法甚至加賦不思此弊不正所處豈足以償所耗乎從古聖賢論理財亦只二法曰生財之原曰節財之流此即節財之義也慎募調兵部尚書楊博題云今之用兵大率有三曰練曰募曰調調遣之舉本非得巳蓋緣本地兵力寡少遇有重大聲息不能不調若使哨探明酌慎於徴調不惟芻糧一無虛費亦且戰守均為有益但邇來邊臣多事張皇偶有小警輒行請調恣目前侵冒之姦為日後掩飾之計相應通行申飭督撫等官各將兵馬嚴加操練務致精強遇有警報相機堵截不許輒張虛聲妄議調遣果有大舉之信徑自斟酌量行調援亦不得因而藉口反悮軍機如或不念國計計處失宜聽各該紀功巡按御史參奏重治又須遵奉明旨務以團練土兵為主如果目下不堪戰守早為計議某處某兵可調某處某兵可募應徑行者徑自酌行應具奏者以次具奏俟主兵練成即為停罷此條雖言募調當慎若能遵行可以汰冗食亦足兵餉之一助又題云今日之事不難於禦冦而難於馭兵不難於足兵而難於足食故建議者每以罷客兵為説但各省投募之兵多有遊民參雜其間官司未得其用地方反罹其殃亟當計處合咨河南山東湖廣廣西等處巡撫都御史將本處遊民嚴加禁約不許出外務令各安本等生理如無招募明文私自出境投兵者即將家屬收禁里鄰坐罪仍刋刻告示通行曉諭庶投兵之風少息地方之患不滋矣此議與都御史翁公大立所奏暗相合都御史唐順之云自倭患以來東南軍制最為不定蓋以濟變未慮經久梟猾之徒方應募於江北忽應募於浙東方以得募價而留忽以滿募限而去譬如借倩之人主人不得而羈之安得而練之至于逺方無賴託名土兵報效希圖虜掠羣然麋至在此不由軍門之徴調在彼不由督撫之遣發坐費糧餉騷擾地方是以人人爭言調募不便而以練土兵為説夫土兵之練誠是也然土兵之數不足安得不募募兵不足以當賊鋒之鋭安得不調如前時王江涇數千倭子乘勝西上非永保之兵力挫其鋒則何所不至矣為今之計合以練兵為實事以募兵為權宜以調兵為寄道募兵則逺募不如近募調兵則多調不如少調募兵先儘本地方驍鋭若浙江處兵江南沙兵之類其逺方驍鋭應募者亦須土人保任優其募價什伍聨束而歲番上之不得自去自來如往時則募兵亦土兵也總督軍門歲調麻兵立為定額直𨽻幾千浙江幾千専為衝鋒之用聽川湖軍門精選發遣以憲司一員監督前來有不能衝鋒及騷擾地方者罪及監督則調兵可以制其毒而得其用也俟土兵訓練有成然後募調俱罷此總論募兵調兵練土兵之法字字當深玩味遵而行之若人先觀乎此而後讀諸公議論或以募調為上䇿或以募調為下䇿自覺其頗僻而無定識矣募客兵兵部尚書張時徹云閩廣諸兵其長技故智利在水者可習而知而吾蒼山下八山之人熟閩廣之技者亦非少也以一教十以十教百以百教千事在反掌而有勇知方是在上之人使之者何如耳夫吳越之人以舟楫代輿馬以江海為坦途伍員對闔閭以舟軍之教比陸軍之法大翼當陸軍之車小翼者當輕車突冒者當衝車樓船者當行樓車走舸者當輕走驃騎况今日之邊防恃舟師為長技以火攻為要術乎此言閩廣水兵不必募又云軍既銷弱勢不得不募客兵矧今募兵他省動越數千里徴發僅千百人未及至而已損官帑民需不訾矣况至者未必皆精以之赴鬬往往貪餌致敗恐官府之詰之也既又棄戈而竄走所過道路率又逞其狼豕貪殘之性白日剽掠昏夜則汙瀆婦女一或捍拒則露刃而譁殺人無忌故諺曰寧遇倭賊毋遇客兵遇倭猶可避遇兵不得生由此而觀客兵有害無益明矣况使之久居內地間熟道路習知土風民俗之事必有不戰自焚之禍如元末苗帥楊完者流毒吳楚蓋可鑒也此言募客兵有損無益主事黃元恭云客兵有二有調而至者有募而至者調而至者統領有官籍貫有的用則劄之至有不用則劄之歸即無事矣募而至者烏合無統領之素萍聚無籍貫之真况多遊手好間無藉惡少安知不恃其武習反衛為仇嘯聚山谷黨附海島皆不難矣此言募兵不如調兵都御史章煥云所募之兵須程其技力而籍其家室守法者厚恤其私犯令而逃者有孥戮之禁至于鰥曠遊民給其田廬與之配偶則可以縶其歸念臣見狼軍每有受㕓之心而山東惡少甘心從賊者利其虜掠之婦女也茍遂其願則兵可募可久矣又云分道募兵不擇強弱不按名籍遊手無賴草竊亡命悉入彀中及至而茫無統紀聚散無稽多寡不問虛糜廩餼豢養無功故募而來來而去去而無兵則又復募府庫罄竭道路驛騷終無實用此募兵之制未定者此二條言募兵無定必立法善馭乃妙豫惟募兵之法但當於本處報選何也其家在是則所獲工食便於歸寄防春之暇便於歸耕其人善惡便於保結召之則聚散之則歸然須不限名數如收錢之法日積青蚨幾文馴至一貫孰有勇力孰長技藝選其精能汰其懦怯夫然後募得其人也若四方泛募則是烏合之衆無賴之徒招之甚易散之甚難今日之兵夫他日之盜賊也蓋離家久逺財不得寄歸淫酗賭博恆心亡矣一旦革之非劫奪何以生乎荆川云逺募不如近募亦此意也御史徐栻云客兵之為地方害夫人而知之但方今之事正如病疽者急則治標以毒攻毒之時也特視制之者何如耳蓋狼兵其貪如狼土兵似之而性尤狡譎客兵中狼兵土兵尤甚一勝之後其氣必愈驕猛無忌况左江田州之兵與右江南丹那地東蘭三洲兵素不相睦散不相顧聚則仇殺雖有二遊擊白泫鄒繼芳分轄之然其所見憚者瓦氏家法與該管土官頭目若莫昆羅堂黃仁等而已土兵忌狼兵先進以攘其功狼兵忌土兵後至而挫其鋭氣態相戾功次相競烏可於既勝之後而不知所以處之乎如欲一勝而撤去則海冦出沒不常况其所素懾而見怯者特此兵耳兹久留而無制則其悍恣之性所過殘擾村市為空是去倭之害一間矣為今之計臣愚以為處之有道焉將各兵分派各沿海府州縣住劄有司官為之崇其犒賞恤其勞苦以深結各該土官頭目之歡心俾有所統屬而不得肆又于本處應募民兵中擇其最驍勇者各照狼兵土兵法編為隊伍結為營陳象其衣甲演其技藝習其徑捷隨其動止飲食以一教十以十教百推而上之日漸月染若與俱化斯隱然示狼土兵之長技在我又足以分其勢制其悍氣而資吾實用積之月日兩兵相為表裡無分主客然後漸次查照發回以逺客兵之害省養兵之費其或制客兵之要乎調客兵都御史章煥題云今治倭者無他調兵而已臣愚以為非久計也少發之不足多發則用度不計久駐則老師廢財暫駐則兵散而賊復入且衆兵雜處爭隙易生壯健久曠姦盜自起故客兵協守惟都城塞下可以居之主客相當有所忌也江南民弱客兵所為尫羸視之者也欲其不亂難矣淫婦女劫貨物殺良民如是則客兵之亂與倭夷等前世調兵江南皆有明戒又云調至土兵賊頗畏忌然亦獷悍難馴夫以苗攻倭猶以毒攻毒不可輕用亦不可久用者也是在上醫國手劑量斟酌對病而攻病去即已今既無鼓舞之方復無調停之法事急則懸賞求之勢緩則厭棄置之求之則易驕棄之則生怨此調兵之制未定者也此二條言客兵不當調兵部主事黃元恭云唐德宗藉回紇以解圍而遂基旋入之擾石敬塘因契丹以取唐卒釀播遷之禍狼土蠻兵非我族類寧可引致心腹之地哉山東徐邳騎不習步四川廣西洞不諳渠用其所短行其所疑則何賴焉且必重費以致之應募則有安家在途則有傳食即營則勞來安插月給行賞計每主兵四五而贍一客兵然烏合無籍戀家寡情故逸使之易勞使之難恱使之從怒使之拂利使之來罪使之叛至其習見我之無內恃而専外藉則遂驕恣橫所過塞門以防其虜遣發議賞而後行重賞之格不自朝廷出幸勝必獲賞而復進速勸之令不自主軍軍門出首級則偽良為賊冒從為主而不得核之論功之典不自憲臣出敗衄則棄營而逃以避誅再募則逃者重冒以趨利在營者原籍官司不得羈縻而閲實待之如此其厚也養之如此其驕也然湯克寬一試之而徐邳之卒敗李逢時許國再試之而山東之卒敗至于今永順保靖麻陽酉陽瓦氏賴陽諸兵潰且散散而盡矣其效已明然猶甘心捐厚畜驕而無變計亦獨何哉或曰知非䇿也然主兵訓未就緒姑暫為之噫豫聞其言五年于茲矣此當事者無久任責成之重而為目前茍且之圖試問月攘一雞足與改弦易轍也歟哉此言客兵之害丹陽邵芳云練本地之兵但可為本處防守而已不能追勦大敵也欲追勦大敵須調客兵何也土兵習知地利顧戀桑梓故選而練之可為常計若别省有事欲望鄰省之民團作一處協力以拯之能乎不能乎且如往年徐海陳東輩領冦數萬壓境而來蘇松杭嘉各自保不暇其能相顧而協勦乎故練土兵與調客兵不可偏廢此言客兵必不當調之説為非御史邵惟中題請勑下該部轉行督撫大臣從長計議如徴調客兵必責令大頭目統領蓋有大頭目則所調客兵亦精而法令必行仍以監軍等官控制之類造各兵年貌籍貫文册照其實數給以糧餉解赴軍門照册查點犒賞報效立功果有功次速行奏請升賞如有退縮即以軍法處治其逃歸者行彼處巡按提問此言客兵即用原統將官領以聽調甚善但欲分配截殺而不用原統官領戰不惟原統官無責任而不用心精選其領戰者亦於軍士不相識難制馭矣恐須始終歸其權於一人則可南京工部尚書馬坤等題欲要總督大臣查見在各處客兵如無親管之官領率者即便轉行各省總督撫按坐名查取稍加優厚申送前來如無土官總領照用兵務本管官舍前來督領督領之官中途逃回如某人輩仍須備行總督及撫按衙門查照律中法例一體查究及稱調兵必須精擇其可用與經戰者少倣古人分兵之法如一省調兵一千則令出兵地方大約可出幾千總其大數互相裒益如十中擇其一則一嵗十丁之族始出一兵也百中擇其一則一嵗百丁之族始出一兵也數千中擇其一則一歲數千丁之族始出一兵也此言調兵之法當計里坐派是誠一見也以愚論之客兵之所以不堪用者止因調至之後不用原統來官領戰責任既輕必不用心精選故也若委知兵憲臣與其頭目統來就用之以督戰功罪所係彼豈肯帶狼狽之兵自誤乎都御史章煥云踐更以示其信處置以服其心以諸邊節制之兵為之凖調到狼土之兵為之輔夫邊兵矩度素間可以消狼苗之逸志狼苗有變而邊兵之強足以制之夫藥有相佐亦有相制惟兵亦然則可調可用也裕州知州王宇云按邊兵習慣苦寒日夜備禦不寧寢食以為兵戍皆然一旦調至南方見蘇杭冨饒逸樂武備廢弛不惟歆羡而不甘抑且玩侮而無忌我祖宗立法止是原調用于北邊自正德間議者不深顧念調擒劉七及江西之冦邊兵遂驕邊患遂啓難於收拾今欲更調之以備倭後患有叵測者湖兵欵兵之當慮也亦然故調客兵不如不調或曰鄉兵僅可各守一方調往他處不能也捍禦大敵不能也不調客兵何以支倭寇之大舉乎曰春秋之齊國嘗受晉楚之師晉師中豈無邊兵乎楚師中豈無土兵乎不聞齊借何地之兵以禦之也若必欲以夷攻夷齊師中夷何在乎大扺兵之強弱惟係得人與不得人齊桓公用一管仲行內政寓軍令之法遂霸天下今若有人能倣其義於保甲法中抽選且如每甲中一家出丁九家不出丁者出銀津貼則不患于無兵與無餉矣就其中更選一班精鋭専一聽調謂之逰兵如此豈不攻守皆有備乎副使王春澤云今之議者皆謂補足軍伍可以禦倭愚謂今之軍伍多羸弱不堪上隨之人所募勇夫憑吾選擇人人精壯可用若移足軍伍之費而費於募勇敢為益不既多乎但不可募逺方之人蓋地逺則水土不服道途盤費有身家者不肯應募而應募者多無藉棍猾之徒其志不在於戰而在於虜不在於受約束而在於逃故軍士不如勇夫逺募不如近募凡有識者不易吾言也豫按今之論禦倭者有三曰調客兵曰練鄉兵曰募土著之兵愚以為募土著之兵可也調客兵與練鄉兵不可也何也客兵性氣驕悍不受吾之約束既不肯受約束豈肯出死力而為我殺敵乎故客兵有害而無益所謂不可調者此也欲練鄉兵須處錢糧養之今之錢糧甚難區處將欲使民自備與則民因貧而投兵豈能自備乎將欲官給之與則凡民之無依者恐盡起而應募何以支之將欲驗田均派與則田多者恐其始倩勇夫以充役後用家丁之無能者以抽代人且不常安能訓成兵技乎况防春正值農忙廢田事而固結不可也鄉民各保其鄉調用之於他處不樂也故鄉兵保甲之法僅可以防夜警自古迄今未聞以之而禦夷狄者所謂不可練者此也夫惟募兵一事執利權以囿民選擇之精訓練之勤賞罰之嚴悉由乎我而大有實益然募逺方之民非智也加賦以養兵非仁也須遵奏行新例令貧民補實衛所軍額查各州縣民壯弓兵之額而三分之留其一與有司自用取其二而團聚於府沿海弓兵亦取而團聚之通計三項每省若干名用其精強易其單弱大約以三千為率合軍伍民壯弓兵之三者豈不足以供其數乎軍糧每歲九斗六升以一衛計之則五萬石矣民壯弓兵每嵗身銀七兩二錢以一府計之則幾千百兩矣此國朝定額見在所實費者以是實費而行吾實事分而訓之各精一技合而訓之使知分合進退之法平居則團練於府有警則分調各州縣豈不精壯常在官使不必調兵而兵自足不必擾民而餉自充也哉是之謂土著之兵所當募者此也雖然欲復祖宗之軍額須復祖宗之糧額凡衛所缺伍而開作羡餘者不奏查之不可也欲團練民壯弓兵須令各州縣按季徴解民壯弓兵之身銀若聽其自索諸民不可也蠡測之見未知然否處客兵主事唐樞云諸客兵每日供費須集議的當銀米數目令可永為遵守其數目須相去不逺使無彼此相形其間若欲厚薄只於犒賞處低昂之此言調停客兵之法又云南北水土異宜近日久旱河水太渾濁須用桃杏仁澄之食麵須淮北麥今江南自有淮麥只要處置司買者的當蓋淮麥秋植次年夏收備四時之氣麥屬金又得布種之正江以南冬種春收所以異也此言供養客兵當備淮麥客兵附録天下精兵甚多不可勝紀茲所載者但據廟堂近年議調與士論所評者耳或云無益如愚見客兵各負所長其或敗者不間吳越地利又多堂堂之陳罕用餌伏若原領頭目得人調皆精選嚴節制慎衝突用謀用哨不徒恃乎驍猛庶可暫為海防之一助狼兵廣西狼兵於今海內為尤悍然不易得真狼也真狼兵必土官親行部署才出其餘蓋不過栁州所為水東岩之遊民與廣州新會打手之屬而已如果則亦無以加於嘉湖販鹽者流也東蘭那地丹州之狼兵能以少擊衆十出而九勝何者三州土官之兵大略如昔秦人以首虜為上功其所部署之法將千人者得以軍令臨百人之將將百人者得以軍令臨十人之將凡一人赴敵則左右人呼而夾擊而一伍皆爭救之否則一人戰沒而左右不夾擊者臨陳即斬其一伍之衆必論罪以差甚者截耳矣凡一伍赴敵則左右伍呼而夾擊而一隊皆爭救之否則一伍戰沒而左右伍不夾擊者臨陳即斬其一隊之衆必論罪以差甚者截耳矣不如令者斬退縮者斬走者斬言恐衆者斬敵人衝而亂者斬敵既敗走佯以金帛遺地或爭取而不追躡者斬一切科條與世之軍政所載無以異而其既也所謂論功行賞之法戰沒受上賞當臨陳躍馬前鬭因而摧敵破陳雖不獲級而能奪敵之氣者受上賞斬級者論首虜以差斬級而能冠所同伍者輒以其人領之故其兵可死而不可敗岑氏家法七人為伍每伍自相為命四人専主擊刺三人専主割首所獲首級七人共分之割首之人雖有照獲主擊刺者之責然不必其武藝之精絶也我祖宗舊制狼兵調征經過之處不許入城狼兵性貪淫離家逺出罕御酒肉又不獲繼貨色之欲含怨飲恨惟劫於其主之威而已若有司不善遇之虜掠之患所不免也湖兵鈎鐮鎗弩之技湖廣土兵永順為上彭翼南保靖次之彭藎臣其兵天下莫強焉近嘗調三千人後調六千此在官之數也實私加一倍共一萬二千人其陳法每司立二十四旗頭每旗一人居前其次三人橫列為第二重又其次五人橫列為第三重又其次七人橫列為第四重又其次七人橫列為第五重其餘皆置後歡呼助陳若在前者敗績則第二重居中者進補兩翼亦然勝負以五重為限若五重而皆敗則餘無望矣每旗一十六人二十四旗共三百八十四人皆精選之兵也其調法初檄所屬照丁抽選宣慰籲天祭以白牛牛首置几上銀副之下令曰多士中有敢死衝鋒者收此銀啖此牛首勇者報名彚而收之更盟誓而食之即各旗頭標下十六人是也其節制甚嚴止許擊刺不許割首違者與退縮者皆斬故所戰必捷人莫敢攖但沿途剽掠胥謂其不可用不知剽掠之故一是因調來者非止一枝有過得相推委二是因小頭目愚弄宣慰謂人不可擅殺殺則言官論之朝廷罪之彼然而聽之也若以保永分為二班輪嵗更調每調定以一萬二千人每人月給工食銀一兩每嵗十四萬四千兩先以四萬兩與調官領給土兵途費不必騷動有司反稽途程其來也以一憲副督之宣慰専主禁令調官専主聚泊每晚不許舟師亂泊須視調官搴旗然後魚貫而泊次早即行勿容登岸既至軍人以二千人派之溫台二千人派之寧紹二千人派之杭嘉二千人派之蘇松二千人派之淮揚各以一頭目將官領之餘二千人宣慰自領以聽軍門調發隨處䇿應有功者照常每級賞銀三十兩給與本兵無使土官侵匿宣慰土官大加升賞其歸也憲副與調官仍照前法送之則兵將感激聞風知勵何剽掠之有所患者土兵無鳥嘴銃須軍門以素演熟者三千人分撥助用其技為十全矣或謂夷性難馴萬一生變何以制之是殆不然嘗聞二宣慰之言曰吾祖宗相傳土地官爵逺自隋唐未嘗易姓以奕世謹守忠義故也若恃兵勇謀為不軌朝廷下片紙令鄰夷分取吾土朝令而夕亡矣得如今日之富貴乎又嘗聞其門帖云心戀九重跬步敢忘燕闕北手提三尺英風長鎮楚天南又一帖云節欲可以延生何必遼天尋洞府守分便是享福却來平地作神仙此其心之明達蓋可占矣夫豈不守分量而率意妄為者哉若二司更調各逞賢能各圖報效各希爵賞較之並調為益不既多乎湖廣九溪等衛容美宣慰等司桑植安撫長官等司麻寮等所上洞茅等洞各有驍勇土兵慣熟戰陳宜選各衛謀勇素著指揮統領豫按短兵相接倭賊甚精近能制之者惟湖廣兵鈎鐮鎗弩之技必須動永保二宣慰司精兵使與北兵彼此夾持部五均配器械長短相濟河南兵嵩盧等縣調取毛葫蘆兵懷慶引農二衛調字號官軍多驍健可用雎陳二衛宣武彰德二衛軍兵俱可調用礦夫嵩縣李和尚李昶白廷美盧氏縣王九張文廣永寧縣馬雄張吕登豐縣王試宜陽縣葉張飛靈寶縣王九宰等俱堪調取涉縣夏時生長其地習知礦場之事可以統領角腦兵號角腦者坐名取之查照近例量給冠帶賞以銀牌花紅假以把總名色令其自率平日所與之人以來官不必選彼必欣然聽命而來者必強壯可用之士其中或舊有罪犯者許令立功自贖計得角腦十人即可得兵一千打手打手須用行文四處選取每百餘名選一驍勇知名之士率領其給賞冠帶假以把總名目與礦夫同北方兵山東直𨽻徐邳山西善使雙頭棍標鎗打手徐州箭手保定箭手涿州河間等兵徐邳淮揚乃徑兵所産之處破賊有徴多可用與經戰者就委慣戰者參遊督率而來北兵所長優於騎射東南水鄉技難獨展僧兵今之武藝天下胥推少林其次為伏牛要之伏牛諸僧亦因欲禦礦盜而學於少林者耳其次為五臺五臺之傳本之楊氏世所謂楊家鎗是也之三者其剎數百其僧億萬內而盜賊外而夷狄朝廷下征調之命蔑不取勝誠精兵之淵藪也邊兵延綏遼東兩鎮官兵除已選入衛者不動外其存留本鎮者各練若干名鎮巡衙門選委謀勇素著慣戰將官管領令其多帶火藥弓箭星馳赴援延綏新遊兵二枝內可量撥大同新選聽兵與調用遊兵可量撥邊兵不耐暑熱此後涉夏潦濕方盛恐難于用若先行選定仍令在鎮蓄養精鋭以俟緩急方可福兵漳兵嘗習水戰聞其內多從海冦行姦利者多習海冦所鬭於諸兵中為最特不知今所調者若干耳坑兵浙江以處州為絶勇處州守坑之軍其性健鬭但未嘗勒習水戰也總兵盧鏜云浙中陸兵之善鬭者無如坑兵而邇來應募者卒皆不得其用者何耶蓋坑兵惟梁高山為最自幼開坑盜礦驍悍難制自有重利不樂為官府用也欲顧募之非優其募資厚其糧餉恩信兼至真坑兵其可得乎集衆謀副使吳子孝云鄉官舉人監生生員人各有識下至耆老總里人等不拘貴賤但有所見許其面陳許其具手本來説虛心以受之下禮以招之則竒計出矣若更許其薦舉多能之士畢集軍門智䇿不可勝用矣然須有一二名士高才定其可否迂闊狂妄者不用則羣小無以售其姦矣諸葛公開誠心布公道廣忠益集衆思専攻吾之闕一字不可少也舉人王文録云如至一縣必諭知縣曰爾為知縣必知一縣人才有謀者不拘縉紳士庶請之來吾當詢之詢之一縣則一縣之謀集矣詢之一府則一府之謀集矣府縣積而為省省積而為天下則天下之謀集矣然集衆謀必先虛已略去勢分屈降咨詢邇言不遺寸長必録歡然如家人父子手足腹心之相與唯求靖冦為急則庶乎其可也宋嶽武穆謀勇之全者也將出兵也猶且盡召諸統制環坐而飲食之先謀敵之所以敗我者至於六七竭智共攻必無敗也乃行故每戰而無敗况其下者而可不集衆謀乎是故用兵者必以集衆謀為先也吳郡生員盛之化云昔周文襄巡撫江南凡父老士庶無不延訪或時在路亦止輿受言始則集衆人之細長終則成一人之大智陽明先生自入仕以至秉鉞動隨生徒顧問帷幄後遇逆濠之變若龍光黃受諸人或為間諜或潛伺察或通機密皆以平日腹心為之遂能成功至于封拜邇年東塘毛公征交南大開言路有賞無罰謀士集者八十二人遂能開削故道洞見敵情奮士鼓行蠻王納欵此皆前事之足驗者收圖籍都御史唐順之云古之籌邊者敵之所從入與吾之所以制敵皆可以按圖而坐籌之是以守固而戰克人皆言敵人來去如風雨此亦未必盡然且敵人非萬騎不能大舉騎不可一日無水草沙磧少水而水草可飲食萬騎者尤為難得敵人擁騎南下須是覘得水草便利處然後可入其無水草處敵人亦不能以飢渴馬致千里也是以邊城雖綿亘千萬里敵人雖是風雨來去而其師從入大約可以先定其小小隘口零騎可入處雖不可數而其大舉之路大約不過數條而已禦敵者常患備多而力分茍圖畫分明可以必敵之所入與所不入知敵所入與所不入則備可以不多而力可以不分列屯築堡駕梁按伏省却大半氣力矣定武略兵部尚書胡世寧云自古詰戎練武専備蠻夷盜賊蓋以二者皆能戕殺生靈傾覆廟社故為此殺人以救人非得巳也今境外四夷已有祖訓不許輕伐先朝惟責邊將謹備其來而或近屯百里之外勢將入冦則先伐其謀耳自來不曾逺征至于邊境叛軍即聽處決擒殺著律已明别無他議若民間盜起則宜查纍朝設立巡撫兵備敕詞立為定制務使練兵足食一聞盜賊生發即便舉兵撲滅於微一面奏聞及其既久則宜撫捕兼行以散其脅從離其黨與而必殱其渠魁不許姑息若其一時失計稍有挫衄則當體念勝負兵家之常責圖後效以全功其若終無成功或先隱瞞坐視及有事地方等官或先爭權曲阻其事或後忌成隂毁其功者皆當重治誤事甚者即照先年重例處死鼓軍氣都御史唐順之題云戰陳之所以精明與中國之所以勝四夷者氣也而非甲兵之謂也國家承平日久文吏遊談而養尊武臣恬嬉而寶身間雅雍容之習成而慷慨果鋭之氣亦寢銷矣南倭北狄倐然內侵殆若昔人所謂氣炎以取之者賴皇上天縱神武赫然一怒誅逐偷惰拔用英竒文臣督帥皆躬自臨戎有兔罝﨣﨣之氣自此倭虜不敢深入則氣之勝也以臣占於行陳之間猶有未盡然者臣視師東南備觀怯將情狀一聞賊戰如澆冷水顔色可憐縱不便走股已先栗雖亦未必盡然而然者固多矣至于倭賊渡洋談笑飲食若履平地而我將棲泊近岸日遇海風則頭捍目眩夜聞潮聲則耳讋心愓且夫倭賊有過藐我將之氣而我將無必吞倭賊之氣則是未戰而索然也如此而望長驅海島掃清大懟臣猶以為難也此氣在宇宙間磨礱而時用之則鮮明置之不用則黯無精光謂宜文臣督帥時御戎服出入軍中發揚蹈厲以作武將之氣武臣大將遇有賊戰戎服出入陳中以作偏禆小校之氣偏禆小校遇有賊戰戎服先登以作士卒之氣而督帥武將臨陳督戰間取潰校逃卒遵奉旗牌事例百萬軍中忽然斬却一二人以變士卒之耳目使我之氣日益精明則賊之氣自然銷沮此其言若迂闊而實勝敵之要機也李光弼蒞軍而旌旗變色每戰必勝氣之謂也按荆川鼓軍氣之説不如東坡倡勇敢之論蓋士氣精明必須養之有素臨陳得善戰者作之若但使文武戎服先登以倡疲卒則疲卒望敵而潰徒送文臣與賊殺之而已無益也軍之取勝全在乎氣作之誠是但如此作之恐難公賞罰兵部尚書王守仁云夫法之不行自上犯之也今總兵官之頭目動以若干彼其誠以武勇而收録之也則亦何不可之有然而此輩非勢家之子弟即豪右之夤緣皆以權力而強委之也彼且需求刻剝騷擾道路仗勢以奪功無勞而冒賞懈戰士之心與邊戎之怨為總兵者且復資其權力以相後先其委之也敢以不受乎其受之也其肯以不庇乎茍戾於法又敢斬之以殉乎是將軍之威固已因此輩而索然矣其又何以臨師服衆哉必須提督等官發令之日即以先所喪師者斬于轅門以正軍法而所謂頭目之屬悉皆禁令發回毋使瀆擾侵冒以撓將權則士卒奮勵軍威振肅克敵制勝皆原於此此言行法須自將官始若姑息將官則士卒不服矣又云賞罰之典雖備然罰典止行於參提之後而不行於臨陳對敵之時賞格止行於大軍征𠞰之日而不行於尋常用兵之際又云近年以來如賊攻城掠鄉每每督兵追𠞰而不勝者以無賞罰為之激勸耳今後但遇賊情領兵官不拘軍衛有司所領兵衆有退縮不用命者許領兵官軍前以軍法從事領兵官不用命者許總統兵官軍前以軍法從事所統兵衆有能對敵擒斬功次或赴敵陳亡從實開報覆勘是實轉達奏聞一體升賞至若生擒賊徒鞠問明白即時押赴市曹斬首示衆庶使人知警畏亦與見行事例決不待時無相悖戾如此則賞罰既明人心激勵盜賊生發得以即時撲滅糧餉可省事功可見矣又云古者賞不踰時罰不後事過時而賞與無賞同後事而罰與不罰同况過時而不賞後事而不罰其亦何以齊一人心而作興士氣是雖使韓白為將亦不能有所成此三條俱言賞罰須行于臨陳之時方為有益又云伏覩大明律內該載失誤軍事條領兵官已承調遣不依期進兵䇿應若承差告報軍期而違限因而失誤軍機者並斬從軍違期條若軍臨敵境託故違期三日不至者斬主將不固守條官軍臨陳先退及圍困敵城而逃者斬此皆罰典也及查得原擬直𨽻山東江西等處征𠞰流賊升賞事例一人并二人為首就陳擒斬以次劇賊一名者五兩二名者十兩三名者升實授一級不願者賞十兩陳亡者升一級俱世襲不願者賞十兩擒斬從賊六名以上至九名者正升實授二級餘功加賞不及六名除升一級之外扣算賞銀三人四人五人以上共擒斬以次劇賊一名者賞銀十兩均分從賊一名者賞五兩均分領軍把總等官自斬賊級不準升賞部下獲功七十名以上者升署一級五百名者升實授一級不及數百量賞一人捕獲從賊一名者賞銀四兩二名者賞銀八兩三名者升一級以次劇賊一名者升署一級俱不準世襲不願者賞五兩此該賞格也今賞罰之典固在然操縱失宜進而效死無爵賞之勸退而奔逃無誅戮之及則進有必死而退有幸生也何苦而求必死乎凡兵之情畏我則不畏敵畏敵則不畏我今兵皆畏敵而不畏我欲求其用安可得乎此言賞罰為兵家之要務當照律例所載而行都御史方亷云用兵之際衝鋒為難斬級次之今海上賊船初來能迎其鋒犂沉一船另賞銀一百兩飽去之賊犂沉一船另賞銀五十兩如不能對敵搖駕小船撈取首級者不惟不賞即以退縮論陸地之賊初來疲困甚易擒𠞰延至二三日即復強悍但初𠞰之不令貽害地方又不當以難易言也其間能衝鋒破陳使賊披靡者另賞銀三百兩若夫鄉村零斬必要倭首相兼仍審地方鄰證見賊犯某處從何斬獲取有結狀方照格行賞查係虛冒即以妄殺平人論都御史唐順之云賊若從某處海面深入登岸者該總首先坐之論其登岸多少以次罪及總兵又罪及兵備海道而止至於海中擊賊初至將領以竒功論已有事例惟軍士首級之賞尚未别白臣先具題擊來船與擊歸船不同擊歸船真倭首級一顆給銀十五兩自合如故擊來船真倭首級一顆合無量增銀十兩比陸戰首級尚少銀五兩巳足使水卒感恩懷利盡死擊賊此言行罰當自上始行賞當以海中擊來船為重又云擊賊海中以竒功論雖有平倭事例但分别得來船去船欠明且水中首級一槩以十五兩論賞不知打來船之難十倍於打去船也去船殺人劫財巳厭其毒殺一賊是止于一賊而已若殺却來賊一人是全了幾箇好人性命其功不可同日語也若得該部題覆打來船真倭首級雖不能同於陸地首級三十兩亦可量增銀五七兩則人人爭奪打來船者益衆而賊之登岸者少矣此専言賞功當以海中擊來船為重又云自來海中獲功止擊歸賊不擊來賊歸則賊氣已惰賊資又滿人既樂擊擊之又易來則賊氣方鋭賊船又空人不樂擊擊之又難擊賊之歸如虎啖人而人殺虎虎斃而人已殘擊賊之來如虎未啖人而人殺虎人不傷而虎斃此假發明擊來賊與去賊難易不同夫出入波濤冒不測之險人情所甚不堪然臣嘗思之地里有險夷而土著者無險人情有利害而利重者忘害若使各升調官軍必於沿海衛所自少生長身履目擊雖或稍遷異地事無弗同也至其垂危冒險轉戰窮追若只同常廩止以常格論功其視內地輕重難易之間殊有不得其平者今須多處行糧豐其犒賞若總兵官能使賊船不得登岸而於海洋擒斬首級得敘異格各軍人等比內地所獲功次倍論如止獲賊船亦以大小論級如此則人皆爭奪而無不堪之情矣此言論功當以禦海洋為重太常寺卿魏校云臨陳不可生擒在野不可妄殺陷陳先登者為上功繼而登者次之尚功首虜敗亡之道也此條論賞功當重衝鋒不當重首級兵部尚書胡世寧云聞各處兵戰多因割取首級及爭縛生擒檢取婦女財物以致費力誤事乃將欽奉奏例并斟酌事情預定臨陳賞罰條格惟臨陳先登破敵者第一人賞銀十兩第二人第三人各賞銀五兩其先登被賊攢促而後兵進救得勝者亦賞銀十兩其擒殺諸賊首級俱依欽定賞格外若對敵每殺從賊一人賞銀二兩敗後擒殺從賊每一人賞銀一兩皆以衆見為定即時給賞不論首級若賊來盛獨立不退者每人賞銀五錢全隊不退者總甲賞銀一兩其勝賊回軍檢得賊馬一匹者止賞銀五錢軍器全件一付賞銀一錢若與同夥有功人爭取首級仍還本人報功者每級分與該賞銀三錢冒認為已功者重打五十不賞對敵陳亡者先給埋葬銀二兩子孫升世襲官一級不願官者另賞銀三十兩若退陳逃回被賊趕殺者不賞亦不收葬此論與前同義而詳明過之又云夫以賞言首級論功非國初舊制也兩軍相敵當先格鬭者手眼瞬息不得差也何暇割首使其取首則再不能戰而為敵所乘為後軍所爭奪死矣故首級非我大勝彼大敗奔逺不能割而割之者多或非真也貪軍奮死殺賊止望得賞衣食稍足耳豈望升官也惟論首級升官故殺賊者不能取首而得首者又為勢要所奪又或因爭首級自相蹂踐而為敵所敗此邊人之大恨兵戰之大患也以罰言則原奏邊例交鋒傷虜四五人即問充軍殺虜十名口以上不報者止降一級輕重不倫隱瞞得利人何苦而實報哉又或兩軍對敵勝負相當殺傷相抵我軍被殺者可驗殺彼之人不能取首不得論功亦問前罪故今邊將惟以退縮保守為事而墩堡任其攻尅鄉民任其殺虜上下相瞞惟事欺隱而已甚者被殺之人捨死逃回邊堡以其先時失報恐被查究而遂殺之尤可痛也如蒙聖明更定賞罰之格惟嚴隱匿之罪其兩軍交鋒而殺傷相抵不曽割取首級撫按明知回奏者不問其罪其有守備力所不及雖被殺虜二十人以下亦不問充軍其若力可敵而不敵雖失四五人亦問充軍至于兵力相當退縮敗陳及擁衆自衛縱賊深入而又不能擊其惰歸以取勝者但被殺虜數十人以上俱問失機其他軍校小小失事不曾有誤地方者輕則聽領兵官量情責打重則送巡撫官即時問決不必一一奏勘以致纍死邊軍至于戰勝論功止憑巡撫兵備查審衆證某人設䇿某人當先破陳某人殺死幾人皆聽巡撫官量情即時給賞銀兩但紀其功不必升官其有三次設謀或當先破陳或一起連殺三五人之上勇力出衆者方保升官其若巡撫總兵失事混同隱匿或冒功賞其所私者却從巡按訪實紏舉必問重罪如此庶幾賞罰當而人心思奮此條言賞罰之法與前論互相發明又云首級論功之弊有詐冒有攘奪甚至戮平民傷戰士其弊有不可勝言者夫自古戰敗之餘固有假遺財物於道以使敵人檢拾而緩其追躡者况當酣戰之際格鬭不暇乘勝之餘追奔不及而何暇於斬首哉故首級之得或多非奮勇當先真能殺敵之人矣而况奏報隨從之人身未常便鞍馬目未嘗見軍陳者哉是蓋古今通患而莫之善處蓋惟朝廷命將得人而其所任偏禆校領臨陳之人自皆奉公而執法其所身經而目覩者某陳得某人之效謀而得勝某陳得某人之奮力而成功其方戰也某人敵退某人其既勝也某人斬獲幾首又某人奮敵不過而被殺某人得功幾多而陳亡回營之後復參之於衆見而報之於紀功之人由是權其難易以第其功賞不専尚於首級也至於凱旋之日則某人書辦得用某人隨從有勞詳以上奏而量加甄録固亦可也若冒報立功之人則面試其謀勇斬敵之狀而取證其臨敵同事之人其偽立見矣丘公濬所言選任紀功之官更立賞功之式而欲死者一功當生者二功皆良法也此篇不但發明首級論功之弊至為詳備而紀驗功次之法確乎其不可易用兵者不可不知兵部尚書楊博題云沿海一帶休戚相關若使自分秦越或不行拒堵或不相䇿應希免巳責貽人以禍均屬誤事交相坐罪合行福浙直督撫諸臣如前通政唐順之所議若賊巳下船果有衝鋒阻遏俾不得登岸四突者雖無首級照依題準事例升賞松江府同知羅拱辰云各兵懦怯者既不肯前而勇悍者衝鋒多因砍取首級以致敗事若一兵砍取首級則傍兵見必爭之况得首級者欲全賞功銀兩未免先奔一兵相爭則衆兵皆亂一兵既走則衆兵皆搖兵因此而驚潰賊乘此而進衝從來如此今須於將臨陳時審其願衝鋒者各給與衝鋒小朩牌使衆兵皆知其為衝鋒彼雖欲不前誰則容之衝鋒者決不許砍取首級若有衝鋒先兵拿首級來獻者打一百棍仍不準給賞陳後助陳兵夫許令斬級如一陳斬獲首級若干顆該給賞功銀若干兩內以七分給衝鋒兵以二分給與助陳砍取首級之兵以一分驗其在陳被傷者給之庶賞有差等不致爭亂而人皆思奮矣副使吳子孝云凡戰鬭之時不須首級為功今因割首級往往誤事如一陳海冦盡殪滅之總算給賞不以首級為貴則破敵必矣舉人王文祿云衝鋒者先衆兵而殺寇功之最也今混於一例而不分惟論首級行賞每戰亂奪首級以致敗徒費用兵之財不明賞之過也必以所練之兵拔取衝鋒萬取一千千取一百時加倍犒戰勝不論首級而賞亦倍之蓋衝鋒不暇斬首斬首皆籍衝鋒之人殺而斬之也此三論與前同義在京各衙門會議云凡水陸主客官軍民快臨陳擒斬有名真倭賊首一名顆者升授三級不願升授者賞銀一百五十兩獲真倭從一名顆并陳亡者升授一級不願者賞銀二十兩此言論功以首級多寡為序與王陽明胡靜菴諸公之見相反恐未為定論也又云武將自守備把總以下文官自海防練兵同知以下所領軍兵民勇五百名部下臨陳擒斬真倭每五名顆升一級十名顆加一級一千名部下每五名顆升署一級十名顆升實授一級各以則例遞升至三級而止如獲功之前或以後失事革職者準收贖若總兵副總兵之與巡撫參將之與兵備水陸士卒俱屬統領戰守機宜俱聽調度除在下有違節制者免究外其餘功罪參將以所屬分論兵備隨之總副合所屬通論巡撫隨之但今經理之初暫將臨山總兵分理海防金山副總兵分理陸地則功罪亦當查照分别重輕俱聽總督巡按酌量時勢究核情實明白具題此言賞罰之格當計職任又云凡有官員舉監生員義民人等督領家丁赴軍門隨賊截殺得獲功次及仗義輸粟濟軍者俱聽軍門及撫按官臨時酌擬奏請從厚升賞以為懷忠慕義者之勸至于耆民統領沙兵或屬把總或屬府縣官管轄其所獲功次仍照部下功論擬升賞此言處報效賞格兵部尚書張時徹云今奏擬五等賞功之例曰論首級凡水陸主客官軍民快臨陳擒斬有名真倭賊首一名顆者升三級不願升授者賞銀一百五十兩獲真倭從賊一名顆并陳亡者升一級不願者賞銀五十兩獲漢人脅從賊二名顆者升授署一級不願者賞銀二十兩曰論竒功如在海洋遇賊有能要擊衝沈船隻或追逐登山使賊不得登岸如賊既登岸有能衝鋒破陳奮其聲勢或追出境或逼下船使地方不致受禍或所部兵少而擒斬多者均以竒功論聽總督即時具題巡按作速勘報超格升賞曰分信地凡守備把總及海防民兵府州縣佐各有信地如賊至不能拒守致賊突入者固當律以守備不設之罪若能奮勇鏖戰或有首級功罪相當者亦許準贖若罪少功多者仍以功論如賊從别港路出境有能邀截擒斬打獲船隻所得貨物盡行給付仍照例升賞至於故縱出入本港専圖邀取賊贓者聽督撫官參究重治曰計職任詳見會題中曰處報效詳見會題中必如是而行之則有功不至於濫賞有罪不容於幸免而將士戮力用命矣此言賞罰之令當嚴巡撫都御史唐順之云肅隊而趨挺矛而舞非以為戲也將責之以臨陳禦敵之實用也責之臨陳禦敵之實用而不以臨陳禦敵之賞罰施之則亦戲而巳矣史傳所記子玉治兵斬七人貫三人耳孫武以婦女試陳法而戮其女隊長二人然後鼓之而無不如志然則古之治兵者大略可見也請於常廩之外多儲金錢以賞其用命者以作其投石超距之氣其不用命者縱不能盡如臨陳之刑而軍令所謂鞭笞貫耳等類許將官督操亦時一行之以示威或聨為伍法罰及同伍紀律既明人心自肅至其臨陳庶幾畏我而不畏敵矣此言操練時須發行賞罰人方知畏太倉生員毛希秉云欲人出死力不與同其利自古未有能濟者也乞依朝錯邊事胡人入驅能止所驅者以其半與之凡捕巡所獲鹽船賊船聽其照例估料納銀不得如舊惟有勢要在官人徴價給領利歸他人如此而再犯贓壞法照依文官永不許管軍管事庶彼顧利不敢輕犯明憲而可責其盡職矣此使人自為戰之法也兵備副使凌雲翼云臨陳退縮軍法甚重今領兵官員畏罪掩飾每遇賊入犯即妄稱領兵追賊其實去賊甚逺不惟不見其形雖賊之衆寡虛實亦不得而知也及尾賊出境乃揑報追至某處與賊血戰沈死者不計燒死者不計斬獲首級一顆豈有與賊血戰而斬獲僅一顆者乎此名為追賊實與退縮何異不加敕正遂效尤接踵習為故智豈不敗乃事哉今後須申明軍法務要從實追𠞰如果賊勢重大兵力寡弱徑自明白聲説以為别圖如或窮追連旬纍月不聞一戰直至賊出境虛飾浮詞欺罔觀聽者聽本道查實參呈重究與退縮同科庶可以破其躲閃之故態矣閩縣知縣仇俊卿云羊斟之微足以覆床一笠之小可以強吳三略曰軍無賞士不往使勸懲通乎人心可以使之赴水火者否則衆心解體矣何以能劫之使鬭哉是故行賞以示惠決罰以立威皆兵家之所尚也後世賞罰不明武備廢弛有脂韋襁抱而報功者有手獲功級而為人掩奪者亦有喪師矯以為捷而冒賞者有屢建竒功獨立而反蒙辜者亦有乘其喜怒愛憎之故而賞不以功罰不以罪者顛倒繆迷如此何以厭服人心振揚武烈哉顧其鋒鏑縱橫之際存亡呼吸之間人以萬死博一賞在上者寧不動心矜察之乎若有敵不前交鋒不勇者罰固無足議也亦有勢孤援寡勞逸飢飽主賔地利之不同者此皆有可原也斬將先登破陳殺賊者賞固在上功也亦有運籌決勝者雖未曽身蒙矢石亦賞之所推首也茍或俘降以邀功誘虜以違令甚至截殺行人老稚以充首級者又皆在所不赦也故將之五德信賞必罰為之主焉若近嵗王陽明申明賞罰疏雖已事之後猶不亡前功斯可以永昭勸懲者也豫按已上諸論皆賞罰之常格未盡其妙也何也今之衛所官乃紈袴子弟而巳矣武藝且多不諳况肯捐軀建功業乎衛所軍餘世平日久不經訓練一旦臨敵無技能可恃膽寒氣怯非敗即走以是常格賞罰待之豈能煆煉淬勵而得良將徑兵乎夫賞罰者榮辱之謂也大而官爵之命小而言語之褒皆謂之榮重而斬刖之刑輕而斥詈之及皆謂之辱施恩而可測者非榮也惟施不測之恩人方以為恩而知所勸耳施威而可測者非辱也惟施不測之辱人方以為威而知所懲耳故有今日為行伍而明日拔之為將領者有侵晨在人上而薄暮降之為役卒者褒貶豫奪大公無我顛倒豪傑莫知端倪則人孰肯甘處其辱而不思所以自奮哉周禮爵以馭其貴祿以馭其富正此意也在上者能測乎此則激惰為勤轉弱為強不必用衛所之官而民間自有良將可選不必調湖粵之兵而鄉閭自有勇夫可練矣禁妄殺兵備副使凌雲翼云賞功罰罪勸懲繫焉今各領兵官員既不能奮勇運謀為地方保障往往將被虜逃回或窮鄉避難之民殺以報功故行路者若非成羣不敢獨行是不能禦賊而反為民賊矣又從而賞之誠可痛恨今後報首級止一顆二顆者聽本道查訪果有對敵實迹方轉送紀驗其或詐冒無據者即鞠究明白坐以抵命至於指稱姦細殺以為功者猶為易見蓋謂之姦細必至一二人假裝吾民或探聽消息或潛為內應既巳覺露可縛而致之非臨陳血戰者比也何至斬首級哉以後姦細止許生擒不許殺害違者一體抵罪蓋天理人心昭然難泯而欲欺昧以求滅賊未有能濟者也御史徐栻云自古命將出征師還奏凱取魁首以為大戮後世緣此遂尚首功故首級不明非惟功賞不實亦多戕害人命西北邊功正患坐此流弊也故我祖宗深鑒兹弊惟海外諸蠻如倭之類得論首級以其種類别而真偽易辨耳近者斬獲倭冦得比照流賊事例已該兵部題奉欽依無容别議但臣恐貪冒成風功次失實則未免貽誣殺冒功之害也是可不嚴為之防乎臣願我皇上敕下該部議行海防巡撫都御史以後凡遇海上報捷即便詳加勘驗果係皮肉緊縮有血蔭刀痕者方為真正首級頂心門無髮又非刀剃者方為真正倭頭得以首級論功奏請升賞其有中國勾引之人雖係有髮須在大夥賊內對陳擒斬者方許比照從賊生擒例議賞如有誣殺平民妄冒功次者悉從巡按御史參究坐罪則庶乎首級申明而慎軍功重民命胥得之矣伏惟聖裁處首級都御史唐順之云鳥銃手不許割首級亦不暇割首級論賞與餘軍照數分級假如百人為率或鳥銃手十名餘軍九十名鳥銃手居餘軍十分之一或餘軍內得一首級該銀三十兩則鳥銃手得銀亦十分之一共分銀三兩或鳥銃手五十名餘軍五十名鳥銃手居餘軍二分之一餘軍得一首級則鳥銃手亦得銀二分之一共分銀一十五兩人數搭得多寡分銀數多寡率照此例算恤傷殘巡撫都御史彭巡按御史孫等議云優恤軍屬律有正條隱蔽殺傷例有明禁今後各道并軍衛有司部下軍兵俱要從實開報陳亡官員給銀三十兩奏請升級他鄉客死者仍給關文陳亡民兵一名給銀五兩官軍一名給銀三兩被傷軍兵傷重者一兩傷輕者五錢被殺民人未埋者五錢已埋者三錢被傷未痊者一錢房燒盡絶十口以上者三兩十口以下者一兩五錢老小無依者五錢壯丁砍去蘆葦者應納鹽課官為處補俱從兵備道呈請查給若有隱蔽不報者從重究治督糧道仍將近者議免太倉嘉定上海崇明四州縣荒蕪田糧及民運白糙糧米議改折色數目出榜諭衆通知務俾民有實惠籌海圖編卷十一
