body:
  text: 籌海圖編地理類五邊防之屬提要臣等謹案籌海圖編十三卷明胡宗憲撰宗憲字汝貞號梅林績溪人嘉靖戊戍進士官至兵部尚書督師剿倭冦以言官論劾下獄瘐死萬厯初追復原官諡襄懋事迹具明史本𫝊是書首載輿地全圖沿海沙山圖次載王官使倭略倭國入貢事略倭國事略次載廣東福建浙江直𨽻登萊五省沿海郡縣圖倭變圖兵防官考及事宜次載倭患總編年表次載冦踪分合圖譜次載大捷考次載遇難殉節考次載經略考明史稱趙文華督察浙江軍務宗憲深附之總督張經破倭於王江涇文華盡掩經功歸宗憲經遂得罪又陷撫臣李天寵文華還朝力薦宗憲遂擢顯秩宗憲又因文華結納嚴嵩以為內援其喜功名而尚權詐誠有如𫝊贊所云奢黷䝉垢者書中載胡松撰王江涇捷事略專述宗憲之功不及張經與本𫝊符合是其攘功之實證然其他若載嘉靖三十四年五月平望之捷陸涇壩之捷十一月清風嶺之捷三十五年仙居之捷七月乍浦之捷十一月龕山之捷及金塘淮揚寧台溫之捷又紀勦徐海及擒王直始末大端與明史紀𫝊均相符合則宗憲之保障東南尚不為無功經略考三卷內凡㑹哨鄰援招撫城守團結保甲宣諭間諜貢道互市及一切海船兵仗戎器火器無不周密又若唐順之張時徹俞大猷茅坤戚繼光諸條議是書亦靡不具載於明代海防亦云詳備蓋其人雖不醇其才則固一世之雄也乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
